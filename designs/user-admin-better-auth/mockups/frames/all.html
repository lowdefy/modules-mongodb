<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FRAME — all (user-admin)</title>
<style>
/* The frame dialect stylesheet — assets/frame.css, verbatim. */
@property --s {
  syntax: "<integer>";
  inherits: false;
  initial-value: 24;
}
@property --sm {
  syntax: "<integer>";
  inherits: false;
  initial-value: 24;
}
@property --g {
  syntax: "<length>";
  inherits: true;
  initial-value: 0px;
}
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  background: #f0f0f2;
}
.c {
  min-height: 1px;
  flex: 0 0 calc(var(--sm) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
  max-width: calc(var(--sm) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
}
@media (min-width: 768px) {
  .c {
    flex-basis: calc(var(--s) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
    max-width: calc(var(--s) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
  }
}
.fi {
  flex: 0 1 auto;
  max-width: none;
  min-height: 1px;
}
.sp {
  flex: 1 0 auto;
  max-width: none;
}
.r {
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  column-gap: var(--g, 0px);
  row-gap: var(--g, 0px);
}
.r.top {
  align-items: flex-start;
}
.r.mid {
  align-items: center;
}
.r.sb {
  justify-content: space-between;
}
.r.ctr {
  justify-content: center;
  align-items: center;
}
.card {
  background: #ffffff;
  border: 1px solid #d9d9de;
  border-radius: 10px;
}
.ph {
  background: #dcdce1;
  border-radius: 6px;
}
.shell {
  background: #cdced4;
}
.ovl {
  position: fixed;
  inset: 0;
  z-index: 9;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(16, 16, 20, 0.45);
}
.ovl.right {
  justify-content: flex-end;
  align-items: stretch;
}
.ovl.left {
  justify-content: flex-start;
  align-items: stretch;
}
.c[id],
.fi[id] {
  position: relative;
}
.c[id]::before,
.fi[id]::before {
  content: attr(id);
  position: absolute;
  left: 4px;
  top: 4px;
  z-index: 2;
  font:
    500 9px/1 ui-monospace,
    Menlo,
    monospace;
  color: #595963;
  background: rgba(255, 255, 255, 0.8);
  padding: 2px 4px;
  border-radius: 3px;
  pointer-events: none;
  white-space: nowrap;
}
.ph[id]::before {
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #595963;
  background: none;
  padding: 0;
}
</style>
</head>
<body>
  <!-- FRAME for the `all` page (Users list) — Members + Invitations tabs.
       Geometry derived from mockups/screens/all.html CSS:
       .appbar height 56  ·  .canvas max-width 1200, margin 0 auto, padding 24 32 40
       Shell (56) + wrapper padding-top (24) = 80 = mock first-content y. -->
  <div class="r">
    <div class="c" id="page">
      <div class="r">
        <!-- Page shell (layout `page` component: appbar + breadcrumb, component-owned) -->
        <div class="c shell" id="shell" style="height:56px"></div>

        <div class="c" id="content" style="max-width:1200px; margin:0 auto; padding:24px 32px 40px">
          <div class="r" style="--g:16px">

            <!-- ── title-block (shared) — title left, actions right, top-aligned ── -->
            <div class="c" id="users_titlebar" data-ldf-component="title-block">
              <div class="r top sb">
                <div class="fi ph" id="title_text" style="width:180px; height:34px"></div>
                <div class="fi" id="title_actions">
                  <div class="r" style="--g:8px">
                    <!-- download_excel_btn present only when the `download` var is true (Decision 2) -->
                    <div class="fi ph" id="download_excel_btn" style="width:150px; height:32px"></div>
                    <div class="fi ph" id="invite_user_btn" style="width:130px; height:32px"></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- ── Tabs (one strip of triggers, two panels/slots) ──
                 tabs_strip = the Tabs bar (absorbed by the Tabs block in phase 2);
                 each panel becomes a Tabs slot with its OWN filter/table/pagination. -->
            <div class="c" id="users_tabs">
              <div class="r" style="--g:16px">
                <div class="c ph" id="tabs_strip" style="height:42px"></div>

                <!-- SLOT / LAYER: Members tab (resting / base) -->
                <div class="c" id="members_panel" data-ldf-layer-hide="invitations_open">
                  <div class="r" style="--g:12px">

                    <!-- filter row: search, role filter, status segmented, clear
                         (consumer `components.filters` slot appends here) -->
                    <div class="c" id="members_filters">
                      <div class="r mid" style="--g:8px">
                        <div class="fi ph" id="members_search" style="width:340px; height:32px"></div>
                        <div class="fi ph" id="members_role_filter" style="width:140px; height:32px"></div>
                        <div class="fi ph" id="members_status_seg" style="width:270px; height:32px"></div>
                        <div class="fi ph" id="members_clear_btn" style="width:80px; height:32px"></div>
                      </div>
                    </div>

                    <!-- sort-filters (shared) — Sort-by selector + asc/desc toggle, right-aligned -->
                    <div class="c" id="members_sort_filters" data-ldf-component="sort-filters">
                      <div class="r" style="--g:8px">
                        <div class="sp"></div>
                        <div class="fi ph" id="members_sort_by" style="width:160px; height:32px"></div>
                        <div class="fi ph" id="members_sort_dir" style="width:32px; height:32px"></div>
                      </div>
                    </div>

                    <!-- AgGridBalham — one ph (whole table). Columns: Name, Email, Roles,
                         Status, [table_columns slot], Created, Updated, Signed up.
                         table height is a placeholder (content phase → 70vh). -->
                    <div class="c ph" id="members_table" style="height:240px"></div>

                    <!-- pagination (shared) — right-aligned footer -->
                    <div class="c ph" id="members_pagination" data-ldf-component="pagination" style="height:32px"></div>
                  </div>
                </div>

                <!-- SLOT / LAYER: Invitations tab (alt; hidden at rest for base render) -->
                <div class="c" id="invitations_panel" data-ldf-layer="invitations_open" hidden>
                  <div class="r" style="--g:12px">

                    <!-- filter row: search, status segmented (All/Invited/Expired), clear -->
                    <div class="c" id="invitations_filters">
                      <div class="r mid" style="--g:8px">
                        <div class="fi ph" id="invitations_search" style="width:340px; height:32px"></div>
                        <div class="fi ph" id="invitations_status_seg" style="width:250px; height:32px"></div>
                        <div class="fi ph" id="invitations_clear_btn" style="width:80px; height:32px"></div>
                      </div>
                    </div>

                    <!-- sort-filters (shared) — default Expiry -->
                    <div class="c" id="invitations_sort_filters" data-ldf-component="sort-filters">
                      <div class="r" style="--g:8px">
                        <div class="sp"></div>
                        <div class="fi ph" id="invitations_sort_by" style="width:160px; height:32px"></div>
                        <div class="fi ph" id="invitations_sort_dir" style="width:32px; height:32px"></div>
                      </div>
                    </div>

                    <!-- AgGridBalham — Email, Invited by, Roles, Status, Expires, Actions -->
                    <div class="c ph" id="invitations_table" style="height:132px"></div>

                    <div class="c ph" id="invitations_pagination" data-ldf-component="pagination" style="height:32px"></div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
