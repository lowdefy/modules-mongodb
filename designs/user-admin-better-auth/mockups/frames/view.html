<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Frame — user detail (view) — user-admin</title>
<style>
/* The frame dialect stylesheet — copy this VERBATIM into every frame's inline
 * <style>, plus nothing else.
 *
 * It is a ~30-line CSS system that replicates Lowdefy's layout engine exactly:
 * the same two-element block structure (.c = block wrapper / lf-col, .r = block
 * content row / lf-row), the same 24-column flex-basis formula from
 * @lowdefy/layout grid.css, and the same mobile-first breakpoint semantics.
 * Because a frame renders with Lowdefy's own math, "frame ≈ mock" implies
 * "app ≈ frame" almost by construction, and frame → YAML translation is
 * mechanical.
 *
 *   .c  = block wrapper (grid-col mode; --s span at md+, --sm below 768px)
 *   .r  = block content row (--g gap, wraps by default)
 *   .fi = flex-item mode (Lowdefy layout.flex: 0 1 auto)
 *   .sp = spacer         (Lowdefy layout.flex: 1 0 auto)
 *   .ph = leaf placeholder (the only element carrying explicit size)
 *
 * The .c width formula is copied verbatim from grid.css:
 *   flex-basis = span/24 * (100% + gap) - gap, gap inherited from parent .r.
 *
 * Colours are a neutral wireframe palette so a frame reads legibly beside the
 * mock in either light or dark mocks. They are frame-only — they never carry
 * into the Lowdefy output (structural blocks inherit the app theme; see
 * phases/02-layout.md).
 */
@property --s {
  syntax: "<integer>";
  inherits: false;
  initial-value: 24;
}
@property --sm {
  syntax: "<integer>";
  inherits: false;
  initial-value: 24;
}
@property --g {
  syntax: "<length>";
  inherits: true;
  initial-value: 0px;
}
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  background: #f0f0f2;
}
.c {
  min-height: 1px;
  flex: 0 0 calc(var(--sm) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
  max-width: calc(var(--sm) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
}
@media (min-width: 768px) {
  .c {
    flex-basis: calc(var(--s) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
    max-width: calc(var(--s) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
  }
}
.fi {
  flex: 0 1 auto;
  max-width: none;
  min-height: 1px;
}
.sp {
  flex: 1 0 auto;
  max-width: none;
}
.r {
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  column-gap: var(--g, 0px);
  row-gap: var(--g, 0px);
}
.r.top {
  align-items: flex-start;
}
.r.mid {
  align-items: center;
}
.r.sb {
  justify-content: space-between;
}
.r.ctr {
  justify-content: center;
  align-items: center;
}
.card {
  background: #ffffff;
  border: 1px solid #d9d9de;
  border-radius: 10px;
}
.ph {
  background: #dcdce1;
  border-radius: 6px;
}
.shell {
  background: #cdced4;
}
.ovl {
  position: fixed;
  inset: 0;
  z-index: 9;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(16, 16, 20, 0.45);
}
.ovl.right {
  justify-content: flex-end;
  align-items: stretch;
}
.ovl.left {
  justify-content: flex-start;
  align-items: stretch;
}
.c[id],
.fi[id] {
  position: relative;
}
.c[id]::before,
.fi[id]::before {
  content: attr(id);
  position: absolute;
  left: 4px;
  top: 4px;
  z-index: 2;
  font:
    500 9px/1 ui-monospace,
    Menlo,
    monospace;
  color: #595963;
  background: rgba(255, 255, 255, 0.8);
  padding: 2px 4px;
  border-radius: 3px;
  pointer-events: none;
  white-space: nowrap;
}
.ph[id]::before {
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #595963;
  background: none;
  padding: 0;
}
</style>
</head>
<body>
  <!-- ═══ BASE SCREEN (resting) ═══

       menu, breadcrumb) is owned by the shared layout/page component — one stub.

       proposed slot the component lacks — see layout phase); each tile maps to
       the shared layout/card component wrapping module-specific body content. -->

        <div class="c" id="content" style="max-width:1200px; margin:0 auto; padding:24px 32px 40px">

              <div class="r mid" style="--g:12px">
                <div class="fi ph" id="title_avatar" style="width:48px; height:48px"></div>
                <div class="fi ph" id="title_status_pill" style="width:74px; height:50px"></div>
                <div class="fi ph" id="title_name" style="width:280px; height:30px"></div>
              </div>
            </div>

            <!-- Two-column grid: main span 14 · side span 10 (1.4:1 in the mock). -->
            <div class="c" id="detail_grid" style="--s:24">
              <div class="r top" style="--g:16px">

                <!-- ── MAIN COLUMN (span 14) ─────────────────────────────── -->

                  <div class="r" style="--g:16px">

                    <!-- Profile tile -->
                    <div class="c card" id="profile_tile" data-ldf-component="card" style="--s:24">
                      <div class="r">
                        <div class="c" id="profile_head" style="--s:24; padding:12px 16px">
                          <div class="r mid sb">
                            <div class="fi ph" id="profile_head_title" style="width:110px; height:22px"></div>
                            <div class="fi ph" id="profile_edit_btn" style="width:72px; height:24px"></div>
                          </div>
                        </div>
                        <div class="c" id="profile_body" style="--s:24; padding:16px">
                          <div class="r">
                            <div class="c ph" id="profile_view" style="--s:24; height:186px"></div>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- Attributes tile (roles + member attributes) -->
                    <div class="c card" id="attributes_tile" data-ldf-component="card" style="--s:24">
                      <div class="r">
                        <div class="c" id="attributes_head" style="--s:24; padding:12px 16px">
                          <div class="r mid sb">
                            <div class="fi ph" id="attributes_head_title" style="width:110px; height:22px"></div>
                            <div class="fi ph" id="attributes_edit_btn" style="width:72px; height:24px"></div>
                          </div>
                        </div>
                        <div class="c" id="attributes_body" style="--s:24; padding:16px">
                          <div class="r">
                            <div class="c ph" id="attributes_view" style="--s:24; height:112px"></div>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- Global attributes tile (user-row attributes) -->
                    <div class="c card" id="global_attrs_tile" data-ldf-component="card" style="--s:24">
                      <div class="r">
                        <div class="c" id="global_attrs_head" style="--s:24; padding:12px 16px">
                          <div class="r mid sb">
                            <div class="fi ph" id="global_attrs_head_title" style="width:150px; height:22px"></div>
                            <div class="fi ph" id="global_attrs_edit_btn" style="width:72px; height:24px"></div>
                          </div>
                        </div>
                        <div class="c" id="global_attrs_body" style="--s:24; padding:16px">
                          <div class="r">

                          </div>
                        </div>
                      </div>
                    </div>

                  </div>
                </div>

                <!-- ── SIDE COLUMN (span 10) ─────────────────────────────── -->

                  <div class="r" style="--g:16px">

                    <!-- Security tile -->

                      <div class="r">

                        </div>

                            <div class="c ph" id="methods_eyebrow" style="--s:24; height:16px"></div>
                            <div class="c ph" id="auth_methods" style="--s:24; height:24px"></div>
                          </div>

                          </div>
                        </div>
                        <div class="c" id="apps_body" style="--s:24; padding:16px">
                          <div class="r" style="--g:8px">

                      </div>

                          </div>
                        </div>
                      </div>
                    </div>

                  </div>
                </div>

              </div>
            </div>

        </div>

    <div class="c card" id="modal_profile" style="width:560px; max-width:560px">
      <div class="r">
        <div class="c" id="modal_profile_head" style="--s:24; padding:16px 24px">
          <div class="r mid sb">
            <div class="fi ph" id="modal_profile_title" style="width:130px; height:22px"></div>
            <div class="fi ph" id="modal_profile_close" style="width:20px; height:20px"></div>
          </div>
        </div>
        <div class="c" id="modal_profile_body" style="--s:24; padding:24px">
          <div class="r" style="--g:16px">
            <div class="c ph" id="profile_form_name" style="--s:12; height:56px"></div>
            <div class="c ph" id="profile_form_email" style="--s:12; height:56px"></div>
            <div class="c ph" id="profile_form_phone" style="--s:12; height:56px"></div>

        </div>

          <div class="r sb">

      <div class="r">

            <div class="c ph" id="access_form_roles_hint" style="--s:24; height:32px"></div>
            <div class="c ph" id="access_form_region" style="--s:24; height:56px"></div>
            <div class="c ph" id="access_form_cost_centre" style="--s:24; height:56px"></div>
          </div>
        </div>
        <div class="c" id="modal_access_foot" style="--s:24; padding:16px 24px">
          <div class="r sb">
            <div class="fi ph" id="modal_access_cancel" style="width:80px; height:32px"></div>
            <div class="fi ph" id="modal_access_save" style="width:130px; height:32px"></div>
          </div>

    </div>

    <div class="c card" id="modal_global" style="width:480px; max-width:480px">
      <div class="r">
        <div class="c" id="modal_global_head" style="--s:24; padding:16px 24px">
          <div class="r mid sb">
            <div class="fi ph" id="modal_global_title" style="width:180px; height:22px"></div>

            <div class="c ph" id="global_form_locale" style="--s:24; height:56px"></div>
            <div class="c ph" id="global_form_hint" style="--s:24; height:20px"></div>
          </div>
        </div>
        <div class="c" id="modal_global_foot" style="--s:24; padding:16px 24px">
          <div class="r sb">
            <div class="fi ph" id="modal_global_cancel" style="width:80px; height:32px"></div>
            <div class="fi ph" id="modal_global_save" style="width:130px; height:32px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- LAYER: Suspend confirm (BanUser — global blast radius, Decision 4) -->
  <div class="ovl" data-ldf-layer="modal_suspend">
    <div class="c card" id="modal_suspend" style="width:480px; max-width:480px">
      <div class="r">
        <div class="c" id="modal_suspend_head" style="--s:24; padding:16px 24px">
          <div class="r mid sb">
            <div class="fi ph" id="modal_suspend_title" style="width:220px; height:22px"></div>
            <div class="fi ph" id="modal_suspend_close" style="width:20px; height:20px"></div>

            <div class="c ph" id="suspend_membership_list" style="--s:24; height:132px"></div>
          </div>
        </div>

          <div class="r sb">
            <div class="fi ph" id="modal_suspend_cancel" style="width:80px; height:32px"></div>

  <!-- LAYER: Sign out everywhere confirm (RevokeUserSessions) -->
  <div class="ovl" data-ldf-layer="modal_revoke">
    <div class="c card" id="modal_revoke" style="width:480px; max-width:480px">
