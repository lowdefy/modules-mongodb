# Members filter bar (skill-3 content fill). Own state, own request
# (get_members). Status is a SegmentedSelector fixed to All/Active/Suspended.
id: members_filters
type: Box
layout:
  gap: 8
  align: middle
  selfAlign: middle
blocks:
  - id: members_search
    type: TextInput
    layout:
      flex: 0 1 auto
    style:
      width: 320px
      maxWidth: 100%
    properties:
      placeholder: Search name or email
      allowClear: true
      label:
        disabled: true
  - id: members_role
    type: Selector
    layout:
      flex: 0 0 auto
    style:
      width: 150px
    properties:
      placeholder: Role
      allowClear: true
      label:
        disabled: true
      # TODO(request-substitute) members_role options: from the app role catalog
      #   (auth.roles); mock uses the roles visible in the mock.
      options:
        - label: Admin
          value: admin
        - label: Editor
          value: editor
        - label: Viewer
          value: viewer
  - id: members_status
    type: SegmentedSelector
    layout:
      flex: 0 0 auto
    properties:
      label:
        disabled: true
      options:
        - label: All
          value: all
        - label: Active
          value: active
        - label: Suspended
          value: suspended
  - id: members_clear
    type: Button
    layout:
      flex: 0 0 auto
    properties:
      title: Clear
      variant: text
