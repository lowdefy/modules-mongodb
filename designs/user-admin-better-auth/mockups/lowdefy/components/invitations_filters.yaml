# Invitations filter bar (skill-3 content fill). Own state, own request
# (get_invitations). Status is a SegmentedSelector fixed to All/Invited/Expired
# (Expired is derived: status "pending" AND expiresAt < now).
id: invitations_filters
type: Box
layout:
  gap: 8
  align: middle
  selfAlign: middle
blocks:
  - id: invitations_search
    type: TextInput
    layout:
      flex: 0 1 auto
    style:
      width: 320px
      maxWidth: 100%
    properties:
      placeholder: Search email
      allowClear: true
      label:
        disabled: true
  - id: invitations_role
    type: Selector
    layout:
      flex: 0 0 auto
    style:
      width: 150px
    properties:
      placeholder: Role
      allowClear: true
      label:
        disabled: true
      # TODO(request-substitute) invitations_role options: from the app role
      #   catalog (auth.roles); mock uses the roles visible in the mock.
      options:
        - label: Admin
          value: admin
        - label: Editor
          value: editor
        - label: Viewer
          value: viewer
  - id: invitations_status
    type: SegmentedSelector
    layout:
      flex: 0 0 auto
    properties:
      label:
        disabled: true
      options:
        - label: All
          value: all
        - label: Invited
          value: invited
        - label: Expired
          value: expired
  - id: invitations_clear
    type: Button
    layout:
      flex: 0 0 auto
    properties:
      title: Clear
      variant: text
