# `all` page — Members + Invitations.
#
# Skill-2 output (frame -> Lowdefy layout), in the SPIRIT of the skill but
# built on this repo's shared components instead of eval placeholder boxes:
#   - shell + breadcrumb + page title come from the shared layout page
#     component (modules/layout/components/page.yaml -> PageHeaderMenu +
#     title-block). No hand-rolled chrome.
#   - pagers come from the shared modules/shared/layout/pagination.yaml.
# Structural pass: layout/geometry is real; DATA content (tables, filter
# inputs) is left as clearly-marked placeholders for the content pass
# (which adds requests, AgGrid columns, selector options, etc.).
#
# Destination: modules/user-admin/pages/all.yaml. Refs (module: layout,
# components/*, ../shared/layout/*) are written to resolve from the module
# root, so this drops straight into the module tree.
_ref:
  module: layout
  component: page
  vars:
    id: all
    title: Users
    type: Access administration # eyebrow (title-block)
    description: People with access to this app # subtitle (title-block)
    content_width: 1200
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label: Users
    # Right-hand actions slot of the title-block. Download is gated by the
    # `download` var (design Decision 2, default false); Invite links to the
    # invite page.
    page_actions:
      _build.array.concat:
        - _build.if:
            test:
              _module.var: download
            then:
              - id: download_excel_btn
                type: Button
                layout:
                  flex: 0 0 auto
                properties:
                  title: Download Excel
                  icon: AiOutlineDownload
                  variant: outlined
                # onClick (fetch + DownloadXlsx) wired in the content pass.
            else: []
        - - id: invite_user_btn
            type: Button
            layout:
              flex: 0 0 auto
            style:
              marginLeft: 8
            properties:
              title: Invite user
              icon: AiOutlinePlus
            events:
              onClick:
                - id: go_invite
                  type: Link
                  params:
                    pageId:
                      _module.pageId: invite
    blocks:
      # Members | Invitations. Each tab carries its own filters + table +
      # pagination (own state, own request) — see users_tabs.yaml.
      - _ref: components/users_tabs.yaml
