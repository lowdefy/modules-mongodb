<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Frame — account workspace (view) — user-account</title>
<style>
/* The frame dialect stylesheet — copy this VERBATIM into every frame's inline
 * <style>, plus nothing else.
 *
 * It is a ~30-line CSS system that replicates Lowdefy's layout engine exactly:
 * the same two-element block structure (.c = block wrapper / lf-col, .r = block
 * content row / lf-row), the same 24-column flex-basis formula from
 * @lowdefy/layout grid.css, and the same mobile-first breakpoint semantics.
 * Because a frame renders with Lowdefy's own math, "frame ≈ mock" implies
 * "app ≈ frame" almost by construction, and frame → YAML translation is
 * mechanical.
 *
 *   .c  = block wrapper (grid-col mode; --s span at md+, --sm below 768px)
 *   .r  = block content row (--g gap, wraps by default)
 *   .fi = flex-item mode (Lowdefy layout.flex: 0 1 auto)
 *   .sp = spacer         (Lowdefy layout.flex: 1 0 auto)
 *   .ph = leaf placeholder (the only element carrying explicit size)
 *
 * The .c width formula is copied verbatim from grid.css:
 *   flex-basis = span/24 * (100% + gap) - gap, gap inherited from parent .r.
 *
 * Colours are a neutral wireframe palette so a frame reads legibly beside the
 * mock in either light or dark mocks. They are frame-only — they never carry
 * into the Lowdefy output (structural blocks inherit the app theme; see
 * phases/02-layout.md).
 */
@property --s {
  syntax: "<integer>";
  inherits: false;
  initial-value: 24;
}
@property --sm {
  syntax: "<integer>";
  inherits: false;
  initial-value: 24;
}
@property --g {
  syntax: "<length>";
  inherits: true;
  initial-value: 0px;
}
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  background: #f0f0f2;
}
.c {
  min-height: 1px;
  flex: 0 0 calc(var(--sm) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
  max-width: calc(var(--sm) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
}
@media (min-width: 768px) {
  .c {
    flex-basis: calc(var(--s) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
    max-width: calc(var(--s) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
  }
}
.fi {
  flex: 0 1 auto;
  max-width: none;
  min-height: 1px;
}
.sp {
  flex: 1 0 auto;
  max-width: none;
}
.r {
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  column-gap: var(--g, 0px);
  row-gap: var(--g, 0px);
}
.r.top {
  align-items: flex-start;
}
.r.mid {
  align-items: center;
}
.r.sb {
  justify-content: space-between;
}
.r.ctr {
  justify-content: center;
  align-items: center;
}
.card {
  background: #ffffff;
  border: 1px solid #d9d9de;
  border-radius: 10px;
}
.ph {
  background: #dcdce1;
  border-radius: 6px;
}
.shell {
  background: #cdced4;
}
.ovl {
  position: fixed;
  inset: 0;
  z-index: 9;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(16, 16, 20, 0.45);
}
.ovl.right {
  justify-content: flex-end;
  align-items: stretch;
}
.ovl.left {
  justify-content: flex-start;
  align-items: stretch;
}
.c[id],
.fi[id] {
  position: relative;
}
.c[id]::before,
.fi[id]::before {
  content: attr(id);
  position: absolute;
  left: 4px;
  top: 4px;
  z-index: 2;
  font:
    500 9px/1 ui-monospace,
    Menlo,
    monospace;
  color: #595963;
  background: rgba(255, 255, 255, 0.8);
  padding: 2px 4px;
  border-radius: 3px;
  pointer-events: none;
  white-space: nowrap;
}
.ph[id]::before {
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #595963;
  background: none;
  padding: 0;
}
</style>
</head>
<body>
  <!-- ═══ BASE SCREEN (resting) ═══
       Account workspace — the signed-in self-service console (design Decision 5).
       Shell chrome (top menu, breadcrumb, profile) is owned by the shared
       layout/page component — one stub. The titlebar maps to the shared
       title-block component (the mock's avatar is a proposed slot the component
       lacks — carried here for geometry only, NOT added to the page, matching the
       user-admin view). Each tile maps to the shared layout/card component
       wrapping self-service body content. Two columns: main (Profile, Security)
       + side (Active sessions, Linked accounts). -->
  <div class="r">
    <div class="c" id="view_page">
      <div class="r">
        <div class="c shell" id="shell" style="height:56px"></div>
        <div class="c" id="content" style="max-width:1200px; margin:0 auto; padding:24px 32px 40px">
          <div class="r" style="--g:16px">

            <!-- Title-block: avatar (proposed slot, geometry-only) + title column
                 (Account + subtitle). page-actions empty — edits are
                 section-scoped (Decision 5). Maps to shared title-block. -->
            <div class="c" id="account_titlebar" data-ldf-component="title-block" style="--s:24">
              <div class="r mid" style="--g:12px">
                <div class="fi ph" id="title_avatar" style="width:48px; height:48px"></div>
                <div class="fi ph" id="title_text" style="width:360px; height:48px"></div>
              </div>
            </div>

            <!-- Two-column grid: main span 14 · side span 10 (1.4:1 in the mock). -->
            <div class="c" id="account_grid" style="--s:24">
              <div class="r top" style="--g:16px">

                <!-- ── MAIN COLUMN (span 14) ─────────────────────────────── -->
                <div class="c" id="account_main_col" style="--s:14; --sm:24">
                  <div class="r" style="--g:16px">

                    <!-- Profile tile -->
                    <div class="c card" id="profile_tile" data-ldf-component="card" style="--s:24">
                      <div class="r">
                        <div class="c" id="profile_head" style="--s:24; padding:12px 16px">
                          <div class="r mid sb">
                            <div class="fi ph" id="profile_head_title" style="width:80px; height:22px"></div>
                            <div class="fi ph" id="profile_edit_btn" style="width:72px; height:24px"></div>
                          </div>
                        </div>
                        <div class="c" id="profile_body" style="--s:24; padding:16px">
                          <div class="r">
                            <div class="c ph" id="profile_view" style="--s:24; height:186px"></div>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- Security tile — sign-in rows (password, 2FA, passkeys) -->
                    <div class="c card" id="security_tile" data-ldf-component="card" style="--s:24">
                      <div class="r">
                        <div class="c" id="security_head" style="--s:24; padding:12px 16px">
                          <div class="r mid sb">
                            <div class="fi ph" id="security_head_title" style="width:90px; height:22px"></div>
                            <div class="fi ph" id="security_verified_badge" style="width:130px; height:22px"></div>
                          </div>
                        </div>
                        <div class="c" id="security_body" style="--s:24; padding:16px">
                          <div class="r" style="--g:0px">
                            <div class="c ph" id="security_signin_eyebrow" style="--s:24; height:16px"></div>
                            <!-- Password row -->
                            <div class="c" id="password_row" style="--s:24; padding:12px 0">
                              <div class="r mid sb">
                                <div class="fi ph" id="password_info" style="width:300px; height:40px"></div>
                                <div class="fi ph" id="password_change_btn" style="width:72px; height:24px"></div>
                              </div>
                            </div>
                            <!-- Two-factor row -->
                            <div class="c" id="twofa_row" style="--s:24; padding:12px 0">
                              <div class="r mid sb">
                                <div class="fi ph" id="twofa_info" style="width:300px; height:40px"></div>
                                <div class="fi" id="twofa_actions">
                                  <div class="r mid" style="--g:8px">
                                    <div class="fi ph" id="twofa_manage_btn" style="width:78px; height:24px"></div>
                                    <div class="fi ph" id="twofa_disable_btn" style="width:70px; height:24px"></div>
                                  </div>
                                </div>
                              </div>
                            </div>
                            <!-- Passkeys row -->
                            <div class="c" id="passkeys_row" style="--s:24; padding:12px 0">
                              <div class="r mid sb">
                                <div class="fi ph" id="passkeys_info" style="width:300px; height:40px"></div>
                                <div class="fi ph" id="passkeys_add_btn" style="width:104px; height:24px"></div>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- main_slots — consumer extension surface (Decision 8) -->
                    <div class="c ph" id="main_slots" style="--s:24; height:1px"></div>

                  </div>
                </div>

                <!-- ── SIDE COLUMN (span 10) ─────────────────────────────── -->
                <div class="c" id="account_side_col" style="--s:10; --sm:24">
                  <div class="r" style="--g:16px">

                    <!-- Active sessions tile -->
                    <div class="c card" id="sessions_tile" data-ldf-component="card" style="--s:24">
                      <div class="r">
                        <div class="c" id="sessions_head" style="--s:24; padding:12px 16px">
                          <div class="r mid sb">
                            <div class="fi ph" id="sessions_head_title" style="width:120px; height:22px"></div>
                            <div class="fi ph" id="sessions_sign_out_others_btn" style="width:120px; height:24px"></div>
                          </div>
                        </div>
                        <div class="c" id="sessions_body" style="--s:24; padding:16px">
                          <div class="r" style="--g:12px">
                            <div class="c ph" id="sessions_list" style="--s:24; height:156px"></div>
                            <div class="c ph" id="sessions_hint" style="--s:24; height:36px"></div>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- Linked accounts tile (read-only) -->
                    <div class="c card" id="linked_accounts_tile" data-ldf-component="card" style="--s:24">
                      <div class="r">
                        <div class="c" id="linked_accounts_head" style="--s:24; padding:12px 16px">
                          <div class="r mid">
                            <div class="fi ph" id="linked_accounts_head_title" style="width:130px; height:22px"></div>
                          </div>
                        </div>
                        <div class="c" id="linked_accounts_body" style="--s:24; padding:16px">
                          <div class="r" style="--g:12px">
                            <div class="c ph" id="linked_accounts_list" style="--s:24; height:104px"></div>
                            <div class="c ph" id="linked_accounts_hint" style="--s:24; height:20px"></div>
                          </div>
                        </div>
                      </div>
                    </div>

                  </div>
                </div>

              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ INTERACTION-STATE LAYERS (4 modals; triggers live in the base) ═══ -->

  <!-- LAYER: Edit profile (write-profile routine → update-profile API) -->
  <div class="ovl" data-ldf-layer="modal_profile">
    <div class="c card" id="modal_profile" style="width:560px; max-width:560px">
      <div class="r">
        <div class="c" id="modal_profile_head" style="--s:24; padding:16px 24px">
          <div class="r mid sb">
            <div class="fi ph" id="modal_profile_title" style="width:110px; height:22px"></div>
            <div class="fi ph" id="modal_profile_close" style="width:20px; height:20px"></div>
          </div>
        </div>
        <div class="c" id="modal_profile_body" style="--s:24; padding:24px">
          <div class="r" style="--g:16px">
            <!-- profile-avatar shared component: preview + colour picker -->
            <div class="c ph" id="profile_avatar_edit" style="--s:24; height:64px"></div>
            <div class="c ph" id="profile_form_given_name" style="--s:12; height:56px"></div>
            <div class="c ph" id="profile_form_family_name" style="--s:12; height:56px"></div>
            <div class="c ph" id="profile_form_phone" style="--s:12; height:56px"></div>
            <div class="c ph" id="profile_form_job_title" style="--s:12; height:56px"></div>
            <div class="c ph" id="profile_form_department" style="--s:12; height:56px"></div>
          </div>
        </div>
        <div class="c" id="modal_profile_foot" style="--s:24; padding:16px 24px">
          <div class="r sb">
            <div class="fi ph" id="modal_profile_cancel" style="width:80px; height:32px"></div>
            <div class="fi ph" id="modal_profile_save" style="width:120px; height:32px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- LAYER: Change password (ChangePassword client action) -->
  <div class="ovl" data-ldf-layer="modal_changepw">
    <div class="c card" id="modal_changepw" style="width:480px; max-width:480px">
      <div class="r">
        <div class="c" id="modal_changepw_head" style="--s:24; padding:16px 24px">
          <div class="r mid sb">
            <div class="fi ph" id="modal_changepw_title" style="width:150px; height:22px"></div>
            <div class="fi ph" id="modal_changepw_close" style="width:20px; height:20px"></div>
          </div>
        </div>
        <div class="c" id="modal_changepw_body" style="--s:24; padding:24px">
          <div class="r" style="--g:16px">
            <div class="c ph" id="changepw_form_current" style="--s:24; height:56px"></div>
            <div class="c ph" id="changepw_form_new" style="--s:24; height:76px"></div>
            <div class="c ph" id="changepw_form_revoke_others" style="--s:24; height:24px"></div>
          </div>
        </div>
        <div class="c" id="modal_changepw_foot" style="--s:24; padding:16px 24px">
          <div class="r sb">
            <div class="fi ph" id="modal_changepw_cancel" style="width:80px; height:32px"></div>
            <div class="fi ph" id="modal_changepw_save" style="width:150px; height:32px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- LAYER: Set up 2FA (TwoFactorEnable → totpURI QR + confirm code) -->
  <div class="ovl" data-ldf-layer="modal_enroltotp">
    <div class="c card" id="modal_enroltotp" style="width:560px; max-width:560px">
      <div class="r">
        <div class="c" id="modal_enroltotp_head" style="--s:24; padding:16px 24px">
          <div class="r mid sb">
            <div class="fi ph" id="modal_enroltotp_title" style="width:280px; height:22px"></div>
            <div class="fi ph" id="modal_enroltotp_close" style="width:20px; height:20px"></div>
          </div>
        </div>
        <div class="c" id="modal_enroltotp_body" style="--s:24; padding:24px">
          <div class="r" style="--g:16px">
            <div class="c ph" id="enroltotp_intro" style="--s:24; height:20px"></div>
            <!-- QR (fixed) left · manual-entry + confirm code right -->
            <div class="c" id="enroltotp_qr" style="--s:8; --sm:24; height:132px"></div>
            <div class="c" id="enroltotp_scancol" style="--s:16; --sm:24">
              <div class="r" style="--g:16px">
                <div class="c ph" id="enroltotp_uri" style="--s:24; height:52px"></div>
                <div class="c ph" id="enroltotp_confirm_code" style="--s:24; height:60px"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="c" id="modal_enroltotp_foot" style="--s:24; padding:16px 24px">
          <div class="r sb">
            <div class="fi ph" id="modal_enroltotp_cancel" style="width:80px; height:32px"></div>
            <div class="fi ph" id="modal_enroltotp_confirm" style="width:160px; height:32px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- LAYER: Save backup codes (post-enrolment) -->
  <div class="ovl" data-ldf-layer="modal_backupcodes">
    <div class="c card" id="modal_backupcodes" style="width:480px; max-width:480px">
      <div class="r">
        <div class="c" id="modal_backupcodes_head" style="--s:24; padding:16px 24px">
          <div class="r mid sb">
            <div class="fi ph" id="modal_backupcodes_title" style="width:200px; height:22px"></div>
            <div class="fi ph" id="modal_backupcodes_close" style="width:20px; height:20px"></div>
          </div>
        </div>
        <div class="c" id="modal_backupcodes_body" style="--s:24; padding:24px">
          <div class="r" style="--g:12px">
            <div class="c ph" id="backupcodes_message" style="--s:24; height:40px"></div>
            <div class="c ph" id="backupcodes_grid" style="--s:24; height:96px"></div>
            <div class="c ph" id="backupcodes_alert" style="--s:24; height:44px"></div>
          </div>
        </div>
        <div class="c" id="modal_backupcodes_foot" style="--s:24; padding:16px 24px">
          <div class="r sb">
            <div class="fi ph" id="modal_backupcodes_copy" style="width:80px; height:32px"></div>
            <div class="fi ph" id="modal_backupcodes_done" style="width:140px; height:32px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
