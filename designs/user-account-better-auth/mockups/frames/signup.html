<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440, initial-scale=1" />
<title>Signup — frame</title>
<style>
/* The frame dialect stylesheet — copy this VERBATIM into every frame's inline
 * <style>, plus nothing else.
 *
 * It is a ~30-line CSS system that replicates Lowdefy's layout engine exactly:
 * the same two-element block structure (.c = block wrapper / lf-col, .r = block
 * content row / lf-row), the same 24-column flex-basis formula from
 * @lowdefy/layout grid.css, and the same mobile-first breakpoint semantics.
 * Because a frame renders with Lowdefy's own math, "frame ≈ mock" implies
 * "app ≈ frame" almost by construction, and frame → YAML translation is
 * mechanical.
 *
 *   .c  = block wrapper (grid-col mode; --s span at md+, --sm below 768px)
 *   .r  = block content row (--g gap, wraps by default)
 *   .fi = flex-item mode (Lowdefy layout.flex: 0 1 auto)
 *   .sp = spacer         (Lowdefy layout.flex: 1 0 auto)
 *   .ph = leaf placeholder (the only element carrying explicit size)
 *
 * The .c width formula is copied verbatim from grid.css:
 *   flex-basis = span/24 * (100% + gap) - gap, gap inherited from parent .r.
 *
 * Colours are a neutral wireframe palette so a frame reads legibly beside the
 * mock in either light or dark mocks. They are frame-only — they never carry
 * into the Lowdefy output (structural blocks inherit the app theme; see
 * phases/02-layout.md).
 */
@property --s {
  syntax: "<integer>";
  inherits: false;
  initial-value: 24;
}
@property --sm {
  syntax: "<integer>";
  inherits: false;
  initial-value: 24;
}
@property --g {
  syntax: "<length>";
  inherits: true;
  initial-value: 0px;
}
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  background: #f0f0f2;
}
.c {
  min-height: 1px;
  flex: 0 0 calc(var(--sm) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
  max-width: calc(var(--sm) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
}
@media (min-width: 768px) {
  .c {
    flex-basis: calc(var(--s) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
    max-width: calc(var(--s) / 24 * (100% + var(--g, 0px)) - var(--g, 0px));
  }
}
.fi {
  flex: 0 1 auto;
  max-width: none;
  min-height: 1px;
}
.sp {
  flex: 1 0 auto;
  max-width: none;
}
.r {
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  column-gap: var(--g, 0px);
  row-gap: var(--g, 0px);
}
.r.top {
  align-items: flex-start;
}
.r.mid {
  align-items: center;
}
.r.sb {
  justify-content: space-between;
}
.r.ctr {
  justify-content: center;
  align-items: center;
}
.card {
  background: #ffffff;
  border: 1px solid #d9d9de;
  border-radius: 10px;
}
.ph {
  background: #dcdce1;
  border-radius: 6px;
}
.shell {
  background: #cdced4;
}
.ovl {
  position: fixed;
  inset: 0;
  z-index: 9;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(16, 16, 20, 0.45);
}
.ovl.right {
  justify-content: flex-end;
  align-items: stretch;
}
.ovl.left {
  justify-content: flex-start;
  align-items: stretch;
}
.c[id],
.fi[id] {
  position: relative;
}
.c[id]::before,
.fi[id]::before {
  content: attr(id);
  position: absolute;
  left: 4px;
  top: 4px;
  z-index: 2;
  font:
    500 9px/1 ui-monospace,
    Menlo,
    monospace;
  color: #595963;
  background: rgba(255, 255, 255, 0.8);
  padding: 2px 4px;
  border-radius: 3px;
  pointer-events: none;
  white-space: nowrap;
}
.ph[id]::before {
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #595963;
  background: none;
  padding: 0;
}
</style>
</head>
<body>
  <div class="r ctr" style="padding:64px 0">
    <div class="c" id="auth-page" data-ldf-component="auth-page" style="--s:7; --sm:24; max-width:400px">
      <div class="c card" id="auth-card">
        <div class="r" style="--g:0px">
          <div class="c ph" id="auth-cover" style="height:96px"></div>
        </div>
        <div class="r" style="padding:26px 32px 28px; --g:16px">
        <div class="c ph" id="signup_title" style="height:28px"></div>
        <div class="c ph" id="profile.first_name" style="height:64px"></div>
        <div class="c ph" id="profile.last_name" style="height:64px"></div>
        <div class="c ph" id="email" style="height:64px"></div>
        <div class="c ph" id="password" style="height:78px"></div>
        <div class="c ph" id="signup_submit" style="height:40px"></div>
        <div class="c ph" id="signup_oauth_divider" style="height:20px"></div>
        <div class="c ph" id="signup_oauth_google" style="height:40px"></div>
        </div>
      </div>
      <div class="c" id="auth-nav" style="margin-top:18px">
        <div class="r">
        <div class="c ph" id="signup_footer" style="height:16px"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
