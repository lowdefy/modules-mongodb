<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440, initial-scale=1" />
<title>Logout — user-account</title>
<link rel="stylesheet" href="mock.css" />
<style>.auth-page{width:360px}</style>
</head>
<body>
<div class="mock">
  <div class="stage">
    <div class="auth-page" id="logout_page" data-ldf-component="auth-page">
      <div class="auth-card">
        <div class="auth-cover"><div class="logo"><span class="mk">M</span><span class="nm">Module Demo App</span></div></div>
        <div class="auth-blocks">
          <div class="result" id="logout_message"><div class="rt">You're signed out</div><div class="rs">Thanks for stopping by. Your session on this device has ended.</div></div>
          <button class="btn pri lg block" id="logout_sign_in_again">Sign in again</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
