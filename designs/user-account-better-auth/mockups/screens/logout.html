<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Signed out</title>
<style>
  :root{
    --violet:#7c3aed; --violet-hover:#6d28d9; --violet-active:#5b21b6;
    --violet-bg:#f4ecff; --violet-bg-2:#ece0ff; --violet-border:#d6bbfb;
    --cover-a:#5729a6; --cover-b:#7c3aed;
    --bg-layout:#f5f5f5; --bg-container:#ffffff;
    --text:rgba(0,0,0,.88); --text-2:rgba(0,0,0,.62); --text-3:rgba(0,0,0,.42);
    --border:#f0f0f0; --border-strong:#d9d9d9;
    --radius:6px; --radius-sm:4px; --radius-lg:8px;
    --shadow-card:0 1px 2px 0 rgba(0,0,0,.03),0 1px 6px -1px rgba(0,0,0,.03),0 2px 4px 0 rgba(0,0,0,.02);
    --shadow-pop:0 6px 16px 0 rgba(0,0,0,.08),0 3px 6px -4px rgba(0,0,0,.12),0 9px 28px 8px rgba(0,0,0,.05);
    --shadow-auth:0 12px 32px -8px rgba(60,30,110,.22),0 2px 8px rgba(0,0,0,.04);
    --ok-bg:#f6ffed;--ok-bd:#b7eb8f;--ok-fg:#389e0d;
    --info-bg:#e6f7ff;--info-bd:#91d5ff;--info-fg:#096dd9;
    --err-bg:#fff1f0;--err-bd:#ffa39e;--err-fg:#cf1322;
    --warn-bg:#fffbe6;--warn-bd:#ffe58f;--warn-fg:#d48806;
    --neutral-bg:#fafafa;--neutral-bd:#d9d9d9;--neutral-fg:#595959;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--text);font-size:14px;line-height:1.5714;-webkit-font-smoothing:antialiased}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  code{font-size:12px;background:#efeaf9;color:var(--violet-active);padding:1px 5px;border-radius:4px}

  /* stage */
  body.auth{min-height:100vh;display:grid;place-items:center;padding:44px 20px;
    background:radial-gradient(1100px 380px at 50% -8%,rgba(124,58,237,.10),transparent 70%),var(--bg-layout)}
  body.shell{background:var(--bg-layout);min-height:100vh}
  body.modal-stage{min-height:100vh;display:grid;place-items:center;padding:34px 20px;
    background:linear-gradient(0deg,rgba(30,20,50,.28),rgba(30,20,50,.28)),repeating-linear-gradient(45deg,#e9e9ee,#e9e9ee 12px,#e4e4ea 12px,#e4e4ea 24px)}
  .authwrap{width:100%;display:flex;flex-direction:column}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;font-size:13.5px;line-height:1;border-radius:6px;padding:7px 13px;border:1px solid var(--border-strong);background:#fff;color:var(--text);cursor:pointer;transition:.15s;white-space:nowrap;text-decoration:none}
  .btn:hover{color:var(--violet);border-color:var(--violet)}
  .btn:focus-visible{outline:2px solid var(--violet);outline-offset:2px}
  .btn.pri{background:var(--violet);border-color:var(--violet);color:#fff;box-shadow:0 2px 0 rgba(124,58,237,.12)}
  .btn.pri:hover{background:var(--violet-hover);border-color:var(--violet-hover);color:#fff}
  .btn.danger{color:var(--err-fg);border-color:var(--err-bd)}
  .btn.danger:hover{background:var(--err-fg);border-color:var(--err-fg);color:#fff}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--text-2);padding:7px 8px}
  .btn.ghost:hover{background:var(--violet-bg);color:var(--violet)}
  .btn.sm{padding:4px 9px;font-size:12.5px}
  .btn.lg{padding:10px 15px;font-size:14.5px;height:40px}
  .btn.block{width:100%}
  .btn.link{border:none;background:none;color:var(--violet);padding:0;height:auto}
  .btn.link:hover{color:var(--violet-hover);text-decoration:underline}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .btn .ic{font-size:14px;line-height:1}

  /* tags */
  .tag{display:inline-flex;align-items:center;gap:5px;padding:1px 8px;border-radius:4px;font-size:12px;line-height:20px;border:1px solid var(--neutral-bd);background:var(--neutral-bg);color:var(--neutral-fg)}
  .tag.ok{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-fg)}
  .tag.info{background:var(--info-bg);border-color:var(--info-bd);color:var(--info-fg)}
  .tag.violet{background:var(--violet-bg);border-color:var(--violet-border);color:var(--violet-active)}

  /* avatars */
  .av{border-radius:50%;color:#fff;display:inline-grid;place-items:center;font-weight:600;flex:0 0 auto;font-size:13px;letter-spacing:.02em;overflow:hidden}
  .av.s24{width:24px;height:24px;font-size:10px}
  .av.s28{width:28px;height:28px;font-size:11px}
  .av.s32{width:32px;height:32px;font-size:12px}
  .av.s72{width:72px;height:72px;font-size:26px}
  .g-jm{background:linear-gradient(135deg,#6a1b9a,#c62828)}
  .g-tn{background:linear-gradient(135deg,#1565c0,#00695c)}
  .g-ap{background:linear-gradient(135deg,#ef6c00,#d84315)}
  .g-ld{background:linear-gradient(135deg,#00695c,#2e7d32)}

  /* auth card */
  .authcard{width:100%;background:#fff;border-radius:12px;box-shadow:var(--shadow-auth);overflow:hidden}
  .authcover{background:linear-gradient(160deg,var(--cover-a) 0%,var(--cover-b) 100%);padding:30px 32px 26px;display:flex;justify-content:center}
  .authcover .logo{display:flex;align-items:center;gap:10px;color:#fff}
  .authcover .logo .mk{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.32);display:grid;place-items:center;font-weight:800;font-size:16px}
  .authcover .logo .nm{font-size:16px;font-weight:600;letter-spacing:.01em}
  .authbody{padding:26px 32px 28px;display:flex;flex-direction:column;gap:16px}
  .authbody h3{margin:0;font-size:20px;font-weight:600;letter-spacing:-.01em}
  .authbody .lead{margin:-8px 0 0;font-size:13px;color:var(--text-2)}
  .authfoot{width:100%;margin:18px auto 0;text-align:center;font-size:12px;color:var(--text-3)}
  .authfoot a{color:var(--violet);text-decoration:none}
  .authfoot a:hover{text-decoration:underline}

  /* forms */
  .frow{display:flex;flex-direction:column;gap:5px}
  .frow label{font-size:13px;font-weight:500;color:var(--text-2);display:flex;align-items:center;gap:6px}
  .frow label .req{color:var(--err-fg)}
  .frow label .spacer{margin-left:auto;font-weight:400}
  .inp{width:100%;height:40px;border:1px solid var(--border-strong);border-radius:6px;padding:0 12px;font:inherit;font-size:14px;color:var(--text);background:#fff;display:flex;align-items:center;gap:8px}
  .inp input{border:none;outline:none;font:inherit;background:transparent;width:100%;color:var(--text)}
  .inp .aff{color:var(--text-3);font-size:15px;flex:0 0 auto}
  .inp:focus-within{border-color:var(--violet);box-shadow:0 0 0 2px var(--violet-bg)}
  .inp.locked{background:#fafafa;color:var(--text-2)}
  .placeholder{color:var(--text-3)}
  .chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2)}
  .chk input{accent-color:var(--violet);width:15px;height:15px}

  .div-or{display:flex;align-items:center;gap:12px;color:var(--text-3);font-size:12px}
  .div-or::before,.div-or::after{content:"";height:1px;background:var(--border);flex:1}
  .provider{width:100%;height:40px;border:1px solid var(--border-strong);border-radius:6px;background:#fff;display:flex;align-items:center;justify-content:center;gap:9px;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;transition:.15s}
  .provider:hover{border-color:var(--violet);color:var(--violet);background:var(--violet-bg)}
  .provider .glyph{width:18px;height:18px;border-radius:4px;display:grid;place-items:center;font-weight:800;font-size:12px;color:#fff}
  .g-google{background:conic-gradient(from -45deg,#ea4335,#fbbc05,#34a853,#4285f4,#ea4335)}
  .g-key{background:var(--violet)}

  .authalert{display:flex;gap:10px;align-items:flex-start;border-radius:8px;padding:11px 13px;font-size:13px;background:var(--err-bg);border:1px solid var(--err-bd);color:#820e0e}
  .authalert.warn{background:var(--warn-bg);border-color:var(--warn-bd);color:#7a5300}
  .authalert .ai{flex:0 0 auto;font-size:15px;line-height:1.3}
  .authalert .at{font-weight:600;margin-bottom:1px}
  .authalert .ax{font-size:12.5px;opacity:.92}

  .invctx{display:flex;align-items:center;gap:11px;background:var(--violet-bg);border:1px solid var(--violet-border);border-radius:8px;padding:11px 13px}
  .invctx .who{min-width:0}
  .invctx .who .l1{font-size:12px;color:var(--text-2)}
  .invctx .who .l2{font-size:13.5px;font-weight:600}

  .otp{display:flex;gap:8px;justify-content:center}
  .otp .cell{width:42px;height:50px;border:1px solid var(--border-strong);border-radius:8px;display:grid;place-items:center;font-size:22px;font-weight:600;font-family:var(--mono)}
  .otp .cell.on{border-color:var(--violet);box-shadow:0 0 0 2px var(--violet-bg)}
  .otp .cell.empty{color:var(--text-3)}

  .result{padding:22px 12px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
  .result .ric{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;font-size:32px;margin-bottom:4px}
  .result .rt{font-size:19px;font-weight:600}
  .result .rs{font-size:13px;color:var(--text-2);max-width:34ch}

  .qrwrap{display:flex;gap:16px;align-items:center}
  .qr{width:132px;height:132px;flex:0 0 auto;border:1px solid var(--border);border-radius:8px;padding:8px;background:#fff}
  .backupgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
  .backupgrid .bc{font-family:var(--mono);font-size:13px;background:#fafafa;border:1px solid var(--border);border-radius:6px;padding:7px 10px;text-align:center;letter-spacing:.04em}
  .hint{font-size:12px;color:var(--text-3);margin-top:8px}
  .subeyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:8px}

  /* app shell */
  .appbar{display:flex;align-items:center;gap:18px;background:var(--bg-container);padding:0 18px;height:52px;border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px}
  .brand .mark{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--violet),#4527a0);display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800}
  .topmenu{display:flex;gap:2px;align-items:center;height:52px}
  .topmenu a{height:100%;display:flex;align-items:center;padding:0 14px;font-size:13.5px;color:var(--text-2);text-decoration:none;border-bottom:2px solid transparent}
  .topmenu a.on{color:var(--violet);border-bottom-color:var(--violet);font-weight:500}
  .topmenu a:hover{color:var(--violet)}
  .appbar .right{margin-left:auto;display:flex;align-items:center;gap:14px;color:var(--text-2)}
  .bell{width:16px;height:16px;border:2px solid currentColor;border-bottom:none;border-radius:8px 8px 0 0;position:relative;display:inline-block}
  .bell::after{content:"";position:absolute;left:-3px;bottom:-2px;width:20px;height:2px;background:currentColor;border-radius:2px}
  .profilemenu{display:flex;align-items:center;gap:7px;cursor:pointer}
  .profilemenu .chev{font-size:9px;color:var(--text-3)}
  .canvas{padding:20px 22px 40px}
  .canvas .inner{max-width:1100px;margin:0 auto}
  .crumbs{font-size:12.5px;color:var(--text-3);margin-bottom:12px;display:flex;gap:7px;align-items:center}
  .crumbs a{color:var(--text-3);text-decoration:none}
  .crumbs .sep{opacity:.5}
  .crumbs .cur{color:var(--text-2)}
  .titleblock{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
  .titleblock .tcol{flex:1 1 0;min-width:0}
  .titleblock .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);line-height:1.2}
  .titleblock h1{font-size:24px;font-weight:600;margin:2px 0 2px;letter-spacing:-.01em}
  .titleblock .sub{font-size:13px;color:var(--text-2)}

  .grid{display:flex;gap:16px;align-items:flex-start}
  .col{min-width:0}
  .col.main{flex:1.35 1 0}
  .col.side{flex:1 1 0}
  .stack{display:flex;flex-direction:column;gap:16px}
  .card{background:var(--bg-container);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-card)}
  .card .chead{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)}
  .card .chead h3{font-size:15px;font-weight:600;margin:0}
  .card .chead .ch-ic{color:var(--violet)}
  .card .chead .spacer{margin-left:auto}
  .card .cbody{padding:6px 16px 10px}
  .card .cbody.pad{padding:14px 16px}
  .desc{display:grid;grid-template-columns:120px 1fr;gap:0}
  .desc dt{padding:8px 12px 8px 0;color:var(--text-2);font-size:13px;border-bottom:1px solid var(--border)}
  .desc dd{margin:0;padding:8px 0;font-size:13px;border-bottom:1px solid var(--border)}
  .desc dt:last-of-type,.desc dd:last-of-type{border-bottom:none}
  .muted{color:var(--text-3)}
  .idhead{display:flex;align-items:center;gap:14px;background:var(--violet-bg);border:1px solid var(--violet-border);padding:16px;border-radius:8px}
  .idhead .who{flex:1 1 auto;min-width:0}
  .idhead .nm{font-size:17px;font-weight:600}
  .idhead .em{font-size:13px;color:var(--text-2)}
  .idhead .meta{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
  .setrow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
  .setrow:last-child{border-bottom:none}
  .setrow .sr-ic{width:34px;height:34px;border-radius:8px;background:var(--violet-bg);color:var(--violet);display:grid;place-items:center;flex:0 0 auto;font-size:16px}
  .setrow .sr-main{flex:1 1 auto;min-width:0}
  .setrow .sr-t{font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:8px}
  .setrow .sr-s{font-size:12px;color:var(--text-3);margin-top:1px}
  .setrow .sr-act{flex:0 0 auto;display:flex;gap:8px;align-items:center}
  .rowitem{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px}
  .rowitem:last-child{border-bottom:none}
  .rowitem .ri-ic{width:30px;height:30px;border-radius:8px;background:var(--neutral-bg);color:var(--text-2);display:grid;place-items:center;flex:0 0 auto;font-size:15px}
  .rowitem .ri-main{flex:1 1 auto;min-width:0}
  .rowitem .ri-sub{color:var(--text-3);font-size:12px}
  .listcaps{display:flex;flex-direction:column}

  /* modal */
  .modal{width:100%;max-width:440px;background:#fff;border-radius:10px;box-shadow:var(--shadow-pop);overflow:hidden}
  .modal .mhead{padding:16px 20px 6px;display:flex;gap:10px;align-items:center}
  .modal .mhead .mic{width:28px;height:28px;border-radius:7px;background:var(--violet-bg);color:var(--violet);display:grid;place-items:center;flex:0 0 auto;font-size:15px}
  .modal .mhead h4{margin:0;font-size:16px;font-weight:600}
  .modal .mbody{padding:8px 20px 6px;font-size:13.5px;color:var(--text-2);display:flex;flex-direction:column;gap:14px}
  .modal .mfoot{padding:14px 20px 18px;display:flex;justify-content:flex-end;gap:8px}

  @media (max-width:820px){ .grid{flex-direction:column} .desc{grid-template-columns:104px 1fr} }
</style>
</head>
<body class="auth">
<div class="authwrap" style="max-width:360px">
  <div class="authcard"><div class="authcover"><div class="logo"><span class="mk">M</span><span class="nm">Module Demo App</span></div></div><div class="authbody">
            <div class="result"><div class="rt">You're signed out</div><div class="rs">Thanks for stopping by. Your session on this device has ended.</div></div>
            <button class="btn pri lg block">Sign in again</button>
          </div></div>
</div>
</body>
</html>
