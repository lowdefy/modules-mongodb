<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440, initial-scale=1" />
<title>Forgot password — user-account</title>
<link rel="stylesheet" href="mock.css" />
<style>.auth-page{width:360px}</style>
</head>
<body>
<div class="mock">
  <div class="stage">
    <div class="auth-page" id="forgot_password_page" data-ldf-component="auth-page">
      <div class="auth-card">
        <div class="auth-cover"><div class="logo"><span class="mk">M</span><span class="nm">Module Demo App</span></div></div>
        <div class="auth-blocks">
          <h3 id="forgot_password_title">Reset your password</h3>
          <p class="lead">Enter your email and we'll send a link to choose a new password.</p>
          <div class="frow" id="forgot_password_email"><label>Email</label><div class="inp"><input value="jane.mokoena@example.com"/><span class="aff">&#9993;</span></div></div>
          <button class="btn pri lg block" id="forgot_password_submit">Send reset link</button>
        </div>
      </div>
      <div class="auth-footer" id="forgot_password_footer"><a href="login.html">&larr; Back to sign in</a></div>
    </div>
  </div>
</div>
</body>
</html>
