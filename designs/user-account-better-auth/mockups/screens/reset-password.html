<div class="mock">

          <div class="frow" id="reset_password_new"><label>New password <span class="req">*</span></label><div class="inp"><input type="password" value="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"/><span class="aff">&#128065;</span></div></div>
          <div class="frow" id="reset_password_confirm"><label>Confirm password <span class="req">*</span></label><div class="inp"><input type="password" value="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"/><span class="aff">&#128065;</span></div></div>
          <button class="btn pri lg block" id="reset_password_submit">Update password</button>
        </div>
      </div>
    </div>
  </div>
</div>
