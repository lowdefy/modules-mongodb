name: Events
version: 0.16.0
description: Event logging — new-event API, event timeline panel, shared event metadata

exports:
  connections:
    - id: events-collection
      description: MongoDB collection connection for event log records
    - id: events-timeline
      description: >
        Read-only EventsTimeline connection exposing the GetEventsTimeline
        engine method that the events-timeline component fetches from.
  components:
    - id: change_stamp
      description: Audit metadata template with timestamp and user fields
    - id: event_types
      description: Event type display metadata (color, title, icon) merged with app additions
    - id: events-timeline
      description: Timeline panel showing filtered event history for an entity
    - id: note-capture
      description: >-
        @mention rich-text note-capture modal, writing through this
        module's own new-event api. Parameterised by a mentionable-users
        source, entity link (entity_id + reference_field, optional
        company_id), and event type/display — see the file header for the
        full vars list.
  api:
    - id: new-event
      description: Log a new audit event

vars:
  display_key:
    type: string
    required: true
    description: >
      App identifier for display objects. Events store per-app display
      titles keyed by app name — this var selects which to render.
      Must not contain dots — dots in MongoDB field paths are interpreted
      as nested field navigation, breaking the $addFields extraction.
  change_stamp:
    type: object
    default:
      timestamp:
        _date: now
      user:
        name:
          _user: profile.name
        id:
          _user: id
    description: >
      Audit metadata template resolved at runtime.
      Contains runtime operators (_user, _date) that evaluate per-request.
  event_types:
    type: object
    default: {}
    description: >
      Additional event type display metadata. Merged with built-in types.
      Keys are type strings, values have color, title, icon.
  contact_page_url:
    type: string
    default: ""
    description: >
      URL template for linking a user avatar/timestamp to their profile page.
      Use `{id}` as the placeholder for the user id; if omitted, the id is
      appended as `?_id=<id>`. Leave empty to render the timestamp/avatar
      without a link. Example: `/user-admin/view?user_id={id}`.
      Per-call overrides via `contact_page_url` and `disable_contact_link`
      vars on the events-timeline component.
  actions_collection:
    type: string
    default: actions
    description: >
      Actions collection the events timeline joins to enrich events with action
      cards. Defaults to `actions`; override only when your actions collection is
      named differently. Enrichment is data-driven: the join is inert when events
      carry no `action_ids`, so entities with no workflow actions render as an
      events-only timeline.
  contacts_collection:
    type: string
    default: user-contacts
    description: >
      Contacts collection joined to resolve each event author's avatar
      (`created.user.id` → `_id`, projecting `profile.picture`). Defaults to
      `user-contacts`; avatars fall back to initials when an author has no
      matching contact.

components:
  - id: change_stamp
    component:
      _ref: defaults/change_stamp.yaml
  - id: event_types
    component:
      _build.object.assign:
        - _ref: ../shared/enums/event_types.yaml
        - _module.var: event_types
  - id: events-timeline
    component:
      _ref: components/events-timeline.yaml
  - id: note-capture
    component:
      _ref: components/note-capture.yaml

api:
  - _ref: api/new-event.yaml

connections:
  - _ref: connections/events-collection.yaml
  - _ref: connections/events-timeline.yaml

plugins:
  - name: "@lowdefy/modules-mongodb-plugins"
    version: "^0.16.0"

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI
