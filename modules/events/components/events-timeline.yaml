id: events-timeline
type: Box
style:
  maxHeight: 600
  overflowY: auto

events:
  onMount:
    - id: fetch_events
      type: Request
      params: get-events

requests:
  - id: get-events
    type: GetEventsTimeline
    connectionId:
      _module.connectionId: events-timeline
    payload:
      reference_value:
        _var: reference_value
    properties:
      reference_field:
        _var: reference_field
      reference_value:
        _payload: reference_value

blocks:
  - id: events_timeline_empty
    type: Paragraph
    visible:
      _eq:
        - _array.length:
            _request: get-events
        - 0
    properties:
      content: No activity
      type: secondary
      style:
        fontSize: 12
        fontStyle: italic
  - id: events-timeline
    type: EventsTimeline
    events:
      onActionClick:
        try:
          - id: set_check_action_modal_action
            type: SetState
            skip:
              _ne:
                - _event: action.kind
                - check
            params:
              check_action_modal:
                action_id:
                  _event: action._id
          - id: open_check_action_modal
            type: CallMethod
            skip:
              _ne:
                - _event: action.kind
                - check
            # error:false → when no modal is on the page the CallMethod throws
            # and the catch navigates; suppress the would-be error toast so
            # recovery is silent.
            messages:
              error: false
            params:
              blockId: check_action_modal
              method: setOpen
              args:
                - open: true
          - id: link_to_action_page
            type: Link
            skip:
              _eq:
                - _event: action.kind
                - check
            params:
              pageId:
                _event: action.link.pageId
              urlQuery:
                _event: action.link.urlQuery
        catch:
          # Modal not on the page (open threw) — navigate to the action's own page.
          - id: link_to_action_page_fallback
            type: Link
            params:
              pageId:
                _event: action.link.pageId
              urlQuery:
                _event: action.link.urlQuery
    visible:
      _gt:
        - _array.length:
            _request: get-events
        - 0
    properties:
      data:
        _request: get-events
      eventTypeConfig:
        _build.object.assign:
          - _ref: ../shared/enums/event_types.yaml
          - _module.var: event_types
      actionStatusConfig:
        _ref: ../shared/enums/action_statuses.yaml
      reverse:
        _var:
          key: reverse
          default: true
      s3GetPolicyRequestId:
        _var: s3GetPolicyRequestId
      contactPageUrl:
        _var:
          key: contact_page_url
          default:
            _module.var: contact_page_url
      disableContactLink:
        _var:
          key: disable_contact_link
          default: false
      compact:
        _var:
          key: compact
          default: false
