id: events-timeline
type: Box
style:
  maxHeight: 600
  overflowY: auto

events:
  onMount:
    - id: fetch_events
      type: Request
      params: get-events

requests:
  - id: get-events
    type: MongoDBAggregation
    connectionId:
      _module.connectionId: events-collection
    payload:
      reference_value:
        _var: reference_value
    properties:
      pipeline:
        - $match:
            _object.fromEntries:
              - - _var: reference_field
                - _payload: reference_value
        - $sort:
            date: -1
        - $addFields:
            title:
              _string.concat:
                - "$"
                - _var:
                    key: display_key
                    default:
                      _module.var: display_key
                - ".title"
            description:
              _string.concat:
                - "$"
                - _var:
                    key: display_key
                    default:
                      _module.var: display_key
                - ".description"
            info:
              _string.concat:
                - "$"
                - _var:
                    key: display_key
                    default:
                      _module.var: display_key
                - ".info"

blocks:
  - id: events_timeline_empty
    type: Paragraph
    visible:
      _eq:
        - _array.length:
            _request: get-events
        - 0
    properties:
      content: No activity
      type: secondary
      style:
        fontSize: 12
        fontStyle: italic
  - id: events-timeline
    type: EventsTimeline
    visible:
      _gt:
        - _array.length:
            _request: get-events
        - 0
    properties:
      data:
        _request: get-events
      eventTypeConfig:
        _build.object.assign:
          - _ref: ../shared/enums/event_types.yaml
          - _module.var: event_types
      reverse:
        _var:
          key: reverse
          default: true
      s3GetPolicyRequestId:
        _var: s3GetPolicyRequestId
      contactPageUrl:
        _var:
          key: contact_page_url
          default:
            _module.var: contact_page_url
      disableContactLink:
        _var:
          key: disable_contact_link
          default: false
      compact:
        _var:
          key: compact
          default: false
