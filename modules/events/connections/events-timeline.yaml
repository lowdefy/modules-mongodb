id: events-timeline
type: EventsTimeline
# Tenant wall: the timeline read and its actions/contacts lookups are scoped
# to the caller's organization (defense in depth over the entity-id match).
tenant: true
properties:
  databaseUri:
    _secret: MONGODB_URI
  app_name:
    _module.var: display_key
  eventsCollection: log-events
  actionsCollection:
    _module.var: actions_collection
  contactsCollection:
    _module.var: contacts_collection
  user:
    _user: true
