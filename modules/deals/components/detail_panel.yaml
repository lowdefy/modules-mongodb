id: detail_panel
type: Box
layout:
  gap: 8
blocks:
  _build.array.concat:
    - - _ref: components/detail/outcome_status.yaml
      - _ref: components/detail/meta_strip.yaml
      - _ref: components/detail/open_items_row.yaml
      - id: detail_divider_actions
        type: Divider
        style:
          .element:
            margin: 4px 0
      - _ref: components/detail/section_info_grid.yaml
      - id: detail_divider_related
        type: Divider
        style:
          .element:
            margin: 4px 0
      - _ref: components/detail/section_related_deals.yaml
      - id: detail_divider_timeline
        type: Divider
        style:
          .element:
            margin: 4px 0
      - id: detail_timeline_tabs
        type: Tabs
        properties:
          size: small
          defaultActiveKey: activities
          # Render the `extra` slot in the tab bar's top-right corner.
          extraAreaKey: extra
          tabs:
            - key: activities
              title: Activities
              titleStyle:
                fontSize: 12
            - key: events
              title: Events
              titleStyle:
                fontSize: 12
        events:
          onChange:
            - id: set_timeline_tab
              type: SetState
              params:
                detail_panel.timeline_tab:
                  _event: activeKey
        slots:
          # Top-right corner of the tab bar. Only show the capture button on the
          # Activities tab (defaults to visible before the first tab change).
          activities:
            blocks:
              - _ref:
                  module: activities
                  component: activities-timeline
                  vars:
                    reference_field: deal_ids
                    reference_value:
                      _state: selected_deal_id
          events:
            blocks:
              - _ref:
                  module: events
                  component: events-timeline
                  vars:
                    reference_field: deal_ids
                    reference_value:
                      _state: selected_deal_id
                    display_key:
                      _module.var: app_name
                    reverse: false
                    compact: true
    # App-injected blocks appended to the main detail column (default []).
    - _module.var: components.main_slots
    - - _ref:
          module: events
          component: note-capture
          vars:
            id: detail_add_note_modal
            mentionable_users:
              _request: get_mentionable_users
            mentionable_users_request_id: get_mentionable_users
            entity_id:
              _state: selected_deal_id
            reference_field: deal_ids
            company_id:
              _request: get_selected_deal.0.company_id
            display_key:
              _module.var: app_name
            type: deal-note
            title_template: |
              <a href="/contacts/view?_id={{ user.id }}">{{ user.profile.name }}</a> added a note.
            on_saved:
              - id: refetch_after_note
                type: Request
                params:
                  - get-events
                  - get_last_contact
      # deal_outcome_modal restored: the header Deal Status selector opens it to
      # record won/lost. Won routes through the module's outcome action's submit
      # (engine win hooks, only once that step is actionable); Lost stamps the deal +
      # cancels the workflow at any stage via record-loss.
      - _ref: components/detail/deal_outcome_modal.yaml
      - _ref:
          path: components/detail/people_modal.yaml.njk
          vars:
            roles:
              _ref: components/contact_roles_list.yaml
      - _ref:
          module: activities
          component: task-modal
          vars:
            id: deal_task_modal
            entity_type: deal
            entity_id:
              _state: selected_deal_id
            company_id:
              _request: get_selected_deal.0.company_id
            assignee_options:
              _request: get_task_assignee_options
            assignee_search:
              request_id: get_task_assignee_options
              state_key: task_assignee_search
            events:
              created:
                type: deal-task-created
                title_template: |
                  <a href="/contacts/view?_id={{ user.id }}">{{ user.profile.name }}</a> created task — {{ title }}.
              completed:
                type: deal-task-completed
                title_template: |
                  <a href="/contacts/view?_id={{ user.id }}">{{ user.profile.name }}</a> completed task — {{ title }}.
              reopened:
                type: deal-task-reopened
                title_template: |
                  <a href="/contacts/view?_id={{ user.id }}">{{ user.profile.name }}</a> reopened task — {{ title }}.
            event_references:
              deal_ids:
                - _state: selected_deal_id
              company_ids:
                - _request: get_selected_deal.0.company_id
            on_saved:
              - id: refetch_after_task_save
                type: Request
                params:
                  - get_open_tasks_for_entity
                  - get-events
              - id: reseed_open_tasks
                type: SetState
                params:
                  open_tasks:
                    _if_none:
                      - _request: get_open_tasks_for_entity
                      - []
