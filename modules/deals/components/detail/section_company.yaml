id: detail_cell_company
type: Descriptions
layout:
  span: 12
  sm:
    span: 24
style:
  .label:
    fontSize: 12px
    lineHeight: 1.4
    color: var(--ant-color-text-tertiary)
    paddingRight: 8px
    width: 110px
    whiteSpace: nowrap
  .content:
    fontSize: 13px
    lineHeight: 1.4
    color: var(--ant-color-text)
    fontWeight: 600
    paddingRight: 4
properties:
  bordered: false
  size: small
  column: 1
  layout: horizontal
  colon: false
  theme:
    itemPaddingBottom: 2
    itemPaddingEnd: 8
    titleMarginBottom: 4
    labelColor: var(--ant-color-text-tertiary)
    contentColor: var(--ant-color-text)
  title: '<div style="font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ant-color-text-tertiary); margin-bottom: 4px;">Company</div>'
  items:
    _array.concat:
      - - label: Name
          value:
            _if_none:
              - _request: get_selected_deal.0.company.short_name
              - _if_none:
                  - _request: get_selected_deal.0.company.name
                  - "—"
      # App-injected company fields (default []) — e.g. sector/sub-sector/size,
      # resolved against the host app's own enum files (see the company_fields var).
      - _module.var: company_fields
