id: deal_task_modal
type: Modal
layout:
  gap: 12
properties:
  title:
    _if:
      test:
        _eq:
          - _state: task_modal.mode
          - edit
      then: Edit Task
      else: Log Task
  okText: Save
  cancelText: Cancel
  width: 520
events:
  onOpen:
    # Create mode when no task is selected; otherwise prefill from the
    # selected task (set by the task card's onClick).
    - id: seed_task_modal
      type: SetState
      params:
        task_modal:
          _if:
            test:
              _eq:
                - _state: selected_task
                - null
            then:
              mode: create
              task_id: null
              title: null
              description: null
              stage: action-required
              due_date:
                _date: now
              assignee: null
            else:
              mode: edit
              task_id:
                _state: selected_task._id
              title:
                _state: selected_task.title
              description:
                _state: selected_task.description
              stage:
                _state: selected_task.stage
              due_date:
                _state: selected_task.due_date
              assignee:
                _state: selected_task.assignees.0
    - id: reset_assignee_search
      type: SetState
      params:
        task_assignee_search: null
    - id: fetch_assignee_options
      type: Request
      params: get_task_assignee_options
  onOk:
    - id: validate_task_form
      type: Validate
      params:
        regex:
          - ^task_modal\.
    - id: create_task
      type: CallAPI
      skip:
        _eq:
          - _state: task_modal.mode
          - edit
      messages:
        success: Task created.
      params:
        endpointId:
          _module.endpointId: create-task
        payload:
          deal_id:
            _state: selected_deal_id
          company_id:
            _request: get_selected_deal.0.company_id
          title:
            _state: task_modal.title
          description:
            _state: task_modal.description
          stage:
            _state: task_modal.stage
          due_date:
            _state: task_modal.due_date
          assignee:
            _state: task_modal.assignee
    - id: update_task
      type: CallAPI
      skip:
        _not:
          _eq:
            - _state: task_modal.mode
            - edit
      messages:
        success: Task updated.
      params:
        endpointId:
          _module.endpointId: update-task
        payload:
          task_id:
            _state: task_modal.task_id
          deal_id:
            _state: selected_deal_id
          company_id:
            _request: get_selected_deal.0.company_id
          stage:
            _state: task_modal.stage
          fields:
            title:
              _state: task_modal.title
            description:
              _state: task_modal.description
            due_date:
              _state: task_modal.due_date
            assignee:
              _state: task_modal.assignee
    - id: refetch_after_task_save
      type: Request
      params:
        - get_selected_deal_open_actions
        - get-events
    - _ref: actions/compute_open_actions.yaml
  onClose:
    - id: reset_task_modal
      type: SetState
      params:
        task_modal: null
        selected_task: null
        task_assignee_search: null
blocks:
  - id: task_modal.title
    type: TextInput
    required: true
    properties:
      title: Task Name
      placeholder: e.g. Send revised pricing to the procurement lead
  - id: task_modal.description
    type: TextArea
    properties:
      title: Description
      placeholder: Add details or context…
      rows: 3
  - id: task_modal.stage
    type: ButtonSelector
    properties:
      title: Status
      label:
        extra:
          _if:
            test:
              _eq:
                - _state: task_modal.stage
                - done
            then: The completed date will be set to the current date.
            else: null
      options:
        - label: To Do
          value: action-required
        - label: Done
          value: done
  - id: task_modal.due_date
    type: DateSelector
    layout:
      span: 12
    required: true
    visible:
      _not:
        _eq:
          - _state: task_modal.stage
          - done
    properties:
      title: Due Date
  - id: task_modal.assignee
    type: Selector
    layout:
      span:
        _if:
          test:
            _eq:
              - _state: task_modal.stage
              - done
          then: 24
          else: 12
    properties:
      title: Person Responsible
      allowClear: true
      showSearch: true
      # Search runs server-side (get_task_assignee_options regex match) —
      # don't let the Selector client-filter the returned options too.
      filterOption: false
      placeholder: Select a person
      # Same options as the activities agenda Person Responsible selector:
      # contacts (not just app users), plain-name labels, and
      # { contact_id, name } values matching the stored task `assignees`
      # shape. The request projects {label, value} server-side, so its
      # results are clean of ~k source markers and the Selector's
      # stable-serialize value↔option match works on edit.
      options:
        _if_none:
          - _request: get_task_assignee_options
          - []
    events:
      onSearch:
        debounce:
          ms: 300
        try:
          - id: set_assignee_search
            type: SetState
            params:
              task_assignee_search:
                _event: value
          - id: refetch_assignee_options
            type: Request
            params:
              requestIds:
                - get_task_assignee_options
              holdValue: true
