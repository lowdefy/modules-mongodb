id: detail_section_actions
type: Box
style:
  marginTop: 12
blocks:
  - id: detail_actions_header
    type: Html
    layout:
      flex: 1 0 auto
    properties:
      html: |
        <div style="font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ant-color-text-tertiary);">Actions</div>
  - id: open_actions_pagination
    type: Pagination
    layout:
      flex: 0 1 auto
    properties:
      style:
        fontSize: 12px
      size: small
      simple: true
      hideOnSinglePage: true
      showSizeChanger: false
      pageSizeOptions:
        - 3
      current:
        _if_none:
          - _state: open_actions_page
          - 1
      total:
        _array.length:
          _if_none:
            - _state: open_actions_all
            - []
    events:
      onMount:
        - id: init_page_size
          type: SetState
          params:
            open_actions_page_size: 3
      onChange:
        - id: set_open_actions_page
          type: SetState
          params:
            open_actions_page:
              _event: current
        - id: slice_open_actions
          type: SetState
          params:
            open_actions:
              _js: |
                const all = state('open_actions_all') || [];
                const page = state('open_actions_page') || 1;
                const size = state('open_actions_page_size') || 3;
                const start = (page - 1) * size;
                return all.slice(start, start + size);

  - id: detail_actions_empty
    type: Html
    visible:
      _eq:
        - _array.length:
            _if_none:
              - _state: open_actions_all
              - []
        - 0
    properties:
      html: |
        <div style="font-size: 11px; color: var(--ant-color-text-tertiary); padding: 8px 0;">No open actions.</div>
  - id: open_actions_row
    type: Box
    visible:
      _gt:
        - _array.length:
            _if_none:
              - _state: open_actions_all
              - []
        - 0
    layout:
      gap: 4
    blocks:
      - _ref:
          path: components/detail/action_card.yaml.njk
          vars:
            index: 0
      - _ref:
          path: components/detail/action_card.yaml.njk
          vars:
            index: 1
      - _ref:
          path: components/detail/action_card.yaml.njk
          vars:
            index: 2
