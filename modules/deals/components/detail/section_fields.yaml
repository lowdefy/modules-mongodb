id: detail_section_fields
# Host-supplied domain fields (module `fields` var) rendered read-only — the
# display half of the create→view round trip. Block ids prefixed `attributes.`
# read from the stored deal's `attributes.*`. Hidden when no host fields are
# configured. Mirrors companies' view_company SmartDescriptions section.
type: SmartDescriptions
layout:
  span: 24
visible:
  _build.gt:
    - _build.array.length:
        _module.var: fields
    - 0
properties:
  title: Details
  column: 1
  size: small
  data:
    _request: get_selected_deal.0
  fields:
    _module.var: fields
