id: detail_people_modal
type: Modal
properties:
  title: Assign People
  okText: Save
  cancelText: Cancel
  width: 520
events:
  onOk:
    - id: submit_people
      type: CallAPI
      messages:
        success: People updated.
      params:
        endpointId:
          _module.endpointId: update-people
        payload:
          deal_id:
            _state: selected_deal_id
          main_point_of_contact:
            _state: selected_deal_people.main_point_of_contact
          decision_maker:
            _state: selected_deal_people.decision_maker
          finance_contact:
            _state: selected_deal_people.finance_contact
    - id: refetch_after_people
      type: Request
      params: get_selected_deal
    # Re-sync the picker-bound state to the saved (and freshly re-fetched) deal.
    - _ref: actions/set_deal_people.yaml
  onClose:
    # Discard any unsaved picker edits by restoring bound state from the
    # current (unchanged) deal.
    - _ref: actions/set_deal_people.yaml
blocks:
  - id: people_modal_main_header
    type: Html
    properties:
      html: |
        <div style="font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ant-color-text-tertiary); padding-bottom: 6px; border-bottom: 1px solid var(--ant-color-border-secondary); margin-bottom: 12px;">Main Point of Contact</div>
  - _ref:
      module: contacts
      component: contact-selector
      vars:
        id: selected_deal_people.main_point_of_contact
        keyword: Main Point of Contact
        max: 1
        form_extra_blocks:
          _ref:
            path: components/detail/contact_phone_fields.yaml.njk
            vars:
              key_prefix: selected_deal_people_main_point_of_contact_contact

  - id: people_modal_decision_header
    type: Html
    properties:
      html: |
        <div style="font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ant-color-text-tertiary); padding-bottom: 6px; border-bottom: 1px solid var(--ant-color-border-secondary); margin: 16px 0 12px;">Decision Maker</div>
  - _ref:
      module: contacts
      component: contact-selector
      vars:
        id: selected_deal_people.decision_maker
        keyword: Decision Maker
        max: 1
        form_extra_blocks:
          _ref:
            path: components/detail/contact_phone_fields.yaml.njk
            vars:
              key_prefix: selected_deal_people_decision_maker_contact

  - id: people_modal_finance_header
    type: Html
    properties:
      html: |
        <div style="font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ant-color-text-tertiary); padding-bottom: 6px; border-bottom: 1px solid var(--ant-color-border-secondary); margin: 16px 0 12px;">Finance Contact</div>
  - _ref:
      module: contacts
      component: contact-selector
      vars:
        id: selected_deal_people.finance_contact
        keyword: Finance Contact
        max: 1
        form_extra_blocks:
          _ref:
            path: components/detail/contact_phone_fields.yaml.njk
            vars:
              key_prefix: selected_deal_people_finance_contact_contact
