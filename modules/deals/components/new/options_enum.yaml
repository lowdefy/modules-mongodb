# Module-local copy of apps/shared/enums/options_enum.yaml — module pages can
# only _ref module-internal files, so enum-driven Selector options can't reach
# across to the app's shared template. Builds Selector options from an enum
# object (e.g. a `_module.var` enum) keyed by slug, each entry `{ title, color?,
# icon? }`. Vars: enum, colored_labels (default true).
_mql.aggregate:
  - - _var: enum
  - - $project:
        items:
          $objectToArray: $$ROOT
    - $unwind:
        path: $items
    - $project:
        label:
          _if:
            test:
              _var:
                key: colored_labels
                default: true
            then:
              $cond:
                if:
                  $ifNull:
                    - $items.v.color
                    - false
                then:
                  $concat:
                    - '<span style="color: '
                    - $items.v.color
                    - '">'
                    - $items.v.title
                    - </span>
                else: $items.v.title
            else: $items.v.title
        value: $items.k
        style:
          _object.assign:
            - fontWeight: bold
            - _if:
                test:
                  _var:
                    key: colored_labels
                    default: true
                then:
                  color: $items.v.color
                else: {}
        tag:
          color: $items.v.color
          icon: $items.v.icon
          title: $items.v.title
