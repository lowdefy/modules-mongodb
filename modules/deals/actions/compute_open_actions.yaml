id: compute_open_actions
type: SetState
params:
  # get_selected_deal_open_actions returns the final ordered card list
  # (overdue tasks → open workflow actions → upcoming tasks).
  open_actions_all:
    _if_none:
      - _request: get_selected_deal_open_actions
      - []
  open_actions_page: 1
  # Pagination is an input block — its displayed page comes from its own
  # state value, not properties, so reset it alongside the slice.
  open_actions_pagination:
    current: 1
    pageSize: 3
    skip: 0
  open_actions:
    _mql.aggregate:
      on:
        _if_none:
          - _request: get_selected_deal_open_actions
          - []
      pipeline:
        - $limit: 3
