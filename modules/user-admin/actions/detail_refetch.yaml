# Re-hydrate the user detail page after a tile edit or security action succeeds.
# Refetches every read so title/status, tiles, sessions, providers and the
# cross-app membership count all reflect the write.
- id: refetch_detail
  type: Request
  params:
    - get_user_detail
    - get_user_sessions
    - get_user_accounts
    - get_user_memberships
