# Event display metadata (color / title / icon) for the module's audit events,
# consumed by the events-timeline on the user detail page (Activity tile).
profile-updated:
  color: "#52c41a"
  title: Profile Updated
  icon: AiOutlineEdit
access-updated:
  color: "#1890ff"
  title: Access Updated
  icon: AiOutlineSafety
user-attributes-updated:
  color: "#1890ff"
  title: Global Attributes Updated
  icon: AiOutlineGlobal
user-suspended:
  color: "#f5222d"
  title: Suspended
  icon: AiOutlineStop
user-reinstated:
  color: "#52c41a"
  title: Reinstated
  icon: AiOutlineCheckCircle
sessions-revoked:
  color: "#faad14"
  title: Sessions Revoked
  icon: AiOutlineLogout
member-removed:
  color: "#fa8c16"
