# Per-app user status — the user's standing in the current app, derived from
# the app sub-document (disabled flag / open invite / otherwise active).
# Consumed by the title-block status pill on the view and edit pages. No
# *_display override var, so it is referenced directly (no components/ wrapper).
#
# Colours are the antd preset green/blue/red families, so the pill matches the
# AgGrid Tag in the list table (table_users.yaml, `colorFrom: active.color`,
# fed the antd preset names green/blue/red by get_all_users). Keep the two in
# sync: the enum slugs here mirror the get_all_users `active` $switch branches.
active:
  color: "#f6ffed"
  borderColor: "#b7eb8f"
  titleColor: "#389e0d"
  title: Active
invited:
  color: "#e6f7ff"
  borderColor: "#91d5ff"
  titleColor: "#096dd9"
  title: Open Invite
disabled:
  color: "#fff1f0"
  borderColor: "#ffa39e"
  titleColor: "#cf1322"
  title: Disabled
