_ref:
  module: layout
  component: page
  vars:
    id: users-invite
    title:
      _nunjucks:
        template: |
          Invite {% if app_title %}{{ app_title }} {% endif %}User{% if profile %}: {{ profile.title }}{{ '.' if profile.title }} {{ profile.name | safe }}{% endif %}
        on:
          _object.assign:
            - _request: get_user.0
            - app_title:
                _module.var: app_title
    content_width: 600
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _build.string.trim:
            _build.string.concat:
              - _module.var: app_title
              - " User Admin"
        pageId:
          _module.pageId: users
      - label: Invite User
    requests:
      - _ref: requests/get_user.yaml
    events:
      onMount:
        - id: redirect
          type: Link
          skip:
            _ne:
              - _input: email
              - null
          params:
            back: true
        - id: get_user
          type: Request
          params: get_user
        - id: set_state_new
          type: SetState
          skip:
            _ne:
              - _input: user_id
              - null
          params:
            email:
              _input: email
            lowercase_email:
              _string.toLowerCase:
                _input: email
        - id: set_state_existing
          type: SetState
          skip:
            _eq:
              - _input: user_id
              - null
          params:
            profile:
              _request: get_user.0.profile
            global_attributes:
              _request: get_user.0.global_attributes
            app_attributes:
              _request: get_user.0.app_attributes
            email:
              _request: get_user.0.email
            lowercase_email:
              _request: get_user.0.lowercase_email
            roles:
              _request: get_user.0.roles
            disabled:
              _request: get_user.0.disabled
            invite:
              _request: get_user.0.invite
            is_user:
              _request: get_user.0.is_user
            sign_up:
              _request: get_user.0.sign_up
            _id:
              _request: get_user.0._id
        - id: init_avatar_color
          type: SetState
          skip:
            _ne:
              - _state: profile.avatar_color
              - null
          params:
            profile.avatar_color:
              _get:
                from:
                  _module.var: avatar_colors
                key:
                  _math.floor:
                    _product:
                      - _math.random: true
                      - _array.length:
                          _module.var: avatar_colors

    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          - _ref: ../shared/profile/avatar-preview.yaml
          - _ref: components/view_invite_link.yaml
          - _ref: components/view_email.yaml
          - id: divider_profile
            type: Divider
            properties:
              title: Profile
          - _ref: components/form_profile.yaml
          - id: divider_access
            type: Divider
            properties:
              title: Access
          - _ref: components/form_global_attributes.yaml
          - _ref: components/form_app_attributes.yaml
          - _ref: components/form_access_invite.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Send Invite
                  icon: RiMailSendLine
                events:
                  onClick:
                    _ref: actions/invite_user.yaml
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: users
