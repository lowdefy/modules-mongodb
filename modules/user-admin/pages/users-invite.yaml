_ref:
  module: layout
  component: page
  vars:
    id: users-invite
    title:
      _nunjucks:
        template: |
          Invite {% if app_title %}{{ app_title }} {% endif %}User{% if profile %}: {{ profile.title }}{{ '.' if profile.title }} {{ profile.name | safe }}{% endif %}
        on:
          _object.assign:
            - _request: get_user.0
            - app_title:
                _module.var: app_title
    content_width: 600
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _build.string.trim:
            _build.string.concat:
              - _module.var: app_title
              - " User Admin"
        pageId:
          _module.pageId: users
      - label: Invite User
    requests:
      - _ref: requests/get_user.yaml
    events:
      onMount:
        - id: redirect
          type: Link
          skip:
            _ne:
              - _input: email
              - null
          params:
            back: true
        - id: get_user
          type: Request
          params: get_user
        - id: set_user
          type: SetState
          params:
            user:
              _if:
                test:
                  _eq:
                    - _input: user_id
                    - null
                then:
                  email:
                    _input: email
                  lowercase_email:
                    _string.toLowerCase:
                      _input: email
                else:
                  _request: get_user.0
        - id: init_avatar_color
          type: SetState
          skip:
            _ne:
              - _state: user.profile.avatar_color
              - null
          params:
            user.profile.avatar_color:
              _get:
                from:
                  _module.var: avatar_colors
                key:
                  _math.floor:
                    _product:
                      - _math.random: true
                      - _array.length:
                          _module.var: avatar_colors

    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          # TODO: doc_metadata component
          # - _ref: ../components/doc_metadata.yaml
          - _ref: components/view_user_avatar_preview.yaml
          - _ref: components/view_invite_link.yaml
          - _ref: components/view_email.yaml
          - id: divider
            type: Divider
            properties:
              title: Profile
          - _ref: components/form_profile.yaml
          - id: divider
            type: Divider
            properties:
              title: Access
          - _ref: components/form_global_attributes.yaml
          - _ref: components/form_app_attributes.yaml
          - _ref: components/form_access_invite.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Send Invite
                  icon: RiMailSendLine
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: generate_avatar
                      type: SetState
                      params:
                        user.profile.picture:
                          _js:
                            _ref:
                              path: ../shared/profile/generate-avatar-svg.js.njk
                              vars:
                                prefix: user.profile
                    - id: invite_user
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: invite-user
                        payload:
                          user:
                            _state: user
                      messages:
                        success: New invite created.
                    - id: reset
                      type: Reset
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: users
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: users
