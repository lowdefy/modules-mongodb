_ref:
  module: layout
  component: page
  vars:
    id: users-invite
    title:
      _nunjucks:
        template: |
          Invite {{ app_title }} User{% if profile %}: {{ profile.title }}{{ '.' if profile.title }} {{ profile.name | safe }}{% endif %}
        on:
          _object.assign:
            - _request: get_user.0
            - app_title:
                _module.var: app_title
    hide_title: true
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _string.concat:
            - _module.var: app_title
            - " User Admin"
        pageId:
          _module.pageId: users
      - label: Invite User
    requests:
      - _ref: ../requests/get_user.yaml
    events:
      onMount:
        - id: redirect
          type: Link
          skip:
            _ne:
              - _input: email
              - null
          params:
            back: true
        - id: get_user
          type: Request
          params: get_user
        - id: set_user
          type: SetState
          params:
            user:
              _if:
                test:
                  _eq:
                    - _input: user_id
                    - null
                then:
                  email:
                    _input: email
                  lowercase_email:
                    _string.toLowerCase:
                      _input: email
                else:
                  _request: get_user.0

    blocks:
      - _ref:
          module: layout
          component: card
          vars:
            title:
              _nunjucks:
                template: |
                  Invite {{ app_title }} User{% if profile %}: {{ profile.title }}{{ '.' if profile.title }} {{ profile.name | safe }}{% endif %}
                on:
                  _object.assign:
                    - _request: get_user.0
                    - app_title:
                        _module.var: app_title
            doc:
              _request: get_user.0
            width: 600
            blocks:
              - _ref: ../components/view_user_avatar_preview.yaml
              - _ref: ../components/view_invite_link.yaml
              - _ref: ../components/view_email.yaml
              - id: divider
                type: Divider
                properties:
                  title: Profile
              - _module.var:
                  key: components.form_profile
                  default:
                    id: form_profile
                    type: Box
              - id: divider
                type: Divider
                properties:
                  title: Access
              - _module.var:
                  key: components.form_global_attributes
                  default:
                    id: form_global_attributes
                    type: Box
              - _module.var:
                  key: components.form_app_attributes
                  default:
                    id: form_app_attributes
                    type: Box
              - _ref: ../components/form_access_invite.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            width: 600
            actions:
              - id: spacer
                type: Box
                layout:
                  flex: 1 0 auto
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: users
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Send Invite
                  icon: RiMailSendLine
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: invite_user
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: invite-user
                        payload:
                          user:
                            _state: user
                      messages:
                        success: New invite created.
                    - id: reset
                      type: Reset
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: users
