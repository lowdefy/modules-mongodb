_ref:
  module: layout
  component: page
  vars:
    id: check
    title: Check Invite Email
    content_width: 500
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _build.string.trim:
            _build.string.concat:
              - _module.var: app_title
              - " User Admin"
        pageId:
          _module.pageId: all
      - label: Check Invite Email
    requests:
      - _ref: requests/check_invite_email.yaml
    blocks:
      - id: card
        type: Card
        blocks:
          - id: email
            type: TextInput
            required: true
            validate:
              _ref: validate/email.yaml
            properties:
              title: New User Work Email Address
              placeholder: name@company.com
            events:
              onPressEnter:
                _ref: actions/check_email.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Find Contact
                  icon: AiOutlineSearch
                events:
                  onClick:
                    _ref: actions/check_email.yaml
