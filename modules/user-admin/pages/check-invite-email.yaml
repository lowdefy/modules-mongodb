_ref:
  path: ../../shared/page_layout.yaml
  vars:
    id: check-invite-email
    title: Check Invite Email
    theme:
      _module.var: theme
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _string.concat:
            - _module.var: app_title
            - " User Admin"
        pageId:
          _module.pageId: users
      - label: Check Invite Email
    requests:
      - _ref: ../requests/check_invite_email.yaml
    blocks:
      - id: content_wrapper
        type: Card
        layout:
          gap: 8
        style:
          maxWidth: 500
          margin: auto
        blocks:
          - id: email
            type: TextInput
            required: true
            validate:
              _ref:
                path: ../../shared/validate_email.yaml
                vars:
                  field_name: email
            properties:
              title: New User Work Email Address
              placeholder: name@company.com
            events:
              onPressEnter:
                _ref: ../actions/check_email.yaml
          - id: spacer
            type: Box
            layout:
              flex: 1 0 auto
          - id: save_button
            type: Button
            layout:
              flex: 0 1 auto
            properties:
              title: Find Contact
              icon: AiOutlineSearch
            events:
              onClick:
                _ref: ../actions/check_email.yaml
