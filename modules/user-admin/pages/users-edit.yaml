_ref:
  module: layout
  component: page
  vars:
    id: users-edit
    title:
      _nunjucks:
        template: |
          Edit {% if app_title %}{{ app_title }} {% endif %}User{% if profile %}: {{ profile.title }}{{ '.' if profile.title }} {{ profile.name | safe }}{% endif %}
        on:
          _object.assign:
            - _request: get_user.0
            - app_title:
                _module.var: app_title
    content_width: 600
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _build.string.trim:
            _build.string.concat:
              - _module.var: app_title
              - ' User Admin'
        pageId:
          _module.pageId: users
      - label: Edit User
    requests:
      - _ref: requests/get_user.yaml
    events:
      onMount:
        - id: redirect_if_no_id
          type: Link
          skip:
            _ne:
              - _input: user_id
              - null
          params:
            back: true
        - id: break_if_no_id
          type: Throw
          skip:
            _ne:
              - _input: user_id
              - null
          messages:
            error: false
          params:
            throw: true
        - id: get_user
          type: Request
          params: get_user
        - id: redirect_if_no_user
          type: Link
          skip:
            _ne:
              - _request: get_user.0
              - null
          params:
            back: true
        - id: break_if_no_user
          type: Throw
          skip:
            _ne:
              - _request: get_user.0
              - null
          messages:
            error: false
          params:
            throw: true
        - id: set_user
          type: SetState
          skip:
            _eq:
              - _input: user_id
              - null
          params:
            user:
              _request: get_user.0
            disable_save: false

    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          - _ref:
              path: ../shared/layout/identity-header.yaml
              vars:
                avatar_src:
                  _state: user.profile.picture
                name:
                  _state: user.profile.name
                email:
                  _state: user.email
                extra:
                  - id: signed_up
                    type: Paragraph
                    visible:
                      _eq:
                        - _state: user.is_user
                        - true
                    style:
                      marginBottom: 0
                    properties:
                      type: secondary
                      content:
                        _nunjucks:
                          template: "Signed up {{ date | date('YYYY-MM-DD') }}"
                          on:
                            date:
                              _state: user.sign_up
          - id: divider_profile
            type: Divider
            properties:
              title: Profile
          - _ref: components/form_profile.yaml
          - id: divider_access
            type: Divider
            properties:
              title: Access
          - _ref: components/form_global_attributes.yaml
          - _ref: components/form_app_attributes.yaml
          - _ref: components/form_access_edit.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Save
                  icon: AiOutlineSave
                  disabled:
                    _state: disable_save
                events:
                  onClick:
                    _ref: actions/save_user.yaml
              - id: resend_invite_button
                type: Button
                visible:
                  _ne:
                    - _state: user.is_user
                    - true
                layout:
                  flex: 0 1 auto
                properties:
                  disabled:
                    _ne:
                      - _state: user.invite.open
                      - true
                  type: default
                  title: Resend Invite
                  icon: AiOutlineSend
                events:
                  onClick:
                    - id: resend
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: resend-invite
                        payload:
                          user:
                            _id:
                              _state: user._id
                            profile:
                              name:
                                _state: user.profile.name
                            email:
                              _state: user.email
                      messages:
                        success: Invite sent successfully.
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        back: true
