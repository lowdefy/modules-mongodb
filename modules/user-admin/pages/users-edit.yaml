_ref:
  module: layout
  component: page
  vars:
    id: users-edit
    title:
      _nunjucks:
        template: |
          Edit {{ app_title }} User{% if profile %}: {{ profile.title }}{{ '.' if profile.title }} {{ profile.name | safe }}{% endif %}
        on:
          _object.assign:
            - _request: get_user.0
            - app_title:
                _module.var: app_title
    hide_title: true
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _string.concat:
            - _module.var: app_title
            - " User Admin"
        pageId:
          _module.pageId: users
      - label: Edit User
    requests:
      - _ref: ../requests/get_user.yaml
    events:
      onMount:
        - id: redirect_if_no_id
          type: Link
          skip:
            _ne:
              - _input: user_id
              - null
          params:
            back: true
        - id: get_user
          type: Request
          skip:
            _eq:
              - _input: user_id
              - null
          params: get_user
        - id: redirect_if_no_user
          type: Link
          skip:
            _ne:
              - _request: get_user.0
              - null
          params:
            back: true
        - id: set_user
          type: SetState
          skip:
            _eq:
              - _input: user_id
              - null
          params:
            user:
              _request: get_user.0
            disable_save: false

    blocks:
      - id: content
        type: Box
        layout:
          span: 24
        style:
          maxWidth: 600
          margin: auto
        blocks:
          - id: card
            type: Card
            properties:
              title:
                _nunjucks:
                  template: |
                    Edit {{ app_title }} User{% if profile %}: {{ profile.title }}{{ '.' if profile.title }} {{ profile.name | safe }}{% endif %}
                  on:
                    _object.assign:
                      - _request: get_user.0
                      - app_title:
                          _module.var: app_title
            layout:
              gap: 16
            blocks:
              # TODO: doc_metadata component
              # - _ref: ../components/doc_metadata.yaml
              - _ref: ../components/view_user_avatar_preview.yaml
              - _ref: ../components/view_signed_up.yaml
              - _ref: ../components/view_invite_link.yaml
              - _ref: ../components/view_email.yaml
              - id: divider
                type: Divider
                properties:
                  title: Profile
              - _module.var:
                  key: components.form_profile
                  default:
                    id: form_profile
                    type: Box
              - id: divider
                type: Divider
                properties:
                  title: Access
              - _module.var:
                  key: components.form_global_attributes
                  default:
                    id: form_global_attributes
                    type: Box
              - _module.var:
                  key: components.form_app_attributes
                  default:
                    id: form_app_attributes
                    type: Box
              - _ref: ../components/form_access_edit.yaml
          - _ref:
              module: layout
              component: floating-actions
              vars:
                actions:
                  - id: resend_invite_button
                    type: Button
                    visible:
                      _ne:
                        - _state: user.is_user
                        - true
                    layout:
                      flex: 0 1 auto
                    properties:
                      disabled:
                        _ne:
                          - _state: user.invite.open
                          - true
                      type: default
                      title: Resend Invite
                      icon: AiOutlineSend
                    events:
                      onClick:
                        - id: resend
                          type: CallAPI
                          params:
                            endpointId:
                              _module.endpointId: resend-invite
                            payload:
                              user:
                                _id:
                                  _state: user._id
                                profile:
                                  name:
                                    _state: user.profile.name
                                email:
                                  _state: user.email
                          messages:
                            success: Invite sent successfully.
                  - id: cancel_button
                    type: Button
                    layout:
                      flex: 0 1 auto
                    properties:
                      title: Cancel
                      icon: AiOutlineCloseCircle
                      type: default
                    events:
                      onClick:
                        - id: back
                          type: Link
                          params:
                            back: true
                  - id: save_button
                    type: Button
                    layout:
                      flex: 0 1 auto
                    properties:
                      title: Save
                      icon: AiOutlineSave
                      disabled:
                        _state: disable_save
                    events:
                      onClick:
                        - id: validate
                          type: Validate
                        - id: update_user
                          type: CallAPI
                          params:
                            endpointId:
                              _module.endpointId: update-user
                            payload:
                              user:
                                _state: user
                          messages:
                            success: User updated.
                        - id: reset
                          type: Reset
                        - id: back
                          type: Link
                          params:
                            back: true
