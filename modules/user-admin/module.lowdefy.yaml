name: User Admin
version: 0.1.0
description: User administration — list, edit, invite users

dependencies:
  - id: layout
    description: Page layout wrapper
  - id: events
    description: Audit event logging and change stamp
  - id: notifications
    description: Notification dispatch

vars:
  app_name:
    required: true
    description: App name for MongoDB field paths (e.g., example-app)
  app_title:
    default: ""
    description: "Optional display prefix (e.g., Team). When set: Team User Admin, Invite Team User. When not set: User Admin, Invite User."
  roles:
    required: true
    description: List of available user roles [{label, value}]
  event_display:
    default:
      _ref: defaults/event_display.yaml
    description: "Per-app event display templates. Keys are app identifiers, values map event types to Nunjucks title templates. Templates receive user (current) and target (edited/invited user). Merges with default templates."
  app_domain:
    description: App domain URL for invite links (falls back to current origin)
  fields:
    type: object
    description: "Field block arrays: profile, global_attributes, app_attributes. Same blocks used for edit forms and SmartDescriptions view. show_honorific toggles the honorific/title selector (Mr/Ms/Dr)."
    properties:
      show_honorific:
        type: boolean
        default: false
      profile:
        default: []
      global_attributes:
        default: []
      app_attributes:
        default: []
  components:
    type: object
    description: "Component overrides: view_access_tile, table_columns, download_columns, filters, main_slots, sidebar_slots"
    properties:
      download_columns:
        default: []
      table_columns:
        default: []
      filters:
        default: []
      main_slots:
        default: []
      sidebar_slots:
        default: []
      view_access_tile:
        default:
          _ref: components/view_access.yaml
  request_stages:
    type: object
    description: "MongoDB pipeline stage overrides: get_all_users, write, filter_match. write stages are appended to both update and invite write flows."
    properties:
      filter_match:
        default: []
      get_all_users:
        default:
          - $addFields: {}
      write:
        default: []
  filter_requests:
    default: []
    description: Additional requests for the custom filters section
  avatar_colors:
    default:
      _ref: ../shared/profile/avatar_colors.yaml
    description: "Gradient pairs for avatar backgrounds. Each entry: { from, to }."

exports:
  pages:
    - id: users
      description: User administration list with filtering, sorting, pagination, and Excel download
    - id: users-view
      description: Read-only user detail with profile, attributes, and access sidebar
    - id: users-edit
      description: Edit existing user profile and access settings
    - id: users-invite
      description: Invite a new user with profile and access settings
    - id: check-invite-email
      description: Verify email availability before sending invite
  connections:
    - id: user-contacts-collection
      description: MongoDB connection for user contact records
  api:
    - id: invite-user
      description: Create user invite with profile, access, and notification
    - id: update-user
      description: Update existing user profile and access settings
    - id: resend-invite
      description: Resend pending user invitation email
  components:
    - id: user-selector
      description: Autocomplete selector for picking users
  menus:
    - id: default
      description: User admin navigation link

connections:
  - _ref: connections/user-contacts-collection.yaml

api:
  - _ref: api/invite-user.yaml
  - _ref: api/update-user.yaml
  - _ref: api/resend-invite.yaml

pages:
  - _ref: pages/users.yaml
  - _ref: pages/users-view.yaml
  - _ref: pages/users-edit.yaml
  - _ref: pages/users-invite.yaml
  - _ref: pages/check-invite-email.yaml

components:
  - id: user-selector
    component:
      _ref: components/user-selector.yaml

menus:
  - _ref: menu.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: "^2"
  - name: "@lowdefy/community-plugin-xlsx"
    version: "^1"
  - name: "@lowdefy/modules-mongodb-plugins"
    version: "^0.1.0"
