name: User Admin
version: 0.2.0
description: User administration — list, edit, invite users

dependencies:
  - id: layout
    description: Page layout wrapper
  - id: events
    description: Audit event logging and change stamp
  - id: notifications
    description: Notification dispatch

vars:
  app_name:
    required: true
    description: App name for MongoDB field paths (e.g., example-app)
  app_title:
    default: ""
    description: "Optional display prefix (e.g., Team). When set: Team User Admin, Invite Team User. When not set: User Admin, Invite User."
  roles:
    required: true
    description: List of available user roles [{label, value}]
  event_display:
    default:
      _ref: defaults/event_display.yaml
    description: "Per-app event display templates. Keys are app identifiers, values map event types to Nunjucks title templates. Templates receive user (current) and target (edited/invited user). Merges with default templates."
  app_domain:
    description: App domain URL for invite links (falls back to current origin)
  fields:
    type: object
    description: "Field block arrays: profile, global_attributes, app_attributes. Same blocks used for edit forms and SmartDescriptions view. show_honorific toggles the honorific/title selector (Mr/Ms/Dr)."
    properties:
      show_honorific:
        type: boolean
        default: false
        description: Show the honorific/title selector (Mr/Ms/Dr) in the profile form.
      profile:
        default: []
        description: >-
          Profile field blocks rendered in the user edit/invite form and view.
          Block ids must be prefixed with `profile.` so they bind to
          `state.profile.*`.
      global_attributes:
        default: []
        description: >-
          Cross-app attribute field blocks rendered in the user form and view.
          Block ids must be prefixed with `global_attributes.` so they bind
          to `state.global_attributes.*`.
      app_attributes:
        default: []
        description: >-
          Per-app attribute field blocks scoped to `app_name`. Block ids must
          be prefixed with `app_attributes.` so they bind to
          `state.app_attributes.*` and write to `app_attributes.{app_name}`
          on save.
  components:
    type: object
    description: "Component overrides: view_access_tile, table_columns, download_columns, filters, main_slots, sidebar_slots"
    properties:
      download_columns:
        default: []
        description: Extra columns appended to the Excel export.
      table_columns:
        default: []
        description: Extra column definitions appended to the users list table.
      filters:
        default: []
        description: >-
          Extra filter blocks rendered below the built-in search bar on the
          users list page. Pair with `filter_requests` for custom data sources.
      main_slots:
        default: []
        description: Extra blocks appended to the main column on the users-view page.
      sidebar_slots:
        default: []
        description: Extra blocks appended to the sidebar column on the users-view page.
      view_access_tile:
        default:
          _ref: components/view_access.yaml
        description: >-
          Override for the access tile rendered on the users-view page. Defaults
          to the built-in roles/access summary; replace with custom blocks to
          show app-specific access information.
  request_stages:
    type: object
    description: "MongoDB pipeline stage overrides: get_all_users, write, filter_match. write stages are appended to both update and invite write flows."
    properties:
      filter_match:
        default: []
        description: >-
          Atlas Search compound clauses appended to the list-page `$search`
          query. Used to add custom filter conditions to the users list.
      get_all_users:
        default:
          - $addFields: {}
        description: >-
          Pipeline stages appended after filtering on the users list and
          Excel export aggregations.
      write:
        default: []
        description: >-
          Pipeline update stages appended to both update-user and invite-user
          flows. Used for derived fields or extra transforms beyond the
          built-in profile/attribute writes.
  filter_requests:
    default: []
    description: Additional requests for the custom filters section
  avatar_colors:
    default:
      _ref: ../shared/profile/avatar_colors.yaml
    description: "Gradient pairs for avatar backgrounds. Each entry: { from, to }."

exports:
  pages:
    - id: all
      description: User administration list with filtering, sorting, pagination, and Excel download
    - id: view
      description: Read-only user detail with profile, attributes, and access sidebar
    - id: edit
      description: Edit existing user profile and access settings
    - id: new
      description: Invite a new user with profile and access settings
    - id: check
      description: Verify email availability before sending invite
  connections:
    - id: user-contacts-collection
      description: MongoDB connection for user contact records
  api:
    - id: invite-user
      description: Create user invite with profile, access, and notification
    - id: update-user
      description: Update existing user profile and access settings
    - id: resend-invite
      description: Resend pending user invitation email
  components:
    - id: user-selector
      description: Autocomplete selector for picking users
  menus:
    - id: default
      description: User admin navigation link

connections:
  - _ref: connections/user-contacts-collection.yaml

api:
  - _ref: api/invite-user.yaml
  - _ref: api/update-user.yaml
  - _ref: api/resend-invite.yaml

pages:
  - _ref: pages/all.yaml
  - _ref: pages/view.yaml
  - _ref: pages/edit.yaml
  - _ref: pages/new.yaml
  - _ref: pages/check.yaml

components:
  - id: user-selector
    component:
      _ref: components/user-selector.yaml

menus:
  - _ref: menu.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: "^2"
  - name: "@lowdefy/community-plugin-xlsx"
    version: "^1"
  - name: "@lowdefy/modules-mongodb-plugins"
    version: "^0.1.0"
