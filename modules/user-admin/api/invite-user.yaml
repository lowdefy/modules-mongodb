id: invite-user
type: Api
routine:
  - id: invite
    type: MongoDBUpdateOne
    connectionId:
      _module.connectionId: user-contacts-collection
    properties:
      options:
        upsert: true
      filter:
        lowercase_email:
          _string.toLowerCase:
            _string.trim:
              _if_none:
                - _payload: email
                - ""
      update:
        _build.array.concat:
          # Stage 1: Insert-only fields + merge data objects
          - - $set:
                _object.assign:
                  - _id:
                      $ifNull:
                        - $_id
                        - _uuid: true
                    email:
                      $ifNull:
                        - $email
                        - _string.trim:
                            _if_none:
                              - _payload: email
                              - ""
                    lowercase_email:
                      $ifNull:
                        - $lowercase_email
                        - _string.toLowerCase:
                            _string.trim:
                              _if_none:
                                - _payload: email
                                - ""
                    profile:
                      $mergeObjects:
                        - $ifNull:
                            - "$$ROOT.profile"
                            - {}
                        - _payload: profile
                    global_attributes:
                      $mergeObjects:
                        - $ifNull:
                            - "$$ROOT.global_attributes"
                            - {}
                        - _payload: global_attributes
                    updated:
                      _ref:
                        module: events
                        component: change_stamp
                    created:
                      $ifNull:
                        - $created
                        - _ref:
                            module: events
                            component: change_stamp
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          ["apps.", { _module.var: app_name }, ".disabled"]
                      descriptor:
                        value:
                          $literal: false
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          ["apps.", { _module.var: app_name }, ".roles"]
                      descriptor:
                        value:
                          _payload: roles
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          ["apps.", { _module.var: app_name }, ".invite.open"]
                      descriptor:
                        value:
                          $literal: true
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          [
                            "apps.",
                            { _module.var: app_name },
                            ".app_attributes",
                          ]
                      descriptor:
                        value:
                          $mergeObjects:
                            - _string.concat:
                                - "$apps."
                                - _module.var: app_name
                                - ".app_attributes"
                            - _payload: app_attributes
          # Stage 2: Compute derived fields (sees merged profile from stage 1)
          - - $set:
                profile.name:
                  $concat:
                    - $trim:
                        input: "$profile.given_name"
                    - " "
                    - $trim:
                        input: "$profile.family_name"
          # Consumer pipeline stages
          - _module.var: request_stages.write

  - id: get-user
    type: MongoDBFindOne
    connectionId:
      _module.connectionId: user-contacts-collection
    properties:
      query:
        lowercase_email:
          _string.toLowerCase:
            _string.trim:
              _if_none:
                - _payload: email
                - ""

  - id: new-event
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: invite-user
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.if_none:
                        - _module.var: event_display
                        - _build.object.fromEntries:
                            - - _module.var: app_name
                              - _ref: defaults/event_display.yaml
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.invite-user
                            - null
                        - null
              callback:
                _build.function:
                  - __build.args: "0.0"
                  - title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.invite-user
                        on:
                          user:
                            _user: true
                          target:
                            name:
                              _step: get-user.profile.name
                            email:
                              _step: get-user.email
                    description: null
        references:
          contact_ids:
            - _step: get-user._id
        metadata:
          app_name:
            _module.var: app_name
          lowercase_email:
            _string.toLowerCase:
              _string.trim:
                _if_none:
                  - _payload: email
                  - ""

  # Dispatch the invite email directly — the module ships its own template
  # (notifications/invite-user.yaml), so apps no longer shape invite events in
  # their send_routine. The item is shaped inline: the recipient is known here.
  - id: dispatch-invite-notification
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: dispatch-notifications
          module: notifications
      payload:
        notification_id:
          _module.notificationId: invite-user
        item:
          # Dedup: one notification per (event, recipient).
          key:
            _string.concat:
              - _step: new-event.eventId
              - ":"
              - _step: get-user._id
          contact:
            _id:
              _step: get-user._id
            email:
              _step: get-user.email
            profile:
              name:
                _step: get-user.profile.name
          inviter_name:
            _user: profile.name
          links:
            button:
              pageId:
                _module.var: login_page_id
              urlQuery:
                hint:
                  _step: get-user.email

  - :return:
      userId:
        _step: get-user._id
