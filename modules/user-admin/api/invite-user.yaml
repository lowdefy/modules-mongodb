id: invite-user
type: Api
routine:
  - id: invite
    type: MongoDBUpdateOne
    connectionId:
      _module.connectionId: user-contacts-collection
    properties:
      options:
        upsert: true
      filter:
        lowercase_email:
          _string.toLowerCase:
            _string.trim:
              _if_none:
                - _payload: email
                - ""
      update:
        _build.array.concat:
          # Stage 1: Insert-only fields + merge data objects
          - - $set:
                _object.assign:
                  - _id:
                      $ifNull:
                        - $_id
                        - _uuid: true
                    email:
                      $ifNull:
                        - $email
                        - _string.trim:
                            _if_none:
                              - _payload: email
                              - ""
                    lowercase_email:
                      $ifNull:
                        - $lowercase_email
                        - _string.toLowerCase:
                            _string.trim:
                              _if_none:
                                - _payload: email
                                - ""
                    profile:
                      $mergeObjects:
                        - $ifNull:
                            - "$$ROOT.profile"
                            - {}
                        - _payload: profile
                    global_attributes:
                      $mergeObjects:
                        - $ifNull:
                            - "$$ROOT.global_attributes"
                            - {}
                        - _payload: global_attributes
                    updated:
                      _ref:
                        module: events
                        component: change_stamp
                    created:
                      $ifNull:
                        - $created
                        - _ref:
                            module: events
                            component: change_stamp
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          ["apps.", { _module.var: app_name }, ".disabled"]
                      descriptor:
                        value:
                          $literal: false
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          ["apps.", { _module.var: app_name }, ".roles"]
                      descriptor:
                        value:
                          _payload: roles
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          ["apps.", { _module.var: app_name }, ".invite.open"]
                      descriptor:
                        value:
                          $literal: true
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          [
                            "apps.",
                            { _module.var: app_name },
                            ".app_attributes",
                          ]
                      descriptor:
                        value:
                          $mergeObjects:
                            - _string.concat:
                                - "$apps."
                                - _module.var: app_name
                                - ".app_attributes"
                            - _payload: app_attributes
          # Stage 2: Compute derived fields (sees merged profile from stage 1)
          - - $set:
                profile.name:
                  $concat:
                    - $trim:
                        input: "$profile.given_name"
                    - " "
                    - $trim:
                        input: "$profile.family_name"
          # Consumer pipeline stages
          - _module.var: request_stages.write

  - id: new-event
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: invite-user
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.object.assign:
                        - _ref: defaults/event_display.yaml
                        - _module.var: event_display
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.invite-user
                            - null
                        - null
              callback:
                _build.function:
                  - __build.args: "0.0"
                  - title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.invite-user
                        on:
                          user:
                            _user: true
                          target:
                            name:
                              _step: invite.value.profile.name
                            email:
                              _step: invite.value.email
                    description: null
        references:
          user_ids:
            - _step: invite.value._id
        metadata:
          app_name:
            _module.var: app_name
          lowercase_email:
            _string.toLowerCase:
              _string.trim:
                _if_none:
                  - _payload: email
                  - ""

  - id: send-notification
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: send-notification
          module: notifications
      payload:
        event_ids:
          - _step: new-event.eventId

  - :return:
      userId:
        _step: invite.value._id
