# update-user-attributes — global/user attributes on the `user` row via
# UpdateUserAttributes (applied across every app, design Decision 3). Role-gated
# app-side; step-floored by `auth.userAdminRole`. Audit event is the final step.
#
# Payload: { user_id, user_attributes (object)?, target_name?, target_email? }
id: update-user-attributes
type: Api
routine:
  - id: set_user_attributes
    type: UpdateUserAttributes
    properties:
      userId:
        _payload: user_id
      attributes:
        _if_none:
          - _payload: user_attributes
          - {}
  - id: audit
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: user-attributes-updated
        display:
          title:
            _nunjucks:
              template:
                _build.if_none:
                  - _module.var: event_display.user-attributes-updated
                  - _ref:
                      path: defaults/event_display.yaml
                      key: user-attributes-updated
              on:
                user:
                  _user: true
                target:
                  name:
                    _payload: target_name
                  email:
                    _payload: target_email
          description: null
        references:
          user_ids:
            - _payload: user_id
  - :return:
      success: true
