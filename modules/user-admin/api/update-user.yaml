id: update-user
type: Api
routine:
  - id: update
    type: MongoDBUpdateOne
    connectionId:
      _module.connectionId: user-contacts-collection
    properties:
      filter:
        _id:
          _payload: _id
      update:
        _build.array.concat:
          # Stage 1: Merge data objects
          - - $set:
                _object.assign:
                  - profile:
                      $mergeObjects:
                        - $ifNull:
                            - "$$ROOT.profile"
                            - {}
                        - _payload: profile
                    global_attributes:
                      $mergeObjects:
                        - $ifNull:
                            - "$$ROOT.global_attributes"
                            - {}
                        - _payload: global_attributes
                    updated:
                      _ref:
                        module: events
                        component: change_stamp
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          ["apps.", { _module.var: app_name }, ".disabled"]
                      descriptor:
                        value:
                          _if_none:
                            - _payload: disabled
                            - false
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          ["apps.", { _module.var: app_name }, ".roles"]
                      descriptor:
                        value:
                          _payload: roles
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          ["apps.", { _module.var: app_name }, ".invite.open"]
                      descriptor:
                        value:
                          _if_none:
                            - _payload: invite.open
                            - false
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          [
                            "apps.",
                            { _module.var: app_name },
                            ".app_attributes",
                          ]
                      descriptor:
                        value:
                          $mergeObjects:
                            - _string.concat:
                                - "$apps."
                                - _module.var: app_name
                                - ".app_attributes"
                            - _payload: app_attributes
          # Stage 2: Compute derived fields (sees merged profile from stage 1)
          - - $set:
                profile.name:
                  $concat:
                    - $trim:
                        input: "$profile.given_name"
                    - " "
                    - $trim:
                        input: "$profile.family_name"
          # Consumer pipeline stages
          - _module.var: request_stages.write

  - id: new-event
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: update-user
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.object.assign:
                        - _ref: defaults/event_display.yaml
                        - _module.var: event_display
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.update-user
                            - null
                        - null
              callback:
                _build.function:
                  key:
                    __build.args: 0.0
                  value:
                    title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.update-user
                        on:
                          user:
                            _user: true
                          target:
                            name:
                              _string.trim:
                                _string.concat:
                                  - _string.trim:
                                      _if_none:
                                        - _payload: profile.given_name
                                        - ""
                                  - " "
                                  - _string.trim:
                                      _if_none:
                                        - _payload: profile.family_name
                                        - ""
                            email:
                              _payload: email
                    description: null
        references:
          user_ids:
            - _payload: _id
        metadata:
          app_name:
            _module.var: app_name

  - :return:
      success: true
