id: update-user
type: Api
auth:
  public: false
routine:
  - id: update
    type: MongoDBUpdateOne
    connectionId:
      _module.connectionId: user-contacts
    properties:
      filter:
        _id:
          _payload: user._id
      update:
        _build.array.concat:
          - - $set:
                _object.assign:
                  - updated:
                      _ref:
                        module: events
                        component: change_stamp
                    global_attributes:
                      $mergeObjects:
                        - $global_attributes
                        - _payload: user.global_attributes
                    profile.name:
                      _string.trim:
                        _string.concat:
                          - _string.trim:
                              _if_none:
                                - _payload: user.profile.given_name
                                - ""
                          - " "
                          - _string.trim:
                              _if_none:
                                - _payload: user.profile.family_name
                                - ""
                    profile.picture:
                      _string.concat:
                        - https://api.dicebear.com/6.x/initials/svg?backgroundType=gradientLinear&scale=75&seed=
                        - _string.trim:
                            _string.concat:
                              - _string.trim:
                                  _if_none:
                                    - _payload: user.profile.given_name
                                    - ""
                              - " "
                              - _string.trim:
                                  _if_none:
                                    - _payload: user.profile.family_name
                                    - ""
                    profile.title:
                      _payload: user.profile.title
                    profile.given_name:
                      _string.trim:
                        _if_none:
                          - _payload: user.profile.given_name
                          - ""
                    profile.family_name:
                      _string.trim:
                        _if_none:
                          - _payload: user.profile.family_name
                          - ""
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          ["apps.", { _module.var: app_name }, ".disabled"]
                      descriptor:
                        value:
                          _if_none:
                            - _payload: user.disabled
                            - false
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          ["apps.", { _module.var: app_name }, ".roles"]
                      descriptor:
                        value:
                          _payload: user.roles
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          ["apps.", { _module.var: app_name }, ".invite.open"]
                      descriptor:
                        value:
                          _if_none:
                            - _payload: user.invite.open
                            - false
                  - _object.defineProperty:
                      on: {}
                      key:
                        _string.concat:
                          [
                            "apps.",
                            { _module.var: app_name },
                            ".app_attributes",
                          ]
                      descriptor:
                        value:
                          $mergeObjects:
                            - _string.concat:
                                - "$apps."
                                - _module.var: app_name
                                - ".app_attributes"
                            - _payload: user.app_attributes
          - _module.var:
              key: request_stages.update_user
              default:
                - $set: {}

  - id: new-event
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: update-user
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.object.assign:
                        - _ref: defaults/event_display.yaml
                        - _module.var:
                            key: event_display
                            default: {}
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.update-user
                            - null
                        - null
              callback:
                _build.function:
                  key:
                    __build.args: 0.0
                  value:
                    title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.update-user
                        on:
                          user:
                            _user: true
                          target:
                            name:
                              _payload: user.profile.name
                            email:
                              _payload: user.email
                    description: null
        references:
          user_ids:
            - _payload: user._id
        metadata:
          app_name:
            _module.var: app_name

  - :return:
      success: true
