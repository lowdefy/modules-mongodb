id: resend-invite
type: Api
routine:
  - id: new-event
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: resend-user-invite
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.if_none:
                        - _module.var: event_display
                        - _build.object.fromEntries:
                            - - _module.var: app_name
                              - _ref: defaults/event_display.yaml
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.resend-user-invite
                            - null
                        - null
              callback:
                _build.function:
                  - __build.args: "0.0"
                  - title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.resend-user-invite
                        on:
                          user:
                            _user: true
                          target:
                            name:
                              _payload: profile.name
                            email:
                              _payload: email
                    description: null
        references:
          contact_ids:
            - _payload: _id
        metadata:
          app_name:
            _module.var: app_name

  # Dispatch the reminder email directly — the module ships its own template
  # (notifications/resend-user-invite.yaml). Each resend logs a new event, so
  # the (event, recipient) dedup key never suppresses a deliberate resend.
  - id: dispatch-resend-notification
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: dispatch-notifications
          module: notifications
      payload:
        notification_id:
          _module.notificationId: resend-user-invite
        item:
          key:
            _string.concat:
              - _step: new-event.eventId
              - ":"
              - _payload: _id
          contact:
            _id:
              _payload: _id
            email:
              _payload: email
            profile:
              name:
                _payload: profile.name
          inviter_name:
            _user: profile.name
          links:
            button:
              pageId:
                _module.var: login_page_id
              urlQuery:
                hint:
                  _payload: email

  - :return:
      success: true
