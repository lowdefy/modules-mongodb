# resend-invitation — InviteMember with native `resend: true` (design Decision 7).
# Re-renders the invitation through the same `auth.email` send path and refreshes
# stored attributes. Only refreshes a still-pending, NON-expired row (re-inviting
# an Expired row routes through `invite` instead — task 5). organizationId
# defaults to the pinned org. Role-gated app-side; step-floored by
# `auth.userAdminRole`. Audit event is the final step.
#
# Payload: { email, roles (array of catalog ids), member_attributes (object)? }
id: resend-invitation
type: Api
routine:
  - id: resend
    type: InviteMember
    properties:
      email:
        _payload: email
      role:
        _array.join:
          - _if_none:
              - _payload: roles
              - []
          - ","
      attributes:
        _if_none:
          - _payload: member_attributes
          - {}
      resend: true
  - id: audit
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: invitation-resent
        display:
          title:
            _nunjucks:
              template:
                _build.if_none:
                  - _module.var: event_display.invitation-resent
                  - _ref:
                      path: defaults/event_display.yaml
                      key: invitation-resent
              on:
                user:
                  _user: true
                target:
                  email:
                    _payload: email
          description: null
  - :return:
      success: true
