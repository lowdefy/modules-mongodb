id: get_user
type: MongoDBAggregation
connectionId:
  _module.connectionId: user-contacts-collection
payload:
  user_id:
    _input: user_id
properties:
  pipeline:
    - $match:
        _id:
          _payload: user_id
    - $project:
        email:
          $cond:
            - $regexMatch:
                input: $email
                regex: "@"
            - $email
            - null
        lowercase_email:
          $cond:
            - $regexMatch:
                input: $lowercase_email
                regex: "@"
            - $lowercase_email
            - null

        global_attributes: 1
        profile: 1
        instance: 1
        app_attributes:
          _string.concat:
            - "$apps."
            - _module.var: app_name
            - ".app_attributes"
        disabled:
          _string.concat:
            - "$apps."
            - _module.var: app_name
            - ".disabled"
        invite:
          _string.concat:
            - "$apps."
            - _module.var: app_name
            - ".invite"
        # Status slug for the title-block pill (enums/user_statuses.yaml).
        # Mirrors the `active` $switch in get_all_users: disabled > open
        # invite > active.
        status:
          $switch:
            branches:
              - case:
                  $eq:
                    - _string.concat:
                        - "$apps."
                        - _module.var: app_name
                        - ".disabled"
                    - true
                then: disabled
              - case:
                  $eq:
                    - _string.concat:
                        - "$apps."
                        - _module.var: app_name
                        - ".invite.open"
                    - true
                then: invited
            default: active
        is_user:
          _string.concat:
            - "$apps."
            - _module.var: app_name
            - ".is_user"
        roles:
          $ifNull:
            - _string.concat:
                - "$apps."
                - _module.var: app_name
                - ".roles"
            - []
        sign_up:
          _string.concat:
            - "$apps."
            - _module.var: app_name
            - ".sign_up"
        updated: 1
        created: 1
