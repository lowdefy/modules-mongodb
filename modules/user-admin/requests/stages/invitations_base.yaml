# Invitations base stages (design Decision 2/7) — shared by the Invitations list
# read and the Excel export. Root is `user-invitations` for the pinned org.
# Reads the collection directly (bypassing the org-plugin helpers) so it can do
# its own status/expiry derivation:
#   $match status: "pending" — excludes accepted / rejected / canceled rows,
#     which appear in neither the Invitations tab nor the export.
#   status — there is NO "expired" status in BetterAuth; it is derived from a
#     pending row's expiresAt: future → Invited, past → Expired (Decision 2).
#   roles_arr — invitation.role is the same CSV shape as member.role; $split it.
#   inviter_name / inviter_id — the "Invited by" column (join `users`).
- $match:
    organizationId:
      _user: organizationId
    status: pending
- $lookup:
    from: users
    localField: inviterId
    foreignField: _id
    as: inviter
- $unwind:
    path: "$inviter"
    preserveNullAndEmptyArrays: true
- $addFields:
    inviter_name: "$inviter.name"
    inviter_id: "$inviterId"
    roles_arr:
      $split:
        - $ifNull:
            - "$role"
            - ""
        - ","
    # Clean id list (empties dropped) — the resend action re-sends these ids.
    role_ids:
      $filter:
        input:
          $split:
            - $ifNull:
                - "$role"
                - ""
            - ","
        as: r
        cond:
          $ne:
            - "$$r"
            - ""
    expires_at: "$expiresAt"
    # Stored invite-time member attributes (applied to the member at accept) —
    # carried through so Resend can preserve them rather than blank them.
    member_attributes:
      $ifNull:
        - "$attributes"
        - {}
    status:
      $cond:
        - $gt:
            - "$expiresAt"
            - _date: now
        - Invited
        - Expired
