# Security tile (design Decision 5) — "Access & sign-in". Suspend/reinstate
# (behind the suspension var, Decision 4), Remove from app, Sign out everywhere,
# Delete identity, and the impersonation affordance (behind the impersonation
# var). Active sessions (token projected out) and read-only auth methods.
#
# Multi-app vs single-app degradation (Decision 6 — blast-radius copy, Delete
# enablement, "suite"/"every app" phrasing) keys off the person's other-
# membership count and is WIRED in task 13. This renders the multi-app variant.
_ref:
  module: layout
  component: card
  vars:
    title: Security
    blocks:
      - id: security_body
        type: Box
        layout:
          gap: 12
        blocks:
          - id: security_access_eyebrow
            type: Html
            properties:
              html: '<div style="text-transform:uppercase; letter-spacing:0.08em; font-size:11px; color:var(--ant-color-text-tertiary);">Access &amp; sign-in</div>'
          - id: security_actions
            type: Box
            layout:
              direction: row
              gap: 8
            blocks:
              _build.array.concat:
                # Suspend — behind the suspension var (Decision 4). Permanent,
                # suite-wide ban; opens the blast-radius confirm (modal_suspend).
                - _build.if:
                    test:
                      _module.var: suspension
                    then:
                      - id: suspend_btn
                        type: Button
                        layout:
                          flex: 0 0 auto
                        properties:
                          title: Suspend access
                          danger: true
                        events:
                          onClick:
                            - id: open_suspend_modal
                              type: CallMethod
                              params:
                                blockId: modal_suspend
                                method: toggleOpen
                    else: []
                - - id: remove_btn
                    type: Button
                    layout:
                      flex: 0 0 auto
                    properties:
                      title: Remove from app
                    events:
                      onClick:
                        - id: open_remove_modal
                          type: CallMethod
                          params:
                            blockId: modal_remove
                            method: toggleOpen
                  - id: revoke_btn
                    type: Button
                    layout:
                      flex: 0 0 auto
                    properties:
                      title: Sign out everywhere
                    events:
                      onClick:
                        - id: open_revoke_modal
                          type: CallMethod
                          params:
                            blockId: modal_revoke
                            method: toggleOpen
                  # Delete identity — only when the person holds no other
                  # memberships (Decision 4). Disabled in the multi-app variant;
                  # task 13 flips `disabled` off the membership count.
                  - id: delete_btn
                    type: Button
                    layout:
                      flex: 0 0 auto
                    properties:
                      title: Delete identity
                      danger: true
                      # Enabled only at other-membership count 0 (Decision 4/6);
                      # the routine re-checks server-side.
                      disabled:
                        _gt:
                          - _array.length:
                              _if_none:
                                - _request: get_user_memberships
                                - []
                          - 0
                    events:
                      onClick:
                        - id: open_delete_modal
                          type: CallMethod
                          params:
                            blockId: modal_delete
                            method: toggleOpen
                # Impersonation — "View as user", behind the impersonation var
                # (Decision 5). Off by default; works once auth.userAdminRole is
                # configured and held. The client action is wired in task 13.
                - _build.if:
                    test:
                      _module.var: impersonation
                    then:
                      - id: impersonate_btn
                        type: Button
                        layout:
                          flex: 0 0 auto
                        properties:
                          title: View as user
                          icon: AiOutlineEye
                        events:
                          onClick:
                            # Session-scoped client action, governed by
                            # BetterAuth's admin-plugin AC bridged from
                            # auth.userAdminRole (Decision 5). Then land on the
                            # app root as the impersonated user.
                            - id: impersonate_user
                              type: ImpersonateUser
                              params:
                                userId:
                                  _url_query: userId
                            - id: go_home_after_impersonate
                              type: Link
                              params:
                                url: "/"
                    else: []
          - id: security_hint
            type: Html
            properties:
              # Copy collapses to this-app framing at other-membership count 0
              # (Decision 6).
              html:
                _if:
                  test:
                    _gt:
                      - _array.length:
                          _if_none:
                            - _request: get_user_memberships
                            - []
                      - 0
                  then: '<div style="font-size:12px; color:var(--ant-color-text-tertiary);">Suspend blocks this person from every app in the suite and signs them out. Remove takes away access to this app only. Delete is available once they belong to no other apps.</div>'
                  else: '<div style="font-size:12px; color:var(--ant-color-text-tertiary);">Suspend blocks this person from signing in and signs them out. Remove takes away their access to this app. Delete permanently removes their login (their contact record is kept).</div>'
          - id: security_divider_sessions
            type: Divider
            properties:
              margin: 4
          - id: sessions_eyebrow
            type: Html
            properties:
              html: '<div style="text-transform:uppercase; letter-spacing:0.08em; font-size:11px; color:var(--ant-color-text-tertiary);">Active sessions</div>'
          - id: sessions_list
            type: ListSelector
            properties:
              selectable: false
              bordered: false
              gap: 0
              # Active sessions for the target (token $project-ed out, Decision 5).
              # An admin viewing another user has no "current" session in this
              # list, so rows are read-only; revocation is the tile's
              # "Sign out everywhere" action.
              data:
                _request: get_user_sessions
              html: |
                <div id="bl-{{ index }}.session_item" style="display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--ant-color-border-secondary); font-size:13px;">
                  <span style="flex:1 1 auto; min-width:0;">
                    <div style="color:var(--ant-color-text);">{{ item.ua }}</div>
                    <div style="color:var(--ant-color-text-tertiary); font-size:12px;">{{ item.ip }}{% if item.ip and item.expires_str %} · {% endif %}{% if item.expires_str %}expires {{ item.expires_str }}{% endif %}</div>
                  </span>
                </div>
            style:
              .body:
                padding: "0"
          - id: security_divider_methods
            type: Divider
            properties:
              margin: 4
          - id: methods_eyebrow
            type: Html
            properties:
              html: '<div style="text-transform:uppercase; letter-spacing:0.08em; font-size:11px; color:var(--ant-color-text-tertiary);">Auth methods</div>'
          - id: auth_methods
            type: Html
            properties:
              html:
                _nunjucks:
                  # Read-only: email-verified (user.emailVerified), one badge per
                  # linked OAuth provider (get_user_accounts), MFA enrolment
                  # (user.twoFactorEnabled), and a passkey badge when the user has
                  # ≥1 registered passkey (get_user_detail.passkey_count, joined
                  # from the user-passkeys read connection).
                  template: |
                    <div style="display:flex; gap:4px; flex-wrap:wrap;">
                      <span style="padding:0 8px; border-radius:4px; font-size:12px; line-height:20px; {% if emailVerified %}background:var(--ant-color-success-bg); border:1px solid var(--ant-color-success-border); color:var(--ant-color-success-text);{% else %}background:var(--ant-color-fill-quaternary); border:1px solid var(--ant-color-border); color:var(--ant-color-text-secondary);{% endif %}">{% if emailVerified %}✓ {% endif %}Email {% if not emailVerified %}not {% endif %}verified</span>
                    {% for p in providers %}
                      <span style="padding:0 8px; border-radius:4px; font-size:12px; line-height:20px; background:var(--ant-color-fill-quaternary); border:1px solid var(--ant-color-border); color:var(--ant-color-text-secondary); text-transform:capitalize;">{{ p.providerId }}</span>
                    {% endfor %}
                    {% if passkeyCount > 0 %}
                      <span style="padding:0 8px; border-radius:4px; font-size:12px; line-height:20px; background:var(--ant-color-fill-quaternary); border:1px solid var(--ant-color-border); color:var(--ant-color-text-secondary);">Passkey</span>
                    {% endif %}
                    {% if mfa %}
                      <span style="padding:0 8px; border-radius:4px; font-size:12px; line-height:20px; background:var(--ant-color-success-bg); border:1px solid var(--ant-color-success-border); color:var(--ant-color-success-text);">MFA · TOTP</span>
                    {% endif %}
                    </div>
                  on:
                    emailVerified:
                      _request: get_user_detail.0.email_verified
                    mfa:
                      _request: get_user_detail.0.two_factor_enabled
                    passkeyCount:
                      _request: get_user_detail.0.passkey_count
                    providers:
                      _request: get_user_accounts
