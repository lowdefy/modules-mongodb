# Remove-from-app confirm modal — RemoveMember (app-scoped, Decision 4). Deletes
# this app's member row; sign-in, contact, and other apps are untouched. onOk
# (CallAPI remove-member) is wired in task 13.
id: modal_remove
type: Modal
properties:
  title:
    _nunjucks:
      template: "Remove {{ name }} from {{ app | trim }} User Admin?"
      on:
        name:
          _request: get_user_detail.0.name
        app:
          _module.var: app_title
  width: 480
  okText: Remove from app
  cancelText: Cancel
  okButtonProps:
    danger: true
events:
  onOk:
    # RemoveMember (app-scoped, Decision 4). The member row is deleted, so the
    # detail read would return null → return to the list.
    - id: remove_member
      type: CallAPI
      messages:
        loading: Removing…
        success: Removed from this app.
      params:
        endpointId:
          _module.endpointId: remove-member
        payload:
          member_id:
            _request: get_user_detail.0.member_id
          user_id:
            _request: get_user_detail.0.user_id
          target_name:
            _request: get_user_detail.0.name
          target_email:
            _request: get_user_detail.0.email
    - id: back_to_list_after_remove
      type: Link
      params:
        pageId:
          _module.pageId: all
blocks:
  - id: remove_message
    type: Html
    properties:
      html: '<div style="font-size:13.5px; color:var(--ant-color-text-secondary);">This removes the person from <b>this app only</b> — their roles and attributes here are cleared. Their sign-in, contact details, and access to other apps are untouched. To restore access, invite them again (their previous roles are not kept).</div>'
