# Edit profile modal — write-profile routine (change-stamped contact write +
# UpdateUserProfile re-denorm, Decision 3). Fields bind state.profile.*; email is
# the login identity and is locked. onOk wiring (CallAPI update-profile) is task 13.
id: modal_profile
type: Modal
properties:
  title: Edit profile
  width: 560
  okText: Save profile
  cancelText: Cancel
events:
  onOpen:
    - id: seed_profile
      type: SetState
      params:
        profile:
          _request: get_user_detail.0.profile
        email:
          _request: get_user_detail.0.email
  onOk:
    _build.array.concat:
      - - id: validate_profile
          type: Validate
          params: modal_profile
        # write-profile fragment: change-stamped contact write + UpdateUserProfile
        # re-denorm of the TARGET's user.profile bag (Decision 3).
        - id: save_profile
          type: CallAPI
          messages:
            loading: Saving…
            success: Profile updated.
          params:
            endpointId:
              _module.endpointId: update-profile
            payload:
              user_id:
                _request: get_user_detail.0.user_id
              contact_id:
                _request: get_user_detail.0.contact_id
              profile:
                _state: profile
              email:
                _request: get_user_detail.0.email
              target_name:
                _request: get_user_detail.0.name
      - _ref: actions/detail_refetch.yaml
blocks:
  _build.array.concat:
    - _ref:
        path: ../shared/profile/form_core.yaml
        vars:
          show_honorific:
            _module.var: fields.show_honorific
    - - id: email
        type: TextInput
        properties:
          title: Email
          disabled: true
    - _module.var: fields.profile
