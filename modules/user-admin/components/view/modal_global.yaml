# Edit global attributes modal — UpdateUserAttributes (Decision 3). Cross-app
# attributes on the user row; bind state.user_attributes.*. onOk wiring (CallAPI
# update-user-attributes) is task 13.
id: modal_global
type: Modal
properties:
  title: Edit global attributes
  width: 480
  okText: Save attributes
  cancelText: Cancel
events:
  onOpen:
    - id: seed_global
      type: SetState
      # TODO(request-substitute) modal_global seed: "target user attributes subdoc (get_user_detail.user.attributes)"
      params:
        user_attributes:
          notes: Prefers email contact. Based in the Gauteng regional office.
  onOk:
    # TODO(request-substitute) modal_global onOk: "Validate + CallAPI update-user-attributes (UpdateUserAttributes) — task 13"
    - id: save_global_todo
      type: DisplayMessage
      params:
        status: info
        content: Save attributes — wired in task 13.
blocks:
  _build.array.concat:
    - _module.var: fields.user_attributes
    - - id: global_attrs_hint
        type: Html
        properties:
          html: '<div style="font-size:12px; color:var(--ant-color-text-tertiary);">These apply to this person across every app in the suite.</div>'
