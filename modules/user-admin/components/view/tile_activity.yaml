# Activity tile (design Decision 3) — the audit event timeline for this person.
# Uses the events module's request-backed `events-timeline` component
# (GetEventsTimeline over log-events), keyed on `user_ids` = the target's user id
# (the urlQuery userId). Every user-admin audit event stamps `user_ids`
# (update-profile stamps both user_ids and contact_ids, so profile edits appear
# here too); invitation events are keyed by contact and surface on the invite
# flow, not this person's timeline.
_ref:
  module: layout
  component: card
  vars:
    title: Activity
    blocks:
      - _ref:
          module: events
          component: events-timeline
          vars:
            reference_field: user_ids
            reference_value:
              _url_query: userId
            disable_contact_link: true
