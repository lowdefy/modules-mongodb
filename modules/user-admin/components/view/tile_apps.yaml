# Apps tile (design Decision 6) — read-only cross-app badges: the other apps in
# the suite this person belongs to. Visibility, not management. The whole tile is
# hidden when the person has no other memberships (single-app / suite-of-one);
# that gate keys off the other-membership count and is WIRED in task 13. This
# renders the multi-app variant.
_ref:
  module: layout
  component: card
  vars:
    title: Apps
    # TODO(request-substitute) apps_tile.visible: "other-membership count > 0 (get_user_memberships joined to user-organizations) — Decision 6"
    blocks:
      - id: app_badges
        type: Html
        properties:
          html:
            _nunjucks:
              # TODO(request-substitute) app_badges.apps: "other memberships joined to user-organizations (org name) — excludes this app"
              template: |
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                {% for a in apps %}
                  <span style="display:inline-flex; align-items:center; gap:8px; border:1px solid var(--ant-color-border); border-radius:20px; padding:4px 12px 4px 4px; font-size:12px; color:var(--ant-color-text);">
                    <span style="width:22px; height:22px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; background:var(--ant-color-fill-secondary); color:var(--ant-color-text-secondary); font-size:10px; font-weight:700;">{{ a.initial }}</span>
                    {{ a.name }}
                  </span>
                {% endfor %}
                </div>
              on:
                apps:
                  - name: CRM
                    initial: C
                  - name: Field Ops
                    initial: F
                  - name: Analytics
                    initial: A
      - id: apps_hint
        type: Html
        properties:
          html: '<div style="font-size:12px; color:var(--ant-color-text-tertiary);">Other apps this person belongs to. Manage their access from each app''s own admin.</div>'
