id: form_access
type: Box
layout:
  gap: 8
blocks:
  - id: invite.open
    type: Switch
    visible:
      _ne:
        - _state: is_user
        - true
    properties:
      title: Invite
      color: green
  - id: roles
    type: MultipleSelector
    properties:
      title: Roles
      options:
        _module.var: roles
  - id: disabled
    type: Switch
    visible:
      _or:
        - _eq:
            - _state: is_user
            - true
        - _eq:
            - _state: invite.open
            - true
    properties:
      title: Disable User
      color: danger
