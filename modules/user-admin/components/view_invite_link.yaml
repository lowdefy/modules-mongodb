id: invite_link
type: Paragraph
visible:
  _var:
    key: visible
    default: true
style:
  marginBottom: 0
properties:
  type: secondary
  code: true
  copyable: true
  content:
    _nunjucks:
      template: "{{ origin }}/login?hint={{ hint }}"
      on:
        origin:
          _if_none:
            - _module.var: app_domain
            - _location: origin
        hint:
          _if_none:
            - _state: lowercase_email
            - ""
