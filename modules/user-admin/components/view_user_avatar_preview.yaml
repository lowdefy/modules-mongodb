id: user_avatar
type: Img
style:
  textAlign: center
  marginBottom: 42
  /element:
    width: 100px
    borderRadius: 50%
properties:
  src:
    _nunjucks:
      template: https://api.dicebear.com/6.x/initials/svg?backgroundType=gradientLinear&scale=75&seed={{ name }}
      on:
        name:
          _string.concat:
            - _if_none:
                - _state: user.profile.given_name
                - ""
            - " "
            - _if_none:
                - _state: user.profile.family_name
                - ""
  alt:
    _string.concat:
      - "User avatar for "
      - _string.concat:
          - _if_none:
              - _state: user.profile.given_name
              - ""
          - " "
          - _if_none:
              - _state: user.profile.family_name
              - ""
