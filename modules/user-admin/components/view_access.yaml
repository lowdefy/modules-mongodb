id: access_card
type: Card
properties:
  title: Access
layout:
  gap: 8
blocks:
  # Status (Active / Open Invite / Disabled) is shown in the page title pill,
  # so it is intentionally not repeated here.
  - id: roles_label
    type: Paragraph
    style:
      marginBottom: 0
    properties:
      type: secondary
      content: Roles
  - id: roles_tags
    type: Box
    style:
      display: flex
      flexWrap: wrap
      gap: 4px
    blocks:
      _build.array.map:
        on:
          _module.var: roles
        callback:
          _build.function:
            id:
              _build.string.concat:
                - "role_tag_"
                - __build.args: 0
            type: Tag
            visible:
              _array.includes:
                - _state: roles
                - __build.args: 0
            properties:
              title:
                __build.args: 0
  # Account lifecycle + record audit stamp, rendered as label/value rows
  # (matches the Profile card's descriptions). Created/Last modified moved here
  # from the page-title subtitle so the title bar stays a single line. "Signed
  # up" is only included for actual users (is_user); the audit rows are always
  # present on a saved record. antd renders the value in the normal text colour
  # and the label muted — the label/value contrast the flat paragraphs lacked.
  - id: access_meta
    type: Descriptions
    properties:
      column: 1
      size: small
      # Each piece of metadata is its own label/value field (no combined
      # "name · date" string), kept in order via _object.assign: Signed up is
      # only present for actual users; each "by" field is dropped when the
      # change stamp has no user (legacy records) so no empty row renders.
      items:
        _object.assign:
          - _if:
              test:
                _eq:
                  - _state: is_user
                  - true
              then:
                Signed up:
                  _nunjucks:
                    template: "{{ date | date('YYYY-MM-DD') }}"
                    on:
                      date:
                        _state: sign_up
              else: {}
          - _if:
              test:
                _ne:
                  - _state: created.user.name
                  - null
              then:
                Created by:
                  _state: created.user.name
              else: {}
          - Created on:
              _nunjucks:
                template: "{{ date | date('YYYY-MM-DD') }}"
                on:
                  date:
                    _state: created.timestamp
          - _if:
              test:
                _ne:
                  - _state: updated.user.name
                  - null
              then:
                Last modified by:
                  _state: updated.user.name
              else: {}
          - Last modified on:
              _nunjucks:
                template: "{{ date | date('YYYY-MM-DD') }}"
                on:
                  date:
                    _state: updated.timestamp
