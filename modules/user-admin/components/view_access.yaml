id: access_card
type: Card
properties:
  title: Access
layout:
  gap: 8
blocks:
  # Status (Active / Open Invite / Disabled) is shown in the page title pill,
  # so it is intentionally not repeated here.
  - id: roles_label
    type: Paragraph
    style:
      marginBottom: 0
    properties:
      type: secondary
      content: Roles
  - id: roles_tags
    type: Box
    style:
      display: flex
      flexWrap: wrap
      gap: 4px
    blocks:
      _build.array.map:
        on:
          _module.var: roles
        callback:
          _build.function:
            id:
              _build.string.concat:
                - 'role_tag_'
                - __build.args: 0
            type: Tag
            visible:
              _array.includes:
                - _state: roles
                - __build.args: 0
            properties:
              title:
                __build.args: 0
  - id: signed_up
    type: Paragraph
    visible:
      _eq:
        - _state: is_user
        - true
    style:
      marginBottom: 0
    properties:
      type: secondary
      content:
        _nunjucks:
          template: "Signed up {{ date | date('YYYY-MM-DD') }}"
          on:
            date:
              _state: sign_up
  # Record audit stamp — moved here from the page-title subtitle so the title
  # bar stays a single line (eyebrow + name + status pill).
  - id: created_stamp
    type: Paragraph
    visible:
      _ne:
        - _state: created.user.name
        - null
    style:
      marginBottom: 0
    properties:
      type: secondary
      content:
        _nunjucks:
          template: "Created by {{ name | safe }} on {{ date | date('YYYY-MM-DD') }}"
          on:
            name:
              _state: created.user.name
            date:
              _state: created.timestamp
  - id: updated_stamp
    type: Paragraph
    visible:
      _ne:
        - _state: updated.user.name
        - null
    style:
      marginBottom: 0
    properties:
      type: secondary
      content:
        _nunjucks:
          template: "Last modified by {{ name | safe }} on {{ date | date('YYYY-MM-DD') }}"
          on:
            name:
              _state: updated.user.name
            date:
              _state: updated.timestamp
