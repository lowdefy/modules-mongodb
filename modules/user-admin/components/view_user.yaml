id: view_user_details
type: Box
blocks:
  _build.array.concat:
    # Identity header
    - - _ref:
          path: ../shared/layout/identity-header.yaml
          vars:
            avatar_src:
              _state: profile.picture
            name:
              _state: profile.name
            email:
              _state: email
    # Invite link (only visible for open invites)
    - - _ref:
          path: components/view_invite_link.yaml
          vars:
            visible:
              _eq:
                - _state: invite.open
                - true
    # Profile SmartDescriptions
    - - id: profile_view
        type: SmartDescriptions
        properties:
          title: Profile
          column: 1
          size: small
          data:
            profile:
              _state: profile
          fields:
            _build.array.concat:
              - _ref:
                  path: ../shared/profile/form_core.yaml
                  vars:
                    show_honorific:
                      _module.var: fields.show_honorific
              - _module.var: fields.profile
    # Combined attributes SmartDescriptions (only when fields are provided)
    - - id: attributes_view
        type: SmartDescriptions
        visible:
          _build.gt:
            - _build.array.length:
                _build.array.concat:
                  - _module.var: fields.global_attributes
                  - _module.var: fields.app_attributes
            - 0
        properties:
          title: Attributes
          column: 1
          size: small
          data:
            global_attributes:
              _state: global_attributes
            app_attributes:
              _state: app_attributes
          fields:
            _build.array.concat:
              - _module.var: fields.global_attributes
              - _module.var: fields.app_attributes
