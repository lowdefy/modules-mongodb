id: form_profile
type: Box
layout:
  gap: 8
blocks:
  _build.array.concat:
    # Title (conditional)
    - _build.if:
        test:
          _module.var: show_title
        then:
          - id: user.profile.title
            type: Selector
            layout:
              span: 3
            properties:
              title: Title
              options:
                - Mr
                - Ms
                - Mrs
                - Dr
                - Prof
        else: []
    # Core fields
    - - id: user.profile.given_name
        type: TextInput
        required: true
        layout:
          span:
            _build.if:
              test:
                _module.var: show_title
              then: 9
              else: 12
        properties:
          title: First Name
      - id: user.profile.family_name
        type: TextInput
        required: true
        layout:
          span: 12
        properties:
          title: Last Name
    # Extended profile fields (injected by consumer)
    - _module.var: components.profile_fields
