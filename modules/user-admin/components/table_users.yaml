id: users_table
type: AgGridBalham
properties:
  height: 70vh
  rowStyle:
    cursor: pointer
  rowData:
    _request: get_all_users
  defaultColDef:
    sortable: true
    resizable: true
    cellStyle:
      cursor: pointer
      wordBreak: break-word
      display: flex
      alignItems: center
  columnDefs:
    _build.array.concat:
      - - headerName: Name
          field: profile.name
          minWidth: 240
          flex: 1
          cellRenderer:
            _function:
              __nunjucks:
                template: |
                  <span style="display: inline-flex; align-items: center;">{% if profile.picture %}<img src="{{ profile.picture }}" width="16px" height="16px" style="margin-right: 4px; border-radius: 50%; flex-shrink: 0;"/>{% else %}<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:#d9d9d9;color:#8c8c8c;font-size:10px;margin-right:4px;flex-shrink:0;">&#x1F464;</span>{% endif %}{{ profile.name | safe }}</span>
                on:
                  __args: 0.data
        - headerName: Email
          field: email
          flex: 1
          minWidth: 250
        - headerName: Active
          field: active
          width: 140
          cellRenderer:
            _function:
              __nunjucks:
                template: |
                  <span style="color: {{ color }}; border: 1px solid {{ color }}; border-radius: 2px; padding: 2px 4px;">{{ text }}</span>
                on:
                  __args: 0.data.active
        - headerName: Roles
          flex: 1
          minWidth: 200
          wrapText: true
          autoHeight: true
          field: app.roles
          cellRenderer:
            _function:
              __array.join:
                - __if_none:
                    - __args: 0.data.app.roles
                    - []
                - ", "
      - _module.var: components.table_columns
      - - headerName: Updated At
          field: updated_at
          width: 120
        - headerName: Created At
          field: created_at
          width: 120
        - headerName: Signed Up At
          field: signed_up_at
          width: 130
events:
  onRowClick:
    - id: link_to_edit
      type: Link
      params:
        pageId:
          _module.pageId: users-view
        input:
          user_id:
            _event: row._id
