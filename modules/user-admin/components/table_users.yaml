id: users_table
type: AgGridBalham
properties:
  height: 70vh
  overlayNoRowsTemplate:
    _if:
      test:
        _not:
          _request: get_all_users
      then: Loading...
      else: No rows
  rowStyle:
    cursor: pointer
  rowData:
    _request: get_all_users
  defaultColDef:
    sortable: true
    resizable: true
    cellStyle:
      cursor: pointer
      wordBreak: break-word
      display: flex
      alignItems: center
  columnDefs:
    _build.array.concat:
      - - headerName: Name
          field: profile.name
          minWidth: 240
          flex: 1
          cell:
            type: avatar
            nameField: profile.name
            srcField: profile.picture
            idField: _id
        - headerName: Email
          field: email
          flex: 1
          minWidth: 250
        - headerName: Active
          field: active.text
          width: 140
          cell:
            type: tag
            colorFrom: active.color
        - headerName: Roles
          flex: 1
          minWidth: 200
          wrapText: true
          autoHeight: true
          field: app.roles
          cellRenderer:
            _function:
              __array.join:
                - __if_none:
                    - __args: 0.data.app.roles
                    - []
                - ", "
      - _module.var: components.table_columns
      - - headerName: Updated At
          field: updated_at
          width: 120
        - headerName: Created At
          field: created_at
          width: 120
        - headerName: Signed Up At
          field: signed_up_at
          width: 130
events:
  onRowClick:
    - id: link_to_edit
      type: Link
      params:
        pageId:
          _module.pageId: view
        input:
          user_id:
            _event: row._id
