# LAYER: invitation-details form (state_form) — serves the unknown (blank) AND
# existing-contact (prefilled) outcomes (design Decision 7). Blank vs prefilled is
# seeded state (task 17); the form structure is identical, so it is one layer.
# Submit = create-or-link contact → InviteMember (roles + member attributes) — the
# CallAPI + payload mapping is the WIRE task (17).
#
# Wrapper Box carries the frame id + the visibility condition; the shared card
# renders the form body. Roles come from the app role catalog (auth.roles,
# Decision 8); member attributes from the consumer `fields.member_attributes` var.
id: state_form
type: Box
visible:
  _or:
    - _eq:
        - _state: invite_state
        - unknown
    - _eq:
        - _state: invite_state
        - existing
blocks:
  - _ref:
      module: layout
      component: card
      vars:
        title: Invitation details
        # `fields.member_attributes` resolves to an ARRAY of consumer blocks, so the
        # built-ins concat around it (flattened) — the same pattern as modal_access.
        blocks:
          _build.array.concat:
            # Profile capture — the contact fields (create-or-link contact). Prefilled
            # from the resolved contact in the existing-contact outcome (seed = task 17).
            # TODO(request-substitute) form profile seed: "existing-contact prefill (get contact by email) — full name + phone + job title; blank for unknown"
            - - id: full_name
                type: TextInput
                required: true
                layout:
                  span: 12
                  sm:
                    span: 24
                properties:
                  title: Full name
                  placeholder: e.g. Sam Taylor
              - id: profile.phone_number
                type: PhoneNumberInput
                layout:
                  span: 12
                  sm:
                    span: 24
                properties:
                  title: Phone
              - id: profile.job_title
                type: TextInput
                layout:
                  span: 12
                  sm:
                    span: 24
                properties:
                  title: Job title
                  placeholder: Optional
              # Roles — options/labels/descriptions from the app role catalog
              # (_build.authConfig.roles, Decision 8): the option label renders the
              # role label (primary) + description (subtitle); the selected tag stays
              # compact (tag.title). Hardcoded to the demo catalog here — the catalog
              # projection is not resolvable in this page-build context yet (same
              # limitation noted in all_members_filters.yaml), so the wire task swaps
              # these in.
              - id: roles
                type: MultipleSelector
                required: true
                layout:
                  span: 24
                properties:
                  title: Roles
                  placeholder: Select roles…
                  renderTags: true
                  # TODO(request-substitute) roles.options: "_build.authConfig.roles catalog — { value: id, label: '<label> + <description subtitle>' html, filterString: label, tag: { title: label, color } }; Decision 8"
                  options:
                    - value: editor
                      label: >-
                        <div>Editor</div><div style="font-size:12px;
                        color:var(--ant-color-text-tertiary); line-height:1.4;">Create
                        and edit content; cannot manage users.</div>
                      filterString: Editor
                      tag:
                        title: Editor
                        color: purple
                    - value: admin
                      label: >-
                        <div>Admin</div><div style="font-size:12px;
                        color:var(--ant-color-text-tertiary); line-height:1.4;">Full
                        access to all settings and user management.</div>
                      filterString: Admin
                      tag:
                        title: Admin
                        color: purple
                    - value: viewer
                      label: >-
                        <div>Viewer</div><div style="font-size:12px;
                        color:var(--ant-color-text-tertiary); line-height:1.4;">Read-only
                        access to app data.</div>
                      filterString: Viewer
                      tag:
                        title: Viewer
                        color: purple
                    - value: branch-manager
                      label: >-
                        <div>Branch manager</div><div style="font-size:12px;
                        color:var(--ant-color-text-tertiary); line-height:1.4;">Manage
                        a single branch's data and members.</div>
                      filterString: Branch manager
                      tag:
                        title: Branch manager
                        color: purple
              # Member attributes — group label above the consumer fields.
              - id: member_attributes_label
                type: Html
                properties:
                  html: >-
                    <div style="font-size:13px; font-weight:500;
                    color:var(--ant-color-text-secondary);">Member attributes</div>
            # This app's authorization parameters (member row), from the consumer
            # `fields.member_attributes` blocks (bind state.member_attributes.*).
            - _module.var: fields.member_attributes
            # Captured now: they must hold from the first session (Decision 7).
            - - id: member_attributes_hint
                type: Html
                properties:
                  html: >-
                    <div style="font-size:12px; color:var(--ant-color-text-tertiary);">
                    Captured now — authorization parameters the user must hold from
                    their first session.</div>
              # Form actions — right-aligned, inside the card body (matches the mock).
              - id: form_actions
                type: Box
                layout:
                  gap: 8
                  justify: end
                blocks:
                  - id: invite_cancel_btn
                    type: Button
                    layout:
                      flex: 0 0 auto
                    properties:
                      title: Cancel
                      variant: outlined
                    events:
                      onClick:
                        - id: cancel_invite
                          type: Link
                          params:
                            pageId:
                              _module.pageId: all
                  - id: invite_send_btn
                    type: Button
                    layout:
                      flex: 0 0 auto
                    properties:
                      title: Send invitation
                      icon: AiOutlineMail
                      color: primary
                      variant: solid
                    events:
                      onClick:
                        # TODO(request-substitute) invite_send_btn: "Validate + CallAPI invite (create-or-link contact → InviteMember with profile.contactId + roles + attributes) → audit event; on success Link to view/all — task 17"
                        - id: send_invite_todo
                          type: DisplayMessage
                          params:
                            status: info
                            content: Send invitation — wired in task 17.
