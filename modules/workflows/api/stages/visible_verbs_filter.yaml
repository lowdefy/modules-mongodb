# `visible_verbs` compute + drop (Part 38 / Part 34 D12). Replaces the binary
# `access_filter.yaml`.
#
# A two-stage list: the shared `$addFields` compute (factored into
# `../shared/workflow/visible_verbs.yaml` so the dependency-free events timeline
# — Part 42 D5 — can reuse it without the drop) followed by the `$match` that
# drops actions where all four `visible_verbs` are false (the "no role
# intersection on any verb → invisible" outcome).
#
# Bundling both stages in one file keeps the compute→drop ordering enforced
# here rather than at every call site. Consumers splice this list into a
# pipeline with `_build.array.concat` (Lowdefy `_ref` substitutes a node in
# place and does not splice a list on its own — but concat flattens its array
# args one level, so a `_ref` resolving to this two-element list flattens in).
# See the `api:` section of `module.lowdefy.yaml` for the same idiom.
- _ref: ../shared/workflow/visible_verbs.yaml
- $match:
    $expr:
      $anyElementTrue:
        - - $visible_verbs.view
          - $visible_verbs.edit
          - $visible_verbs.review
          - $visible_verbs.error
