$match:
  $expr:
    $and:
      - $gt:
          - $size:
              $ifNull:
                - $setIntersection:
                    - $ifNull:
                        - $getField:
                            field:
                              _module.var: app_name
                            input: $access
                        - []
                    - [view, edit, review]
                - []
          - 0
      - $or:
          - $eq:
              - $size:
                  $ifNull:
                    - $access.roles
                    - []
              - 0
          - $gt:
              - $size:
                  $setIntersection:
                    - $ifNull:
                        - $access.roles
                        - []
                    - _user:
                        _module.var: user_schema.roles_path
              - 0
