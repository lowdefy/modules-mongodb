id: get-entity-workflows
type: Api
routine:
  - id: query
    type: MongoDBAggregation
    connectionId:
      _module.connectionId: workflows-collection
    properties:
      pipeline:
        - $match:
            entity_collection:
              _payload: entity_collection
            entity_id:
              _payload: entity_id

        - $sort:
            display_order: 1
            created.timestamp: -1

        - $lookup:
            from: actions
            localField: _id
            foreignField: workflow_id
            as: actions
            pipeline:
              - $addFields:
                  status:
                    $arrayElemAt:
                      - $status.stage
                      - 0
              # Per-verb access projection + drop (Part 34 D12). Compute then
              # filter — two single-stage refs (Lowdefy _ref does not splice a
              # list into a pipeline). Runs per action doc, before the $group.
              - _ref: ../shared/workflow/visible_verbs.yaml
              - _ref: api/stages/visible_verbs_filter.yaml
              - $addFields:
                  required_sort:
                    $cond:
                      - $eq:
                          - $status
                          - 'not-required'
                      - 1
                      - 0
                  sort:
                    $cond:
                      - $eq:
                          - $status
                          - 'not-required'
                      - 1
                      - $sort_order
              - $sort:
                  required_sort: 1
                  sort: 1
                  created.timestamp: 1
              - $group:
                  _id: $action_group
                  action_group:
                    $first: $action_group
                  workflow_type:
                    $first: $workflow_type
                  workflow_id:
                    $first: $workflow_id
                  actions:
                    $push:
                      type: $type
                      status: $status
                      visible_verbs: $visible_verbs
                      message:
                        _string.concat:
                          - $
                          - _module.var: app_name
                          - .message
                      link:
                        _string.concat:
                          - $
                          - _module.var: app_name
                          - .link

  - :return:
      workflows:
        _step: query
