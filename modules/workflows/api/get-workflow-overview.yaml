id: get-workflow-overview
type: Api
routine:
  - id: query
    type: MongoDBAggregation
    connectionId:
      _module.connectionId: workflows-collection
    properties:
      pipeline:
        - $match:
            _id:
              _payload: workflow_id

        - $lookup:
            from: actions
            localField: _id
            foreignField: workflow_id
            let:
              workflowId: $_id
              groupIds:
                $map:
                  input:
                    $ifNull:
                      - $action_groups
                      - $groups
                      - []
                  as: g
                  in: $$g.id
            pipeline:
              - $addFields:
                  groupIndex:
                    $indexOfArray:
                      - $$groupIds
                      - $action_group
                  type: $type
                  status:
                    $arrayElemAt:
                      - $status.stage
                      - 0
                  message:
                    _string.concat:
                      - $
                      - _module.var: app_name
                      - .message
                  link:
                    _string.concat:
                      - $
                      - _module.var: app_name
                      - .link
              # Per-verb access projection + drop (Part 34 D12). visible_verbs
              # stays on the doc (the $project below only removes groupIndex).
              - _ref: ../shared/workflow/visible_verbs.yaml
              - _ref: api/stages/visible_verbs_filter.yaml
              - $sort:
                  groupIndex: 1
                  sort_order: 1
                  _id: 1
              - $project:
                  groupIndex: 0
            as: actions

  - :return:
      workflow:
        _step: query.0
      actions:
        _step: query.0.actions
