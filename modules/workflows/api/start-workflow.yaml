id: start-workflow
type: Api
routine:
  - id: start
    type: StartWorkflow
    connectionId:
      _module.connectionId: workflow-api
    properties:
      workflow_type:
        _payload: workflow_type
      entity_id:
        _payload: entity_id
      entity_collection:
        _payload: entity_collection
      parent_action_id:
        _payload: parent_action_id
      # actions: override seeds actions directly at a declared status.
      # Grammar: { type, key?, status } where status is one of
      # action-required | blocked (enforced at runtime); key for keyed action
      # types. Per-entry fields/references are not part of the contract —
      # payload-level metadata merges onto every seeded draft, and
      # payload-level references lands on the workflow doc. Signals are the
      # submit-time grammar only and do not apply at workflow start.
      actions:
        _payload: actions
      references:
        _payload: references
      metadata:
        _payload: metadata

  - :return:
      workflow_id:
        _step: start.workflow_id
      action_ids:
        _step: start.action_ids
      event_id:
        _step: start.event_id
