id: start-workflow
type: Api
routine:
  - id: start
    type: StartWorkflow
    connectionId:
      _module.connectionId: workflow-api
    properties:
      workflow_type:
        _payload: workflow_type
      entity_id:
        _payload: entity_id
      entity_collection:
        _payload: entity_collection
      parent_action_id:
        _payload: parent_action_id
      actions:
        _payload: actions
      references:
        _payload: references

  - :return:
      workflow_id:
        _step: start.workflow_id
      action_ids:
        _step: start.action_ids
