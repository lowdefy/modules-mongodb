id: get-action-group-overview
type: Api
routine:
  - id: query
    type: GetWorkflowActionGroupOverview
    connectionId:
      _module.connectionId: workflow-api
    properties:
      workflow_id:
        _payload: workflow_id
      group_id:
        _payload: group_id

  - :return:
      workflow:
        _step: query.workflow
      group:
        _step: query.group
      actions:
        _step: query.actions
