id: workflow-api
type: WorkflowAPI
properties:
  databaseUri:
    _secret: MONGODB_URI
  entry_id:
    _module.id: true
  write: true
  workflowsCollection: workflows
  actionsCollection: actions
  workflowsConfig:
    _ref: components/validated_workflows_config.yaml
  app_name:
    _module.var: app_name
  # Part 61: opt this app in to internal (single-app) comments. When false (the
  # default) the engine coerces any `internal` request to `shared`. The comment
  # surfaces read the same module var at build time to show/hide the control.
  enable_internal_comments:
    _module.var: enable_internal_comments
  user:
    _user: true
  # TODO: this re-declares the contacts module's collection name. Ideally derive
  # it from the contacts module instead of carrying a parallel var. A host app
  # using a custom contacts collection sets `contacts_collection` to match.
  contactsCollection:
    _module.var: contacts_collection
  actionsEnum:
    _ref: ../shared/enums/action_statuses.yaml
  changeStamp:
    _ref:
      module: events
      component: change_stamp
  changeLog:
    collection: log-changes
    meta:
      user:
        _user: true
  endpoints:
    new_event:
      _module.endpointId:
        id: new-event
        module: events
    send_notification:
      _module.endpointId:
        id: send-notification
        module: notifications
