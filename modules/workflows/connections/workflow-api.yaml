id: workflow-api
type: WorkflowAPI
properties:
  databaseUri:
    _secret: MONGODB_URI
  entry_id:
    _module.id: true
  write: true
  workflowsCollection: workflows
  actionsCollection: actions
  workflowsConfig:
    _ref: components/validated_workflows_config.yaml
  app_name:
    _module.var: app_name
  user:
    _user: true
  entities:
    _module.var: entities
  actionsEnum:
    _ref: ../shared/enums/action_statuses.yaml
  changeStamp:
    _ref:
      module: events
      component: change_stamp
  changeLog:
    collection: log-changes
    meta:
      user:
        _user: true
  endpoints:
    new_event:
      _module.endpointId:
        id: new-event
        module: events
    send_notification:
      _module.endpointId:
        id: send-notification
        module: notifications
