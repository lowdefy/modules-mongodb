# Standalone in-context check-action modal (Part 40 — D5).
#
# A single Modal block with a FIXED blockId `check_action_modal` wrapping the
# shared check-action surface (components/check-action-surface.yaml). It lets a
# host (actions-on-entity, the events-timeline action cards) open a check action
# in place — no full-page navigation — and is an in-app shortcut layered on
# hosts, never a replacement for the canonical per-workflow {workflow_type}-action
# page.
#
# Open contract — every host wires it the same way (verbatim):
#   - type: SetState
#     params: { check_action_modal: { action_id: <id> } }
#   - type: CallMethod
#     params: { blockId: check_action_modal, method: setOpen, args: [{ open: true }] }
#
# One instance per page. The modal is dropped exactly once per page, and
# `actions-on-entity` is what drops it when present. Hosts that compose it
# directly (e.g. via EventsTimeline.onActionClick) must not drop a second copy —
# the blockId is fixed and global.
#
# Fixed-request-id constraint. This component defines a component-local Request
# with id `get_workflow_action`. NEVER drop this component on a page that already
# defines a `get_workflow_action` request — i.e. the per-workflow
# {workflow_type}-action page, which carries its own URL-bound
# `get_workflow_action`. A duplicate request id would collide. This modal is for
# entity/host pages only.
#
# On open the modal runs the SAME fetch the pages' `onMount` runs — one
# GetWorkflowAction read for `check_action_modal.action_id` (fresh; the
# list/timeline data may be stale), spread into `current_action` plus the
# working seeds. There is no separate workflow read or role check: `allowed`,
# `buttons`, `workflow_closed`, and `required_after_close` all arrive on the one
# response.
#
# Mode derivation (D5) — drives the surface's signal button bar only; field
# editability is the separate `allowed.edit` gate inside the surface. Pages
# write a literal `current_action.mode` in onMount; this modal writes the
# derived value in its open handler. The surface reads `_state:
# current_action.mode` either way (one read convention, two writers — D1):
#
#   | # | condition                                                   | mode   |
#   |---|-------------------------------------------------------------|--------|
#   | 1 | status.0.stage == error                                     | view   |
#   | 2 | status.0.stage == in-review AND allowed.review              | review |
#   | 3 | status.0.stage in [action-required, in-progress,           | edit   |
#   |   |   changes-required] AND allowed.edit                        |        |
#   | 4 | otherwise                                                   | view   |
#
# Mode is derived from the GetWorkflowAction RESPONSE (`_request:
# get_workflow_action.*`), NOT from `_state: current_action.*`, and is written
# in the SAME SetState that spreads the response. Action params are fully
# evaluated against the PRE-SetState state before any write lands, so deriving
# mode from `_state: current_action.*` would read the stale (empty) value; the
# response is available at parse time, the state is not. The single-SetState
# pattern is also kept for parity with the workspace page (action.yaml.njk).
# (Part 65 removed the status-history List from the surface, so
# `current_action.status` is no longer bound by a block and never pruned — the
# earlier "splitting the writes would prune the List's state" rationale no
# longer applies.)
#
# The events timeline is NOT rendered in the modal (page-level only, D1).
id: check_action_modal
type: Modal
properties:
  width: 750
  footer: false
requests:
  - id: get_workflow_action
    type: GetWorkflowAction
    connectionId:
      _module.connectionId: workflow-api
    payload:
      action_id:
        _state: check_action_modal.action_id
    properties:
      action_id:
        _payload: action_id
events:
  onOpen:
    # Step 1: fetch the action fresh.
    - id: get_action
      type: Request
      params: get_workflow_action
    # Step 2: spread the response, seed the working inputs, and write the
    # derived mode in ONE SetState (one update cycle). Mode is derived from the
    # response (`_request`), not `_state`, because params evaluate against
    # pre-SetState state; the single-SetState is kept for parity with the
    # workspace page (Part 65 removed the status-history List, so
    # `current_action.status` is no longer bound or pruned). `current_action` is
    # the first key so the spread lands before the nested `.fields` / `.comment`
    # / `.mode` writes.
    - id: set_current_action
      type: SetState
      params:
        current_action:
          _request: get_workflow_action
        current_action.fields:
          assignees:
            _request: get_workflow_action.assignees
          due_date:
            _request: get_workflow_action.due_date
        current_action.comment: null
        current_action.change_request_comment: null
        # Stable stage scalar — the header status pill and the error-stage
        # comment gate read this (D4; see check-action-surface.yaml).
        current_action.stage:
          _request: get_workflow_action.status.0.stage
        current_action.mode:
          _if:
            test:
              _eq:
                - _request: get_workflow_action.status.0.stage
                - error
            then: view
            else:
              _if:
                test:
                  _and:
                    - _eq:
                        - _request: get_workflow_action.status.0.stage
                        - in-review
                    - _eq:
                        - _request: get_workflow_action.allowed.review
                        - true
                then: review
                else:
                  _if:
                    test:
                      _and:
                        - _array.includes:
                            - - action-required
                              - in-progress
                              - changes-required
                            - _request: get_workflow_action.status.0.stage
                        - _eq:
                            - _request: get_workflow_action.allowed.edit
                            - true
                    then: edit
                    else: view
blocks:
  - _ref:
      path: components/check-action-surface.yaml
      vars:
        on_complete:
          _build.array.concat:
            - _var:
                key: on_complete
                default: []
            - - id: close_check_action_modal
                type: CallMethod
                params:
                  blockId: check_action_modal
                  method: setOpen
                  args:
                    - open: false
