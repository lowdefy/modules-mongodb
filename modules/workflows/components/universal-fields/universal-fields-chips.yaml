# Universal-fields chips (Part 56 addendum DA1).
#
# The title-bar `page_actions` presentation of an action's universal fields:
# assignees as avatars + due date as a Tag pill + a pencil (✎) button that opens
# the edit modal. Display-only here — editing happens in the modal
# (universal-fields-modal.yaml), so a calm chip strip reads at a glance.
#
# Composed by every action template into the layout `page` `page_actions` slot, so
# the chip strip is identical across the form + check pages. Consumed via
# `_ref: { path, vars }` with OPERATOR-valued vars. Vars:
#   - action_data  map of operator leaves: `assignee_docs` (avatar source) and
#                  `due_date`. (Assignees themselves are not needed — the avatars
#                  render from the resolved docs.)
#   - show         build-time array of field names (default all three); a chip is
#                  omitted when its field is not listed (same gate as the component).
#   - modal_id     build-time block id of the edit modal the ✎ opens (setOpen).
#   - date_format  due-date display format (default `MMM D, YYYY`).
id: universal_fields_chips
type: Box
# flex 0 0 auto: this strip sizes to its chips. A block with no flex/grow/shrink
# falls into the 24-span column grid (flex 0 0 100%); inside the shrink-to-fit
# page_actions slot that resolves fine for the Box itself, but the explicit flex
# keeps the intent clear and avoids any percentage-basis edge case.
layout:
  direction: row
  contentAlign: center
  wrap: nowrap
  gap: 8
  flex: 0 0 auto
blocks:
  _build.array.concat:
    # Assignees → avatars, only when there are resolved assignee docs.
    - _build.if:
        test:
          _build.array.includes:
            on:
              _var:
                key: show
                default: [assignees, due_date]
            value: assignees
        then:
          # A single Avatar block in group mode renders one overlapping
          # Avatar.Group from the resolved assignee docs — the design's
          # "overlapping avatars". A `List` is the wrong tool here: a list-category
          # block iterates STATE at its own id (not `properties.data`), so with no
          # state seeded at the list id it renders zero items. Computing the
          # avatars array sidesteps per-item state binding entirely. flex 0 0 auto
          # keeps the strip compact (a flex-less block defaults to a 24-span column
          # and would push the due-date pill past the viewport).
          - id: universal_fields_chips_assignees
            type: Avatar
            layout:
              flex: 0 0 auto
            visible:
              _gt:
                - _array.length:
                    _var: action_data.assignee_docs
                - 0
            properties:
              group:
                size: small
                maxCount: 5
                # assignee_docs entries carry { _id, profile: { name, picture } }.
                # picture is a pre-generated gradient SVG, so `content` (the name
                # initial) is only a fallback when a doc has no picture.
                avatars:
                  _js:
                    args:
                      docs:
                        _var: action_data.assignee_docs
                    fn: |
                      const docs = args.docs || [];
                      return docs.map((d) => {
                        const name = d.profile && d.profile.name;
                        return {
                          src: d.profile && d.profile.picture,
                          alt: name,
                          content: name ? name.charAt(0).toUpperCase() : undefined,
                        };
                      });
        else: []
    # Due date → a compact Tag pill, only when set.
    - _build.if:
        test:
          _build.array.includes:
            on:
              _var:
                key: show
                default: [assignees, due_date]
            value: due_date
        then:
          - id: universal_fields_chips_due_date
            type: Tag
            layout:
              flex: 0 0 auto
            visible:
              _ne:
                - _var: action_data.due_date
                - null
            properties:
              icon: AiOutlineCalendar
              title:
                _dayjs.format:
                  on:
                    _var: action_data.due_date
                  format:
                    _var:
                      key: date_format
                      default: MMM D, YYYY
        else: []
    # Edit (✎) — always present, so a field (assignees / due date) can be ADDED
    # even when no chips are showing a value yet. Opens the edit modal.
    - - id: universal_fields_chips_edit
        type: Button
        layout:
          flex: 0 0 auto
        properties:
          type: text
          icon: AiOutlineEdit
          hideTitle: true
        events:
          onClick:
            - id: open_universal_fields_modal
              type: CallMethod
              params:
                blockId:
                  _var: modal_id
                method: setOpen
                args:
                  - open: true
