# Universal-fields surface (Part 24; Part 64 shrank it to two fields).
#
# Renders the action-level universal fields (assignees / due_date) for one
# action, in edit or display mode. The surface is always a plain Box (no card
# chrome): its container owns the chrome. Every consumer gets the same
# standalone Update button (edit mode) that calls the per-workflow
# `{workflow_type}-update-fields` operation — independent of any form submit or
# FSM transition. (Part 64 removed the editable `description` field; the action
# body `description` is now author-authored config, rendered separately by
# `components/action-description.yaml`.)
#
# Placement (Part 56 addendum DA1): on the action workspace pages the EDIT group
# is hosted inside `universal-fields-modal.yaml` (opened by the title-bar ✎ chip),
# while DISPLAY is split out of this component — assignees + due render as
# title-bar chips (`universal-fields-chips.yaml`). The `mode: display` group
# below is therefore no longer used by the workspace pages; it stays intact
# because the component is shared and the in-context check-action surface still
# composes this component inline (D6, untouched).
#
# Consumed via `_ref: { path: ..., vars: {...} }` with OPERATOR-valued vars, so
# block-id namespacing uses `_string.concat` (not njk). Vars:
#   - mode         'edit' | 'display' (required). Literal from the form
#                  templates; a runtime `_if` operator from the check surface —
#                  so mode is gated at RUNTIME (`_eq`), never `_build.*`.
#   - state_path   state namespace for the edit inputs (default `fields`). Block
#                  ids become `{state_path}.{field}`; the Update Validate is
#                  scoped to `^{state_path}\.`.
#   - workflow_type literal (form njk) or `_state` operator (check) — builds the
#                  Update endpoint id at runtime.
#   - action_id    operator leaf the Update payload posts (action root differs
#                  per consumer, so the consumer passes it).
#   - allowed_edit operator leaf — gates the Update button (visible) and the
#                  inline inputs (disabled). Defaults false (display consumers
#                  pass nothing).
#   - show         build-time array of field names to render (default both;
#                  per-field presence gated via `_build.array.includes`).
#   - show_update_button  build-time flag — render the in-body Update button
#                  (default true). The edit modal sets false and drives the
#                  Update from its native footer Ok instead (Part 56 addendum).
#   - action_data  map of operator leaves: assignees, due_date, and
#                  (display) assignee_docs.
#   - on_complete  actions appended after the Update CallAPI (default []).
#   - date_format  display date format (default `MMM D, YYYY`).
id: universal_fields
type: Box
# Render nothing when the presence list is empty (the form templates also omit
# the whole sidebar column — task 11).
visible:
  _build.if:
    test:
      _build.gt:
        - _build.array.length:
            _var:
              key: show
              default: [assignees, due_date]
        - 0
    then: true
    else: false
layout:
  gap: 16
blocks:
  # ── Edit group (mode: edit) — inputs + standalone Update button ───────────
  - id: universal_fields_edit_group
    type: Box
    visible:
      _eq:
        - _var: mode
        - edit
    layout:
      gap: 16
    blocks:
      _build.array.concat:
        # assignees → user-multi-selector (cross-module, Part 24a)
        - _build.if:
            test:
              _build.array.includes:
                on:
                  _var:
                    key: show
                    default: [assignees, due_date]
                value: assignees
            then:
              - _ref:
                  module: user-account
                  component: user-multi-selector
                  vars:
                    id:
                      _string.concat:
                        - _var: state_path
                        - .assignees
                    title: Assignees
            else: []
        # due_date → DateSelector
        - _build.if:
            test:
              _build.array.includes:
                on:
                  _var:
                    key: show
                    default: [assignees, due_date]
                value: due_date
            then:
              - id:
                  _string.concat:
                    - _var: state_path
                    - .due_date
                type: DateSelector
                properties:
                  title: Due date
                  disabled:
                    _eq:
                      - _var:
                          key: allowed_edit
                          default: false
                      - false
            else: []
        # Update button — rendered only when the consumer hosts the action in the
        # body. The in-context check surface needs it (its host modal has no
        # standard footer); the edit MODAL passes show_update_button: false and
        # runs the SAME sequence from its native footer Ok instead. Visible only
        # with the edit verb. The action sequence is the shared
        # update_fields_actions.yaml fragment (one correct way).
        - _build.if:
            test:
              _var:
                key: show_update_button
                default: true
            then:
              - id: button_update_fields
                type: Button
                properties:
                  title: Update
                  type: primary
                visible:
                  _eq:
                    - _var:
                        key: allowed_edit
                        default: false
                    - true
                events:
                  onClick:
                    _ref:
                      path: components/universal-fields/update_fields_actions.yaml
                      vars:
                        state_path:
                          _var: state_path
                        workflow_type:
                          _var: workflow_type
                        action_id:
                          _var: action_id
                        on_complete:
                          _var:
                            key: on_complete
                            default: []
            else: []
  # ── Display group (mode: display) — read-only with empty-state placeholders ─
  - id: universal_fields_display_group
    type: Box
    visible:
      _eq:
        - _var: mode
        - display
    layout:
      gap: 16
    blocks:
      _build.array.concat:
        # assignees → one avatar per assignee_docs entry; placeholder when empty
        - _build.if:
            test:
              _build.array.includes:
                on:
                  _var:
                    key: show
                    default: [assignees, due_date]
                value: assignees
            then:
              - id: universal_fields_assignees_label
                type: Title
                properties:
                  level: 5
                  content: Assignees
              # A single Avatar block in group mode renders an overlapping
              # Avatar.Group from the resolved docs. A `List` is the wrong tool: a
              # list-category block iterates STATE at its own id (not
              # `properties.data`), so with no state seeded at the list id it
              # renders zero items. Computing the avatars array sidesteps per-item
              # state binding. (assignee_docs entries: { _id, profile: { name,
              # picture } }; picture is a pre-generated SVG, so `content` — the
              # name initial — is only a fallback.)
              - id: universal_fields_assignees_list
                type: Avatar
                visible:
                  _gt:
                    - _array.length:
                        _var: action_data.assignee_docs
                    - 0
                properties:
                  group:
                    avatars:
                      _js:
                        args:
                          docs:
                            _var: action_data.assignee_docs
                        fn: |
                          const docs = args.docs || [];
                          return docs.map((d) => {
                            const name = d.profile && d.profile.name;
                            return {
                              src: d.profile && d.profile.picture,
                              alt: name,
                              content: name ? name.charAt(0).toUpperCase() : undefined,
                            };
                          });
              - id: universal_fields_assignees_empty
                type: Paragraph
                visible:
                  _not:
                    _gt:
                      - _array.length:
                          _var: action_data.assignee_docs
                      - 0
                properties:
                  type: secondary
                  content: Not assigned
            else: []
        # due_date → formatted date; placeholder when null
        - _build.if:
            test:
              _build.array.includes:
                on:
                  _var:
                    key: show
                    default: [assignees, due_date]
                value: due_date
            then:
              - id: universal_fields_due_date_label
                type: Title
                properties:
                  level: 5
                  content: Due date
              - id: universal_fields_due_date_value
                type: Paragraph
                visible:
                  _ne:
                    - _var: action_data.due_date
                    - null
                properties:
                  content:
                    _dayjs.format:
                      on:
                        _var: action_data.due_date
                      format:
                        _var:
                          key: date_format
                          default: MMM D, YYYY
              - id: universal_fields_due_date_empty
                type: Paragraph
                visible:
                  _eq:
                    - _var: action_data.due_date
                    - null
                properties:
                  type: secondary
                  content: No due date
            else: []
