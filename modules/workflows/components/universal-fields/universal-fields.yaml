# Universal-fields EDIT surface.
#
# Renders the action-level universal-fields EDIT inputs (assignees / due_date)
# for one action. The surface is always a plain Box (no card chrome): its
# container owns the chrome. Every consumer gets the same standalone Update
# button that calls the per-workflow `{workflow_type}-update-fields` operation —
# independent of any form submit or FSM transition.
#
# Placement: the EDIT inputs are hosted inside `universal-fields-modal.yaml`
# (opened by the title-bar ✎ chip). Read-only display of assignees + due lives
# entirely in the title-bar chips (`universal-fields-chips.yaml`) on every
# surface — including the in-context check-action surface. This component only
# renders edit inputs (no `mode` var).
#
# Consumed via `_ref: { path: ..., vars: {...} }` with OPERATOR-valued vars, so
# block-id namespacing uses `_string.concat` (not njk). Vars:
#   - state_path   state namespace for the edit inputs (default `fields`). Block
#                  ids become `{state_path}.{field}`; the Update Validate is
#                  scoped to `^{state_path}\.`.
#   - workflow_type literal (form njk) or `_state` operator (check) — builds the
#                  Update endpoint id at runtime.
#   - action_id    operator leaf the Update payload posts (action root differs
#                  per consumer, so the consumer passes it).
#   - allowed_edit operator leaf — gates the Update button (visible) and the
#                  inline inputs (disabled). Defaults false.
#   - show         build-time array of field names to render (default both;
#                  per-field presence gated via `_build.array.includes`).
#   - show_update_button  build-time flag — render the in-body Update button
#                  (default true). The edit modal sets false and drives the
#                  Update from its native footer Ok instead (Part 56 addendum).
#   - on_complete  actions appended after the Update CallAPI (default []).
id: universal_fields
type: Box
# Render nothing when the presence list is empty (the form templates also omit
# the whole sidebar column — task 11).
visible:
  _build.if:
    test:
      _build.gt:
        - _build.array.length:
            _var:
              key: show
              default: [assignees, due_date]
        - 0
    then: true
    else: false
layout:
  gap: 16
blocks:
  # ── Edit inputs + standalone Update button ────────────────────────────────
  - id: universal_fields_edit_group
    type: Box
    layout:
      gap: 16
    blocks:
      _build.array.concat:
        # assignees → user-multi-selector (cross-module, Part 24a)
        - _build.if:
            test:
              _build.array.includes:
                on:
                  _var:
                    key: show
                    default: [assignees, due_date]
                value: assignees
            then:
              - _ref:
                  module: user-account
                  component: user-multi-selector
                  vars:
                    id:
                      _string.concat:
                        - _var: state_path
                        - .assignees
                    title: Assignees
            else: []
        # due_date → DateSelector
        - _build.if:
            test:
              _build.array.includes:
                on:
                  _var:
                    key: show
                    default: [assignees, due_date]
                value: due_date
            then:
              - id:
                  _string.concat:
                    - _var: state_path
                    - .due_date
                type: DateSelector
                properties:
                  title: Due date
                  disabled:
                    _eq:
                      - _var:
                          key: allowed_edit
                          default: false
                      - false
            else: []
        # Update button — rendered only when the consumer hosts the action in the
        # body (show_update_button: true). The edit MODAL passes false and runs
        # the SAME sequence from its native footer Ok instead. The action
        # sequence is the shared update_fields_actions.yaml fragment (one
        # correct way).
        - _build.if:
            test:
              _var:
                key: show_update_button
                default: true
            then:
              - id: button_update_fields
                type: Button
                properties:
                  title: Update
                  type: primary
                visible:
                  _eq:
                    - _var:
                        key: allowed_edit
                        default: false
                    - true
                events:
                  onClick:
                    _ref:
                      path: components/universal-fields/update_fields_actions.yaml
                      vars:
                        state_path:
                          _var: state_path
                        workflow_type:
                          _var: workflow_type
                        action_id:
                          _var: action_id
                        on_complete:
                          _var:
                            key: on_complete
                            default: []
            else: []
