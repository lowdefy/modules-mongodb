# Universal-fields edit modal (Part 56 addendum DA1).
#
# Hosts the Part 24 universal-fields EDIT surface (the assignees multi-selector,
# DateSelector, TiptapInput, and the standalone Update button) inside a Modal,
# opened by the title-bar ✎ chip. The Update still calls
# `{workflow_type}-update-fields` exactly as before (Part 24) — only its host moved
# from an inline RHS button to this modal footer-less body. The modal closes itself
# after a successful Update (appended to on_complete).
#
# `footer: false` — the Update button lives in the body, so the default Ok/Cancel
# footer is suppressed; the close (x) dismisses without saving. The block exposes
# the antd `setOpen`/`toggleOpen` methods (there is no `open`/`close`), so the chips
# ✎ and this modal's self-close both use `setOpen` with `{ open }`.
#
# Consumed via `_ref: { path, vars }` with OPERATOR-valued vars. Vars:
#   - modal_id      build-time block id (matches the chips ✎ setOpen target).
#   - state_path    state namespace for the edit inputs (Part 24).
#   - workflow_type literal (form njk) or `_state` operator (check) — builds the
#                   Update endpoint id.
#   - action_id     operator leaf the Update payload posts.
#   - allowed_edit  operator leaf gating the Update button (visible) + inputs (disabled).
#   - show          build-time array of field names to render (default both).
#   - on_complete   actions appended after the Update CallAPI (default []); this
#                   modal appends a `setOpen: false` self-close after them.
id:
  _var: modal_id
type: Modal
properties:
  width: 520
  title: Edit details
  footer: false
blocks:
  - _ref:
      path: components/universal-fields/universal-fields.yaml
      vars:
        mode: edit
        state_path:
          _var: state_path
        workflow_type:
          _var: workflow_type
        action_id:
          _var: action_id
        allowed_edit:
          _var:
            key: allowed_edit
            default: false
        show:
          _var:
            key: show
            default: [assignees, due_date]
        on_complete:
          _build.array.concat:
            - _var:
                key: on_complete
                default: []
            - - id: close_universal_fields_modal
                type: CallMethod
                params:
                  blockId:
                    _var: modal_id
                  method: setOpen
                  args:
                    - open: false
