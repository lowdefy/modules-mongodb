# Entity action surface (Part 40 — D5).
#
# Renders each of an entity's workflows as an ActionSteps block and bundles ONE
# check-action modal so `check`-kind action rows open in place rather than
# navigating. Every other kind navigates via the server-resolved `action.link`.
#
# Bundled-modal rule. The check-action modal is dropped exactly ONCE per page,
# and `actions-on-entity` is what drops it when present (its blockId
# `check_action_modal` is fixed and global). A host page composing the event
# timeline (workflows-events-timeline) alongside this component targets the same
# `check_action_modal` blockId by id and must NOT drop a second copy.
#
# Vars:
#   entity_id          — (required) the entity whose workflows render.
#   entity_collection  — (required) the entity's collection.
#   on_action_complete — extra actions appended after the bundled modal's
#                        built-in entity-workflows refetch on a successful
#                        signal (default []). Because this component owns the
#                        single modal, a co-present surface that also needs
#                        refreshing on completion (e.g. workflows-events-timeline,
#                        which only fetches on mount) is refreshed by threading
#                        its refetch through here — the modal's on_complete does
#                        not know about sibling surfaces. A timeline page passes
#                        `[{ type: Request, params: get_events_timeline }]`.
id: actions_on_entity
type: Box
events:
  onMount:
    - id: call_entity_workflows
      type: CallAPI
      params:
        endpointId:
          _module.endpointId: get-entity-workflows
        payload:
          entity_id:
            _var: entity_id
          entity_collection:
            _var: entity_collection
    - id: set_entity_workflows
      type: SetState
      params:
        entity_workflows:
          _actions: call_entity_workflows.response.response.workflows
layout:
  gap: 16
blocks:
  - id: entity_workflows
    type: List
    # Stack the per-workflow header (title + overview button) above its action
    # steps. Without a column direction the title, button and ActionSteps are
    # flat siblings in the default wrapping row and tangle into each other.
    layout:
      direction: column
      gap: 8
    blocks:
      - id: entity_workflows.$.header
        type: Box
        # Default row direction: title fills, the overview button pins right.
        layout:
          align: middle
          gap: 8
        blocks:
          - id: entity_workflows.$.title
            type: Html
            layout:
              flex: 1 1 auto
            properties:
              html:
                _nunjucks:
                  template: '<h2>{{ title }}</h2>'
                  on:
                    title:
                      _state: entity_workflows.$.title
          - id: workflow_overview_tooltip
            type: Tooltip
            layout:
              flex: 0 0 auto
            properties:
              title: Workflow Overview
            blocks:
              - id: workflow_overview
                type: Button
                properties:
                  icon: LuWorkflow
                  hideTitle: true
                events:
                  onClick:
                    - id: link_to_overview
                      type: Link
                      params:
                        pageId:
                          _module.pageId: workflow-overview
                        urlQuery:
                          workflow_id:
                            _state: entity_workflows.$._id
      - id: entity_workflows.$.action_steps
        type: ActionSteps
        events:
          onActionClick:
            _ref: components/check-action-click.yaml
        properties:
          direction: vertical
          actionStatusConfig:
            _ref: components/action_statuses.yaml
          actionGroupConfig:
            _object.fromEntries:
              _array.map:
                - _if_none:
                    - _state: entity_workflows.$.groups
                    - []
                - _function:
                    - __args: 0.id
                    - order:
                        __args: 0.order
                      title:
                        __args: 0.title
                      icon:
                        __args: 0.icon
                      link:
                        __args: 0.link
          items:
            _if_none:
              - _state: entity_workflows.$.groups
              - []
  - _ref:
      path: components/check-action-modal.yaml
      vars:
        on_complete:
          _build.array.concat:
            - _ref:
                path: components/entity-workflows-refetch.yaml
                vars:
                  entity_id:
                    _var: entity_id
                  entity_collection:
                    _var: entity_collection
            - _var:
                key: on_action_complete
                default: []
