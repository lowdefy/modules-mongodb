id: actions_on_entity
type: Box
events:
  onMount:
    - id: call_entity_workflows
      type: CallAPI
      params:
        endpointId:
          _module.endpointId: get-entity-workflows
        payload:
          entity_id:
            _var: entity_id
          entity_collection:
            _var: entity_collection
    - id: set_entity_workflows
      type: SetState
      params:
        entity_workflows:
          _actions: call_entity_workflows.response.response.workflows
layout:
  gap: 16
blocks:
  - id: entity_workflows
    type: List
    blocks:
      - id: entity_workflows.$.title
        type: Html
        layout:
          flex: 1 1 auto
        properties:
          html:
            _nunjucks:
              template: '<h2>{{ title }}</h2>'
              on:
                title:
                  _state: entity_workflows.$.title
      - id: workflow_overview_tooltip
        type: Tooltip
        layout:
          flex: 0 0 auto
        properties:
          title: Workflow Overview
        blocks:
          - id: workflow_overview
            type: Button
            properties:
              icon: LuWorkflow
              hideTitle: true
            events:
              onClick:
                - id: link_to_overview
                  type: Link
                  params:
                    pageId:
                      _module.pageId: workflow-overview
                    urlQuery:
                      workflow_id:
                        _state: entity_workflows.$._id
      - id: entity_workflows.$.action_steps
        type: ActionSteps
        properties:
          direction: vertical
          actionGroupConfig:
            _object.fromEntries:
              _array.map:
                - _if_none:
                    - _state: entity_workflows.$.groups
                    - []
                - _function:
                    - __args: 0.id
                    - order:
                        __args: 0.order
                      title:
                        __args: 0.title
                      icon:
                        __args: 0.icon
                      link:
                        __args: 0.link
          items:
            _if_none:
              - _state: entity_workflows.$.groups
              - []
