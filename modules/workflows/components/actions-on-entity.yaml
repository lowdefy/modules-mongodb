# Entity action surface (Part 40 — D5).
#
# Renders each of an entity's workflows as an ActionSteps block and bundles ONE
# check-action modal so `check`-kind action rows open in place rather than
# navigating. Every other kind navigates via the server-resolved `action.link`.
#
# Bundled-modal rule. The check-action modal is dropped exactly ONCE per page,
# and `actions-on-entity` is what drops it when present (its blockId
# `check_action_modal` is fixed and global). A host page composing the event
# timeline (workflows-events-timeline) alongside this component targets the same
# `check_action_modal` blockId by id and must NOT drop a second copy.
id: actions_on_entity
type: Box
events:
  onMount:
    - id: call_entity_workflows
      type: CallAPI
      params:
        endpointId:
          _module.endpointId: get-entity-workflows
        payload:
          entity_id:
            _var: entity_id
          entity_collection:
            _var: entity_collection
    - id: set_entity_workflows
      type: SetState
      params:
        entity_workflows:
          _actions: call_entity_workflows.response.response.workflows
layout:
  gap: 16
blocks:
  - id: entity_workflows
    type: List
    blocks:
      - id: entity_workflows.$.title
        type: Html
        layout:
          flex: 1 1 auto
        properties:
          html:
            _nunjucks:
              template: '<h2>{{ title }}</h2>'
              on:
                title:
                  _state: entity_workflows.$.title
      - id: workflow_overview_tooltip
        type: Tooltip
        layout:
          flex: 0 0 auto
        properties:
          title: Workflow Overview
        blocks:
          - id: workflow_overview
            type: Button
            properties:
              icon: LuWorkflow
              hideTitle: true
            events:
              onClick:
                - id: link_to_overview
                  type: Link
                  params:
                    pageId:
                      _module.pageId: workflow-overview
                    urlQuery:
                      workflow_id:
                        _state: entity_workflows.$._id
      - id: entity_workflows.$.action_steps
        type: ActionSteps
        events:
          onActionClick:
            - id: set_check_action_modal_action
              type: SetState
              skip:
                _ne:
                  - _event: action.kind
                  - check
              params:
                check_action_modal:
                  action_id:
                    _event: action._id
            - id: open_check_action_modal
              type: CallMethod
              skip:
                _ne:
                  - _event: action.kind
                  - check
              params:
                blockId: check_action_modal
                method: setOpen
                args:
                  - open: true
            - id: link_to_action_page
              type: Link
              skip:
                _eq:
                  - _event: action.kind
                  - check
              params:
                pageId:
                  _event: action.link.pageId
                urlQuery:
                  _event: action.link.urlQuery
        properties:
          direction: vertical
          actionStatusConfig:
            _ref: components/action_statuses.yaml
          actionGroupConfig:
            _object.fromEntries:
              _array.map:
                - _if_none:
                    - _state: entity_workflows.$.groups
                    - []
                - _function:
                    - __args: 0.id
                    - order:
                        __args: 0.order
                      title:
                        __args: 0.title
                      icon:
                        __args: 0.icon
                      link:
                        __args: 0.link
          items:
            _if_none:
              - _state: entity_workflows.$.groups
              - []
  - _ref:
      path: components/check-action-modal.yaml
      vars:
        on_complete:
          _ref:
            path: components/entity-workflows-refetch.yaml
            vars:
              entity_id:
                _var: entity_id
              entity_collection:
                _var: entity_collection
