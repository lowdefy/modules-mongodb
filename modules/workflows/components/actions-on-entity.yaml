id: actions_on_entity
type: Box
events:
  onMount:
    - id: call_entity_workflows
      type: CallAPI
      params:
        endpointId:
          _module.endpointId: get-entity-workflows
        payload:
          entity_id:
            _var: entity_id
          entity_collection:
            _var: entity_collection
    - id: set_entity_workflows
      type: SetState
      params:
        entity_workflows:
          _actions: call_entity_workflows.response.response.workflows
layout:
  gap: 16
blocks:
  - id: entity_workflows
    type: List
    blocks:
      - id: entity_workflows.$.title
        type: Html
        layout:
          flex: 1 1 auto
        properties:
          html:
            _nunjucks:
              template: '<h2>{{ title }}</h2>'
              on:
                title:
                  _get:
                    from:
                      _ref: components/workflows_config.yaml
                    key:
                      _string.concat:
                        - _state: entity_workflows.$.workflow_type
                        - '.title'
                    default: Workflow Progress
      - id: workflow_overview_tooltip
        type: Tooltip
        layout:
          flex: 0 0 auto
        properties:
          title: Workflow Overview
        blocks:
          - id: workflow_overview
            type: Button
            properties:
              icon: LuWorkflow
              hideTitle: true
            events:
              onClick:
                - id: link_to_overview
                  type: Link
                  params:
                    pageId:
                      _module.pageId: workflow-overview
                    urlQuery:
                      workflow_id:
                        _state: entity_workflows.$._id
      - id: entity_workflows.$.action_steps
        type: ActionSteps
        properties:
          direction: vertical
          actionGroupConfig:
            _js:
              args:
                workflow:
                  _state: entity_workflows.$
                workflowsConfig:
                  _module.var: workflows_config
                groupOverviewPageId:
                  _module.pageId: group-overview
              fn: |
                const { workflow, workflowsConfig, groupOverviewPageId } = args;
                const wfConfig = (workflowsConfig || []).find(
                  (w) => w.type === workflow.workflow_type
                ) || {};
                const groupsDef = wfConfig.action_groups || [];
                const config = {};
                groupsDef.forEach((g, i) => {
                  config[g.id] = {
                    order: i,
                    title: g.title,
                    link: {
                      pageId: groupOverviewPageId,
                      urlQuery: { workflow_id: workflow._id, group_id: g.id },
                    },
                  };
                  if (g.icon) config[g.id].icon = g.icon;
                });
                return config;
          items:
            _state: entity_workflows.$.actions
