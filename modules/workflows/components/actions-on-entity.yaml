# Entity action surface (Part 40 — D5; Part 55 — D1).
#
# Renders each of an entity's workflows as an ActionSteps block, with the shared
# `check-action-click` handler baked into each row. A `check`-kind row opens the
# in-context check-action modal in place; every other kind navigates via the
# server-resolved `action.link`.
#
# The check-action modal is dropped by the PAGE, not here — the page is the only
# scope that sees every co-present surface, so it owns the modal drop and its
# `on_complete` refetch list (Part 55 D1). This component does not bundle the
# modal: when no modal is on the page the baked-in click handler degrades to
# navigation (Part 55 D2/D3).
#
# Vars:
#   entity_id            — (required) the entity whose workflows render.
#   entity_connection_id — (required) the entity's connection id.
#   active_action_id     — (optional) the _id of the action currently on screen;
#                          its step row is highlighted. Omit on entity-view pages
#                          (no current action) — defaults to null, no highlight.
id: actions_on_entity
type: Box
events:
  onMount:
    - id: call_entity_workflows
      type: CallAPI
      params:
        endpointId:
          _module.endpointId: get-entity-workflows
        payload:
          entity:
            id:
              _var: entity_id
            connection_id:
              _var: entity_connection_id
    - id: set_entity_workflows
      type: SetState
      params:
        entity_workflows:
          _actions: call_entity_workflows.response.response.workflows
layout:
  gap: 16
blocks:
  - id: entity_workflows
    type: List
    # Stack the per-workflow header (title + overview button) above its action
    # steps. Without a column direction the title, button and ActionSteps are
    # flat siblings in the default wrapping row and tangle into each other.
    layout:
      direction: column
      gap: 8
    blocks:
      - id: entity_workflows.$.header
        type: Box
        # Default row direction: title fills, the overview button pins right.
        layout:
          align: middle
          gap: 8
        blocks:
          - id: entity_workflows.$.title
            type: Html
            layout:
              flex: 1 1 auto
            properties:
              html:
                _nunjucks:
                  template: "<h2>{{ title }}</h2>"
                  on:
                    title:
                      _state: entity_workflows.$.title
          - id: workflow_overview_tooltip
            type: Tooltip
            layout:
              flex: 0 0 auto
            properties:
              title: Workflow Overview
            blocks:
              - id: workflow_overview
                type: Button
                properties:
                  icon: LuWorkflow
                  hideTitle: true
                events:
                  onClick:
                    - id: link_to_overview
                      type: Link
                      params:
                        pageId:
                          _module.pageId: workflow-overview
                        urlQuery:
                          workflow_id:
                            _state: entity_workflows.$._id
      - id: entity_workflows.$.action_steps
        type: ActionSteps
        events:
          onActionClick:
            _ref: components/check-action-click.yaml
        properties:
          direction: vertical
          activeActionId:
            _var:
              key: active_action_id
              default: null
          actionStatusConfig:
            _ref: components/action_statuses.yaml
          actionGroupConfig:
            _object.fromEntries:
              _array.map:
                - _if_none:
                    - _state: entity_workflows.$.groups
                    - []
                - _function:
                    - __args: 0.id
                    - order:
                        __args: 0.order
                      title:
                        __args: 0.title
                      icon:
                        __args: 0.icon
                      link:
                        __args: 0.link
          items:
            _if_none:
              - _state: entity_workflows.$.groups
              - []
