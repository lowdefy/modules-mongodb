# Workflow Progress surface — presentation variant of `actions-on-entity`.
#
# Renders an entity's workflows as collapsible sections of grouped,
# status-colored action buttons via the WorkflowProgress block. Same data
# contract as `actions-on-entity` (fetch get-entity-workflows → render), with
# the shared `check-action-click` handler baked in: a `check`-kind click opens
# the in-context check-action modal in place; every other kind navigates via
# the server-resolved `action.link`.
#
# The check-action modal is dropped by the PAGE, not here — the page is the
# only scope that sees every co-present surface, so it owns the modal drop and
# its `on_complete` refetch list. When no modal is on the page the baked-in
# click handler degrades to navigation.
#
# Vars:
#   entity_id            — (required) the entity whose workflows render.
#   entity_connection_id — (required) the entity's connection id.
#   active_action_id     — (optional) the _id of the action currently on
#                          screen; its button is highlighted. Omit on
#                          entity-view pages (no current action).
#   default_active_keys  — (optional) workflow_type slugs expanded on mount.
#                          When unset, workflows with any non-terminal action
#                          start open. Ignored when `active_keys` is set.
#   active_keys          — (optional) controlled expansion: the workflow_type
#                          slugs that are open. When set (an array), the page
#                          owns expansion — pair with `on_change` to keep it in
#                          sync with user toggles. Leave unset for the default
#                          uncontrolled behaviour.
#   on_change            — (optional) action list run when a user expands or
#                          collapses a workflow row. Receives the toggle event
#                          (`_event: activeKeys` / `workflowType` / `open`);
#                          wire it to update `active_keys` in controlled mode.
#   fetch_on_mount       — (optional, default true) set false when the page
#                          owns the entity_workflows fetch (e.g. it drives
#                          refetching via `entity-workflows-refetch` because
#                          shallow navigation never re-mounts this component).
id: workflow_progress
type: Box
events:
  onMount:
    - id: call_entity_workflows
      type: CallAPI
      skip:
        _eq:
          - _var:
              key: fetch_on_mount
              default: true
          - false
      params:
        endpointId:
          _module.endpointId: get-entity-workflows
        payload:
          entity:
            id:
              _var: entity_id
            connection_id:
              _var: entity_connection_id
    - id: set_entity_workflows
      type: SetState
      skip:
        _eq:
          - _var:
              key: fetch_on_mount
              default: true
          - false
      params:
        entity_workflows:
          _actions: call_entity_workflows.response.response.workflows
blocks:
  - id: no_workflows
    type: Result
    # entity_workflows is null while loading; only show the empty state once it
    # has resolved to an empty list.
    visible:
      _and:
        - _ne:
            - _state: entity_workflows
            - null
        - _eq:
            - _array.length:
                _if_none:
                  - _state: entity_workflows
                  - []
            - 0
    properties:
      icon:
        name: AiOutlineDeploymentUnit
        color: '#bfbfbf'
      subTitle: No workflows found
  - id: workflow_progress_block
    type: WorkflowProgress
    visible:
      _gt:
        - _array.length:
            _if_none:
              - _state: entity_workflows
              - []
        - 0
    events:
      onActionClick:
        _ref: components/check-action-click.yaml
      onChange:
        _var:
          key: on_change
          default: []
    properties:
      disableTooltip: true
      workflowOverviewPageId:
        _module.pageId: workflow-overview
      activeActionId:
        _var:
          key: active_action_id
          default: null
      defaultActiveKeys:
        _var:
          key: default_active_keys
          default: null
      activeKeys:
        _var:
          key: active_keys
          default: null
      actionStatusConfig:
        _ref: components/action_statuses.yaml
      workflows:
        _if_none:
          - _state: entity_workflows
          - []
