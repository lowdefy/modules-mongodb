# Per-workflow strip with title, lifecycle badge, summary counts, milestone
# label, workflow-overview link button, and a slot for caller-passed blocks.
# Used internally by actions-on-entity (inside a List) and by
# workflow-overview / group-overview (standalone).
#
# Required vars:
#   id            — string. Sets the container's block id, and every child id
#                   is derived from it via `_build.string.concat`. When used
#                   inside a List, pass `<list_id>.$.workflow_header`. When
#                   used standalone, pass any unique string (e.g. `workflow_header`).
#   workflow      — object. The workflow doc (with status, summary, groups, etc).
#
# Optional vars:
#   is_overview_page — boolean. Hides the workflow-overview link button when true.
#   blocks           — array. Caller-passed blocks rendered in the slot.
id:
  _build.string.concat:
    - _var: id
type: Box
visible:
  _ne:
    - _var: workflow
    - null
layout:
  gap: 8
blocks:
  - id:
      _build.string.concat:
        - _var: id
        - .strip
    type: Box
    layout:
      gap: 8
      align: middle
    blocks:
      - id:
          _build.string.concat:
            - _var: id
            - .strip.title_block
        type: Box
        layout:
          gap: 2
          flex: 1 1 auto
        blocks:
          - id:
              _build.string.concat:
                - _var: id
                - .strip.title_block.title
            type: Title
            properties:
              level: 4
              content:
                _js:
                  args:
                    workflow:
                      _var: workflow
                    workflowsConfig:
                      _module.var: workflows_config
                  fn: |
                    const { workflow, workflowsConfig } = args;
                    if (!workflow) return "";
                    const wfConfig = (workflowsConfig || []).find(
                      (w) => w.type === workflow.workflow_type
                    );
                    return (wfConfig && wfConfig.title) || workflow.workflow_type || "";
          - id:
              _build.string.concat:
                - _var: id
                - .strip.title_block.summary
            type: Paragraph
            properties:
              type: secondary
              content:
                _string.concat:
                  - ''
                  - _sum:
                      - _get:
                          from:
                            _var: workflow
                          key: summary.done
                          default: 0
                      - _get:
                          from:
                            _var: workflow
                          key: summary.not_required
                          default: 0
                  - ' of '
                  - _get:
                      from:
                        _var: workflow
                      key: summary.total
                      default: 0
                  - ' done'
          - id:
              _build.string.concat:
                - _var: id
                - .strip.title_block.milestone
            type: Paragraph
            properties:
              type: secondary
              content:
                _js:
                  args:
                    workflow:
                      _var: workflow
                    workflowsConfig:
                      _module.var: workflows_config
                  fn: |
                    const { workflow, workflowsConfig } = args;
                    if (!workflow) return "";
                    const wfConfig = (workflowsConfig || []).find(
                      (w) => w.type === workflow.workflow_type
                    ) || {};
                    const groupsDef = wfConfig.action_groups || [];
                    const groupsByOrder = (workflow.groups || []).map((g) => ({
                      ...g,
                      order: groupsDef.findIndex((d) => d.id === g.id),
                    }));
                    groupsByOrder.sort((a, b) => a.order - b.order);
                    const nextGroup = groupsByOrder.find((g) => g.status !== "done");
                    if (nextGroup) {
                      const def = groupsDef.find((d) => d.id === nextGroup.id);
                      return (def && def.title) || nextGroup.id;
                    }
                    return wfConfig.title || workflow.workflow_type || "";
      - id:
          _build.string.concat:
            - _var: id
            - .strip.overview_tooltip
        type: Tooltip
        visible:
          _ne:
            - _var: is_overview_page
            - true
        layout:
          flex: 0 0 auto
        properties:
          title: Workflow Overview
        blocks:
          - id:
              _build.string.concat:
                - _var: id
                - .strip.overview_link
            type: Button
            properties:
              icon: LuWorkflow
              type: link
              hideTitle: true
            events:
              onClick:
                - id: go_to_overview
                  type: Link
                  params:
                    pageId:
                      _module.pageId: workflow-overview
                    urlQuery:
                      workflow_id:
                        _js:
                          args:
                            workflow:
                              _var: workflow
                          fn: |
                            return args?.workflow?._id ?? null;
      - id:
          _build.string.concat:
            - _var: id
            - .strip.lifecycle_badge
        type: Tag
        layout:
          flex: 0 0 auto
        properties:
          color:
            _js:
              args:
                stages:
                  _ref: components/workflow_lifecycle_stages.yaml
                stage:
                  _get:
                    from:
                      _var: workflow
                    key: status.0.stage
              fn: |
                const { stages, stage } = args;
                return stages?.[stage]?.color;
          title:
            _js:
              args:
                stages:
                  _ref: components/workflow_lifecycle_stages.yaml
                stage:
                  _get:
                    from:
                      _var: workflow
                    key: status.0.stage
              fn: |
                const { stages, stage } = args;
                return stages?.[stage]?.title;
  - id:
      _build.string.concat:
        - _var: id
        - .slot
    type: Box
    blocks:
      _var:
        key: blocks
        default: []
