# Phone-number form field. Wraps the PhoneNumberInput block — the form-side
# counterpart to the `phoneNumber` field type the view renderer already knows
# (SmartDescriptions/fieldTypes/blockTypeMap.js maps PhoneNumberInput →
# phoneNumber). The block value is stored at the `key` state path.
vars:
  key:
    type: string
    required: true
  title:
    type: string
    required: false
  placeholder:
    type: string
    required: false
  visible:
    type: boolean
    default: true
  required:
    type: boolean
    default: false
  validate:
    type: array
    default: []
  label_inline:
    type: boolean
    default: false
  label_span:
    type: number
    required: false
  default_region:
    type: string
    required: false
  on_change:
    type: array
    default: []

config:
  id:
    _var: key
  type: PhoneNumberInput
  visible:
    _var:
      key: visible
      default: true
  required:
    _var:
      key: required
      default: false
  validate:
    _var:
      key: validate
      default: []
  properties:
    label:
      _build.object.assign:
        - inline:
            _var:
              key: label_inline
              default: false
        - _build.if:
            test:
              _build.ne:
                - _var:
                    key: label_span
                    default: null
                - null
            then:
              span:
                _var: label_span
              align: right
            else: {}
    title:
      _var: title
    placeholder:
      _var: placeholder
    defaultRegion:
      _var: default_region
  events:
    onChange:
      _var:
        key: on_change
        default: []
