vars:
  key:
    type: string
    required: true
  title:
    type: string
    required: false
  visible:
    type: boolean
    default: true
  required:
    type: boolean
    default: false
  validate:
    type: array
    default: []
  options:
    type: array
    default: []
  extra:
    type: string
    required: false
  label_inline:
    type: boolean
    default: false
  label_span:
    type: number
    required: false
  renderTags:
    type: boolean
    default: false
  on_change:
    type: array
    default: []

config:
  id:
    _var: key
  type: MultipleSelector
  validate:
    _build.array.concat:
      - _var:
          key: validate
          default: []
      - _build.if:
          test:
            _build.eq:
              - _var:
                  key: required
                  default: false
              - true
          then:
            - message: This field is required.
              status: error
              pass:
                _gt:
                  - _array.length:
                      _state:
                        _var: key
                  - 0
          else: []
  visible:
    _var:
      key: visible
      default: true
  required:
    _var:
      key: required
      default: false
  properties:
    renderTags:
      _var:
        key: renderTags
        default: false
    label:
      _build.object.assign:
        - extra:
            _var: extra
          inline:
            _var:
              key: label_inline
              default: false
        - _build.if:
            test:
              _build.ne:
                - _var:
                    key: label_span
                    default: null
                - null
            then:
              span:
                _var: label_span
              align: right
            else: {}
    title:
      _var: title
    options:
      _var:
        key: options
        default: []
  events:
    onChange:
      _var:
        key: on_change
        default: []
