vars:
  key:
    type: string
    required: true
  title:
    type: string
    required: false
  placeholder:
    type: string
    required: false
  visible:
    type: boolean
    default: true
  required:
    type: boolean
    default: false
  validate:
    type: array
    default: []
  label_inline:
    type: boolean
    default: false
  label_span:
    type: number
    required: false
  disabled:
    type: boolean
    default: false
  extra:
    type: string
    required: false
  on_change:
    type: array
    default: []
  max_length:
    type: number
    required: false
  show_count:
    type: boolean
    required: false

config:
  id:
    _var: key
  type: TextInput
  visible:
    _var:
      key: visible
      default: true
  required:
    _var:
      key: required
      default: false
  validate:
    _var:
      key: validate
      default: []
  properties:
    disabled:
      _var:
        key: disabled
        default: false
    label:
      _build.object.assign:
        - inline:
            _var:
              key: label_inline
              default: false
          extra:
            _var: extra
        - _build.if:
            test:
              _build.ne:
                - _var:
                    key: label_span
                    default: null
                - null
            then:
              span:
                _var: label_span
              align: right
            else: {}
    title:
      _var: title
    placeholder:
      _var: placeholder
    maxLength:
      _var:
        key: max_length
        default: null
    showCount:
      _build.if:
        test:
          _build.eq:
            - _var:
                key: show_count
                default: null
            - null
        then:
          _build.ne:
            - _var:
                key: max_length
                default: null
            - null
        else:
          _var: show_count
  events:
    onChange:
      _var:
        key: on_change
        default: []
