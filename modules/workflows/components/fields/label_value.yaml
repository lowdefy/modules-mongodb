vars:
  key:
    type: string
    required: true
  title:
    type: string
    required: true
  visible:
    type: boolean
    default: true

config:
  id:
    _var: key
  type: Html
  visible:
    _var:
      key: visible
      default: true
  properties:
    html:
      _string.concat:
        - "<div>"
        - _var: title
        - ': <span class="secondary">'
        - _state:
            _var: key
        - "</span></div>"
