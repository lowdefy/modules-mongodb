vars:
  key:
    type: string
    required: true
  title:
    type: string
    required: false
  extra:
    type: string
    required: false
  visible:
    type: boolean
    default: true
  required:
    type: boolean
    default: false
  label_inline:
    type: boolean
    default: false
  label_span:
    type: number
    required: false

config:
  id:
    _var: key
  type: DateSelector
  required:
    _var:
      key: required
      default: false
  visible:
    _var:
      key: visible
      default: true
  properties:
    title:
      _var: title
    label:
      _build.object.assign:
        - extra:
            _var: extra
          inline:
            _var:
              key: label_inline
              default: false
        - _build.if:
            test:
              _build.ne:
                - _var:
                    key: label_span
                    default: null
                - null
            then:
              span:
                _var: label_span
              align: right
            else: {}
    format: DD MMMM YYYY
