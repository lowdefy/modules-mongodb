vars:
  key:
    type: string
    required: true
  title:
    type: string
    required: false
  visible:
    type: boolean
    default: true
  required:
    type: boolean
    default: false
  options:
    type: array
    default: []
  extra:
    type: string
    required: false
  on_change:
    type: array
    default: []

config:
  id:
    _var: key
  type: CheckboxSelector
  visible:
    _var:
      key: visible
      default: true
  required:
    _var:
      key: required
      default: false
  properties:
    title:
      _var: title
    label:
      span: 12
      align: right
      colon: false
      extra:
        _var: extra
    options:
      _var:
        key: options
        default: []
  events:
    onChange:
      _var:
        key: on_change
        default: []
