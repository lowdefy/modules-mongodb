# Multi-contact form field scoped to one or more roles. Same as `role_contact`
# but renders the contacts module's `role-contact-selector` in `MultipleSelector`
# mode, so the block value is an array of denormalized `{ contact_id, name, email }`
# objects (each rendered read-only by the DataDescriptions `contact` field type).
# Requires the host app to wire a `contacts` entry.
vars:
  key:
    type: string
    required: true
  roles:
    type: array
    required: true
  title:
    type: string
    required: false
  placeholder:
    type: string
    required: false
  visible:
    type: boolean
    default: true
  required:
    type: boolean
    default: false
  label_inline:
    type: boolean
    default: false
  label_span:
    type: number
    required: false

config:
  _ref:
    module: contacts
    component: role-contact-selector
    vars:
      field_id:
        _var: key
      roles:
        _var: roles
      mode: MultipleSelector
      required:
        _var:
          key: required
          default: false
      visible:
        _var:
          key: visible
          default: true
      title:
        _var: title
      placeholder:
        _var: placeholder
      label:
        _build.object.assign:
          - inline:
              _var:
                key: label_inline
                default: false
          - _build.if:
              test:
                _build.ne:
                  - _var:
                      key: label_span
                      default: null
                  - null
              then:
                span:
                  _var: label_span
                align: right
              else: {}
