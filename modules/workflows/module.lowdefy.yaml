# This manifest declares the part-04 enum components (action_statuses,
# workflow_lifecycle_stages), the part-15 action_form_configs component,
# the part-17 shared pages (task-edit / task-view / task-review /
# workflow-overview), the part-19 operational APIs (start/cancel/close-workflow
# + get-entity-workflows / get-workflow-overview), the part-18 entity-page
# components (actions-on-entity, workflow-header, action_role_check), the
# part-25 group-overview surface (group-overview page + get-action-group-overview
# Api), and the part-20a static surface (workflows-collection / actions-collection
# / workflow-api connections, MONGODB_URI secret, dependencies on layout + events,
# user_schema + app_name + entities vars).
#
# The remaining module surface — resolver-channel page + API exports
# (makeActionPages, makeWorkflowApis), form-fields component library
# (part 14), notifications dependency, menu exports — lands in part 20b.
#
# The workflow-api connection `_ref`s the canonical enum file directly
# (`actionsEnum: { _ref: ../enums/action_statuses.yaml }`), so the engine
# always reads the shipped enum with its canonical priorities. The merged
# enum components below are UI-only consumers.

name: Workflows
version: 0.6.0
description: Workflow engine — action lifecycle, status transitions, hooks, trackers

dependencies:
  - id: layout
    description: Page layout wrapper consumed by every shared page.
  - id: events
    description: Provides the change_stamp component referenced by the workflow-api connection.

exports:
  components:
    - id: action_statuses
      description: Action status enum (8 canonical statuses) merged with app display overrides — for UI consumption
    - id: workflow_lifecycle_stages
      description: Workflow lifecycle stage enum (active, completed, cancelled) merged with app display overrides — for UI consumption
    - id: actions-on-entity
      description: Entity-page widget — surfaces all workflows attached to one entity. Host apps drop it onto entity pages; takes entity_id + entity_collection vars.
    - id: workflow-header
      description: Per-workflow strip with title, lifecycle badge, summary counts, milestone label, workflow-overview link button, and a collapsible slot for caller-passed blocks. Used internally by actions-on-entity and workflow-overview.
    - id: action_role_check
      description: Client-side role-gate action sequence. Composed into a page's onMount; writes the boolean to _state.action_allowed.
  api:
    - id: start-workflow
      description: Instantiate a workflow on an entity. Optional parent_action_id links as a child of an existing tracker action.
    - id: cancel-workflow
      description: Push cancelled to workflow status; flip remaining open actions to not-required.
    - id: close-workflow
      description: User-initiated normal termination — push completed to workflow status; sweep non-terminal actions honoring required_after_close.
    - id: get-entity-workflows
      description: Return workflows + filtered actions for one entity. Consumed by actions-on-entity.
    - id: get-workflow-overview
      description: Return one workflow + ordered + filtered actions for the shipped workflow-overview page.
    - id: get-action-group-overview
      description: Return one workflow + one action group's metadata + ordered + filtered actions in that group. Backs the shipped group-overview page.
  pages:
    - id: task-edit
      description: Shared task-action edit page — status selector + universal fields + Save. Addressed by ?action_id=<id>.
    - id: task-view
      description: Shared task-action view page — read-only universal fields + status timeline + comment timeline. Addressed by ?action_id=<id>.
    - id: task-review
      description: Shared task-action review page — read-only fields + approve / request_changes buttons. Addressed by ?action_id=<id>.
    - id: workflow-overview
      description: Workflow detail page — header + action cards with form_data DataView. Addressed by ?workflow_id=<id>.
    - id: group-overview
      description: Group detail page — header + progress bar + group-status badge + action cards with form_data DataView. Addressed by ?workflow_id=<id>&group_id=<id>.
  connections:
    - id: workflows-collection
      description: MongoDB collection connection for direct read access to the workflows collection.
    - id: actions-collection
      description: MongoDB collection connection for direct read access to the actions collection.
    - id: workflow-api
      description: Server-side WorkflowAPI connection — owns engine-managed write paths (transitions, tracker subscription, summary writeback).

vars:
  workflows_config:
    type: array
    required: true
    description: >
      Array of workflow definitions consumed by every build-time resolver in this
      module (parts 4, 12, 13, 15). Host app supplies via the entry's `vars` block,
      e.g. `vars: { _ref: workflow_config/workflows.yaml }`. Each entry is a workflow
      object with `type`, `entity_collection`, `starting_actions`, `action_groups`,
      and `actions` (see workflows-module-concept/action-authoring/spec.md).
  app_name:
    type: string
    required: true
    description: >
      The host app's deployment name. Filters action access via `access.{app_name}`
      per action, and is consumed by the engine to key the default log event's
      display block (matching the events module's display_key projection).
  user_schema:
    type: object
    default:
      roles_path: roles
    description: >
      Where the engine reads the caller's roles from on the session/user object.
      Defaults to `{ roles_path: roles }`.
  entities:
    type: object
    required: true
    description: >
      Map keyed by workflow `entity_collection` → `{ page_id, id_query_key, title }`.
      The module deep-links back into host-app entity pages (workflow-overview back-link,
      workflow-header entity-kind chrome) using these entries.
      - `page_id` — host-app page id rendering the entity.
      - `id_query_key` — URL query string key the entity page expects for its primary id (commonly `_id`).
      - `title` — singular human-readable entity-kind label (e.g. "Lead", "Ticket").
      Per-key shape is not statically validated by Lowdefy; part 4's `makeWorkflowsConfig`
      validator confirms every `entity_collection` referenced in `workflows_config`
      has a matching key here.
  action_statuses_display:
    type: object
    default: {}
    description: >
      Per-status display overrides for the shipped action_statuses enum.
      Merged via `_build.object.assign` onto the shipped enum and exposed
      as the `action_statuses` component for UI consumption only. The
      engine reads the shipped enum directly from the module file —
      overrides cannot affect engine priority logic.
  workflow_lifecycle_stages_display:
    type: object
    default: {}
    description: >
      Per-stage display overrides for the shipped workflow_lifecycle_stages
      enum. Same merge semantics as action_statuses_display: UI-only,
      cannot affect engine logic.

components:
  - id: action_statuses
    component:
      _build.object.assign:
        - _ref: enums/action_statuses.yaml
        - _module.var: action_statuses_display
  - id: workflow_lifecycle_stages
    component:
      _build.object.assign:
        - _ref: enums/workflow_lifecycle_stages.yaml
        - _module.var: workflow_lifecycle_stages_display
  - id: actions-on-entity
    component:
      _ref: components/actions-on-entity.yaml
  - id: workflow-header
    component:
      _ref: components/workflow-header.yaml
  - id: action_role_check
    component:
      _ref: components/action_role_check.yaml

connections:
  - _ref: connections/workflows-collection.yaml
  - _ref: connections/actions-collection.yaml
  - _ref: connections/workflow-api.yaml

api:
  - _ref: api/start-workflow.yaml
  - _ref: api/cancel-workflow.yaml
  - _ref: api/close-workflow.yaml
  - _ref: api/get-entity-workflows.yaml
  - _ref: api/get-workflow-overview.yaml
  - _ref: api/get-action-group-overview.yaml

pages:
  - _ref: pages/task-edit.yaml
  - _ref: pages/task-view.yaml
  - _ref: pages/task-review.yaml
  - _ref: pages/workflow-overview.yaml
  - _ref: pages/group-overview.yaml

plugins:
  - name: "@lowdefy/modules-mongodb-plugins"
    version: "^0.6.0"

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI
