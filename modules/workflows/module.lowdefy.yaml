# Build-time resolver invocations (resolvers in modules/workflows/resolvers/):
#   makeWorkflowsConfig    — engine config validation; component
#                            validated_workflows_config, consumed by
#                            connections/workflow-api.yaml.
#   makeWorkflowApis       — per-workflow {type}-submit/start/cancel/close
#                            APIs plus engine-only hook / group on-complete
#                            InternalApis; spliced into api:.
#   makeActionPages        — per-action edit/view/review/error pages from
#                            templates/{verb}.yaml.njk; spliced into pages:.
#   makeActionsForm        — template-scope form-block substitution (already
#                            wired from templates/{verb}.yaml.njk).
#
# The workflow-api connection `_ref`s the canonical enum file directly
# (`actionsEnum: { _ref: ../shared/enums/action_statuses.yaml }`), so the engine
# always reads the shipped enum with its canonical priorities. The merged
# enum components below are UI-only consumers.

name: Workflows
version: 0.6.0
description: Workflow engine — action lifecycle, status transitions, hooks, trackers

dependencies:
  - id: layout
    description: Page layout wrapper consumed by every shared page.
  - id: events
    description: >
      Provides the change_stamp component referenced by the workflow-api
      connection, and the new-event Api the engine dispatches the
      per-invocation log event to (endpoints.new_event on the connection).
  - id: notifications
    description: >
      Provides the send-notification InternalApi the engine dispatches to
      after each committed event (endpoints.send_notification on the
      workflow-api connection).
  - id: contacts
    description: >
      Provides the contact-selector component wrapped by the `contact` /
      `multiple_contact` form fields (components/fields/). Only exercised when
      a workflow form uses one of those fields.
  - id: user-account
    description: >
      Supplies the user-multi-selector and user-avatar components the
      universal-fields surface composes (Part 24 / Part 24a).

vars:
  workflows_config:
    type: array
    required: true
    description: >
      Array of workflow definitions consumed by every build-time resolver in this
      module (parts 4, 12, 13, 15). Host app supplies via the entry's `vars` block,
      e.g. `vars: { _ref: workflow_config/workflows.yaml }`. Each entry is a workflow
      object with `type`, `entity_collection`, `entity_ref_key` (the event-references
      key for the workflow's entity, e.g. `lead_ids` — required), `starting_actions`,
      `action_groups`, and `actions` (see
      workflows-module-concept/action-authoring/spec.md). Workflows, actions, and
      action groups accept an optional `title:`; when omitted it is derived from
      the slug (`type`/`id`) by the title humanizer — splits on `-`/`_`/camelCase,
      applies Title Case, lowercases minor words mid-string, uppercases acronyms
      (base set: PO ID URL API CRM SLA KPI VAT PDF CSV FAQ KYC RFQ; extended by
      `title_acronyms`). Set `title:` only when the default is wrong.
  app_name:
    type: string
    required: true
    description: >
      The host app's deployment name. Serves three roles: (1) filters action
      access via `access.{app_name}` per action; (2) keys the engine's default
      log event display block (matching the events module's display_key
      projection); and (3) keys the per-app action display the engine writes
      onto each action doc — display surfaces read `action.{app_name}.message`
      and `action.{app_name}.links` for the current app's slug.
  entities:
    type: object
    required: true
    description: >
      Map keyed by workflow `entity_collection` → `{ page_id, id_query_key, title }`.
      The module deep-links back into host-app entity pages (workflow-overview back-link,
      workflow-header entity-kind chrome) using these entries.
      - `page_id` — host-app page id rendering the entity.
      - `id_query_key` — URL query string key the entity page expects for its primary id (commonly `_id`).
      - `title` — singular human-readable entity-kind label (e.g. "Lead", "Ticket").
      Per-key shape is not statically validated by Lowdefy; part 4's `makeWorkflowsConfig`
      validator confirms every `entity_collection` referenced in `workflows_config`
      has a matching key here.
  action_statuses_display:
    type: object
    default: {}
    description: >
      Per-status display overrides for the shipped action_statuses enum.
      Merged via `_build.object.assign` onto the shipped enum and exposed
      as the `action_statuses` component for UI consumption only. The
      engine reads the shipped enum directly from the module file —
      overrides are UI-only and cannot affect engine behaviour (transition
      legality is owned by the per-kind FSM tables; the enum's `priority`
      is display-only ordering).
  workflow_lifecycle_stages_display:
    type: object
    default: {}
    description: >
      Per-stage display overrides for the shipped workflow_lifecycle_stages
      enum. Same merge semantics as action_statuses_display: UI-only,
      cannot affect engine logic.
  title_acronyms:
    type: array
    default: []
    description: >
      Domain acronyms (e.g. [BOM, SKU]) merged into the module's base acronym
      set and applied by the title humanizer when deriving default titles from
      workflow/action/group slugs. A token whose lowercased form matches an entry
      is fully uppercased in derived titles (e.g. "upload-bom" → "Upload BOM").
      Base set ships in the module; this var extends it. Has no effect on
      explicitly authored `title:` values.
  contacts_collection:
    type: string
    default: user-contacts
    description: >
      Collection name the timeline lookup (GetEventsTimeline) joins to resolve
      each event author's avatar (created.user.id → _id, projecting
      profile.picture). Defaults to `user-contacts` — the shared collection
      where a user IS a contact (same _id space). Set this to match your
      contacts collection name if the host app points the contacts module at a
      custom collection.

exports:
  components:
    - id: check-action-modal
      description: >
        Standalone in-context check-action modal — a single Modal block (fixed
        blockId check_action_modal) wrapping the shared check-action surface.
        Bundled automatically by actions-on-entity (and, opt-in, by
        workflows-events-timeline via include_modal). Opened exclusively via the
        documented SetState + CallMethod(setOpen, [{ open: true }]) contract.
        Optional var: on_complete (host refetch actions, default []). One
        instance per page; never drop it on a page that already defines a
        get_workflow_action request (the workflow-action-* pages).
    - id: workflows-events-timeline
      description: >
        Action-enriched events timeline panel backed by the GetEventsTimeline
        engine method — events with cross-stream action cards, workflow cards
        verb-filtered and engine-linked server-side. The kind-branch click
        handler is baked in (check cards open the shared check_action_modal,
        every other kind navigates via action.link) — consumers wire no
        onActionClick. Vars: reference_field, reference_value (plus optional
        reverse, contact_page_url, disable_contact_link, compact,
        s3GetPolicyRequestId; include_modal — bundle a check-action modal here,
        default false, set true ONLY on a timeline-only page with no
        actions-on-entity since the check_action_modal blockId is global;
        on_action_complete — extras appended after the bundled modal's built-in
        timeline refetch, default []).

components:
  - id: action_statuses
    component:
      _ref: components/action_statuses.yaml
  - id: workflow_lifecycle_stages
    component:
      _ref: components/workflow_lifecycle_stages.yaml
  - id: actions-on-entity
    component:
      _ref: components/actions-on-entity.yaml
  - id: check-action-modal
    component:
      _ref: components/check-action-modal.yaml
  - id: validated_workflows_config
    component:
      _ref: components/validated_workflows_config.yaml
  - id: entity-workflows-refetch
    component:
      _ref: components/entity-workflows-refetch.yaml
  - id: workflows-events-timeline
    component:
      _ref: components/workflows-events-timeline.yaml

connections:
  - _ref: connections/workflows-collection.yaml
  - _ref: connections/actions-collection.yaml
  - _ref: connections/workflow-api.yaml

api:
  _build.array.concat:
    - - _ref: api/get-entity-workflows.yaml
      - _ref: api/get-workflow-overview.yaml
      - _ref: api/get-action-group-overview.yaml
    - _ref:
        resolver: resolvers/makeWorkflowApis.js
        vars:
          workflows:
            _module.var: workflows_config

pages:
  _build.array.concat:
    - - _ref: pages/workflow-action-edit.yaml
      - _ref: pages/workflow-action-view.yaml
      - _ref: pages/workflow-action-review.yaml
      - _ref: pages/workflow-overview.yaml
      - _ref: pages/workflow-group-overview.yaml
    - _ref:
        resolver: resolvers/makeActionPages.js
        vars:
          workflows:
            _module.var: workflows_config
          app_name:
            _module.var: app_name
          title_acronyms:
            _module.var: title_acronyms

plugins:
  - name: '@lowdefy/modules-mongodb-plugins'
    version: '^0.6.0'

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI
