# Shared check-action review page (Part 40 — D1).
#
# Thin container: addressed by ?action_id=<id>, it loads the action, primes
# `current_action.*` state, and renders the shared check-action surface in
# review mode. All review UI — header, universal fields, comment, the
# Approve / Request Changes buttons, and the request-changes modal — lives in
# components/check-action-surface.yaml; this page owns only the guards and the
# state seed.
#
# Stale-URL guard allowlist is `[in-review]` only (NOT `error`). A check action
# at `error` renders no review buttons, and the engine routes its `error` verb
# to workflow-action-view (where resolve_error lives), so an `error`-stage hit
# is redirected to the view page rather than stranding the reviewer on a
# buttonless review render.
#
# Path-stub dependencies (won't build until other parts ship):
#   - components/check-action-surface.yaml -> universal-fields (part 24)
_ref:
  module: layout
  component: page
  vars:
    id: workflow-action-review
    hide_title: true
    content_width: 750
    requests:
      - _ref: requests/get_workflow_action.yaml
    events:
      onMount:
        # Step 1: action_id presence guard.
        - id: redirect_no_action
          type: Link
          skip:
            _ne:
              - _url_query: action_id
              - null
          params:
            back: true
        # Step 2: load the action.
        - id: get_action
          type: Request
          params: get_workflow_action
        # Step 3: stale-URL guard. Allowlist is `[in-review]` only — an
        # `error`-stage action has no review buttons and resolves via the
        # view page, so redirect it to workflow-action-view.
        - id: redirect_stale_status
          type: Link
          skip:
            _array.includes:
              - - in-review
              - _request: get_workflow_action.status.0.stage
          params:
            pageId:
              _module.pageId: workflow-action-view
            urlQuery:
              _url_query: true
        # Step 4 (get_workflow) — omitted; workflow_closed + allowed resolved
        # server-side into the get_workflow_action envelope.
        # Step 5 (get_entity) — intentionally omitted on all check pages (v1).
        # Step 6 (action_role_check) — omitted; allowed resolved server-side.
        # Step 7: prime current_action state for the surface. Spread the
        # response envelope, then seed the working inputs and the mode literal.
        - id: set_current_action
          type: SetState
          params:
            current_action:
              _request: get_workflow_action
        - id: seed_working_state
          type: SetState
          params:
            # Seed fields even on review: universal-fields editability is
            # edit-verb-gated, so an edit-verb reviewer gets live inputs bound
            # at current_action.fields.*.
            current_action.fields:
              assignees:
                _request: get_workflow_action.assignees
              due_date:
                _request: get_workflow_action.due_date
              description:
                _request: get_workflow_action.description
            current_action.comment: null
            # Stable stage scalar for the header badge (see check-action-surface.yaml).
            current_action.stage:
              _request: get_workflow_action.status.0.stage
            current_action.mode: review
        # Step 8 (author-supplied pages.review.events.onMount) — omitted on
        # shared check pages; same gap as workflow-action-view / workflow-action-edit.
    blocks:
      - _ref:
          path: components/check-action-surface.yaml
