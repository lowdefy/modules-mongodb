# Shared read-only task-action page (part 17).
#
# Addressed by ?action_id=<id>. Static page — one experience for every task
# action. Mirrors the 8-step onMount sequence from part 16's view.yaml.njk,
# adapted for plain YAML (no Nunjucks render-time vars).
#
# Path-stub dependencies (won't build until other parts ship):
#   - ../components/action_role_check.yaml       (part 18)
#   - ../components/universal-fields/universal-fields.yaml  (part 24)
_ref:
  module: layout
  component: page
  vars:
    id: task-view
    hide_title: true
    content_width: 750
    requests:
      - _ref: ../requests/get_action.yaml
    events:
      onMount:
        # Step 1: action_id presence guard.
        - id: redirect_no_action
          type: Link
          skip:
            _ne:
              - _url_query: action_id
              - null
          params:
            back: true
        # Step 2: load the action.
        - id: get_action
          type: Request
          params: get_action
        # Step 3 (stale-URL guard) — intentionally omitted on view.
        # Step 4 (get_workflow) — intentionally omitted on view (no form-state to prime).
        # Step 5 (get_entity) — intentionally omitted on all task pages (v1).
        # Step 6: role check — sets _state.action_allowed.
        - _ref:
            path: ../components/action_role_check.yaml
            vars:
              action_config:
                _request: get_action
        # Step 7: no-op SetState slot (kept for sequence parity).
        - id: prime_form_state
          type: SetState
          params: {}
        # Step 8 (author-supplied pages.view.events.onMount) — omitted on shared
        # task pages because static pages have no per-action page_config var.
        # Wiring requires a different mechanism (resolver-driven or runtime
        # action_config lookup); tracked in part 27 / follow-up.
    blocks:
      - _ref:
          module: layout
          component: card
          vars:
            hide_title: true
            blocks:
              - id: action_header
                type: Box
                layout:
                  gap: 8
                  contentAlign: middle
                blocks:
                  - id: action_title
                    type: Title
                    properties:
                      level: 4
                      content:
                        _request: get_action.title
                  - id: action_status_badge
                    type: Tag
                    properties:
                      color:
                        _global:
                          _string.concat:
                            - action_statuses.
                            - _request: get_action.status.0.stage
                            - .color
                      style:
                        color:
                          _global:
                            _string.concat:
                              - action_statuses.
                              - _request: get_action.status.0.stage
                              - .titleColor
                        borderColor:
                          _global:
                            _string.concat:
                              - action_statuses.
                              - _request: get_action.status.0.stage
                              - .borderColor
                      content:
                        _global:
                          _string.concat:
                            - action_statuses.
                            - _request: get_action.status.0.stage
                            - .title
              - _ref:
                  path: ../components/universal-fields/universal-fields.yaml
                  vars:
                    mode: display
                    kind: task
                    action_data:
                      assignees:
                        _request: get_action.assignees
                      due_date:
                        _request: get_action.due_date
                      description:
                        _request: get_action.description
      - _ref:
          module: layout
          component: card
          vars:
            title: Status History
            blocks:
              - id: status_history_list
                type: List
                visible:
                  _gt:
                    - _array.length:
                        _request: get_action.status
                    - 0
                properties:
                  data:
                    _request: get_action.status
                blocks:
                  - id: status_history_list.$.row
                    type: Box
                    layout:
                      gap: 8
                      contentAlign: middle
                    blocks:
                      - id: status_history_list.$.badge
                        type: Tag
                        properties:
                          color:
                            _global:
                              _string.concat:
                                - action_statuses.
                                - _array_indices: stage
                                - .color
                          content:
                            _global:
                              _string.concat:
                                - action_statuses.
                                - _array_indices: stage
                                - .title
                      - id: status_history_list.$.timestamp
                        type: Paragraph
                        properties:
                          type: secondary
                          style:
                            fontSize: 12
                          content:
                            _dayjs.format:
                              on:
                                _array_indices: created.timestamp
                              params:
                                format: YYYY-MM-DD HH:mm
                      - id: status_history_list.$.error
                        type: Paragraph
                        visible:
                          _ne:
                            - _array_indices: error_message
                            - null
                        properties:
                          type: danger
                          style:
                            fontSize: 12
                          content:
                            _array_indices: error_message
      - _ref:
          module: layout
          component: card
          vars:
            title: Comments
            blocks:
              - id: comment_events
                type: Box
                requests:
                  - id: get_comment_events
                    type: MongoDBAggregation
                    connectionId:
                      _module.connectionId: events-collection
                    payload:
                      action_id:
                        _request: get_action._id
                    properties:
                      pipeline:
                        - $match:
                            action_ids:
                              $in:
                                - _payload: action_id
                            metadata.comment:
                              $exists: true
                        - $sort:
                            created.timestamp: -1
                events:
                  onMount:
                    - id: fetch_comment_events
                      type: Request
                      params: get_comment_events
                blocks:
                  - id: comment_events_empty
                    type: Paragraph
                    visible:
                      _eq:
                        - _array.length:
                            _request: get_comment_events
                        - 0
                    properties:
                      type: secondary
                      style:
                        fontSize: 12
                        fontStyle: italic
                      content: No comments yet.
                  - id: comment_events_list
                    type: List
                    visible:
                      _gt:
                        - _array.length:
                            _request: get_comment_events
                        - 0
                    properties:
                      data:
                        _request: get_comment_events
                    blocks:
                      - id: comment_events_list.$.row
                        type: Box
                        layout:
                          gap: 4
                        blocks:
                          - id: comment_events_list.$.author_line
                            type: Paragraph
                            properties:
                              type: secondary
                              style:
                                fontSize: 12
                              content:
                                _string.concat:
                                  - _array_indices: created.by.name
                                  - " — "
                                  - _dayjs.format:
                                      on:
                                        _array_indices: created.timestamp
                                      params:
                                        format: YYYY-MM-DD HH:mm
                          - id: comment_events_list.$.body
                            type: Html
                            properties:
                              html:
                                _array_indices: metadata.comment
