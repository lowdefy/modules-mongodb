# Group overview page (part 25).
#
# Addressed by ?workflow_id=<id>&group_id=<id>. Single CallApi to
# get-action-group-overview (part 25), then renders a group-scoped header
# (workflow + group title, entity back-link), a progress bar driven by
# group.summary, a group-status badge, and the per-action card list.
#
# Dependencies:
#   - api/get-action-group-overview.yaml         (this part)
#   - component action_statuses                  (part 4)
#
# Workflow/group titles, entity back-link, and per-action form metadata
# ride the API response (part 46) — this page reads no module config vars.
_ref:
  module: layout
  component: page
  vars:
    id: workflow-group-overview
    content_width: 1100
    title:
      _state: group.title
    # No back_link → the title-block falls back to browser-history back.
    show_back_button: true
    # Breadcrumb trail: Home / [entity list] / entity / workflow→ / group (terminal).
    breadcrumbs:
      _ref:
        path: components/overview-breadcrumbs.yaml
        vars:
          tail:
            - label:
                _state: workflow.title
              pageId:
                _module.pageId: workflow-overview
              urlQuery:
                workflow_id:
                  _url_query: workflow_id
            - label:
                _state: group.title
    # Eyebrow names the entity this workflow hangs off ("{type}: {name}", e.g.
    # "Company: Acme Corp") — same data as the breadcrumb trail, above the title.
    type:
      _ref: components/overview-entity-eyebrow.yaml
    status:
      _state: group.status
    status_enum:
      _ref: enums/action_group_statuses.yaml
    loading:
      _not:
        _state: group
    events:
      onMount:
        # workflow_id + group_id presence guard.
        - id: redirect_no_workflow_or_group
          type: Link
          skip:
            _and:
              - _ne:
                  - _url_query: workflow_id
                  - null
              - _ne:
                  - _url_query: group_id
                  - null
          params:
            back: true
        # Single CallApi to get-action-group-overview.
        - id: call_get_overview
          type: CallAPI
          params:
            endpointId:
              _module.endpointId: get-action-group-overview
            payload:
              workflow_id:
                _url_query: workflow_id
              group_id:
                _url_query: group_id
        # Stash the response in _state.overview, plus put the actions array
        # under its own top-level state key so the List block can read from it.
        - id: set_overview_state
          type: SetState
          params:
            workflow:
              _actions: call_get_overview.response.response.workflow
            group:
              _actions: call_get_overview.response.response.group
            actions_list:
              _actions: call_get_overview.response.response.actions
        # Null-redirect guard — Api returns workflow: null when no actions
        # pass the access filter, the workflow doc is missing, or the group
        # id is unknown.
        # - id: redirect_no_workflow_doc
        #   type: Link
        #   skip:
        #     _ne:
        #       - _state: workflow
        #       - null
        #   params:
        #     back: true
    blocks:
      # Workflow context line — the title-block carries the group title +
      # status badge + back link; this names the parent workflow beneath it.
      - id: group_overview_workflow_title
        type: Paragraph
        properties:
          type: secondary
          content:
            _state: workflow.title
      # Segmented status bar (Part 66) — same shared component as the workflow
      # overview, fed this group's summary.
      - _ref:
          path: components/overview-progress-bar.yaml
          vars:
            summary:
              _state: group.summary
      # Outside the List, so it writes the whole collapse_map in one SetState.
      - id: collapse_toolbar
        type: Box
        layout:
          justify: flex-end
        blocks:
          - id: collapse_all_toggle
            type: Button
            layout:
              flex: 0 0 auto
            properties:
              type: text
              size: small
              title:
                _js:
                  args:
                    acts:
                      _state: actions_list
                    map:
                      _state: collapse_map
                  fn: |
                    const acts = args.acts || [];
                    const ids = acts.map((a) => (a.key ? a.type + '.' + a.key : a.type));
                    const map = args.map || {};
                    const allExpanded = ids.length > 0 && ids.every((id) => map[id]);
                    return allExpanded ? 'Collapse all' : 'Expand all';
            events:
              onClick:
                - id: toggle_all
                  type: SetState
                  params:
                    collapse_map:
                      _js:
                        args:
                          acts:
                            _state: actions_list
                          map:
                            _state: collapse_map
                        fn: |
                          const acts = args.acts || [];
                          const ids = acts.map((a) => (a.key ? a.type + '.' + a.key : a.type));
                          const map = args.map || {};
                          const allExpanded = ids.length > 0 && ids.every((id) => map[id]);
                          if (allExpanded) return {};
                          const next = {};
                          for (const id of ids) next[id] = true;
                          return next;

      # Card gap rides the `.element` CSS slot — blocks-basic List merges it into
      # its item flex-container; layout.gap only reaches blocks within a card.
      - id: actions_list
        type: List
        properties:
          direction: column
          wrap: nowrap
        style:
          .element:
            gap: 8px
        blocks:
          - id: actions_list.$.card
            type: Card
            layout:
              gap: 16
            blocks:
              - id: actions_list.$.header
                type: Box
                layout:
                  gap: 8
                  selfAlign: middle
                  # Layout default is flex-wrap: wrap — nowrap holds the row.
                  wrap: nowrap
                blocks:
                  - id: actions_list.$.collapse_toggle
                    type: Button
                    layout:
                      flex: 0 0 auto
                    properties:
                      type: text
                      hideTitle: true
                      icon:
                        _if:
                          test:
                            _get:
                              from:
                                _state: collapse_map
                              key:
                                _if:
                                  test:
                                    _ne:
                                      - _state: actions_list.$.key
                                      - null
                                  then:
                                    _string.concat:
                                      - _state: actions_list.$.type
                                      - .
                                      - _state: actions_list.$.key
                                  else:
                                    _state: actions_list.$.type
                              default: false
                          then: AiOutlineUp
                          else: AiOutlineDown
                    events:
                      onClick:
                        - id: actions_list.$.toggle
                          type: SetState
                          params:
                            collapse_map:
                              _js:
                                args:
                                  id:
                                    _if:
                                      test:
                                        _ne:
                                          - _state: actions_list.$.key
                                          - null
                                      then:
                                        _string.concat:
                                          - _state: actions_list.$.type
                                          - .
                                          - _state: actions_list.$.key
                                      else:
                                        _state: actions_list.$.type
                                  map:
                                    _state: collapse_map
                                fn: |
                                  const map = { ...(args.map || {}) };
                                  const id = args.id;
                                  map[id] = !map[id];
                                  return map;
                  - id: actions_list.$.title_row
                    type: Box
                    layout:
                      gap: 8
                      selfAlign: middle
                      flex: 1 1 0
                    blocks:
                      - id: actions_list.$.title_row
                        type: Box
                        layout:
                          gap: 8
                          selfAlign: middle
                        blocks:
                          - id: actions_list.$.status_badge
                            type: Tag
                            layout:
                              flex: 0 0 auto
                            properties:
                              color:
                                _get:
                                  from:
                                    _ref: components/action_statuses.yaml
                                  key:
                                    _string.concat:
                                      - _state: actions_list.$.status
                                      - .titleColor
                              title:
                                _get:
                                  from:
                                    _ref: components/action_statuses.yaml
                                  key:
                                    _string.concat:
                                      - _state: actions_list.$.status
                                      - .title
                          - id: actions_list.$.message
                            layout:
                              flex: 1 1 auto
                            type: Paragraph
                            properties:
                              content:
                                _state: actions_list.$.message
                          - id: actions_list.$.link_button
                            type: Button
                            layout:
                              flex: 0 0 auto
                            visible:
                              _ne:
                                - _state: actions_list.$.link
                                - null
                            properties:
                              title:
                                _if_none:
                                  - _state: actions_list.$.link.title
                                  - Open
                              type: link
                            events:
                              onClick:
                                - id: actions_list.$.link
                                  type: Link
                                  params:
                                    _state: actions_list.$.link
              - id: actions_list.$.body_empty
                type: Html
                visible:
                  _and:
                    - _get:
                        from:
                          _state: collapse_map
                        key:
                          _if:
                            test:
                              _ne:
                                - _state: actions_list.$.key
                                - null
                            then:
                              _string.concat:
                                - _state: actions_list.$.type
                                - .
                                - _state: actions_list.$.key
                            else:
                              _state: actions_list.$.type
                    - _eq:
                        - _get:
                            from:
                              _state: workflow.form_data
                            key:
                              _if:
                                test:
                                  _ne:
                                    - _state: actions_list.$.key
                                    - null
                                then:
                                  _string.concat:
                                    - _state: actions_list.$.type
                                    - .
                                    - _state: actions_list.$.key
                                else:
                                  _state: actions_list.$.type
                            default: null
                        - null
                properties:
                  html: "<p style='color:#999;font-style:italic;font-size:12px'>No data submitted yet.</p>"
              - id: actions_list.$.body_dataview
                type: DataDescriptions
                visible:
                  _and:
                    - _get:
                        from:
                          _state: collapse_map
                        key:
                          _if:
                            test:
                              _ne:
                                - _state: actions_list.$.key
                                - null
                            then:
                              _string.concat:
                                - _state: actions_list.$.type
                                - .
                                - _state: actions_list.$.key
                            else:
                              _state: actions_list.$.type
                    - _ne:
                        - _get:
                            from:
                              _state: workflow.form_data
                            key:
                              _if:
                                test:
                                  _ne:
                                    - _state: actions_list.$.key
                                    - null
                                then:
                                  _string.concat:
                                    - _state: actions_list.$.type
                                    - .
                                    - _state: actions_list.$.key
                                else:
                                  _state: actions_list.$.type
                            default: null
                        - null
                properties:
                  formConfig:
                    _array.concat:
                      - _if_none:
                          - _state: actions_list.$.form_meta.form
                          - []
                      - _if_none:
                          - _state: actions_list.$.form_meta.form_review
                          - []
                  data:
                    form:
                      _get:
                        from:
                          _state: workflow.form_data
                        key:
                          _if:
                            test:
                              _ne:
                                - _state: actions_list.$.key
                                - null
                            then:
                              _string.concat:
                                - _state: actions_list.$.type
                                - .
                                - _state: actions_list.$.key
                            else:
                              _state: actions_list.$.type
                        default: null
                    workflow:
                      _state: workflow
