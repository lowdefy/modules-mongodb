# Group overview page (part 25).
#
# Addressed by ?workflow_id=<id>&group_id=<id>. Single CallApi to
# get-action-group-overview (part 25), then renders a group-scoped header
# (workflow + group title, entity back-link), a progress bar driven by
# group.summary, a group-status badge, and the per-action card list.
#
# Dependencies:
#   - api/get-action-group-overview.yaml         (this part)
#   - _module.var: workflows_config              (part 4)
#   - _module.var: entities                      (part 20)
#   - _module.var: app_name                      (part 20)
#   - component action_form_configs              (part 15)
#   - component action_statuses                  (part 4)
_ref:
  module: layout
  component: page
  vars:
    id: workflow-group-overview
    hide_title: true
    content_width: 1100
    events:
      onMount:
        # workflow_id + group_id presence guard.
        - id: redirect_no_workflow_or_group
          type: Link
          skip:
            _and:
              - _ne:
                  - _url_query: workflow_id
                  - null
              - _ne:
                  - _url_query: group_id
                  - null
          params:
            back: true
        # Single CallApi to get-action-group-overview.
        - id: call_get_overview
          type: CallAPI
          params:
            endpointId:
              _module.endpointId: get-action-group-overview
            payload:
              workflow_id:
                _url_query: workflow_id
              group_id:
                _url_query: group_id
        # Stash the response in _state.overview, plus put the actions array
        # under its own top-level state key so the List block can read from it.
        - id: set_overview_state
          type: SetState
          params:
            workflow:
              _actions: call_get_overview.response.response.workflow
            group:
              _actions: call_get_overview.response.response.group
            actions_list:
              _actions: call_get_overview.response.response.actions
        # Null-redirect guard — Api returns workflow: null when no actions
        # pass the access filter, the workflow doc is missing, or the group
        # id is unknown.
        # - id: redirect_no_workflow_doc
        #   type: Link
        #   skip:
        #     _ne:
        #       - _state: workflow
        #       - null
        #   params:
        #     back: true
    blocks:
      - id: group_overview_header
        type: Box
        layout:
          gap: 8
        blocks:
          - id: group_overview_titles
            type: Box
            layout:
              gap: 4
            blocks:
              - id: group_overview_workflow_title
                type: Paragraph
                properties:
                  content:
                    _state: workflow.title
              - id: group_overview_group_title
                type: Html
                layout:
                  flex: 1 1 auto
                properties:
                  html:
                    _nunjucks:
                      template: |
                        <h1 class="text-3xl font-semibold" style="margin: 0;">{{ title | default('Group') }}</h1>
                      on:
                        title:
                          _state: group.title
              - id: group_status_badge
                type: Tag
                layout:
                  flex: 0 0 auto
                properties:
                  color:
                    _if:
                      test:
                        _eq:
                          - _state: group.status
                          - done
                      then: green
                      else:
                        _if:
                          test:
                            _eq:
                              - _state: group.status
                              - in-progress
                          then: blue
                          else: default
                  title:
                    _if:
                      test:
                        _eq:
                          - _state: group.status
                          - done
                      then: Done
                      else:
                        _if:
                          test:
                            _eq:
                              - _state: group.status
                              - in-progress
                          then: In progress
                          else: Blocked
      - id: entity_back_button
        type: Button
        properties:
          title:
            _state: workflow.entity_link.title
          type: link
          icon: AiOutlineArrowLeft
        events:
          onClick:
            - id: link_to_entity
              type: Link
              params:
                pageId:
                  _state: workflow.entity_link.pageId
                urlQuery:
                  _state: workflow.entity_link.urlQuery
      - id: group_progress
        type: Progress
        properties:
          percent:
            _js:
              args:
                summary:
                  _state: group.summary
              fn: |
                const { summary } = args;
                if (!summary) return 0;
                const total = summary.total || 0;
                if (total === 0) return 100;
                const filled = (summary.done || 0) + (summary.not_required || 0);
                return Math.round((filled / total) * 100);

      - id: actions_list
        type: List
        blocks:
          - id: actions_list.$.card
            type: Card
            layout:
              gap: 16
            blocks:
              - id: actions_list.$.header
                type: Box
                layout:
                  gap: 8
                  align: middle
                  justify: space-between
                blocks:
                  - id: actions_list.$.title_row
                    type: Box
                    layout:
                      gap: 8
                      align: middle
                    blocks:
                      - id: actions_list.$.title_row
                        type: Box
                        layout:
                          gap: 8
                          align: middle
                        blocks:
                          - id: actions_list.$.status_badge
                            type: Tag
                            layout:
                              flex: 0 0 auto
                            properties:
                              color:
                                _get:
                                  from:
                                    _ref: components/action_statuses.yaml
                                  key:
                                    _string.concat:
                                      - _state: actions_list.$.status
                                      - .titleColor
                              title:
                                _get:
                                  from:
                                    _ref: components/action_statuses.yaml
                                  key:
                                    _string.concat:
                                      - _state: actions_list.$.status
                                      - .title
                          - id: actions_list.$.message
                            layout:
                              flex: 1 1 auto
                            type: Paragraph
                            properties:
                              content:
                                _state: actions_list.$.message
                          - id: actions_list.$.link_button
                            type: Button
                            layout:
                              flex: 0 0 auto
                            visible:
                              _ne:
                                - _state: actions_list.$.link
                                - null
                            properties:
                              title:
                                _if_none:
                                  - _state: actions_list.$.link.title
                                  - Open
                              type: link
                            events:
                              onClick:
                                - id: actions_list.$.link
                                  type: Link
                                  params:
                                    _state: actions_list.$.link
              - id: actions_list.$.body_empty
                type: Html
                visible:
                  _eq:
                    - _get:
                        from:
                          _state: workflow.form_data
                        key:
                          _if:
                            test:
                              _ne:
                                - _state: actions_list.$.key
                                - null
                            then:
                              _string.concat:
                                - _state: actions_list.$.type
                                - .
                                - _state: actions_list.$.key
                            else:
                              _state: actions_list.$.type
                        default: null
                    - null
                properties:
                  html: "<p style='color:#999;font-style:italic;font-size:12px'>No data submitted yet.</p>"
              - id: actions_list.$.body_dataview
                type: DataDescriptions
                visible:
                  _ne:
                    - _get:
                        from:
                          _state: workflow.form_data
                        key:
                          _if:
                            test:
                              _ne:
                                - _state: actions_list.$.key
                                - null
                            then:
                              _string.concat:
                                - _state: actions_list.$.type
                                - .
                                - _state: actions_list.$.key
                            else:
                              _state: actions_list.$.type
                        default: null
                    - null
                properties:
                  formConfig:
                    _if_none:
                      - _state: actions_list.$.form_meta
                      - form: []
                        form_review: []
                  data:
                    form:
                      _get:
                        from:
                          _state: workflow.form_data
                        key:
                          _if:
                            test:
                              _ne:
                                - _state: actions_list.$.key
                                - null
                            then:
                              _string.concat:
                                - _state: actions_list.$.type
                                - .
                                - _state: actions_list.$.key
                            else:
                              _state: actions_list.$.type
                        default: null
                    workflow:
                      _state: workflow
