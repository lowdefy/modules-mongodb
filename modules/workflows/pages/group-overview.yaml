# Group overview page (part 25).
#
# Addressed by ?workflow_id=<id>&group_id=<id>. Single CallApi to
# get-action-group-overview (part 25), then renders a group-scoped header
# (workflow + group title, entity back-link), a progress bar driven by
# group.summary, a group-status badge, and the per-action card list.
#
# Dependencies:
#   - api/get-action-group-overview.yaml         (this part)
#   - _module.var: workflows_config              (part 4)
#   - _module.var: entities                      (part 20)
#   - _module.var: app_name                      (part 20)
#   - component action_form_configs              (part 15)
#   - component action_statuses                  (part 4)
_ref:
  module: layout
  component: page
  vars:
    id: group-overview
    hide_title: true
    content_width: 1100
    events:
      onMount:
        # workflow_id + group_id presence guard.
        - id: redirect_no_workflow_or_group
          type: Link
          skip:
            _and:
              - _ne:
                  - _url_query: workflow_id
                  - null
              - _ne:
                  - _url_query: group_id
                  - null
          params:
            back: true
        # Single CallApi to get-action-group-overview.
        - id: call_get_overview
          type: CallAPI
          params:
            endpointId:
              _module.endpointId: get-action-group-overview
            payload:
              workflow_id:
                _url_query: workflow_id
              group_id:
                _url_query: group_id
        # Stash the response in _state.overview, plus put the actions array
        # under its own top-level state key so the List block can read from it.
        - id: set_overview_state
          type: SetState
          params:
            overview:
              _actions: call_get_overview.response.response
            actions_list:
              _actions: call_get_overview.response.response.actions
        # Null-redirect guard — Api returns workflow: null when no actions
        # pass the access filter, the workflow doc is missing, or the group
        # id is unknown.
        # - id: redirect_no_workflow_doc
        #   type: Link
        #   skip:
        #     _ne:
        #       - _state: overview.workflow
        #       - null
        #   params:
        #     back: true
    blocks:
      - id: group_overview_header
        type: Box
        layout:
          gap: 8
        blocks:
          - id: group_overview_titles
            type: Box
            layout:
              gap: 4
            blocks:
              - id: group_overview_workflow_title
                type: Paragraph
                properties:
                  content:
                    _js:
                      args:
                        workflow:
                          _state: overview.workflow
                        workflowsConfig:
                          _module.var: workflows_config
                      fn: |
                        const { workflow, workflowsConfig } = args;
                        if (!workflow) return "";
                        const wfConfig = (workflowsConfig || []).find(
                          (w) => w.type === workflow.workflow_type
                        );
                        return (
                          (wfConfig && wfConfig.title) ||
                          workflow.workflow_type ||
                          ""
                        );
              - id: group_overview_group_title
                type: Title
                properties:
                  level: 3
                  content:
                    _js:
                      args:
                        workflow:
                          _state: overview.workflow
                        group:
                          _state: overview.group
                        workflowsConfig:
                          _module.var: workflows_config
                      fn: |
                        const { workflow, group, workflowsConfig } = args;
                        if (!group) return "";
                        const wfConfig = (workflowsConfig || []).find(
                          (w) => w && workflow && w.type === workflow.workflow_type
                        ) || {};
                        const groupsDef = wfConfig.action_groups || [];
                        const def = groupsDef.find((d) => d.id === group.id);
                        return (def && def.title) || group.id;
      - id: entity_back_button
        type: Button
        properties:
          title:
            _string.concat:
              - _get:
                  from:
                    _module.var: entities
                  key:
                    _string.concat:
                      - _state: overview.workflow.entity_collection
                      - .title
                  default: Entity
              - ' '
              - _state: overview.workflow.entity_id
          type: link
          icon: AiOutlineArrowLeft
        events:
          onClick:
            - id: link_to_entity
              type: Link
              params:
                pageId:
                  _get:
                    from:
                      _module.var: entities
                    key:
                      _string.concat:
                        - _state: overview.workflow.entity_collection
                        - .page_id
                urlQuery:
                  _object.fromEntries:
                    - - - _get:
                            from:
                              _module.var: entities
                            key:
                              _string.concat:
                                - _state: overview.workflow.entity_collection
                                - .id_query_key
                        - _state: overview.workflow.entity_id
      - id: group_progress
        type: Progress
        properties:
          percent:
            _js:
              args:
                summary:
                  _state: overview.group.summary
              fn: |
                const { summary } = args;
                if (!summary) return 0;
                const total = summary.total || 0;
                if (total === 0) return 100;
                const filled = (summary.done || 0) + (summary.not_required || 0);
                return Math.round((filled / total) * 100);
          format:
            _nunjucks:
              template: |
                {%- if summary.total > 0 -%}
                {{ (summary.done or 0) + (summary.not_required or 0) }} of {{ summary.total }} done
                {%- else -%}
                no actions
                {%- endif -%}
              on:
                summary:
                  _state: overview.group.summary
      - id: group_status_badge
        type: Tag
        properties:
          color:
            _if:
              test:
                _eq:
                  - _state: overview.group.status
                  - done
              then: green
              else:
                _if:
                  test:
                    _eq:
                      - _state: overview.group.status
                      - in-progress
                  then: blue
                  else: default
          content:
            _if:
              test:
                _eq:
                  - _state: overview.group.status
                  - done
              then: Done
              else:
                _if:
                  test:
                    _eq:
                      - _state: overview.group.status
                      - in-progress
                  then: In progress
                  else: Blocked
      - id: actions_list
        type: List
        blocks:
          - id: actions_list.$.card
            type: Card
            layout:
              gap: 16
            blocks:
              - id: actions_list.$.header
                type: Box
                layout:
                  gap: 8
                  align: middle
                  justify: space-between
                blocks:
                  - id: actions_list.$.title_row
                    type: Box
                    layout:
                      gap: 8
                      align: middle
                    blocks:
                      - id: actions_list.$.status_badge
                        type: Tag
                        properties:
                          color:
                            _js:
                              args:
                                statuses:
                                  _ref: enums/action_statuses.yaml
                                stage:
                                  _state: actions_list.$.status.0.stage
                              fn: |
                                const { statuses, stage } = args;
                                return statuses?.[stage]?.color;
                          content:
                            _js:
                              args:
                                statuses:
                                  _ref: enums/action_statuses.yaml
                                stage:
                                  _state: actions_list.$.status.0.stage
                              fn: |
                                const { statuses, stage } = args;
                                return statuses?.[stage]?.title;
                      - id: actions_list.$.message
                        type: Paragraph
                        properties:
                          content:
                            _nunjucks:
                              template:
                                _get:
                                  from:
                                    _state: actions_list.$.status_map
                                  key:
                                    _string.concat:
                                      - _state: actions_list.$.status.0.stage
                                      - .
                                      - _module.var: app_name
                                      - .message
                                  default: ''
                              on:
                                action:
                                  _state: actions_list.$
                                workflow:
                                  _state: overview.workflow
                  - id: actions_list.$.link_button
                    type: Button
                    visible:
                      _ne:
                        - _get:
                            from:
                              _state: actions_list.$.status_map
                            key:
                              _string.concat:
                                - _state: actions_list.$.status.0.stage
                                - .
                                - _module.var: app_name
                                - .link
                            default: null
                        - null
                    properties:
                      title: Open
                      type: link
                    events:
                      onClick:
                        - id: actions_list.$.link
                          type: Link
                          params:
                            _get:
                              from:
                                _state: actions_list.$.status_map
                              key:
                                _string.concat:
                                  - _state: actions_list.$.status.0.stage
                                  - .
                                  - _module.var: app_name
                                  - .link
              - id: actions_list.$.body_empty
                type: Html
                visible:
                  _eq:
                    - _get:
                        from:
                          _state: overview.workflow.form_data
                        key:
                          _if:
                            test:
                              _ne:
                                - _state: actions_list.$.key
                                - null
                            then:
                              _string.concat:
                                - _state: actions_list.$.type
                                - .
                                - _state: actions_list.$.key
                            else:
                              _state: actions_list.$.type
                        default: null
                    - null
                properties:
                  html: "<p style='color:#999;font-style:italic;font-size:12px'>No data submitted yet.</p>"
              - id: actions_list.$.body_dataview
                type: DataDescriptions
                visible:
                  _ne:
                    - _get:
                        from:
                          _state: overview.workflow.form_data
                        key:
                          _if:
                            test:
                              _ne:
                                - _state: actions_list.$.key
                                - null
                            then:
                              _string.concat:
                                - _state: actions_list.$.type
                                - .
                                - _state: actions_list.$.key
                            else:
                              _state: actions_list.$.type
                        default: null
                    - null
                properties:
                  formConfig:
                    _get:
                      from:
                        _ref: components/action_form_configs.yaml
                      key:
                        _state: actions_list.$.type
                      default: { form: [], form_review: [] }
                  data:
                    form:
                      _get:
                        from:
                          _state: overview.workflow.form_data
                        key:
                          _if:
                            test:
                              _ne:
                                - _state: actions_list.$.key
                                - null
                            then:
                              _string.concat:
                                - _state: actions_list.$.type
                                - .
                                - _state: actions_list.$.key
                            else:
                              _state: actions_list.$.type
                        default: null
                    workflow:
                      _state: overview.workflow
