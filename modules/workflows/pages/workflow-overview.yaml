# Workflow overview page (part 17).
#
# Addressed by ?workflow_id=<id>. Single CallApi to get-workflow-overview
# (part 19), then renders the workflow header + action cards. The entity
# back-link uses the new vars.entities module var (declared by part 20)
# to deep-link to the host-app entity page without a runtime entity fetch.
#
# Path-stub dependencies (won't build until other parts ship):
#   - ../components/workflow-header.yaml         (part 18)
#   - vars.entities, vars.app_name               (part 20)
_ref:
  module: layout
  component: page
  vars:
    id: workflow-overview
    hide_title: true
    content_width: 1100
    events:
      onMount:
        # workflow_id presence guard.
        - id: redirect_no_workflow
          type: Link
          skip:
            _ne:
              - _url_query: workflow_id
              - null
          params:
            back: true
        # Single CallApi to get-workflow-overview.
        - id: call_get_overview
          type: CallAPI
          params:
            endpointId:
              _module.endpointId: get-workflow-overview
            payload:
              workflow_id:
                _url_query: workflow_id
        # Stash the response in _state.overview, plus put the actions array
        # under its own top-level state key so the List block can read from it.
        - id: set_overview_state
          type: SetState
          params:
            workflow:
              _actions: call_get_overview.response.response.workflow
            actions_list:
              _actions: call_get_overview.response.response.actions
        # Null-redirect guard — Api returns workflow: null when no actions
        # pass the access filter (or the workflow doc is missing).
        # - id: redirect_no_workflow_doc
        #   type: Link
        #   skip:
        #     _ne:
        #       - _state: workflow
        #       - null
        #   params:
        #     back: true
    blocks:
      - id: workflow_header
        type: Box
        layout:
          gap: 8
          align: middle
        blocks:
          - id: workflow_title
            type: Html
            layout:
              flex: 1 1 auto
            properties:
              html:
                _nunjucks:
                  template: |
                    <h1 class="text-3xl font-semibold" style="margin: 0;">{{ title | default('Workflow') }}</h1>
                  on:
                    _get:
                      from:
                        _ref: components/workflows_config.yaml
                      key:
                        _state: workflow.workflow_type
          - id: workflow_lifecycle_badge
            type: Tag
            layout:
              flex: 0 0 auto
            properties:
              color:
                _get:
                  from:
                    _ref: components/workflow_lifecycle_stages.yaml
                  key:
                    _string.concat:
                      - _state: workflow.status.0.stage
                      - .titleColor
              title:
                _get:
                  from:
                    _ref: components/workflow_lifecycle_stages.yaml
                  key:
                    _string.concat:
                      - _state: workflow.status.0.stage
                      - .title
          - id: workflow_progress
            type: Progress
            properties:
              type: line
              percent:
                _js:
                  args:
                    summary:
                      _state: workflow.summary
                  fn: |
                    const { summary } = args;
                    if (!summary) return 0;
                    const total = summary.total || 0;
                    if (total === 0) return 100;
                    const filled = (summary.done || 0) + (summary.not_required || 0);
                    return Math.round((filled / total) * 100);
          - id: workflow_summary
            type: Paragraph
            properties:
              type: secondary
              content:
                _string.concat:
                  - ''
                  - _sum:
                      - _get:
                          from:
                            _state: workflow
                          key: summary.done
                          default: 0
                      - _get:
                          from:
                            _state: workflow
                          key: summary.not_required
                          default: 0
                  - ' of '
                  - _get:
                      from:
                        _state: workflow
                      key: summary.total
                      default: 0
                  - ' done'
      - id: entity_back_button
        type: Button
        properties:
          title:
            _get:
              from:
                _module.var: entities
              key:
                _string.concat:
                  - _state: workflow.entity_collection
                  - .title
              default: Entity
          type: link
          icon: AiOutlineArrowLeft
        events:
          onClick:
            - id: link_to_entity
              type: Link
              params:
                pageId:
                  _get:
                    from:
                      _module.var: entities
                    key:
                      _string.concat:
                        - _state: workflow.entity_collection
                        - .page_id
                urlQuery:
                  _object.fromEntries:
                    - - _get:
                          from:
                            _module.var: entities
                          key:
                            _string.concat:
                              - _state: workflow.entity_collection
                              - .id_query_key
                      - _state: workflow.entity_id
      - id: actions_list
        type: List
        blocks:
          - id: actions_list.$.card
            type: Card
            layout:
              gap: 16
            blocks:
              - id: actions_list.$.header
                type: Box
                layout:
                  gap: 8
                  align: middle
                  justify: space-between
                blocks:
                  - id: actions_list.$.title_row
                    type: Box
                    layout:
                      gap: 8
                      align: middle
                    blocks:
                      - id: actions_list.$.status_badge
                        type: Tag
                        layout:
                          flex: 0 0 auto
                        properties:
                          color:
                            _get:
                              from:
                                _ref: components/action_statuses.yaml
                              key:
                                _string.concat:
                                  - _state: actions_list.$.status
                                  - .titleColor
                          title:
                            _get:
                              from:
                                _ref: components/action_statuses.yaml
                              key:
                                _string.concat:
                                  - _state: actions_list.$.status
                                  - .title
                      - id: actions_list.$.message
                        layout:
                          flex: 1 1 auto
                        type: Paragraph
                        properties:
                          content:
                            _state: actions_list.$.message
                      - id: actions_list.$.link_button
                        type: Button
                        layout:
                          flex: 0 0 auto
                        visible:
                          _ne:
                            - _state: actions_list.$.link
                            - null
                        properties:
                          title:
                            _if_none:
                              - _state: actions_list.$.link.title
                              - Open
                          type: link
                        events:
                          onClick:
                            - id: actions_list.$.link
                              type: Link
                              params:
                                _state: actions_list.$.link
              - id: actions_list.$.body_empty
                type: Html
                visible:
                  _eq:
                    - _get:
                        from:
                          _state: workflow.form_data
                        key:
                          _if:
                            test:
                              _ne:
                                - _state: actions_list.$.key
                                - null
                            then:
                              _string.concat:
                                - _state: actions_list.$.type
                                - .
                                - _state: actions_list.$.key
                            else:
                              _state: actions_list.$.type
                        default: null
                    - null
                properties:
                  html: "<p style='color:#999;font-style:italic;font-size:12px'>No data submitted yet.</p>"
              - id: actions_list.$.body_dataview
                type: DataDescriptions
                visible:
                  _ne:
                    - _get:
                        from:
                          _state: workflow.form_data
                        key:
                          _if:
                            test:
                              _ne:
                                - _state: actions_list.$.key
                                - null
                            then:
                              _string.concat:
                                - _state: actions_list.$.type
                                - .
                                - _state: actions_list.$.key
                            else:
                              _state: actions_list.$.type
                        default: null
                    - null
                properties:
                  formConfig:
                    _get:
                      from:
                        _ref: components/action_form_configs.yaml
                      key:
                        _state: actions_list.$.type
                      default: { form: [], form_review: [] }
                  data:
                    form:
                      _get:
                        from:
                          _state: workflow.form_data
                        key:
                          _if:
                            test:
                              _ne:
                                - _state: actions_list.$.key
                                - null
                            then:
                              _string.concat:
                                - _state: actions_list.$.type
                                - .
                                - _state: actions_list.$.key
                            else:
                              _state: actions_list.$.type
                        default: null
                    workflow:
                      _state: workflow
