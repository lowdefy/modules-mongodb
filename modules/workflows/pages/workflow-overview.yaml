# Workflow overview page (part 17).
#
# Addressed by ?workflow_id=<id>. Single CallApi to get-workflow-overview
# (part 19), then renders the workflow header + action cards. The entity
# back-link uses the new vars.entities module var (declared by part 20)
# to deep-link to the host-app entity page without a runtime entity fetch.
#
# Path-stub dependencies (won't build until other parts ship):
#   - ../components/workflow-header.yaml         (part 18)
#   - vars.entities, vars.app_name               (part 20)
_ref:
  module: layout
  component: page
  vars:
    id: workflow-overview
    hide_title: true
    content_width: 1100
    events:
      onMount:
        # workflow_id presence guard.
        - id: redirect_no_workflow
          type: Link
          skip:
            _ne:
              - _url_query: workflow_id
              - null
          params:
            back: true
        # Single CallApi to get-workflow-overview.
        - id: call_get_overview
          type: CallApi
          params:
            endpointId:
              _module.endpointId:
                id: get-workflow-overview
                module: workflows
            payload:
              workflow_id:
                _url_query: workflow_id
        # Stash the response in _state.overview.
        - id: set_overview_state
          type: SetState
          params:
            overview:
              _actions: call_get_overview.response
        # Null-redirect guard — Api returns workflow: null when no actions
        # pass the access filter (or the workflow doc is missing).
        - id: redirect_no_workflow_doc
          type: Link
          skip:
            _ne:
              - _state: overview.workflow
              - null
          params:
            back: true
    blocks:
      - _ref:
          path: ../components/workflow-header.yaml
          vars:
            workflow:
              _state: overview.workflow
      - id: entity_back_button
        type: Button
        properties:
          title:
            _string.concat:
              - _get:
                  from:
                    _module.var: entities
                  key:
                    _string.concat:
                      - _state: overview.workflow.entity_collection
                      - .title
                  default: Entity
              - " "
              - _state: overview.workflow.entity_id
          type: link
          icon: AiOutlineArrowLeft
        events:
          onClick:
            - id: link_to_entity
              type: Link
              params:
                pageId:
                  _get:
                    from:
                      _module.var: entities
                    key:
                      _string.concat:
                        - _state: overview.workflow.entity_collection
                        - .page_id
                urlQuery:
                  _object.fromEntries:
                    - - - _get:
                            from:
                              _module.var: entities
                            key:
                              _string.concat:
                                - _state: overview.workflow.entity_collection
                                - .id_query_key
                        - _state: overview.workflow.entity_id
      - id: actions_list
        type: List
        properties:
          data:
            _state: overview.actions
        blocks:
          - _ref:
              module: layout
              component: card
              vars:
                hide_title: true
                blocks:
                  - id: actions_list.$.header
                    type: Box
                    layout:
                      gap: 8
                      contentAlign: middle
                      justify: space-between
                    blocks:
                      - id: actions_list.$.title_row
                        type: Box
                        layout:
                          gap: 8
                          contentAlign: middle
                        blocks:
                          - id: actions_list.$.status_badge
                            type: Tag
                            properties:
                              color:
                                _global:
                                  _string.concat:
                                    - action_statuses.
                                    - _array_indices: status.0.stage
                                    - .color
                              content:
                                _global:
                                  _string.concat:
                                    - action_statuses.
                                    - _array_indices: status.0.stage
                                    - .title
                          - id: actions_list.$.message
                            type: Paragraph
                            properties:
                              content:
                                _nunjucks:
                                  template:
                                    _get:
                                      from:
                                        _array_indices: status_map
                                      key:
                                        _string.concat:
                                          - _array_indices: status.0.stage
                                          - .
                                          - _module.var: app_name
                                          - .message
                                      default: ""
                                  on:
                                    action:
                                      _array_indices: true
                                    workflow:
                                      _state: overview.workflow
                      - id: actions_list.$.link_button
                        type: Button
                        visible:
                          _ne:
                            - _get:
                                from:
                                  _array_indices: status_map
                                key:
                                  _string.concat:
                                    - _array_indices: status.0.stage
                                    - .
                                    - _module.var: app_name
                                    - .link
                                default: null
                            - null
                        properties:
                          title: Open
                          type: link
                        events:
                          onClick:
                            - id: actions_list.$.link
                              type: Link
                              params:
                                _get:
                                  from:
                                    _array_indices: status_map
                                  key:
                                    _string.concat:
                                      - _array_indices: status.0.stage
                                      - .
                                      - _module.var: app_name
                                      - .link
                  - id: actions_list.$.body_empty
                    type: Html
                    visible:
                      _eq:
                        - _get:
                            from:
                              _state: overview.workflow.form_data
                            key:
                              _if:
                                test:
                                  _ne:
                                    - _array_indices: key
                                    - null
                                then:
                                  _string.concat:
                                    - _array_indices: type
                                    - .
                                    - _array_indices: key
                                else:
                                  _array_indices: type
                            default: null
                        - null
                    properties:
                      html: "<p style='color:#999;font-style:italic;font-size:12px'>No data submitted yet.</p>"
                  - id: actions_list.$.body_dataview
                    type: DataView
                    visible:
                      _ne:
                        - _get:
                            from:
                              _state: overview.workflow.form_data
                            key:
                              _if:
                                test:
                                  _ne:
                                    - _array_indices: key
                                    - null
                                then:
                                  _string.concat:
                                    - _array_indices: type
                                    - .
                                    - _array_indices: key
                                else:
                                  _array_indices: type
                            default: null
                        - null
                    properties:
                      formConfig:
                        _array.concat:
                          - _global:
                              _string.concat:
                                - action_form_configs.
                                - _array_indices: type
                                - .form
                          - _global:
                              _string.concat:
                                - action_form_configs.
                                - _array_indices: type
                                - .form_review
                      data:
                        form:
                          _get:
                            from:
                              _state: overview.workflow.form_data
                            key:
                              _if:
                                test:
                                  _ne:
                                    - _array_indices: key
                                    - null
                                then:
                                  _string.concat:
                                    - _array_indices: type
                                    - .
                                    - _array_indices: key
                                else:
                                  _array_indices: type
                            default: null
                        workflow:
                          _state: overview.workflow
