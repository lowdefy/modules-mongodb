# Shared check-action view page (part 40 — thin container).
#
# Addressed by ?action_id=<id>. The page is a thin container: it guards the
# URL, fetches the action, populates `current_action` state, and `_ref`s the
# shared check-action surface (components/check-action-surface.yaml) which
# carries the entire body. The surface reads exclusively from
# `_state.current_action.*`; this page tells it the mode by seeding the literal
# `current_action.mode: view` in onMount.
#
# The view page is the canonical, always-available link target for every stage
# (including `done` / `not-required` / `error`) — so it has NO stale-URL guard.
# Error recovery lands here: at stage `error` for an `error`-verb user the
# surface renders the comment field and the `resolve_error` button (FSM
# `error → resolve_error → in-review`), Part 40's resolution of ui Open
# Question 4 (design D4) — there is no separate `check-error` page.
#
# Below the surface, the page-level Activity card composes the events module's
# events-only `events-timeline` filtered to this action (design D6) — the
# comment renders inline under the engine title via the timeline's `description`
# channel, alongside the full submit/status-change stream.
_ref:
  module: layout
  component: page
  vars:
    id: workflow-action-view
    hide_title: true
    content_width: 750
    requests:
      - _ref: requests/get_workflow_action.yaml
    events:
      onMount:
        # Step 1: action_id presence guard.
        - id: redirect_no_action
          type: Link
          skip:
            _ne:
              - _url_query: action_id
              - null
          params:
            back: true
        # Step 2: load the action.
        - id: get_action
          type: Request
          params: get_workflow_action
        # Step 3 (stale-URL guard) — intentionally omitted on view; the view
        # page accepts every stage.
        # Step 4: spread the GetWorkflowAction response into current_action.
        - id: set_current_action
          type: SetState
          params:
            current_action:
              _request: get_workflow_action
        # Step 5: seed the working inputs and the mode literal. The fields seed
        # backs the Part 24 Update path for an edit-verb user opening this page;
        # the comment seed backs the resolve_error recovery note.
        - id: seed_working_state
          type: SetState
          params:
            current_action.fields:
              assignees:
                _request: get_workflow_action.assignees
              due_date:
                _request: get_workflow_action.due_date
              description:
                _request: get_workflow_action.description
            current_action.comment: null
            current_action.change_request_comment: null
            # Stable stage scalar for the header badge (see check-action-surface.yaml).
            current_action.stage:
              _request: get_workflow_action.status.0.stage
            current_action.mode: view
    blocks:
      - _ref:
          path: components/check-action-surface.yaml
      - id: activity_card
        type: Card
        properties:
          title: Activity
        blocks:
          - _ref:
              module: events
              component: events-timeline
              vars:
                reference_field: action_ids
                reference_value:
                  _request: get_workflow_action._id
