# Shared check-action edit page (part 40 — thin container).
#
# Addressed by ?action_id=<id>. The page is a thin container: it guards the
# URL, fetches the action, populates `current_action` state, and `_ref`s the
# shared check-action surface (components/check-action-surface.yaml) which
# carries the entire body. The surface reads exclusively from
# `_state.current_action.*`; this page tells it the mode by seeding the literal
# `current_action.mode: edit` in onMount.
#
# Signal model (Part 38 FSM): the surface's buttons fire `signal`
# (submit / progress / not_required) at the `{workflow_type}-submit` endpoint —
# there is no client-side status selector, `interaction`, or `current_status`.
# Visibility of each signal button is driven by the server-resolved
# `current_action.buttons.{signal}` booleans in the response.
_ref:
  module: layout
  component: page
  vars:
    id: workflow-action-edit
    hide_title: true
    content_width: 750
    requests:
      - _ref: requests/get_workflow_action.yaml
    events:
      onMount:
        # Step 1: action_id presence guard.
        - id: redirect_no_action
          type: Link
          skip:
            _ne:
              - _url_query: action_id
              - null
          params:
            back: true
        # Step 2: load the action.
        - id: get_action
          type: Request
          params: get_workflow_action
        # Step 3: stale-URL guard. Allowlist mirrors part 16's edit template.
        - id: redirect_stale_status
          type: Link
          skip:
            _or:
              - _array.includes:
                  - - action-required
                    - in-progress
                    - changes-required
                  - _request: get_workflow_action.status.0.stage
              - _eq:
                  - _input: skip_status_redirect
                  - true
          params:
            pageId:
              _module.pageId: workflow-action-view
            urlQuery:
              _url_query: true
        # Step 4: spread the GetWorkflowAction response into current_action.
        - id: set_current_action
          type: SetState
          params:
            current_action:
              _request: get_workflow_action
        # Step 5: seed the working inputs and the mode literal.
        - id: seed_working_state
          type: SetState
          params:
            current_action.fields:
              assignees:
                _request: get_workflow_action.assignees
              due_date:
                _request: get_workflow_action.due_date
              description:
                _request: get_workflow_action.description
            current_action.comment: null
            current_action.change_request_comment: null
            # Stable stage scalar for the header badge (see check-action-surface.yaml).
            current_action.stage:
              _request: get_workflow_action.status.0.stage
            current_action.mode: edit
    blocks:
      - _ref:
          path: components/check-action-surface.yaml
