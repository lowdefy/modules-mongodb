name: Data Upload
version: 0.1.0
description: Generic data upload staging — upload spreadsheets, review changes, confirm/discard

dependencies:
  - id: layout
    description: Page layout wrapper
  - id: events
    description: Audit event logging and change stamp

vars:
  tool:
    required: true
    description: Tool config object (id, label, target_collection, id_column, columns, api, s3_prefix, view_page)
    properties:
      id:
        required: true
        description: Unique tool identifier used in staging records and API calls
      label:
        required: true
        description: Display name shown in page title, breadcrumbs, and menu
      target_collection:
        required: true
        description: MongoDB collection name for the tool's target data (e.g., lots)
      id_column:
        required: true
        description: Column name used as the unique row identifier in uploads
      columns:
        required: true
        description: "List of column definitions for the upload template [{field, headerName}]"
      api:
        required: true
        description: API endpoint config for processing staged rows
        properties:
          process_staged:
            required: true
            description: Endpoint ID for the process-staged API call
      s3_prefix:
        required: true
        description: S3 key prefix for uploaded files
      view_page:
        default: null
        description: Page ID for linking staged rows to their detail view (null disables links)

exports:
  pages:
    - id: data-upload
      description: Data upload page with staging tabs
  connections:
    - id: data_upload_stage
      description: MongoDB connection for data-upload-stage collection
    - id: target_collection
      description: Read-only MongoDB connection to the tool's target collection (e.g., lots)
    - id: sync_bucket
      description: S3 connection for sync bucket (file uploads)
    - id: imports
      description: MongoDB connection for imports collection
  api:
    - id: set-status-discard
      description: Bulk discard selected staged rows
  menus:
    - id: default
      description: Data upload navigation link

connections:
  - _ref: connections/data_upload_stage.yaml
  - _ref: connections/target_collection.yaml
  - _ref: connections/sync_bucket.yaml
  - _ref: connections/imports.yaml

api:
  - _ref: api/set-status-discard.yaml

pages:
  - _ref: pages/data-upload.yaml

menus:
  - _ref: menus.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI
  - name: SYNC_S3_ACCESS_KEY_ID
    description: S3 access key for sync bucket
  - name: SYNC_S3_SECRET_ACCESS_KEY
    description: S3 secret for sync bucket
  - name: SYNC_S3_BUCKET
    description: S3 bucket name for sync

plugins:
  - name: "@lowdefy/community-plugin-xlsx"
    version: "^1"
  - name: "@lowdefy/community-plugin-mongodb"
    version: "^2"
