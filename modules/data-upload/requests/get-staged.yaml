id: get_staged
type: MongoDBAggregation
connectionId:
  _module.connectionId: data_upload_stage
payload:
  filter:
    _state: filter
  pagination:
    _state: pagination
properties:
  pipeline:
    - $match:
        tool:
          _module.var: tool.id
        'status.0.stage':
          _payload: filter.status
    - $match:
        _if:
          test:
            _eq:
              - _payload: filter.method
              - changes
          then:
            method:
              $ne: 'none'
          else:
            _if:
              test:
                _eq:
                  - _payload: filter.method
                  - stale
              then:
                stale: true
              else:
                _if:
                  test:
                    _ne:
                      - _payload: filter.method
                      - null
                  then:
                    method:
                      _payload: filter.method
                  else: {}
    - $lookup:
        from: imports
        localField: import_id
        foreignField: _id
        as: import
        pipeline:
          - $project:
              file_key: 1
    - $addFields:
        source:
          $let:
            vars:
              key:
                $arrayElemAt:
                  - '$import.file_key'
                  - 0
            in:
              $concat:
                - $toString: '$row'
                - ':'
                - $arrayElemAt:
                    - $split: ['$$key', '/']
                    - -1
    - $project:
        import: 0
    - $sort:
        created.timestamp: -1
    - $facet:
        results:
          - $skip:
              _if_none:
                - _payload: pagination.skip
                - 0
          - $limit:
              _if_none:
                - _payload: pagination.pageSize
                - 1000
        total:
          - $count: count
