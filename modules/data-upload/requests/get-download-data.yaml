id: get_download_data
type: MongoDBAggregation
connectionId:
  _module.connectionId: target_collection
properties:
  pipeline:
    - $match:
        removed: null
    - $addFields:
        _build.object.fromEntries:
          - - _module.var: tool.id_column
            - '$_id'
    - $project:
        _build.object.assign:
          - _id: 0
          - _build.object.fromEntries:
              _build.array.map:
                on:
                  _module.var: tool.columns
                callback:
                  _build.function:
                    - __build.args: 0.field
                    - 1
