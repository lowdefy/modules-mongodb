id: upload_policy
type: AwsS3PresignedPostPolicy
connectionId:
  _module.connectionId: sync_bucket
payload:
  file_name:
    _state: upload_dragger.file.name
  file_type:
    _state: upload_dragger.file.type
  url:
    _location: href
properties:
  key:
    _string.concat:
      - _module.var: tool.s3_prefix
      - '/'
      - _dayjs.format:
          on:
            _date: now
          params:
            format: YYYYMMDD_HHmmssSSS
      - '/'
      - _uuid: true
      - '/'
      - _payload: file_name
  fields:
    x-amz-meta-uploaded-by-id:
      _if_none:
        - _user: id
        - 'unknown'
    x-amz-meta-uploaded-by-name:
      _if_none:
        - _user: profile.name
        - 'unknown'
    x-amz-meta-uploaded-by-url:
      _if_none:
        - _payload: url
        - 'unknown'
  conditions:
    - - starts-with
      - $x-amz-meta-uploaded-by-id
      - ''
    - - starts-with
      - $x-amz-meta-uploaded-by-name
      - ''
    - - starts-with
      - $x-amz-meta-uploaded-by-url
      - ''
