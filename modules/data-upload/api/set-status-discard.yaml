id: set-status-discard
type: Api
routine:
  - id: discard-rows
    type: MongoDBUpdateMany
    connectionId:
      _module.connectionId: data_upload_stage
    properties:
      filter:
        _id:
          $in:
            _payload: ids
      update:
        $push:
          status:
            $each:
              - stage: discard
                created:
                  _ref:
                    module: events
                    component: change_stamp
            $position: 0

  - :return:
      success: true
