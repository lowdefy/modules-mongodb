id: pagination
type: Pagination
layout:
  flex: 0 1 auto
properties:
  size: small
  showTotal: true
  pageSizeOptions:
    - 100
    - 500
    - 1000
  total:
    _if_none:
      - _request: get_staged.0.total.0.count
      - 0
  disabled:
    _not:
      _request: get_staged
events:
  onChange:
    - id: fetch_data
      type: Request
      params: get_staged
  onSizeChange:
    - id: fetch_data
      type: Request
      params: get_staged
