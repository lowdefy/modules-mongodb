id: action_bar
type: Box
visible:
  _eq:
    - _state: filter.status
    - 'new'
layout:
  gap: 16
  justify: start
  flex: 1 0 auto
blocks:
  - id: confirm_button
    type: Button
    layout:
      flex: 0 1 auto
    properties:
      title:
        _string.concat:
          - 'Confirm ('
          - _array.length:
              _if_none:
                - _state: selected_rows
                - []
          - ' of '
          - _if_none:
              - _request: get_staged.0.total.0.count
              - 0
          - ')'
      type: primary
      icon: AiOutlineCheck
    events:
      onClick:
        - id: process
          type: CallAPI
          params:
            endpointId:
              _module.var: tool.api.process_staged
            payload:
              tool:
                _module.var: tool.id
              ids:
                _array.map:
                  on:
                    _state: selected_rows
                  callback:
                    _function:
                      __args: 0._id
        - id: refresh
          type: Request
          params: get_staged
  - id: discard_button
    type: Button
    layout:
      flex: 0 1 auto
    properties:
      title: Discard Selected
      type: default
      danger: true
      icon: AiOutlineDelete
      disabled:
        _not:
          _gt:
            - _array.length:
                _if_none:
                  - _state: selected_rows
                  - []
            - 0
    events:
      onClick:
        - id: discard
          type: CallAPI
          params:
            endpointId:
              _module.endpointId: set-status-discard
            payload:
              ids:
                _array.map:
                  on:
                    _state: selected_rows
                  callback:
                    _function:
                      __args: 0._id
        - id: refresh
          type: Request
          params: get_staged
