id: download_current
type: Button
properties:
  title: Download Current Data
  icon: AiOutlineDownload
events:
  onClick:
    - id: fetch_data
      type: Request
      params: get_download_data
    - id: download
      type: DownloadXlsx
      params:
        fileName:
          _string.concat:
            - 'hydra_'
            - _string.replace:
                on:
                  _module.var: tool.id
                regex: '-'
                newSubstr: '_'
                flags: g
            - '_'
            - _dayjs.format:
                on:
                  _date: now
                format: YYYYMMDD[T]HHmmss
            - '.xlsx'
        dateFormat: 'YYYY/MM/DD'
        data:
          _request: get_download_data
        schema:
          _array.map:
            on:
              _module.var: tool.columns
            callback:
              _function:
                column:
                  __args: 0.field
                value:
                  __args: 0.field
                type:
                  __args: 0.type
                width: 20
