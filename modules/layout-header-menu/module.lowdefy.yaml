name: Layout Header Menu
description: Page layout with header menu, title bar, and content area

vars:
  logo:
    type: object
    description: "Logo config: { primary, icon, style }"
  menu:
    type: object
    description: Menu config passed to PageHeaderMenu. Defaults to _menu default.
  header:
    type: object
    default: {}
    description: "PageHeaderMenu header properties: { theme, contentStyle }"
  header_extra:
    type: object
    description: "Header customization: { blocks, compact, mobile_extra, requests }"
  title_block:
    type: object
    description: Custom title block override (replaces default title bar)
  footer:
    type: array
    default: []
    description: Footer blocks appended after page content
  card:
    type: object
    description: Custom card component override (replaces default Card layout)

exports:
  components:
    - id: page
      description: PageHeaderMenu layout wrapper with title bar, header slots, and content area
    - id: card
      description: Standard content card layout with optional back button and footer
    - id: floating-actions
      description: Floating action button bar affixed to bottom of viewport
    - id: auth-page
      description: Centered auth/login page layout with logo and card

components:
  - id: page
    component:
      _ref: ./components/page.yaml
  - id: card
    component:
      _ref: ../shared/layout/card.yaml
  - id: floating-actions
    component:
      _ref: ../shared/layout/floating-actions.yaml
  - id: auth-page
    component:
      _ref: ../shared/layout/auth-page.yaml
