id:
  _var: id
type: PageHeaderMenu
properties:
  title:
    _var: title
  logo:
    src:
      _module.var: logo.primary
    srcMobile:
      _module.var: logo.icon
    style:
      _module.var: logo.style
  header:
    _module.var:
      key: header
      default: {}
  menu:
    _module.var:
      key: menu
      default:
        _menu: default
style:
  minHeight: 100vh
requests:
  _build.array.concat:
    - _module.var:
        key: header_extra.requests
        default: []
    - _var:
        key: requests
        default: []
events:
  onInit:
    _var:
      key: events.onInit
      default: []
  onInitAsync:
    _var:
      key: events.onInitAsync
      default: []
  onMount:
    _var:
      key: events.onMount
      default: []
  onMountAsync:
    _var:
      key: events.onMountAsync
      default: []
slots:
  header:
    blocks:
      _module.var:
        key: header_extra.blocks
        default: []
  mobileExtra:
    blocks:
      _module.var:
        key: header_extra.compact
        default: []
  mobileDrawerContent:
    blocks:
      _module.var:
        key: header_extra.mobile_extra
        default: []
  footer:
    blocks:
      _module.var:
        key: footer
        default: []
blocks:
  _build.array.concat:
    # Title block: per-page override > module-level override > default
    - _build.if:
        test:
          _build.not:
            _var:
              key: hide_title
              default: false
        then:
          _build.switch:
            branches:
              - if:
                  _build.ne:
                    - _var:
                        key: title_block
                        default: null
                    - null
                then:
                  _var: title_block
              - if:
                  _build.ne:
                    - _module.var:
                        key: title_block
                        default: null
                    - null
                then:
                  _module.var: title_block
            default:
              - _ref:
                  path: ../../shared/layout/title-block.yaml
                  vars:
                    title:
                      _var: title
                    breadcrumbs:
                      _var:
                        key: breadcrumbs
                        default: []
                    doc:
                      _var:
                        key: doc
                        default: null
                    page_actions:
                      _var:
                        key: page_actions
                        default: []
        else: []
    # Consumer content
    - _var:
        key: blocks
        default: []
