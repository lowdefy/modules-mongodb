name: Contacts
description: Contact management — list, detail, edit, create, selector

dependencies:
  - id: layout
    description: Page layout wrapper
  - id: events
    description: Audit event logging and change stamp
  - id: companies
    description: Company selector and detail page links
  - id: files
    description: File attachments (optional sidebar tile)

vars:
  label:
    default: Contact
    description: Singular display label
  label_plural:
    default: Contacts
    description: Plural display label
  app_name:
    required: true
    description: App identifier for is_user guard and per-app access flags
  event_display:
    default:
      _ref: defaults/event_display.yaml
    description: "Per-app event display templates"
  # TODO: add a `description:` to every nested property below (fields.*, components.*, request_stages.*).
  # User-facing copy — describe what the var is for from the consumer's perspective, no implementation details.
  fields:
    type: object
    description: "Field block arrays: profile, global_attributes. Same blocks used for edit forms and SmartDescriptions view. show_honorific toggles the honorific/title selector (Mr/Ms/Dr)."
    properties:
      show_honorific:
        type: boolean
        default: false
      profile:
        default: []
      global_attributes:
        default: []
  components:
    type: object
    description: "Component slot overrides: table_columns, filters, main_slots, sidebar_slots, download_columns"
    properties:
      table_columns:
        default: []
      filters:
        default: []
      main_slots:
        default: []
      sidebar_slots:
        default: []
      download_columns:
        default: []
  request_stages:
    type: object
    description: "Pipeline overrides: get_all_contacts, write, selector, filter_match. write stages are appended to both create and update flows."
    properties:
      get_all_contacts:
        default:
          - $addFields: {}
      selector:
        default: []
      filter_match:
        default: []
      write:
        default: []
  filter_requests:
    default: []
    description: Additional requests for the custom filters section
  verified:
    default: "off"
    description: |
      Contact verification mode. Controls whether and how `global_attributes.verified` is written by this app's create/update flows, and whether Verify UI is shown.

      - "off" (default): no verified flag written, no Verify UI. `global_attributes.verified` in existing records is ignored.
      - "trusted": every create and update stamps `global_attributes.verified: true`. The contact-detail page header and contact-selector list rows render a danger-styled Verify button for records where `global_attributes.verified === false` (imports / contacts created by other apps in "untrusted" mode). Use for internal-team apps where every human-authored contact write counts as verifying.
      - "untrusted": `create-contact` stamps `global_attributes.verified: false`; `update-contact` leaves the flag untouched (so a reviewer in a trusted app can flip it to true without client-side updates reverting it). No Verify UI. Use for client-facing apps where contacts need human review before being considered verified.
  avatar_colors:
    default:
      _ref: ../shared/profile/avatar_colors.yaml
    description: "Gradient pairs for avatar backgrounds. Each entry: { from, to }."

exports:
  pages:
    - id: contacts
      description: Contact list with filtering, sorting, pagination, and Excel download
    - id: contact-detail
      description: Read-only contact detail with sidebar tiles
    - id: contact-edit
      description: Edit existing contact (blocked for user records)
    - id: contact-new
      description: Create a new contact with duplicate detection
  connections:
    - id: contacts-collection
      description: MongoDB connection for contact records (user-contacts collection)
  api:
    - id: create-contact
      description: Create contact with duplicate check and event logging
    - id: update-contact
      description: Update contact with is_user guard and event logging
  components:
    - id: contact-selector
      description: Multi-select contact picker with search, inline add/edit, and deletion
  menus:
    - id: default
      description: Contacts navigation link

connections:
  - _ref: connections/contacts-collection.yaml

api:
  - _ref: api/create-contact.yaml
  - _ref: api/update-contact.yaml

pages:
  - _ref: pages/contacts.yaml
  - _ref: pages/contact-detail.yaml
  - _ref: pages/contact-edit.yaml
  - _ref: pages/contact-new.yaml

components:
  - id: contact-selector
    component:
      _ref: components/contact-selector.yaml.njk

menus:
  - _ref: menus.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: "^2"
  - name: "@lowdefy/community-plugin-xlsx"
    version: "^1"
  - name: "@lowdefy/modules-mongodb-plugins"
    version: "^1"
