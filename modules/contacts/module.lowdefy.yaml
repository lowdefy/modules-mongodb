name: Contacts
version: 0.2.0
description: Contact management — list, detail, edit, create, selector

dependencies:
  - id: layout
    description: Page layout wrapper
  - id: events
    description: Audit event logging and change stamp
  - id: companies
    description: Company selector and detail page links
  - id: files
    description: File attachments (optional sidebar tile)

vars:
  label:
    default: Contact
    description: Singular display label
  label_plural:
    default: Contacts
    description: Plural display label
  app_name:
    required: true
    description: App identifier for is_user guard and per-app access flags
  event_display:
    default:
      _ref: defaults/event_display.yaml
    description: "Per-app event display templates"
  fields:
    type: object
    description: "Field block arrays: profile, global_attributes. Same blocks used for edit forms and SmartDescriptions view. show_honorific toggles the honorific/title selector (Mr/Ms/Dr)."
    properties:
      show_honorific:
        type: boolean
        default: false
        description: Show the honorific/title selector (Mr/Ms/Dr) in the profile form.
      profile:
        default: []
        description: >-
          Extended profile field blocks rendered in the contact form and view.
          Block ids must be prefixed with `profile.` so they bind to
          `state.profile.*`.
      global_attributes:
        default: []
        description: >-
          Cross-app attribute field blocks rendered in the contact form and
          view. Block ids must be prefixed with `global_attributes.` so they
          bind to `state.global_attributes.*`.
  components:
    type: object
    description: "Component slot overrides: table_columns, filters, main_slots, sidebar_slots, download_columns, company_card_extra_fields"
    properties:
      table_columns:
        default: []
        description: Extra column definitions appended to the contacts list table.
      filters:
        default: []
        description: >-
          Extra filter blocks rendered below the built-in search bar on the
          contacts list page. Pair with `filter_requests` for custom data
          sources.
      main_slots:
        default: []
        description: Extra blocks appended to the main column on the contact-detail page.
      sidebar_slots:
        default: []
        description: Extra blocks appended to the sidebar column on the contact-detail page.
      download_columns:
        default: []
        description: Extra columns appended to the Excel export.
      company_card_extra_fields:
        default: []
        description: |
          List of { label, value } pairs appended under each company's display
          name in the contact view companies tile. `value` is a top-level key
          on the company doc projected by get_contact_companies.
  request_stages:
    type: object
    description: "Pipeline overrides: get_all_contacts, get_contact, write, selector, filter_match. write stages are appended to both create and update flows."
    properties:
      get_all_contacts:
        default:
          - $addFields: {}
        description: >-
          Pipeline stages appended after filtering on the contacts list and
          Excel export aggregations.
      get_contact:
        default: []
        description: Additional pipeline stages appended to get_contact (e.g. $lookup, $addFields).
      selector:
        default: []
        description: Pipeline stages appended to the contact-selector aggregation.
      filter_match:
        default: []
        description: >-
          Atlas Search compound clauses appended to the list-page `$search`
          query. Used to add custom filter conditions to the contacts list.
      write:
        default: []
        description: >-
          Pipeline update stages appended to both create-contact and
          update-contact flows. Runs after the built-in `$mergeObjects` merge
          of profile and global_attributes; used for derived fields or extra
          transforms.
  filter_requests:
    default: []
    description: Additional requests for the custom filters section
  avatar_colors:
    default:
      _ref: ../shared/profile/avatar_colors.yaml
    description: "Gradient pairs for avatar backgrounds. Each entry: { from, to }."
  use_verified:
    type: boolean
    default: false
    description: |
      Whether this module instance tracks contact verification.
      - false: no verification UI or payload writes on any picker.
      - true: pickers render a Verify button for unverified rows and
        write `global_attributes.verified` on add/edit. Each picker
        instance sets the written value via its per-call `verified`
        var (see contact-selector wrapper).

exports:
  pages:
    - id: all
      description: Contact list with filtering, sorting, pagination, and Excel download
    - id: view
      description: Read-only contact detail with sidebar tiles
    - id: edit
      description: Edit existing contact (blocked for user records)
    - id: new
      description: Create a new contact with duplicate detection
  connections:
    - id: contacts-collection
      description: MongoDB connection for contact records (user-contacts collection)
  api:
    - id: create-contact
      description: Create contact with duplicate check and event logging
    - id: update-contact
      description: Update contact with is_user guard and event logging
  components:
    - id: contact-selector
      description: Rich ContactSelector block — search, add, edit, remove, optional verify UI
    - id: basic-contact-selector
      description: Simple Selector/MultipleSelector dropdown over all active contacts (read-only picker)
  menus:
    - id: default
      description: Contacts navigation link

connections:
  - _ref: connections/contacts-collection.yaml

api:
  - _ref: api/create-contact.yaml
  - _ref: api/update-contact.yaml

pages:
  - _ref: pages/all.yaml
  - _ref: pages/view.yaml
  - _ref: pages/edit.yaml
  - _ref: pages/new.yaml

components:
  - id: contact-selector
    component:
      _ref: components/contact-selector.yaml.njk
  - id: basic-contact-selector
    component:
      _ref: components/basic-contact-selector.yaml

menus:
  - _ref: menus.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: "^2"
  - name: "@lowdefy/community-plugin-xlsx"
    version: "^1"
  - name: "@lowdefy/modules-mongodb-plugins"
    version: "^0.1.0"
