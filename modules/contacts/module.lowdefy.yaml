name: Contacts
description: Contact management — list, detail, edit, create, selector

dependencies:
  - id: layout
    description: Page layout wrapper
  - id: events
    description: Audit event logging and change stamp
  - id: companies
    description: Company selector and detail page links
  - id: files
    description: File attachments (optional sidebar tile)

vars:
  label:
    default: Contact
    description: Singular display label
  label_plural:
    default: Contacts
    description: Plural display label
  app_name:
    required: true
    description: App identifier for is_user guard and per-app access flags
  event_display:
    default:
      _ref: defaults/event_display.yaml
    description: "Per-app event display templates"
  # TODO: add a `description:` to every nested property below (fields.*, components.*, request_stages.*).
  # User-facing copy — describe what the var is for from the consumer's perspective, no implementation details.
  fields:
    type: object
    description: "Field block arrays: profile, global_attributes. Same blocks used for edit forms and SmartDescriptions view. show_honorific toggles the honorific/title selector (Mr/Ms/Dr)."
    properties:
      show_honorific:
        type: boolean
        default: false
      profile:
        default: []
      global_attributes:
        default: []
  components:
    type: object
    description: "Component slot overrides: table_columns, filters, main_slots, sidebar_slots, download_columns"
    properties:
      table_columns:
        default: []
      filters:
        default: []
      main_slots:
        default: []
      sidebar_slots:
        default: []
      download_columns:
        default: []
  request_stages:
    type: object
    description: "Pipeline overrides: get_all_contacts, get_contact, write, selector, filter_match. write stages are appended to both create and update flows."
    properties:
      get_all_contacts:
        default:
          - $addFields: {}
      get_contact:
        default: []
        description: Additional pipeline stages appended to get_contact (e.g. $lookup, $addFields).
      selector:
        default: []
      filter_match:
        default: []
      write:
        default: []
  filter_requests:
    default: []
    description: Additional requests for the custom filters section
  avatar_colors:
    default:
      _ref: ../shared/profile/avatar_colors.yaml
    description: "Gradient pairs for avatar backgrounds. Each entry: { from, to }."
  verified:
    type: string
    enum: [off, trusted, untrusted]
    default: off
    description: |
      Contact verification mode for the contact-selector picker.
      - off: no verification UI or payload writes.
      - trusted: contacts created/edited via the picker are marked verified; unverified rows render a Verify button.
      - untrusted: contacts created via the picker are marked unverified; apps provide their own verify flow.
  all_contacts:
    type: boolean
    default: false
    description: When true, the picker searches across all companies. When false, scope to the user's global_attributes.company_ids.
  phone_label:
    type: boolean
    default: false
    description: When true, the search results label includes phone numbers.

exports:
  pages:
    - id: contacts
      description: Contact list with filtering, sorting, pagination, and Excel download
    - id: contact-detail
      description: Read-only contact detail with sidebar tiles
    - id: contact-edit
      description: Edit existing contact (blocked for user records)
    - id: contact-new
      description: Create a new contact with duplicate detection
  connections:
    - id: contacts-collection
      description: MongoDB connection for contact records (user-contacts collection)
  api:
    - id: create-contact
      description: Create contact with duplicate check and event logging
    - id: update-contact
      description: Update contact with is_user guard and event logging
  components:
    - id: contact-selector
      description: Selector/MultipleSelector for picking contacts
  menus:
    - id: default
      description: Contacts navigation link

connections:
  - _ref: connections/contacts-collection.yaml

api:
  - _ref: api/create-contact.yaml
  - _ref: api/update-contact.yaml

pages:
  - _ref: pages/contacts.yaml
  - _ref: pages/contact-detail.yaml
  - _ref: pages/contact-edit.yaml
  - _ref: pages/contact-new.yaml

components:
  - id: contact-selector
    component:
      _ref: components/contact-selector.yaml

menus:
  - _ref: menus.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: "^2"
  - name: "@lowdefy/community-plugin-xlsx"
    version: "^1"
  - name: "@lowdefy/modules-mongodb-plugins"
    version: "^1"
