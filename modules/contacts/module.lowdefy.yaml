name: Contacts
description: Contact management — list, detail, edit, create, selector

dependencies:
  - id: layout
    description: Page layout wrapper
  - id: events
    description: Audit event logging and change stamp
  - id: companies
    description: Company selector and detail page links
  - id: files
    description: File attachments (optional sidebar tile)

vars:
  label:
    default: Contact
    description: Singular display label
  label_plural:
    default: Contacts
    description: Plural display label
  app_name:
    required: true
    description: App identifier for is_user guard and per-app access flags
  event_display:
    default:
      _ref: defaults/event_display.yaml
    description: 'Per-app event display templates'
  show_title:
    type: boolean
    default: false
    description: Show the title/honorific field (Mr, Ms, Dr, etc.)
  components:
    type: object
    description: 'Overrides: detail_fields, form_fields, form_attributes, attributes_set_fields, profile_fields, profile_set_fields, profile_view_config, attributes_view_config, view_extra, table, filters, main_tiles, sidebar_tiles, download_columns'
    properties:
      detail_fields:
        default:
          _ref: components/view_contact.yaml
      form_fields:
        default:
          _ref: components/form_contact.yaml
      form_attributes:
        default: null
      attributes_set_fields:
        default: {}
      profile_fields:
        default: []
      profile_set_fields:
        default: {}
      profile_view_config:
        default: null
      attributes_view_config:
        default: null
      view_extra:
        default: []
      table:
        default:
          _ref: components/table_contacts.yaml
      table_columns:
        default: []
      filters:
        default:
          _ref: components/filter_contacts.yaml
      main_tiles:
        default: []
      sidebar_tiles:
        default: []
      download_columns:
        default: []
  request_stages:
    type: object
    description: 'Pipeline overrides: get_all_contacts, get_contact, insert_contact, update_contact, selector, filter_match'
    properties:
      get_all_contacts:
        default:
          - $addFields: {}
      selector:
        default: []
      filter_match:
        default: []
      insert_contact:
        default: []
      update_contact:
        default: []
  filter_requests:
    default: []
    description: Additional requests for the custom filters section
  avatar_colors:
    default:
      _ref: ../shared/profile/avatar_colors.yaml
    description: 'Gradient pairs for avatar backgrounds. Each entry: { from, to }.'

exports:
  pages:
    - id: contacts
      description: Contact list with filtering, sorting, pagination, and Excel download
    - id: contact-detail
      description: Read-only contact detail with sidebar tiles
    - id: contact-edit
      description: Edit existing contact (blocked for user records)
    - id: contact-new
      description: Create a new contact with duplicate detection
  connections:
    - id: contacts-collection
      description: MongoDB connection for contact records (user-contacts collection)
  api:
    - id: create-contact
      description: Create contact with duplicate check and event logging
    - id: update-contact
      description: Update contact with is_user guard and event logging
  components:
    - id: contact-selector
      description: Selector/MultipleSelector for picking contacts
  menus:
    - id: default
      description: Contacts navigation link

connections:
  - _ref: connections/contacts-collection.yaml

api:
  - _ref: api/create-contact.yaml
  - _ref: api/update-contact.yaml

pages:
  - _ref: pages/contacts.yaml
  - _ref: pages/contact-detail.yaml
  - _ref: pages/contact-edit.yaml
  - _ref: pages/contact-new.yaml

components:
  - id: contact-selector
    component:
      _ref: components/contact-selector.yaml

menus:
  - _ref: menus.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI
