id: create-contact
type: Api
routine:
  - id: check-existing
    type: MongoDBFindOne
    connectionId:
      _module.connectionId: contacts-collection
    properties:
      query:
        lowercase_email:
          _string.toLowerCase:
            _string.trim:
              _if_none:
                - _payload: email
                - ""
        hidden:
          $ne: true
        disabled:
          $ne: true

  - id: insert
    type: MongoDBUpdateOne
    skip:
      _ne:
        - _step: check-existing
        - null
    connectionId:
      _module.connectionId: contacts-collection
    properties:
      filter:
        _id:
          _payload: _id
      options:
        upsert: true
      update:
        _build.array.concat:
          # Stage 1: Insert-only fields + merge data objects
          - - $set:
                _id:
                  $ifNull:
                    - $_id
                    - _payload: _id
                email:
                  _payload: email
                lowercase_email:
                  _string.toLowerCase:
                    _payload: email
                hidden: false
                disabled: false
                created:
                  $ifNull:
                    - $created
                    - _ref:
                        module: events
                        component: change_stamp
                profile:
                  $mergeObjects:
                    - $ifNull:
                        - "$$ROOT.profile"
                        - {}
                    - _payload: profile
                global_attributes:
                  $mergeObjects:
                    - $ifNull:
                        - "$$ROOT.global_attributes"
                        - {}
                    - _payload: global_attributes
                updated:
                  _ref:
                    module: events
                    component: change_stamp
          # Stage 2: Compute derived fields (sees merged profile from stage 1)
          - - $set:
                profile.name:
                  $concat:
                    - $trim:
                        input: "$profile.given_name"
                    - " "
                    - $trim:
                        input: "$profile.family_name"
          # Stage 3 (optional): Write `global_attributes.verified` based on the module's `verified` mode.
          # - "trusted": mark as verified (internal-team apps).
          # - "untrusted": mark as unverified (client-facing apps).
          # - "off" (default): don't touch the flag.
          - _build.if:
              test:
                _build.eq:
                  - _module.var: verified
                  - trusted
              then:
                - $set:
                    global_attributes.verified: true
              else:
                _build.if:
                  test:
                    _build.eq:
                      - _module.var: verified
                      - untrusted
                  then:
                    - $set:
                        global_attributes.verified: false
                  else: []
          # Consumer pipeline stages
          - _module.var: request_stages.write

  - id: new-event
    type: CallApi
    skip:
      _ne:
        - _step: check-existing
        - null
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: create-contact
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.object.assign:
                        - _ref: defaults/event_display.yaml
                        - _module.var: event_display
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.create-contact
                            - null
                        - null
              callback:
                _build.function:
                  key:
                    __build.args: 0.0
                  value:
                    title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.create-contact
                        on:
                          user:
                            _user: true
                          target:
                            name:
                              _string.trim:
                                _string.concat:
                                  - _string.trim:
                                      _if_none:
                                        - _payload: profile.given_name
                                        - ""
                                  - " "
                                  - _string.trim:
                                      _if_none:
                                        - _payload: profile.family_name
                                        - ""
                    description: null
        references:
          contact_ids:
            - _step: insert.upsertedId
          company_ids:
            _if_none:
              - _payload: global_attributes.company_ids
              - []
        metadata:
          contact_id:
            _step: insert.upsertedId

  - :return:
      contactId:
        _if:
          test:
            _ne:
              - _step: check-existing
              - null
          then:
            _step: check-existing._id
          else:
            # MongoDBUpdateOne returns `upsertedId` when the collection has no
            # changeLog, and `lastErrorObject.upserted` when it does (because
            # the implementation uses findOneAndUpdate with result metadata).
            # Fall through so the API works for both connection shapes.
            _if_none:
              - _step: insert.upsertedId
              - _step: insert.lastErrorObject.upserted
      existing:
        _ne:
          - _step: check-existing
          - null
