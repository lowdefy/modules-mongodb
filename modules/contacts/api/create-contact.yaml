id: create-contact
type: Api
routine:
  - id: check-existing
    type: MongoDBFindOne
    connectionId:
      _module.connectionId: contacts-collection
    properties:
      query:
        lowercase_email:
          _string.toLowerCase:
            _string.trim:
              _if_none:
                - _payload: contact.email
                - ""

  - id: insert
    type: MongoDBUpdateOne
    skip:
      _ne:
        - _step: check-existing
        - null
    connectionId:
      _module.connectionId: contacts-collection
    properties:
      filter:
        _id:
          _payload: _id
      options:
        upsert: true
      update:
        _build.array.concat:
          - - $set:
                _object.assign:
                  # Insert-only fields (use $ifNull so they're only set on first insert)
                  - _id:
                      $ifNull:
                        - $_id
                        - _payload: _id
                    email:
                      _payload: contact.email
                    lowercase_email:
                      _string.toLowerCase:
                        _payload: contact.email
                    hidden: false
                    disabled: false
                    created:
                      $ifNull:
                        - $created
                        - _ref:
                            module: events
                            component: change_stamp
                  # Core profile fields
                  - profile.name:
                      _string.concat:
                        - _if_none:
                            - _payload: contact.profile.given_name
                            - ""
                        - " "
                        - _if_none:
                            - _payload: contact.profile.family_name
                            - ""
                    profile.avatar_color:
                      _payload: contact.profile.avatar_color
                    profile.picture:
                      _payload: contact.profile.picture
                    profile.given_name:
                      _payload: contact.profile.given_name
                    profile.family_name:
                      _payload: contact.profile.family_name
                    global_attributes.company_ids:
                      _if_none:
                        - _payload: contact.global_attributes.company_ids
                        - []
                    updated:
                      _ref:
                        module: events
                        component: change_stamp
                  # Title (conditional)
                  - _build.if:
                      test:
                        _module.var: show_title
                      then:
                        profile.title:
                          _payload: contact.profile.title
                      else: {}
                  # Extended profile fields (injected by consumer)
                  - _module.var: components.profile_set_fields
                  # Attribute set fields (injected by consumer)
                  - _module.var: components.attributes_set_fields
          # request_stages injection (preserved)
          - _module.var: request_stages.insert_contact

  - id: new-event
    type: CallApi
    skip:
      _ne:
        - _step: check-existing
        - null
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: create-contact
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.object.assign:
                        - _ref: defaults/event_display.yaml
                        - _module.var: event_display
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.create-contact
                            - null
                        - null
              callback:
                _build.function:
                  key:
                    __build.args: 0.0
                  value:
                    title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.create-contact
                        on:
                          user:
                            _user: true
                          target:
                            name:
                              _string.concat:
                                - _if_none:
                                    - _payload: contact.profile.given_name
                                    - ""
                                - " "
                                - _if_none:
                                    - _payload: contact.profile.family_name
                                    - ""
                    description: null
        references:
          contact_ids:
            - _step: insert.upsertedId
          company_ids:
            _if_none:
              - _payload: contact.global_attributes.company_ids
              - []
        metadata:
          contact_id:
            _step: insert.upsertedId

  - :return:
      contactId:
        _if:
          test:
            _ne:
              - _step: check-existing
              - null
          then:
            _step: check-existing._id
          else:
            _step: insert.upsertedId
      existing:
        _ne:
          - _step: check-existing
          - null
