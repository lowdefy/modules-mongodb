id: update-contact
type: Api
routine:
  - id: update
    type: MongoDBUpdateOne
    connectionId:
      _module.connectionId: contacts-collection
    properties:
      filter:
        _object.assign:
          - _id:
              _payload: contact._id
            updated.timestamp:
              _payload: contact.updated.timestamp
          - _object.defineProperty:
              on: {}
              key:
                _string.concat:
                  - "apps."
                  - _module.var: app_name
                  - ".is_user"
              descriptor:
                value:
                  $ne: true
      update:
        _build.array.concat:
          - - $set:
                _object.assign:
                  # email and lowercase_email are NOT updated — email is immutable after creation
                  # Core profile fields
                  - profile.name:
                      _string.concat:
                        - _if_none:
                            - _payload: contact.profile.given_name
                            - ""
                        - " "
                        - _if_none:
                            - _payload: contact.profile.family_name
                            - ""
                    profile.avatar_color:
                      _payload: contact.profile.avatar_color
                    profile.picture:
                      _payload: contact.profile.picture
                    profile.given_name:
                      _payload: contact.profile.given_name
                    profile.family_name:
                      _payload: contact.profile.family_name
                    global_attributes.company_ids:
                      _if_none:
                        - _payload: contact.global_attributes.company_ids
                        - []
                    updated:
                      _ref:
                        module: events
                        component: change_stamp
                  # Title (conditional)
                  - _build.if:
                      test:
                        _module.var: show_title
                      then:
                        profile.title:
                          _payload: contact.profile.title
                      else: {}
                  # Extended profile fields (injected by consumer)
                  - _module.var: components.profile_set_fields
                  # Attribute set fields (injected by consumer)
                  - _module.var: components.attributes_set_fields
          - _module.var: request_stages.update_contact

  - id: new-event
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: update-contact
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.object.assign:
                        - _ref: defaults/event_display.yaml
                        - _module.var: event_display
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.update-contact
                            - null
                        - null
              callback:
                _build.function:
                  key:
                    __build.args: 0.0
                  value:
                    title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.update-contact
                        on:
                          user:
                            _user: true
                          target:
                            name:
                              _string.concat:
                                - _if_none:
                                    - _payload: contact.profile.given_name
                                    - ""
                                - " "
                                - _if_none:
                                    - _payload: contact.profile.family_name
                                    - ""
                    description: null
        references:
          contact_ids:
            - _payload: contact._id
          company_ids:
            _if_none:
              - _payload: contact.global_attributes.company_ids
              - []
        metadata:
          contact_id:
            _payload: contact._id

  - :return:
      success: true
