id: update-contact
type: Api
routine:
  - id: update
    type: MongoDBUpdateOne
    connectionId:
      _module.connectionId: contacts-collection
    properties:
      filter:
        _object.assign:
          - _id:
              _payload: _id
          - _if:
              test:
                _ne:
                  - _payload: updated.timestamp
                  - null
              then:
                updated.timestamp:
                  _payload: updated.timestamp
              else: {}
          - _object.defineProperty:
              on: {}
              key:
                _string.concat:
                  - "apps."
                  - _module.var: app_name
                  - ".is_user"
              descriptor:
                value:
                  $ne: true
      update:
        _build.array.concat:
          # Stage 1: Merge data objects
          - - $set:
                # email and lowercase_email are NOT updated — email is immutable after creation
                profile:
                  $mergeObjects:
                    - $ifNull:
                        - "$$ROOT.profile"
                        - {}
                    - _payload: profile
                global_attributes:
                  $mergeObjects:
                    - $ifNull:
                        - "$$ROOT.global_attributes"
                        - {}
                    - _payload: global_attributes
                updated:
                  _ref:
                    module: events
                    component: change_stamp
          # Stage 2: Compute derived fields (sees merged profile from stage 1)
          - - $set:
                profile.name:
                  $concat:
                    - $trim:
                        input: "$profile.given_name"
                    - " "
                    - $trim:
                        input: "$profile.family_name"
          # Consumer pipeline stages
          - _module.var: request_stages.write

  - id: new-event
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: update-contact
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.object.assign:
                        - _ref: defaults/event_display.yaml
                        - _module.var: event_display
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.update-contact
                            - null
                        - null
              callback:
                _build.function:
                  key:
                    __build.args: 0.0
                  value:
                    title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.update-contact
                        on:
                          user:
                            _user: true
                          target:
                            name:
                              _string.trim:
                                _string.concat:
                                  - _string.trim:
                                      _if_none:
                                        - _payload: profile.given_name
                                        - ""
                                  - " "
                                  - _string.trim:
                                      _if_none:
                                        - _payload: profile.family_name
                                        - ""
                    description: null
        references:
          contact_ids:
            - _payload: _id
          company_ids:
            _if_none:
              - _payload: global_attributes.company_ids
              - []
        metadata:
          contact_id:
            _payload: _id

  - :return:
      success: true
