id: form_contact
type: Box
blocks:
  _build.array.concat:
    # Avatar preview
    - - id: avatar_preview
        type: Avatar
        style:
          textAlign: center
          marginBottom: 16
        properties:
          src:
            _js:
              _ref:
                path: ../shared/profile/generate-avatar-svg.js.njk
                vars:
                  prefix: profile
          size: 100
    # Core profile fields (shared)
    - _ref:
        path: ../shared/profile/form_core.yaml
        vars:
          show_title:
            _module.var: fields.show_title
    # Email (editable on create, plain text on edit)
    - _build.if:
        test:
          _var:
            key: email_disabled
            default: false
        then:
          - id: email_display
            type: Descriptions
            properties:
              bordered: false
              column: 1
              size: small
              items:
                - label: Email
                  value:
                    _state: email
        else:
          - id: email
            type: TextInput
            required: true
            properties:
              title: Email
              placeholder: "name@company.com"
            validate:
              _ref: validate/email.yaml
    # Extended profile fields (injected by consumer)
    - _module.var: fields.profile
    # Attributes section (conditional — only when consumer provides global_attributes fields)
    - _build.if:
        test:
          _build.gt:
            - _build.array.length:
                _module.var: fields.global_attributes
            - 0
        then:
          _build.array.concat:
            - - id: divider_details
                type: Divider
                properties:
                  title: Details
            - _module.var: fields.global_attributes
        else: []
