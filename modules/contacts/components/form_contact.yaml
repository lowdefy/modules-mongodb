id: form_contact
type: Box
blocks:
  _build.array.concat:
    # Avatar preview
    - - id: avatar_preview
        type: Avatar
        style:
          textAlign: center
          marginBottom: 16
        properties:
          src:
            _js:
              _ref:
                path: ../shared/profile/generate-avatar-svg.js.njk
                vars:
                  prefix: contact.profile
          size: 100
    # Title (conditional)
    - _build.if:
        test:
          _module.var: show_title
        then:
          - id: contact.profile.title
            type: Selector
            layout:
              span: 3
            properties:
              title: Title
              options:
                - Mr
                - Ms
                - Mrs
                - Dr
                - Prof
        else: []
    # Core fields
    - - id: contact.profile.given_name
        type: TextInput
        required: true
        layout:
          span:
            _build.if:
              test:
                _module.var: show_title
              then: 9
              else: 12
        properties:
          title: First Name
      - id: contact.profile.family_name
        type: TextInput
        required: true
        properties:
          title: Last Name
    # Email (editable on create, plain text on edit)
    - _build.if:
        test:
          _var:
            key: email_disabled
            default: false
        then:
          - id: email_display
            type: Descriptions
            properties:
              bordered: false
              column: 1
              size: small
              items:
                - label: Email
                  value:
                    _state: contact.email
        else:
          - id: contact.email
            type: TextInput
            required: true
            properties:
              title: Email
              placeholder: 'name@company.com'
            validate:
              _ref: validate/email.yaml
    # Extended profile fields (injected by consumer)
    - _module.var: components.profile_fields
    # Attributes section (conditional — only when consumer provides form_attributes)
    - _build.if:
        test:
          _build.ne:
            - _module.var: components.form_attributes
            - null
        then:
          _build.array.concat:
            - - id: divider_details
                type: Divider
                properties:
                  title: Details
            - _module.var: components.form_attributes
        else: []
    # Companies section
