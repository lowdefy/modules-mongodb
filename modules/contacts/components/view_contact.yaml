id: contact_details
type: Box
blocks:
  _build.array.concat:
    # Identity header
    - - _ref:
          path: ../shared/layout/identity-header.yaml
          vars:
            avatar_src:
              _request: get_contact.0.profile.picture
            name:
              _request: get_contact.0.profile.name
            email:
              _request: get_contact.0.email
    # Profile SmartDescriptions
    - - id: profile_view
        type: SmartDescriptions
        properties:
          title: Profile
          column: 1
          size: small
          data:
            profile:
              _request: get_contact.0.profile
          fields:
            _build.array.concat:
              - _ref:
                  path: ../shared/profile/form_core.yaml
                  vars:
                    show_honorific:
                      _module.var: fields.show_honorific
              - _module.var: fields.profile
    # Attributes SmartDescriptions (only when fields are provided)
    - - id: attributes_view
        type: SmartDescriptions
        visible:
          _build.gt:
            - _build.array.length:
                _module.var: fields.global_attributes
            - 0
        properties:
          title: Attributes
          column: 1
          size: small
          data:
            global_attributes:
              _request: get_contact.0.global_attributes
          fields:
            _module.var: fields.global_attributes
