id: contacts_table
type: AgGridBalham
properties:
  height: 70vh
  rowStyle:
    cursor: pointer
  rowData:
    _request: get_all_contacts
  defaultColDef:
    sortable: true
    resizable: true
    cellStyle:
      cursor: pointer
      wordBreak: break-word
      display: flex
      alignItems: center
  columnDefs:
    _build.array.concat:
      - - headerName: Name
          field: profile.name
          flex: 1
          minWidth: 240
          cellRenderer:
            _function:
              __nunjucks:
                template: |
                  <span style="display: inline-flex; align-items: center;">{% if profile.picture %}<img src="{{ profile.picture }}" width="16px" height="16px" style="margin-right: 4px; border-radius: 50%; flex-shrink: 0;"/>{% else %}<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:#d9d9d9;color:#8c8c8c;font-size:10px;margin-right:4px;flex-shrink:0;">&#x1F464;</span>{% endif %}{{ profile.name | safe }}</span>
                on:
                  __args: 0.data
        - headerName: Email
          field: email
          flex: 1
          minWidth: 250
        - headerName: Department
          field: profile.department
          flex: 1
          minWidth: 150
        - headerName: Job Title
          field: profile.job_title
          flex: 1
          minWidth: 150
      - _module.var: components.table_columns
      - - headerName: Updated At
          field: updated_at
          width: 120
        - headerName: Created At
          field: created_at
          width: 120
events:
  onRowClick:
    - id: link_to_detail
      type: Link
      params:
        pageId:
          _module.pageId: contact-detail
        urlQuery:
          _id:
            _event: row._id
