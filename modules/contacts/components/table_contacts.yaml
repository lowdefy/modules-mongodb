id: contacts_table
type: AgGridBalham
properties:
  height: 70vh
  rowStyle:
    cursor: pointer
  rowData:
    _request: get_all_contacts
  defaultColDef:
    sortable: true
    resizable: true
    cellStyle:
      cursor: pointer
      wordBreak: break-word
      display: flex
      alignItems: center
  columnDefs:
    _build.array.concat:
      - - headerName: Name
          field: profile.name
          flex: 1
          minWidth: 240
          cell:
            type: avatar
            nameField: profile.name
            srcField: profile.picture
            idField: _id
        - headerName: Email
          field: email
          flex: 1
          minWidth: 250
        - headerName: Department
          field: profile.department
          flex: 1
          minWidth: 150
        - headerName: Job Title
          field: profile.job_title
          flex: 1
          minWidth: 150
      - _module.var: components.table_columns
      - - headerName: Updated At
          field: updated_at
          width: 120
        - headerName: Created At
          field: created_at
          width: 120
events:
  onRowClick:
    - id: link_to_detail
      type: Link
      params:
        pageId:
          _module.pageId: view
        urlQuery:
          _id:
            _event: row._id
