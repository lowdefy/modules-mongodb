# Simple Selector / MultipleSelector dropdown backed by a one-shot
# fetch of all active contacts. Useful when the rich ContactSelector
# block (see contact-selector.yaml.njk) is overkill — e.g. read-only
# forms, admin tools, or cases where add/edit is handled elsewhere.
#
# Vars:
#   field_id (string, default "contact") — block id / state key
#   mode     (string, default "Selector") — "Selector" or "MultipleSelector"
#   title    (string) — visible field title. Defaults to the module
#                       `label` var ("Contact"). Placeholder follows
#                       the same source ("Select <title>").
#   label    (object) — Form.Item Label config (extra, tooltip, etc.)
#                       — passed to the Selector's Label wrapper via
#                       the spread; not the visible field title.
id:
  _var:
    key: field_id
    default: contact
type:
  _var:
    key: mode
    default: Selector
requests:
  - _ref: requests/get_contacts_for_selector.yaml
events:
  onMount:
    - id: fetch_contacts
      type: Request
      params: get_contacts_for_selector
properties:
  title:
    _if_none:
      - _var: title
      - _module.var: label
  placeholder:
    _string.concat:
      - "Select "
      - _if_none:
          - _var: title
          - _module.var: label
  options:
    _request: get_contacts_for_selector
  label:
    _var:
      key: label
      default: {}
