# HTML rendering of the contact's linked companies. Reads
# `_request: get_contact_companies` directly — no state setup needed.
#
# Extension: set `components.company_card_extra_fields` in the
# consuming app's vars (as a list of { label, value } pairs) to
# render additional rows under each company's display name.
#
#   components:
#     company_card_extra_fields:
#       - { label: Reg, value: registration_number }
#       - { label: VAT, value: vat_number }
#
# `value` is a top-level key on the company document as projected
# by get_contact_companies. For a nested source field, extend
# the request's $project stage to flatten it to a top-level key.
id: company_list_html
type: Html
properties:
  html:
    _nunjucks:
      template: |
        {% if companies.length %}
        <div>
          {% for company in companies %}
          <div style="padding:8px 0; border-bottom:1px solid var(--ant-color-border-secondary)">
            <a href="/companies/company-detail?_id={{ company._id }}" style="color:inherit; text-decoration:none">
              <div><b>{{ company.display_name | safe }}</b></div>
              {% for field in extra_fields %}
                {% if company[field.value] %}
                <div style="color:var(--ant-color-text-secondary); font-size:11px">
                  <b>{{ field.label | safe }}:</b> {{ company[field.value] | safe }}
                </div>
                {% endif %}
              {% endfor %}
            </a>
          </div>
          {% endfor %}
        </div>
        {% else %}
        <div style="color:var(--ant-color-text-secondary); font-size:12px; font-style:italic; padding:8px 0">
          No linked companies
        </div>
        {% endif %}
      on:
        companies:
          _if_none:
            - _request: get_contact_companies
            - []
        extra_fields:
          _if_none:
            - _module.var: components.company_card_extra_fields
            - []
