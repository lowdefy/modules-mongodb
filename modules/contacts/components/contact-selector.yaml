id:
  _var:
    key: field_id
    default: contact
type:
  _var:
    key: mode
    default: Selector
requests:
  - _ref: requests/get_contacts_for_selector.yaml
events:
  onMount:
    - id: fetch_contacts
      type: Request
      params: get_contacts_for_selector
properties:
  placeholder:
    _string.concat:
      - "Select "
      - _if_none:
          - _var: label
          - _module.var: label
  options:
    _request: get_contacts_for_selector
  label:
    _if_none:
      - _var: label
      - _module.var: label
  optionConfig:
    titleField: label
    valueField: value
