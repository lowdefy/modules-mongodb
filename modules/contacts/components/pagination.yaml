id: pagination
type: Pagination
style:
  textAlign: right
properties:
  size: small
  showTotal: true
  showSizeChanger: true
  total:
    _if_none:
      - _request: get_all_contacts.0.total_results
      - 0
  disabled:
    _not:
      _request: get_all_contacts
  pageSizeOptions:
    - 100
    - 500
    - 1000
events:
  onChange:
    - id: fetch_data
      type: Request
      messages:
        loading: true
      params: get_all_contacts
