# Simple Selector of contacts scoped to one or more roles, storing a
# denormalized { contact_id, name, email } value (view-renderable). Use when the
# rich ContactSelector is overkill and selection is limited to an existing
# contact in a role (e.g. an internal agent). Requires a `contacts` module entry.
#
# Vars (passed via `_ref: { module: contacts, component: role-contact-selector, vars }`):
#   field_id (string, default "contact") — block id / state key.
#   roles    (array, required) — role values matched against apps.<app_name>.roles.
#   title    (string) — field title; defaults to the module `label` var.
#   required (boolean, default false) — required validation.
#   visible  (runtime, default true) — block visibility.
#   label    (object) — Form.Item Label config passed to the Selector's Label wrapper.
id:
  _var:
    key: field_id
    default: contact
type: Selector
required:
  _var:
    key: required
    default: false
visible:
  _var:
    key: visible
    default: true
requests:
  - _ref:
      path: requests/get_role_contacts_for_selector.yaml
      vars:
        roles:
          _var: roles
events:
  onMount:
    - id: fetch_role_contacts
      type: Request
      params: get_role_contacts_for_selector
properties:
  title:
    _if_none:
      - _var: title
      - _module.var: label
  placeholder:
    _string.concat:
      - "Select "
      - _if_none:
          - _var: title
          - _module.var: label
  options:
    _request: get_role_contacts_for_selector
  label:
    _var:
      key: label
      default: {}
