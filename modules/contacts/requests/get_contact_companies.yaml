id: get_contact_companies
type: MongoDBAggregation
connectionId:
  _module.connectionId:
    id: companies-collection
    module: companies
payload:
  company_ids:
    _request: get_contact.0.global_attributes.company_ids
properties:
  pipeline:
    - $match:
        _id:
          $in:
            _if_none:
              - _payload: company_ids
              - []
        deleted.timestamp:
          $exists: false
    - $addFields:
        display_name:
          $getField:
            field: name
            input: "$$ROOT"
        company_id: "$_id"
    - $project:
        _id: 1
        company_id: 1
        display_name: 1
        name: 1
    - $sort:
        display_name: 1
