id:
  _var:
    key: id
    default: get_contact
type: MongoDBFindOne
connectionId:
  _module.connectionId: contacts-collection
payload:
  _id:
    _var:
      key: id_source
      default:
        _url_query: _id
  ~ignoreBuildChecks: true
properties:
  query:
    _id:
      _payload: _id
    hidden:
      $ne: true
    disabled:
      $ne: true
