_ref:
  module: layout
  component: page
  vars:
    id: contact-detail
    title:
      _nunjucks:
        template: |
          {{ label }}{% if profile %}: {{ profile.title }}{{ '.' if profile.title }} {{ profile.name | safe }}{% endif %}
        on:
          _object.assign:
            - _request: get_contact
            - label:
                _module.var: label
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
        pageId:
          _module.pageId: contacts
      - label:
          _if_none:
            - _request: get_contact.profile.name
            - ""
    page_actions:
      - id: edit_button
        type: Button
        visible:
          _not:
            _get:
              key:
                _string.concat:
                  - "apps."
                  - _module.var: app_name
                  - ".is_user"
              from:
                _request: get_contact
        layout:
          flex: 0 1 auto
        properties:
          title:
            _if:
              test:
                _and:
                  - _eq:
                      - _module.var: verified
                      - trusted
                  - _eq:
                      - _request: get_contact.global_attributes.verified
                      - false
              then: Verify
              else: Edit
          icon:
            _if:
              test:
                _and:
                  - _eq:
                      - _module.var: verified
                      - trusted
                  - _eq:
                      - _request: get_contact.global_attributes.verified
                      - false
              then: AiOutlineExclamationCircle
              else: AiOutlineEdit
          danger:
            _and:
              - _eq:
                  - _module.var: verified
                  - trusted
              - _eq:
                  - _request: get_contact.global_attributes.verified
                  - false
          type: default
        events:
          onClick:
            - id: go_edit
              type: Link
              params:
                pageId:
                  _module.pageId: contact-edit
                urlQuery:
                  _id:
                    _url_query: _id
    doc:
      _request: get_contact
    events:
      onMount:
        - id: fetch
          type: Request
          params:
            - get_contact
        - id: redirect_if_not_found
          type: Link
          skip:
            _ne:
              - _request: get_contact
              - null
          params:
            pageId:
              _module.pageId: contacts
    requests:
      - _ref: requests/get_contact.yaml
    blocks:
      - id: detail_layout
        type: Box
        layout:
          gap: 16
        blocks:
          - id: main_column
            type: Box
            layout:
              span: 14
              sm:
                span: 24
            blocks:
              _build.array.concat:
                - - _ref:
                      module: layout
                      component: card
                      vars:
                        title:
                          _string.concat:
                            - _module.var: label
                            - " Information"
                        blocks:
                          - _ref: components/view_contact.yaml
                - _module.var: components.main_slots
          - id: sidebar_column
            type: Box
            layout:
              span: 10
              sm:
                span: 24
            blocks:
              _build.array.concat:
                - - _ref: components/tile_companies.yaml
                  - _ref: components/tile_events.yaml
                - _module.var: components.sidebar_slots
