_ref:
  module: layout
  component: page
  vars:
    id: new
    title:
      _string.concat:
        - "New "
        - _module.var: label
    content_width: 600
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
        pageId:
          _module.pageId: all
      - label:
          _string.concat:
            - "New "
            - _module.var: label
    events:
      onInit:
        - id: init_state
          type: SetState
          params:
            global_attributes: {}
            profile.avatar_color:
              _get:
                from:
                  _module.var: avatar_colors
                key:
                  _math.floor:
                    _product:
                      - _math.random: true
                      - _array.length:
                          _module.var: avatar_colors
    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          - _ref: components/form_email.yaml
          - id: divider_profile
            type: Divider
            properties:
              title: Profile
          - _ref: components/form_profile.yaml
          - _ref: components/form_global_attributes.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title:
                    _string.concat:
                      - "Create "
                      - _module.var: label
                  icon: AiOutlineUserAdd
                  type: primary
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: generate_avatar
                      type: SetState
                      params:
                        profile.picture:
                          _js:
                            _ref:
                              path: ../shared/profile/generate-avatar-svg.js.njk
                              vars:
                                prefix: profile
                    - id: create_contact
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: create-contact
                        payload:
                          _id:
                            _uuid: true
                          email:
                            _state: email
                          profile:
                            _state: profile
                          global_attributes:
                            _state: global_attributes
                      messages:
                        success:
                          _string.concat:
                            - _module.var: label
                            - " created."
                    - id: reset
                      type: Reset
                    - id: go_detail
                      type: Link
                      params:
                        pageId:
                          _module.pageId: view
                        urlQuery:
                          _id:
                            _actions: create_contact.response.response.contactId
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: all
