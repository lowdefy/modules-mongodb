_ref:
  module: layout
  component: page
  vars:
    id: contact-new
    title:
      _string.concat:
        - "New "
        - _module.var: label
    hide_title: true
    content_width: 700
    events:
      onInit:
        - id: init_avatar_color
          type: SetState
          params:
            profile.avatar_color:
              _get:
                from:
                  _module.var: avatar_colors
                key:
                  _math.floor:
                    _product:
                      - _math.random: true
                      - _array.length:
                          _module.var: avatar_colors
    blocks:
      - _ref:
          module: layout
          component: card
          vars:
            title:
              _string.concat:
                - "New "
                - _module.var: label
            blocks:
              - _module.var: components.form_fields
      - _ref:
          module: layout
          component: floating-actions
          vars:
            width: 700
            actions:
              - id: spacer
                type: Box
                layout:
                  flex: 1 0 auto
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: contacts
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title:
                    _string.concat:
                      - "Create "
                      - _module.var: label
                  icon: AiOutlineUserAdd
                  type: primary
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: generate_avatar
                      type: SetState
                      params:
                        profile.picture:
                          _js:
                            _ref:
                              path: ../shared/profile/generate-avatar-svg.js.njk
                              vars:
                                prefix: profile
                    - id: create_contact
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: create-contact
                        payload:
                          _id:
                            _uuid: true
                          email:
                            _state: email
                          profile:
                            _state: profile
                          global_attributes:
                            _state: global_attributes
                      messages:
                        success:
                          _string.concat:
                            - _module.var: label
                            - " created."
                    - id: reset
                      type: Reset
                    - id: go_detail
                      type: Link
                      params:
                        pageId:
                          _module.pageId: contact-detail
                        urlQuery:
                          _id:
                            _actions: create_contact.response.contactId
