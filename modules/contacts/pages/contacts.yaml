_ref:
  module: layout
  component: page
  vars:
    id: contacts
    title:
      _module.var: label_plural
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
    page_actions:
      - _ref: components/excel_download.yaml
      - _ref: components/button_new_contact.yaml
    events:
      onInit:
        - id: set_sort
          type: SetState
          params:
            sort:
              by: updated.timestamp
              order: -1
      onMountAsync:
        - id: set_pagination
          type: SetState
          params:
            pagination:
              current: 1
              skip: 0
              pageSize: 500
        - id: get_all
          type: Request
          params:
            - get_all_contacts
    requests:
      - _ref: requests/get_all_contacts.yaml
      - _ref: requests/get_contact_excel_data.yaml
    blocks:
      - _ref: components/filter_contacts.yaml
      - id: custom_filters_box
        type: Box
        layout:
          gap: 8
        requests:
          _module.var: filter_requests
        style:
          maxWidth: 1200
          margin: auto
          marginTop: 4
        blocks:
          _module.var: components.filters
      - _ref:
          path: ../shared/layout/sort-filters.yaml
          vars:
            search_action:
              _ref: actions/search.yaml
            sort_options:
              - label: Name
                value: profile.name
              - label: Email
                value: email
              - label: Date Updated
                value: updated.timestamp
              - label: Date Created
                value: created.timestamp
      - _ref: components/table_contacts.yaml
      - _ref:
          path: ../shared/layout/pagination.yaml
          vars:
            request_id: get_all_contacts
