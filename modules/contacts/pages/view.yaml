_ref:
  module: layout
  component: page
  vars:
    id: view
    title:
      _nunjucks:
        template: |
          {{ label }}{% if profile %}: {{ profile.title }}{{ '.' if profile.title }} {{ profile.name | safe }}{% endif %}
        on:
          _object.assign:
            - _request: get_contact.0
            - label:
                _module.var: label
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
        pageId:
          _module.pageId: all
      - label:
          _if_none:
            - _request: get_contact.0.profile.name
            - ""
    page_actions:
      - id: edit_button
        type: Button
        visible:
          _not:
            _get:
              key:
                _string.concat:
                  - "apps."
                  - _module.var: app_name
                  - ".is_user"
              from:
                _request: get_contact.0
        layout:
          flex: 0 1 auto
        properties:
          title: Edit
          icon: AiOutlineEdit
          type: default
        events:
          onClick:
            - id: go_edit
              type: Link
              params:
                pageId:
                  _module.pageId: edit
                urlQuery:
                  _id:
                    _url_query: _id
    doc:
      _request: get_contact.0
    events:
      # TEMPORARY onInit — paired with the inline activities tile below.
      # The tile's capture modal uses company-selector, whose request reads
      # `_state.cycle_check_*` and trips ConfigWarning on pages that don't
      # declare those keys. Runtime behaviour unchanged (the request's
      # `_if_none` defaults already handle null/empty). Remove this entire
      # onInit block alongside the inline-tile workaround once the framework
      # limitation (decisions.md §7) is fixed.
      onInit:
        - id: init_state
          type: SetState
          params:
            cycle_check_self_id: null
            cycle_check_ids: []
      onMount:
        - id: fetch
          type: Request
          params:
            - get_contact
        - id: redirect_if_not_found
          type: Link
          skip:
            _ne:
              - _request: get_contact.0
              - null
          params:
            pageId:
              _module.pageId: all
    requests:
      - _ref: requests/get_contact.yaml
    blocks:
      - id: detail_layout
        type: Box
        layout:
          gap: 16
        blocks:
          - id: main_column
            type: Box
            layout:
              span: 14
              sm:
                span: 24
            blocks:
              _build.array.concat:
                - - _ref:
                      module: layout
                      component: card
                      vars:
                        title:
                          _string.concat:
                            - _module.var: label
                            - " Information"
                        blocks:
                          - _ref: components/view_contact.yaml
                - _module.var: components.main_slots
          - id: sidebar_column
            type: Box
            layout:
              span: 10
              sm:
                span: 24
            blocks:
              _build.array.concat:
                - - _ref: components/tile_companies.yaml
                  # TEMPORARY inline — intended pattern is app-level slot wiring
                  # via components.sidebar_slots (decisions.md §7); blocked by
                  # framework limitation. Move back to app vars once fixed.
                  # Paired with the activities module dep (module.lowdefy.yaml)
                  # and the cycle_check_* onInit state init above — revert all
                  # three together.
                  - _ref:
                      module: activities
                      component: tile_activities
                      vars:
                        reference_field: contact_ids
                        reference_value:
                          _url_query: _id
                        prefill:
                          contact_ids:
                            - _url_query: _id
                        on_created:
                          - id: refetch_events
                            type: Request
                            params: get-events
                  - _ref: components/tile_events.yaml
                - _module.var: components.sidebar_slots
