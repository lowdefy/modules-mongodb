_ref:
  module: layout
  component: page
  vars:
    id: edit
    title:
      _string.concat:
        - "Edit "
        - _module.var: label
        - ": "
        - _if_none:
            - _request: get_contact.0.profile.name
            - ""
    content_width: 600
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
        pageId:
          _module.pageId: all
      - label:
          _string.concat:
            - "Edit "
            - _module.var: label
    events:
      onMount:
        - id: fetch
          type: Request
          params:
            - get_contact
        - id: redirect_if_user
          type: Link
          skip:
            _not:
              _get:
                key:
                  _string.concat:
                    - "apps."
                    - _module.var: app_name
                    - ".is_user"
                from:
                  _request: get_contact.0
          params:
            pageId:
              _module.pageId: view
            urlQuery:
              _id:
                _url_query: _id
        - id: redirect_if_not_found
          type: Link
          skip:
            _ne:
              - _request: get_contact.0
              - null
          params:
            pageId:
              _module.pageId: all
        - id: set_state
          type: SetState
          params:
            profile:
              _request: get_contact.0.profile
            global_attributes:
              _request: get_contact.0.global_attributes
            email:
              _request: get_contact.0.email
            updated:
              _request: get_contact.0.updated
            _id:
              _request: get_contact.0._id
    requests:
      - _ref: requests/get_contact.yaml
    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          - _ref:
              path: ../shared/layout/identity-header.yaml
              vars:
                avatar_src:
                  _state: profile.picture
                name:
                  _state: profile.name
                email:
                  _state: email
          - id: divider_profile
            type: Divider
            properties:
              title: Profile
          - _ref: components/form_profile.yaml
          - _ref: components/form_global_attributes.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Save
                  icon: AiOutlineSave
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: generate_avatar
                      type: SetState
                      params:
                        profile.picture:
                          _js:
                            _ref:
                              path: ../shared/profile/generate-avatar-svg.js.njk
                              vars:
                                prefix: profile
                    - id: update_contact
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: update-contact
                        payload:
                          _id:
                            _state: _id
                          profile:
                            _state: profile
                          global_attributes:
                            _state: global_attributes
                          updated:
                            _state: updated
                      messages:
                        success:
                          _string.concat:
                            - _module.var: label
                            - " updated."
                    - id: reset
                      type: Reset
                    - id: back
                      type: Link
                      params:
                        back: true
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        back: true
