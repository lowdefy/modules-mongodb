id: get_activities_excel_data
type: MongoDBAggregation
connectionId:
  _module.connectionId: activities-collection
payload:
  filter:
    _state: filter
  sort:
    _state: sort
  pagination:
    _state: fetch_request_pagination
    ~ignoreBuildChecks: true
properties:
  pipeline:
    _build.array.concat:
      - - _ref: stages/match_filter.yaml
        - _ref: stages/add_derived_fields.yaml
        - _ref: stages/lookup_contacts.yaml
        - _ref: stages/lookup_companies.yaml
        - $addFields:
            updated_at:
              $dateToString:
                date: $updated.timestamp
                format: "%Y-%m-%d"
            created_at:
              $dateToString:
                date: $created.timestamp
                format: "%Y-%m-%d"
        - $sort:
            updated.timestamp: -1
      - _module.var: request_stages.get_all_activities
      - - $skip:
            _payload: pagination.skip
        - $limit:
            _payload: pagination.pageSize
