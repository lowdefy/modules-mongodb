$lookup:
  from: companies
  localField: company_ids
  foreignField: _id
  as: companies
  pipeline:
    - $match:
        deleted.timestamp:
          $exists: false
    - $project:
        _id: 1
        # Project the app-configured display field under the stable alias
        # `name` (mirrors companies' `name_field`; default `name`). Templates
        # read `company.name` and stay agnostic of the source field.
        name:
          $getField:
            _module.var: company_name_field
