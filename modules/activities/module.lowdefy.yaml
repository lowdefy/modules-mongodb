name: Activities
version: 0.14.1
description: CRM activities — calls, meetings, emails linked to contacts and companies

dependencies:
  - id: layout
    description: Page layout wrapper
  - id: events
    description: Audit event logging and change_stamp
  - id: contacts
    description: Contact selector and linking
  - id: companies
    description: Company selector and linking
  - id: files
    description: File attachments (optional)

vars:
  app_name:
    required: true
    description: App identifier used to key event_display titles when no override is supplied.
  label:
    default: Activity
    description: Singular display label
  label_plural:
    default: Activities
    description: Plural display label
  activity_types:
    type: object
    default: {}
    description: >-
      App-level additions to the built-in activity-type enum. Same shape as
      event_types — keys are type strings, values have title, color, icon,
      default_stage, plus optional behavior flags: `agenda: true` renders
      the Agenda Topics section in the form, `duration: true` /
      `direction: true` show those meta fields, and `contact_label` titles
      the linked-contacts selector (default "Participants"). The built-in
      `meeting` type carries `agenda`, `duration`, and
      `contact_label: Attendees` as its defaults. Merging is by top-level
      key — overriding a built-in type replaces its whole entry, flags
      included.
  event_display:
    description: "Per-app event display templates. Keys are app identifiers, values map event types to Nunjucks title templates. When unset, the module's defaults render under app_name. When set, the override fully replaces the defaults — no merge."
  fields:
    type: object
    description: Field block arrays rendered in the edit form and SmartDescriptions view
    properties:
      attributes:
        default: []
        description: >-
          Custom field blocks appended after the built-in sections in the
          form and view. Block ids must be prefixed with `attributes.` so
          they bind to `state.attributes.*`.
      attributes_by_type:
        type: object
        default: {}
        description: >-
          Per-type custom field blocks, keyed by activity type id — same
          block shape as `attributes`. A type with an entry renders that
          list instead of the global `attributes` array (in both the form
          and the view); types without an entry fall back to `attributes`.
  components:
    type: object
    description: "Page slot overrides: table_columns, filters, main_slots, sidebar_slots, download_columns, form_attachments, view_attachments"
    properties:
      table_columns:
        default: []
        description: Extra column definitions appended to the activities list table.
      filters:
        default: []
        description: >-
          Extra filter blocks rendered below the built-in search bar on the
          activities list page. Pair with `filter_requests` for custom data
          sources.
      main_slots:
        default: []
        description: Extra blocks appended to the main column on the activity-detail page.
      sidebar_slots:
        default: []
        description: Extra blocks appended to the sidebar column on the activity-detail page.
      download_columns:
        default: []
        description: Extra columns appended to the Excel export.
      contact_card_extra_fields:
        type: array
        default: []
        description: >-
          Extra `{ label, value }` rows rendered under each linked contact's
          name/email on the activity-detail contact chips. `value` is a
          top-level key on the projected contact doc — extend
          `lookup_contacts.yaml`'s `$project` to surface nested source fields.
      company_card_extra_fields:
        type: array
        default: []
        description: >-
          Extra `{ label, value }` rows rendered under each linked company's
          name on the activity-detail company chips. `value` is a top-level
          key on the projected company doc — extend `lookup_companies.yaml`'s
          `$project` to surface additional fields.
      form_attachments:
        default:
          _ref: components/attachments_form.yaml
        description: >-
          Block array for the attachments section at the bottom of the
          activity form (new / edit / capture modal). Defaults to a divider
          plus the files module's file-manager; apps that don't wire the
          files module supply their own blocks (`state.activity_id` holds
          the activity id, minted before create) or `[]` to drop the
          section.
      view_attachments:
        default:
          _ref: components/attachments_view.yaml
        description: >-
          Block array for the attachments tile at the top of the
          activity-detail sidebar. Defaults to the files module's
          file-card; apps that don't wire the files module supply their
          own blocks (the activity id is at `_url_query: _id`) or `[]` to
          drop the tile.
  hooks:
    type: object
    description: "Action-list extension points spliced into built-in flows: on_created"
    properties:
      on_created:
        default: []
        description: >-
          Actions run after a successful create — in both the new page's
          save flow and the capture_activity modal — with the new
          activity's id at `_state: activity_id` and the captured fields
          (`type`, `title`, `contacts`, `company_ids`, `attributes`,
          `references`) still in state. On the new page the built-in tail
          (form reset + navigate to the view page) runs after the hook;
          set `state.on_created_handled: true` in a hook action to skip it
          (e.g. when routing somewhere else with a Link).
  request_stages:
    type: object
    description: Pipeline overrides
    properties:
      get_all_activities:
        default:
          - $addFields: {}
        description: >-
          Pipeline stages appended after filtering on the activities list and
          Excel export aggregations.
      selector:
        default: []
        description: Pipeline stages appended to the activity-selector aggregation.
      filter_match:
        default: []
        description: >-
          Atlas Search compound clauses appended to the list-page `$search`
          query.
      write:
        default: []
        description: >-
          Pipeline update stages appended to both create-activity and
          update-activity flows.
  filter_requests:
    default: []
    description: Additional requests for the custom filters section
  form_requests:
    default: []
    description: >-
      Request configs spliced into the new and edit page request lists and
      fired on page init, so request-backed consumer `fields.*` blocks (e.g. a
      Selector whose options come from an app collection) have their option
      sources available. Each entry is a full request definition with an `id`.
      NOT added to the capture_activity modal — a modal can't own page
      requests. Blocks that depend on these should gate on
      `state.activity_form_context` (`page` on the new/edit pages, `view` on
      the detail page, `modal` in the capture modal) so they don't render
      broken in the modal; the host
      page must supply the requests itself if such a field is wanted there.
  lookup_collections:
    type: object
    description: >-
      Real Mongo collection names used by the read-pipeline `$lookup` stages
      that enrich linked contacts, companies, and agenda tasks on activity
      detail/list pages. Override when an app points its connections at
      differently-named collections.
    properties:
      contacts:
        type: string
        default: user-contacts
        description: Collection joined by `lookup_contacts.yaml` (contacts.contact_id → _id).
      companies:
        type: string
        default: companies
        description: Collection joined by `lookup_companies.yaml` (company_ids → _id).
      actions:
        type: string
        default: actions
        description: >-
          Collection joined by `lookup_agenda_tasks.yaml` (_id → activity_ids)
          to fetch the tasks created from meeting agenda topics. Set to the
          same real collection name the `actions-collection` connection is
          mapped to.
  disable_company_edit:
    type: boolean
    default: false
    description: >-
      Render the linked-companies selector read-only (disabled) on the edit
      page, so linked companies stay visible but can't be changed after
      creation. The new page and quick-capture prefill still set companies,
      and display-only company chips on the detail page are unaffected.
  company_name_field:
    default: name
    description: >-
      Field on company docs used as the display name in linked-company chips
      (company_list_items) and the list-table company tags (table_activities).
      Mirrors the companies module's `name_field` var — set both to the same
      value when an app stores its company display name under a non-default
      field (e.g. `trading_name`). The `lookup_companies` stage projects this
      field under the stable alias `name`, so templates always read
      `company.name` regardless of the source field.

exports:
  pages:
    - id: all
      description: Activity list with filtering, sorting, pagination, Excel download
    - id: view
      description: Activity detail
    - id: edit
      description: Edit existing activity
    - id: new
      description: Create new activity (accepts URL prefill query params)
  connections:
    - id: activities-collection
      description: MongoDB connection for activity records
    - id: actions-collection
      description: MongoDB connection for the actions collection where meeting agenda topics are stored as tasks
  api:
    - id: create-activity
      description: Insert activity, emit create-activity event
    - id: update-activity
      description: Update activity editable fields, emit update-activity event
    - id: change-activity-status
      description: Transition activity stage, emit stage-specific event
    - id: delete-activity
      description: Soft-delete activity, emit delete-activity event
  components:
    - id: activity-selector
      description: Selector/MultipleSelector for picking activities
    - id: tile_activities
      description: Self-contained sidebar tile (layout.card + activities-timeline + capture_activity in header). For app-level slot wiring on companies/contacts.
    - id: activities-timeline
      description: Content-only block (list + filters + view-all link, no card). Building block for apps wanting custom wrappers.
    - id: capture_activity
      description: Button + modal capture flow with prefill vars
    - id: open_capture
      description: Action sequence — navigates to pageId:new with prefill in urlQuery
  menus:
    - id: default
      description: Activities navigation link

connections:
  - _ref: connections/activities-collection.yaml
  - _ref: connections/actions-collection.yaml

api:
  - _ref: api/create-activity.yaml
  - _ref: api/update-activity.yaml
  - _ref: api/change-activity-status.yaml
  - _ref: api/delete-activity.yaml

pages:
  - _ref: pages/new.yaml
  - _ref: pages/edit.yaml
  - _ref: pages/view.yaml
  - _ref: pages/all.yaml

# components: list will be filled in by later tasks

components:
  - id: activity_types
    component:
      _build.object.assign:
        - _ref: enums/activity_types.yaml
        - _module.var: activity_types
  - id: capture_activity
    component:
      _ref: components/capture_activity.yaml
  - id: open_capture
    component:
      _ref: actions/open_capture.yaml
  - id: activity-selector
    component:
      _ref: components/activity-selector.yaml
  - id: activities-timeline
    component:
      _ref: components/activities-timeline.yaml
  - id: tile_activities
    component:
      _ref: components/tile_activities.yaml

menus:
  - _ref: menus.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: "^3"
  - name: "@lowdefy/community-plugin-xlsx"
    version: "^1"
  - name: "@lowdefy/modules-mongodb-plugins"
    version: "^0.14.1"
