# Shared field definitions for the activity meta row: date (all types),
# duration / direction (per the type's enum flags — see
# `enums/activity_types.yaml`).
#
# Referenced by both `form_activity.yaml` (as input blocks in the meta
# row) and `view_activity.yaml` (as the `fields` config of a
# SmartDescriptions, which reads `id` / `type` / `visible` /
# `properties.title` and ignores form-only keys like `required` and
# `layout`).
#
# The duration / direction `visible` conditions look the current
# `_state: type` up in the merged activity-type enum (built-ins +
# consumer `activity_types` var) and read the type's `duration` /
# `direction` flags. `_state: type` is set by the type input on form
# pages and mirrored from `get_activity.0.type` by `pages/view.yaml`,
# so the same conditions work in both contexts.
- id: attributes.date
  type: DateSelector
  required: true
  layout:
    flex: 1 1 0
  properties:
    title: Date
- id: attributes.duration
  type: Selector
  visible:
    _eq:
      - _get:
          from:
            _build.object.assign:
              - _ref: enums/activity_types.yaml
              - _module.var: activity_types
          key:
            _string.concat:
              - _state: type
              - .duration
          default: false
      - true
  layout:
    flex: 1 1 0
  properties:
    title: Duration
    options:
      - label: 15 min
        value: 15 min
      - label: 30 min
        value: 30 min
      - label: 45 min
        value: 45 min
      - label: 60 min
        value: 60 min
      - label: 90 min
        value: 90 min
- id: attributes.direction
  type: Selector
  visible:
    _eq:
      - _get:
          from:
            _build.object.assign:
              - _ref: enums/activity_types.yaml
              - _module.var: activity_types
          key:
            _string.concat:
              - _state: type
              - .direction
          default: false
      - true
  layout:
    flex: 1 1 0
  properties:
    title: Direction
    options:
      - label: Sent
        value: Sent
      - label: Received
        value: Received
