# Self-contained button + modal for creating an activity from anywhere.
#
# Drop this anywhere on a page; consumers pass prefill, appearance, and
# behaviour vars. In `mode: modal` (default) the button opens a Modal
# carrying `form_activity`. In `mode: page` the button skips the modal
# and Links to `pageId: new` with prefill in `urlQuery`.
#
# Vars (all optional):
#   id            — block id; namespace for the button + modal pair so
#                   multiple instances on a page don't collide. Default
#                   `capture_activity`. Pass a unique value per
#                   instance (e.g. `header_capture`, `tile_capture`).
#   prefill       — { type, title, description, contacts, company_ids }
#                   seeded into form state when the modal opens (modal
#                   mode) or carried in urlQuery (page mode, except
#                   `description` — see design.md / decisions.md §8).
#   label         — button text. Default "Log activity".
#   icon          — button icon. Default `AiOutlinePlus`.
#   button_type   — `primary | default | link | text`. Default `primary`.
#   size          — `small | middle | large`. Default `middle`.
#   mode          — `modal | page`. Default `modal`.
#   on_created    — action sequence run after a successful create
#                   (used by `tile_activities` to refetch its timeline).
#                   Default `[]`.
#
# Modal mechanics: the button opens the modal with the Modal block's own
# `toggleOpen` method (no args) so each instance carries independent
# visibility. The modal uses its built-in footer — `okText` is the
# create button (runs `onOk`: validate + create; the modal auto-closes on
# success and stays open if validation fails) and the built-in Cancel
# button just closes it. `onClose` fires on every close path (create,
# Cancel, X, mask) and resets only this form's own state keys — never the
# whole page. The embedded `form_activity` writes to top-level state;
# users open one capture modal at a time, so this matches form_activity's
# existing contract.
id:
  _var:
    key: id
    default: capture_activity
type: Box
layout:
  flex: 0 0 auto
blocks:
  _build.array.concat:
    - - id:
          _build.string.concat:
            - _var:
                key: id
                default: capture_activity
            - _trigger
        type: Button
        layout:
          flex: 0 0 auto
        properties:
          title:
            _var:
              key: label
              default: Log activity
          icon:
            _var:
              key: icon
              default: AiOutlinePlus
          type:
            _var:
              key: button_type
              default: primary
          size:
            _var:
              key: size
              default: middle
        events:
          onClick:
            _build.if:
              test:
                _build.eq:
                  - _var:
                      key: mode
                      default: modal
                  - page
              then:
                - id: go_new
                  type: Link
                  params:
                    pageId:
                      _module.pageId: new
                    urlQuery:
                      type:
                        _var: prefill.type
                      title:
                        _var: prefill.title
                      contacts:
                        _var: prefill.contacts
                      company_ids:
                        _var: prefill.company_ids
              else:
                - id: open_modal
                  type: CallMethod
                  params:
                    blockId:
                      _build.string.concat:
                        - _var:
                            key: id
                            default: capture_activity
                        - _modal
                    method: toggleOpen
    - _build.if:
        test:
          _build.eq:
            - _var:
                key: mode
                default: modal
            - modal
        then:
          - id:
              _build.string.concat:
                - _var:
                    key: id
                    default: capture_activity
                - _modal
            type: Modal
            properties:
              title:
                _string.concat:
                  - "New "
                  - _module.var: label
              width: 720
              okText:
                _string.concat:
                  - "Create "
                  - _module.var: label
              cancelText: Cancel
            events:
              onOpen:
                - id: seed_prefill
                  type: SetState
                  params:
                    # Stable id minted up front so consumer attachment fields
                    # (fields.attributes) can bind their entity_id to the
                    # activity before it's created; reused as the create _id.
                    activity_id:
                      _uuid: true
                    type:
                      _if_none:
                        - _var: prefill.type
                        - call
                    title:
                      _if_none:
                        - _var: prefill.title
                        - null
                    description:
                      _if_none:
                        - _var: prefill.description
                        - null
                    contacts:
                      _if_none:
                        - _var: prefill.contacts
                        - []
                    company_ids:
                      _if_none:
                        - _var: prefill.company_ids
                        - []
                    # Seed sensible defaults (today's date, a typical call
                    # duration, outbound email direction); let any
                    # consumer-prefilled attributes win.
                    attributes:
                      _object.assign:
                        - date:
                            _date: now
                          duration: 45 min
                          direction: Sent
                        - _if_none:
                            - _var: prefill.attributes
                            - {}
                    references:
                      _if_none:
                        - _var: prefill.references
                        - {}
                    agenda_topics: []
                    # Companies' company-selector cycle-check state — init
                    # so its get_companies_for_selector request doesn't
                    # ConfigWarning on hosts that don't otherwise declare it.
                    cycle_check_self_id: null
                    cycle_check_ids: []
              onOk:
                _build.array.concat:
                  - - id: validate
                      type: Validate
                      params:
                        blockIds:
                          - type
                          - title
                          - attributes.date
                        # Agenda topic rows render with array indices in
                        # their block ids (agenda_topics.0.topic, …) — the
                        # topic is required to create the row's task.
                        regex:
                          - '^agenda_topics\.\d+\.topic$'
                    - id: create
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: create-activity
                        payload:
                          _id:
                            _state: activity_id
                          type:
                            _state: type
                          title:
                            _state: title
                          description:
                            _state: description
                          contacts:
                            _if_none:
                              - _state: contacts
                              - []
                          company_ids:
                            _if_none:
                              - _state: company_ids
                              - []
                          attributes:
                            _if_none:
                              - _state: attributes
                              - {}
                          agenda_topics:
                            _if_none:
                              - _state: agenda_topics
                              - []
                          references:
                            _if_none:
                              - _state: references
                              - {}
                      messages:
                        success:
                          _string.concat:
                            - _module.var: label
                            - " created."
                  - _var:
                      key: on_created
                      default: []
              # Fires on every close path (create success, Cancel, X, mask).
              # Reset only this form's own state keys — never the whole page.
              onClose:
                - id: reset_form
                  type: SetState
                  params:
                    activity_id: null
                    type: null
                    title: null
                    description: null
                    contacts: []
                    company_ids: []
                    attributes: {}
                    agenda_topics: []
                    references: {}
                    cycle_check_self_id: null
                    cycle_check_ids: []
            slots:
              content:
                blocks:
                  - _ref:
                      path: components/form_activity.yaml
                      vars:
                        show_company: false
        else: []
