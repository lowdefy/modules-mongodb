# Detail-page main column for an activity.
#
# Renders the activity doc returned by `requests/get_activity.yaml` —
# a header block (title + rich-text description), the duration
# SmartDescriptions, linked contact / company chips, status history,
# and consumer-extension `main_slots` blocks. The type + current-stage
# pills live in the wrapping card's `extra` slot (see `pages/view.yaml`).
# SmartDescriptions handles the change-stamp footer (created / updated).
#
# The wrapping `pages/view.yaml` (Task 14) is responsible for two
# pieces of state plumbing this component depends on:
#   1. Triggering `get_activity` on mount.
#   2. Mirroring `request.get_activity.0.contacts_enriched` into
#      `state.contacts` and `request.get_activity.0.companies` into `state.companies`
#      (the chip components read those state paths — see
#      `contact_list_items.yaml` / `company_list_items.yaml` headers).
#      A single `SetState` after the request resolves is sufficient.
#
# Consumer-extension hooks:
#   - `_module.var: components.main_slots` — extra blocks appended
#     after the built-in sections.
#   - `_module.var: fields.attributes` — SmartDescriptions field rows
#     rendered from `state.<doc>.attributes`.
#   - `_module.var: components.contact_card_extra_fields` /
#     `components.company_card_extra_fields` — forwarded by the chip
#     components (see `contact_list_items.yaml` / `company_list_items.yaml`).
id: view_activity
type: Box
layout:
  gap: 16
blocks:
  _build.array.concat:
    # Single header block: type + current-stage chips, title, and the
    # rendered Tiptap description.
    - - id: activity_header
        type: Html
        properties:
          html:
            _nunjucks:
              template: |
                {% if title %}
                <h2 style="margin:0 0 10px 0; font-size:24px; line-height:1.25; font-weight:600; letter-spacing:-0.01em; color:var(--ant-color-text-heading)">{{ title }}</h2>
                {% else %}
                <h2 style="margin:0 0 10px 0; font-size:24px; line-height:1.25; font-weight:600; letter-spacing:-0.01em; color:var(--ant-color-text-quaternary); font-style:italic">Untitled</h2>
                {% endif %}
                {% if description %}
                <div class="tiptap-rendered" style="font-size:14px; line-height:1.7; color:var(--ant-color-text-secondary)">{{ description | safe }}</div>
                {% endif %}
              on:
                title:
                  _if_none:
                    - _request: get_activity.0.title
                    - ""
                description:
                  _if_none:
                    - _request: get_activity.0.description.html
                    - ""
      # Duration — field-driven SmartDescriptions over the activity's own
      # `attributes` (only shown when a duration was captured; the form
      # records it for call / meeting types).
      - id: duration_view
        type: SmartDescriptions
        visible:
          _ne:
            - _if_none:
                - _request: get_activity.0.attributes.duration
                - ""
            - ""
        properties:
          column: 1
          size: small
          data:
            attributes:
              _request: get_activity.0.attributes
          fields:
            - id: attributes.duration
              type: Selector
              properties:
                title: Duration
    # Consumer-defined attribute fields (only when provided)
    - _build.if:
        test:
          _build.gt:
            - _build.array.length:
                _module.var: fields.attributes
            - 0
        then:
          - id: attributes_view
            type: SmartDescriptions
            properties:
              title: Additional Details
              column: 1
              size: small
              data:
                attributes:
                  _request: get_activity.0.attributes
              fields:
                _module.var: fields.attributes
        else: []
    # Consumer main-slot extension
    - _module.var: components.main_slots
