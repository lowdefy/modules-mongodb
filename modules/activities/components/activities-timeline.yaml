# Content-only block: list of activities for a parent entity, plus an
# empty state and a "View all" link. No card wrapper — `tile_activities`
# wraps this in `layout.card`; consumers wanting custom wrappers (or no
# wrapper at all) ref this directly.
#
# Mirrors `events/events-timeline.yaml` — declares its data request
# inline (reading vars), fetches on mount, renders an empty state when
# the response is empty, otherwise renders a list of rows.
#
# Vars:
#   reference_field — required — `contacts` | `company_ids` | future
#                                 `deal_ids`. The activity-doc field to
#                                 filter on. For `contacts` (stored as
#                                 reference objects) the match targets
#                                 `contacts.contact_id` internally.
#   reference_value — required — the entity ID to filter on. Typically
#                                 `{ _url_query: _id }` for detail-page
#                                 hosts.
#
# Request id is `get_activities_for_entity` so the auto-refetch wired
# by `tile_activities` (after a successful capture) lands on this
# block. Keep the id stable.
id: activities_timeline
type: Box
layout:
  gap: 8
requests:
  - id: get_activities_for_entity
    type: MongoDBAggregation
    connectionId:
      _module.connectionId: activities-collection
    payload:
      reference_field:
        _var: reference_field
      reference_value:
        _var: reference_value
    properties:
      pipeline:
        - $match:
            _object.assign:
              - deleted.timestamp:
                  $exists: false
              # `contacts` is stored as reference objects, so the membership
              # match targets the nested `contacts.contact_id`; `company_ids`
              # (plain ids) matches directly.
              - _object.defineProperty:
                  on: {}
                  key:
                    _if:
                      test:
                        _eq:
                          - _payload: reference_field
                          - contacts
                      then: contacts.contact_id
                      else:
                        _payload: reference_field
                  descriptor:
                    value:
                      _payload: reference_value
        - _ref: requests/stages/add_derived_fields.yaml
        - $sort:
            updated.timestamp: -1
        - $limit: 20
events:
  onMount:
    - id: fetch_activities
      type: Request
      params: get_activities_for_entity
blocks:
  - id: activities_timeline_empty
    type: Paragraph
    visible:
      _eq:
        - _array.length:
            _request: get_activities_for_entity
        - 0
    properties:
      content: No activities yet
      type: secondary
      style:
        fontSize: 12
        fontStyle: italic
  - id: activities_timeline_list
    type: Html
    visible:
      _gt:
        - _array.length:
            _request: get_activities_for_entity
        - 0
    properties:
      html:
        _nunjucks:
          template: |
            <div>
              <style>
                .activities-timeline-row:hover { background: var(--ant-color-fill-quaternary); }
              </style>
              {% for a in activities %}
                {% set entry = type_map[a.type] %}
                {% set color = entry.color or '#8c8c8c' %}
                {% set type_label = entry.title or a.type %}
                {% set stage_color = stage_colors[a.current_stage] or '#8c8c8c' %}
                <a class="activities-timeline-row" href="/{{ view_page }}?_id={{ a._id }}" style="display:flex; flex-direction:column; gap:2px; padding:8px 12px{% if not loop.last %}; border-bottom:1px solid var(--ant-color-border-secondary){% endif %}; border-radius:6px; transition:background 0.15s; color:inherit; text-decoration:none">
                  <div style="display:flex; gap:8px; align-items:center">
                    <span style="font-weight:500; word-break:break-word; flex:1 1 auto; min-width:0">{{ a.title or 'Untitled' }}</span>
                    <span style="display:inline-flex; align-items:center; padding:0 7px; border-radius:999px; font-size:10px; font-weight:600; line-height:16px; color:{{ color }}; background:color-mix(in srgb, {{ color }} 12%, transparent); border:1px solid color-mix(in srgb, {{ color }} 30%, transparent); flex:0 0 auto">{{ type_label }}</span>
                  </div>
                  {% set desc = (a.description.html | striptags | trim) if a.description else '' %}
                  {% if desc %}
                  <div style="color:var(--ant-color-text-secondary); font-size:11px; line-height:1.5; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical">{{ desc }}</div>
                  {% endif %}
                  <div style="display:flex; gap:8px; align-items:center">
                    <span style="font-size:11px; font-weight:600; color:{{ stage_color }}; text-transform:capitalize">{{ a.current_stage }}</span>
                    {% if a.attributes and a.attributes.date %}
                    <span style="margin-left:auto; color:var(--ant-color-text-secondary); font-size:11px">{{ a.attributes.date | date('YYYY-MM-DD') }}</span>
                    {% endif %}
                  </div>
                </a>
              {% endfor %}
            </div>
          on:
            activities:
              _if_none:
                - _request: get_activities_for_entity
                - []
            type_map:
              _build.object.assign:
                - _ref: enums/activity_types.yaml
                - _module.var: activity_types
            stage_colors:
              open: "#1890ff"
              done: "#52c41a"
              cancelled: "#8c8c8c"
            view_page:
              _module.pageId: view
  - id: activities_timeline_view_all
    type: Button
    visible:
      _gt:
        - _array.length:
            _request: get_activities_for_entity
        - 0
    layout:
      flex: 0 0 auto
    properties:
      title: View all
      type: link
      size: small
    events:
      onClick:
        - id: go_activities_all
          type: Link
          params:
            # Navigate to the full activities list. The list page has no
            # visible entity (contact/company/deal) filter control, so we do
            # NOT scope it via url-query params — a silently filtered table the
            # user can't see or clear is bad UX. The entity-scoped subset is
            # already shown in this timeline tile.
            pageId:
              _module.pageId: all
