# HTML rendering of an activity's linked companies. Reads from `_state:
# companies` — the wrapping page or block populates that state path
# from the activity doc's lookup-joined `companies` array (see
# `requests/stages/lookup_companies.yaml`). Differs from contacts'
# `company_list_items.yaml`, which fires its own `get_contact_companies`
# request — activities already have the joined company data in hand on
# the read pipeline, so a separate request would be redundant.
#
# The lookup stage projects `_id` and the app-configured company name field
# (companies' `name_field`, set here via the activities `company_name_field`
# var, default `name`) under the stable alias `name`. The chip renders
# `company.name` as the display name. To surface other company fields, extend
# `lookup_companies.yaml`'s `$project` and add the field to
# `components.company_card_extra_fields` in the consuming app's vars
# (a list of { label, value } pairs):
#
#   components:
#     company_card_extra_fields:
#       - { label: Reg, value: registration_number }
#       - { label: VAT, value: vat_number }
#
# Extra-field rows render when the field is non-null. Falsy primitives
# (0, false, "") are shown — only `null`/`undefined` are skipped.
id: company_list_html
type: Html
properties:
  html:
    _nunjucks:
      template: |
        {% if companies.length %}
        <div>
          {% for company in companies %}
          <div style="padding:8px 0{% if not loop.last %}; border-bottom:1px solid var(--ant-color-border-secondary){% endif %}">
            <a href="/{{ company_detail_page }}?_id={{ company._id }}" style="color:inherit; text-decoration:none">
              <div><b>{{ company.name }}</b></div>
              {% for field in extra_fields %}
                {% if company[field.value] != null %}
                <div style="color:var(--ant-color-text-secondary); font-size:11px">
                  <b>{{ field.label }}:</b> {{ company[field.value] }}
                </div>
                {% endif %}
              {% endfor %}
            </a>
          </div>
          {% endfor %}
        </div>
        {% else %}
        <div style="color:var(--ant-color-text-secondary); font-size:12px; font-style:italic; padding:8px 0">
          No linked companies
        </div>
        {% endif %}
      on:
        companies:
          _if_none:
            - _state: companies
            - []
        extra_fields:
          _module.var: components.company_card_extra_fields
        company_detail_page:
          _module.pageId:
            id: view
            module: companies
