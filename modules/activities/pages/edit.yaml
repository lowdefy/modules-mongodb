_ref:
  module: layout
  component: page
  vars:
    id: edit
    title:
      _string.concat:
        - "Edit "
        - _module.var: label
        - ": "
        - _if_none:
            - _request: get_activity.0.title
            - ""
    content_width: 700
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
        pageId:
          _module.pageId: all
      - label:
          _string.concat:
            - "Edit "
            - _module.var: label
    events:
      # onInit (not onMount) — onInit completes before any block renders, so
      # the file-manager's own onMount files fetch sees activity_id seeded.
      # Block-level onMount fetches fire before the page root's onMount.
      onInit:
        - id: fetch
          type: Request
          params: get_activity
        - id: redirect_if_not_found
          type: Link
          skip:
            _ne:
              - _request: get_activity.0
              - null
          params:
            pageId:
              _module.pageId: all
        - id: set_state
          type: SetState
          params:
            _id:
              _request: get_activity.0._id
            # Mirror of _id under the form's canonical id key, so the form's
            # Attachments file-manager (bound to _state activity_id) resolves
            # the same way it does on the new page and capture modal.
            activity_id:
              _request: get_activity.0._id
            type:
              _request: get_activity.0.type
            title:
              _request: get_activity.0.title
            description:
              _request: get_activity.0.description
            contacts:
              _if_none:
                - _request: get_activity.0.contacts
                - []
            company_ids:
              _if_none:
                - _request: get_activity.0.company_ids
                - []
            attributes:
              _if_none:
                - _request: get_activity.0.attributes
                - {}
            # Agenda tasks mapped back to form rows. Items keep the task
            # _id so saving updates the right task; rows added in the form
            # have none and update-activity mints one. Mapped with
            # _mql.aggregate (not _array.map/_function) so the
            # person_responsible value objects stay free of ~k source
            # markers that break the Selector's value↔option match.
            agenda_topics:
              _mql.aggregate:
                on:
                  _if_none:
                    - _request: get_activity.0.agenda_tasks
                    - []
                pipeline:
                  - $project:
                      _id: $_id
                      topic: $title
                      details: $description
                      action: $attributes.action
                      person_responsible:
                        $arrayElemAt:
                          - $assignees
                          - 0
                      due_date: $due_date
            updated:
              _request: get_activity.0.updated
            # Init companies' cycle-check state keys so the company-selector
            # request doesn't fire ConfigWarning for unreferenced _state.
            # Runtime behaviour unchanged — `_if_none` defaults take over.
            cycle_check_self_id: null
            cycle_check_ids: []
    requests:
      - _ref: requests/get_activity.yaml
    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          - _ref:
              path: components/form_activity.yaml
              vars:
                disable_company:
                  _module.var: disable_company_edit
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Save
                  icon: AiOutlineSave
                  type: primary
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: update_activity
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: update-activity
                        payload:
                          _id:
                            _state: _id
                          type:
                            _state: type
                          title:
                            _state: title
                          description:
                            _state: description
                          contacts:
                            _if_none:
                              - _state: contacts
                              - []
                          company_ids:
                            _if_none:
                              - _state: company_ids
                              - []
                          attributes:
                            _if_none:
                              - _state: attributes
                              - {}
                          agenda_topics:
                            _if_none:
                              - _state: agenda_topics
                              - []
                          updated:
                            _state: updated
                      messages:
                        success:
                          _string.concat:
                            - _module.var: label
                            - " updated."
                    - id: reset
                      type: Reset
                    - id: back
                      type: Link
                      params:
                        back: true
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        back: true
