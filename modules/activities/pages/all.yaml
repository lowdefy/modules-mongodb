# Activities list page (`pageId: all`).
#
# AgGrid table + filter panel + Excel download + pagination, mirroring
# `companies/pages/all.yaml`.
#
# No url-query filtering. This page renders no visible entity
# (contact/company/deal) filter control, so it does NOT scope the table
# from url-query params — a silently filtered list the user can't see or
# clear is bad UX. "View all" links (e.g. `activities-timeline`) navigate
# here with a clean url and show the full list. `state.filter.contact_id`
# / `company_id` remain as a request-side extension point for consumers
# that add their own *visible* picker via `components.filters`.
_ref:
  module: layout
  component: page
  vars:
    id: all
    title:
      _module.var: label_plural
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
    page_actions:
      - _ref: components/excel_download.yaml
      - id: button_new_activity
        type: Button
        layout:
          flex: 0 0 auto
        properties:
          title:
            _string.concat:
              - "New "
              - _module.var: label
          icon: AiOutlinePlusCircle
          type: primary
        events:
          onClick:
            - id: go_new
              type: Link
              params:
                pageId:
                  _module.pageId: new
    events:
      onInit:
        - id: init_filter
          type: SetState
          params:
            filter:
              search: null
              type: null
              stage: null
              date_from: null
              date_to: null
              # Entity-scope keys kept null-initialised so the filter state
              # shape stays stable and `get_activities`' contact/company
              # `equals` clauses still bind. They are only ever set by a
              # consumer-added *visible* picker (via `components.filters`) —
              # NOT by url-query params (see header note).
              contact_id: null
              company_id: null
            sort:
              by: updated.timestamp
              order: -1
            pagination:
              current: 1
              skip: 0
              pageSize: 500
            # Init companies' cycle-check state keys so the company-selector
            # filter doesn't fire ConfigWarning for unreferenced _state.
            # Runtime behaviour unchanged — `_if_none` defaults take over.
            cycle_check_self_id: null
            cycle_check_ids: []
      onMountAsync:
        - id: fetch
          type: Request
          params: get_activities
    requests:
      - _ref: requests/get_activities.yaml
      - _ref: requests/get_activities_excel_data.yaml
    blocks:
      - _ref: components/filter_activities.yaml
      - id: custom_filters_box
        type: Box
        layout:
          gap: 8
        requests:
          _module.var: filter_requests
        style:
          maxWidth: 1200
          margin: auto
          marginTop: 4
        blocks:
          _module.var: components.filters
      - _ref:
          path: ../shared/layout/sort-filters.yaml
          vars:
            search_action:
              _ref: components/actions/filter_changed.yaml
            sort_options:
              - label: Date Updated
                value: updated.timestamp
              - label: Date Created
                value: created.timestamp
              - label: Title
                value: title
      - _ref: components/table_activities.yaml
      - _ref:
          path: ../shared/layout/pagination.yaml
          vars:
            request_id: get_activities
