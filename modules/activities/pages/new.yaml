_ref:
  module: layout
  component: page
  vars:
    id: new
    title:
      _string.concat:
        - "New "
        - _module.var: label
    content_width: 700
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
        pageId:
          _module.pageId: all
      - label:
          _string.concat:
            - "New "
            - _module.var: label
    events:
      onInit:
        - id: init_state
          type: SetState
          params:
            # Stable id minted up front so consumer attachment fields
            # (fields.attributes) can bind their entity_id to the activity
            # before it's created; reused as the create _id.
            activity_id:
              _uuid: true
            type:
              _if_none:
                - _url_query: type
                - call
            title:
              _url_query: title
            # `contacts` holds contact reference objects for the selector. A
            # singular `contact_id` url param (e.g. "log activity for this
            # contact") is wrapped into a { contact_id } object; the selector
            # enriches name/email from the contacts collection on open.
            contacts:
              _array.concat:
                - _if:
                    test:
                      _ne:
                        - _url_query: contact_id
                        - null
                    then:
                      - contact_id:
                          _url_query: contact_id
                    else: []
                - _if_none:
                    - _url_query: contacts
                    - []
            company_ids:
              _array.concat:
                - _if:
                    test:
                      _ne:
                        - _url_query: company_id
                        - null
                    then:
                      - _url_query: company_id
                    else: []
                - _if_none:
                    - _url_query: company_ids
                    - []
            # Seed defaults so the tabbed form opens populated.
            attributes:
              date:
                _date: now
              duration: 45 min
              direction: Sent
            agenda_topics: []
            # Init companies' cycle-check state keys so the company-selector
            # request (get_companies_for_selector) doesn't fire ConfigWarning
            # for unreferenced _state on this page. Runtime behaviour unchanged
            # — the selector's `_if_none` defaults already handle null/empty.
            cycle_check_self_id: null
            cycle_check_ids: []
            references: {}
    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          - _ref: components/form_activity.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title:
                    _string.concat:
                      - "Create "
                      - _module.var: label
                  icon: AiOutlinePlusCircle
                  type: primary
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: create_activity
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: create-activity
                        payload:
                          _id:
                            _state: activity_id
                          type:
                            _state: type
                          title:
                            _state: title
                          description:
                            _state: description
                          contacts:
                            _if_none:
                              - _state: contacts
                              - []
                          company_ids:
                            _if_none:
                              - _state: company_ids
                              - []
                          attributes:
                            _if_none:
                              - _state: attributes
                              - {}
                          agenda_topics:
                            _if_none:
                              - _state: agenda_topics
                              - []
                          references:
                            _if_none:
                              - _state: references
                              - {}
                      messages:
                        success:
                          _string.concat:
                            - _module.var: label
                            - " created."
                    - id: reset
                      type: Reset
                    - id: go_detail
                      type: Link
                      params:
                        pageId:
                          _module.pageId: view
                        urlQuery:
                          _id:
                            _actions: create_activity.response.response.activityId
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: all
