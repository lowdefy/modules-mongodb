_ref:
  module: layout
  component: page
  vars:
    id: new
    title:
      _string.concat:
        - "New "
        - _module.var: label
    content_width: 700
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
        pageId:
          _module.pageId: all
      - label:
          _string.concat:
            - "New "
            - _module.var: label
    events:
      onInit:
        - id: init_state
          type: SetState
          params:
            type:
              _url_query: type
            title:
              _url_query: title
            contact_ids:
              _array.concat:
                - _if:
                    test:
                      _ne:
                        - _url_query: contact_id
                        - null
                    then:
                      - _url_query: contact_id
                    else: []
                - _if_none:
                    - _url_query: contact_ids
                    - []
            company_ids:
              _array.concat:
                - _if:
                    test:
                      _ne:
                        - _url_query: company_id
                        - null
                    then:
                      - _url_query: company_id
                    else: []
                - _if_none:
                    - _url_query: company_ids
                    - []
            attributes: {}
            # Init companies' cycle-check state keys so the company-selector
            # request (get_companies_for_selector) doesn't fire ConfigWarning
            # for unreferenced _state on this page. Runtime behaviour unchanged
            # — the selector's `_if_none` defaults already handle null/empty.
            cycle_check_self_id: null
            cycle_check_ids: []
            references: {}
    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          - _ref: components/form_activity.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title:
                    _string.concat:
                      - "Create "
                      - _module.var: label
                  icon: AiOutlinePlusCircle
                  type: primary
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: create_activity
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: create-activity
                        payload:
                          _id:
                            _uuid: true
                          type:
                            _state: type
                          title:
                            _state: title
                          description:
                            _state: description
                          contact_ids:
                            _if_none:
                              - _state: contact_ids
                              - []
                          company_ids:
                            _if_none:
                              - _state: company_ids
                              - []
                          attributes:
                            _if_none:
                              - _state: attributes
                              - {}
                          references:
                            _if_none:
                              - _state: references
                              - {}
                      messages:
                        success:
                          _string.concat:
                            - _module.var: label
                            - " created."
                    - id: reset
                      type: Reset
                    - id: go_detail
                      type: Link
                      params:
                        pageId:
                          _module.pageId: view
                        urlQuery:
                          _id:
                            _actions: create_activity.response.response.activityId
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: all
