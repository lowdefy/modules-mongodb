id: delete-activity
type: Api
routine:
  # Load needed for references (contacts, company_ids) and target fields
  # (type, title) on the emitted event, since the payload only carries
  # activity_id. Filter excludes already-deleted docs — a second delete on
  # the same id finds nothing here, so the soft-delete and emit steps no-op.
  - id: load
    type: MongoDBAggregation
    connectionId:
      _module.connectionId: activities-collection
    properties:
      pipeline:
        - $match:
            _id:
              _payload: activity_id
            deleted.timestamp:
              $exists: false
        - $project:
            _id: 1
            type: 1
            title: 1
            contacts: 1
            company_ids: 1
            updated: 1

  # Open agenda-topic tasks for this activity — marked not-required below
  # so deleting a meeting doesn't leave orphan open tasks in the host
  # app's task lists. Done tasks are left as they are.
  - id: find-agenda-tasks
    type: MongoDBFind
    connectionId:
      _module.connectionId: actions-collection
    properties:
      query:
        kind: task
        activity_ids:
          _payload: activity_id
      options:
        projection:
          _id: 1
          status: 1
  - :set_state:
      open_task_ids:
        _array.map:
          on:
            _array.filter:
              on:
                _step: find-agenda-tasks
              callback:
                _function:
                  __eq:
                    - __args: 0.status.0.stage
                    - action-required
          callback:
            _function:
              __args: 0._id

  - id: soft-delete
    type: MongoDBUpdateOne
    connectionId:
      _module.connectionId: activities-collection
    properties:
      filter:
        _id:
          _payload: activity_id
        updated.timestamp:
          _step: load.0.updated.timestamp
      update:
        $set:
          deleted:
            _ref:
              module: events
              component: change_stamp
          updated:
            _ref:
              module: events
              component: change_stamp

  - id: new-event
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: delete-activity
        # Target is built from the loaded doc (not the payload, which only
        # carries activity_id). Inlined here rather than via
        # ../defaults/event_target.yaml because that default reads from
        # _payload.
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.if_none:
                        - _module.var: event_display
                        - _build.object.fromEntries:
                            - - _module.var: app_name
                              - _ref: defaults/event_display.yaml
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.delete-activity
                            - null
                        - null
              callback:
                _build.function:
                  - __build.args: "0.0"
                  - title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.delete-activity
                        on:
                          user:
                            _user: true
                          target:
                            _id:
                              _payload: activity_id
                            title:
                              _step: load.0.title
                            type:
                              _step: load.0.type
                            type_label:
                              _get:
                                from:
                                  _build.object.assign:
                                    - _ref: enums/activity_types.yaml
                                    - _module.var: activity_types
                                key:
                                  _string.concat:
                                    - _step: load.0.type
                                    - .title
                                default:
                                  _step: load.0.type
                    description: null
        references:
          # Events store references as plain-id arrays for reverse lookups,
          # so flatten the contact reference objects to ids.
          contact_ids:
            _array.map:
              on:
                _if_none:
                  - _step: load.0.contacts
                  - []
              callback:
                _function:
                  __args: 0.contact_id
          company_ids:
            _step: load.0.company_ids
          activity_ids:
            - _payload: activity_id
          # Open agenda tasks marked not-required below with this event's
          # id on the status entry they gain.
          action_ids:
            _state: open_task_ids
        metadata:
          activity_id:
            _payload: activity_id

  # One set-based update; an empty $in simply matches nothing.
  - id: mark-open-tasks-not-required
    type: MongoDBUpdateMany
    connectionId:
      _module.connectionId: actions-collection
    properties:
      filter:
        _id:
          $in:
            _state: open_task_ids
        kind: task
      update:
        $push:
          status:
            $position: 0
            $each:
              - stage: not-required
                event_id:
                  _step: new-event.eventId
                created:
                  _ref:
                    module: events
                    component: change_stamp
        $set:
          updated:
            _ref:
              module: events
              component: change_stamp

  - :return:
      success: true
