id: create-activity
type: Api
routine:
  _build.array.concat:
    - - id: insert
        type: MongoDBInsertOne
        connectionId:
          _module.connectionId: activities-collection
        properties:
          doc:
            _object.assign:
              - _id:
                  _payload: _id
                type:
                  _payload: type
                title:
                  _payload: title
                description:
                  _payload: description
                contact_ids:
                  _if_none:
                    - _payload: contact_ids
                    - []
                company_ids:
                  _if_none:
                    - _payload: company_ids
                    - []
                attributes:
                  _if_none:
                    - _payload: attributes
                    - {}
                source:
                  channel:
                    _if_none:
                      - _payload: source.channel
                      - manual
                  external_ref:
                    _if_none:
                      - _payload: source.external_ref
                      - null
                  raw:
                    _if_none:
                      - _payload: source.raw
                      - null
                status:
                  - stage:
                      _if_none:
                        - _payload: initial_stage
                        - _get:
                            from:
                              _build.object.assign:
                                - _ref: enums/activity_types.yaml
                                - _module.var: activity_types
                            key:
                              _string.concat:
                                - _payload: type
                                - .default_stage
                            default: open
                    created:
                      _ref:
                        module: events
                        component: change_stamp
                created:
                  _ref:
                    module: events
                    component: change_stamp
                updated:
                  _ref:
                    module: events
                    component: change_stamp
                deleted: null
              - _if_none:
                  - _payload: references
                  - {}
    # Optional consumer-provided pipeline stages (only emitted when provided)
    - _build.if:
        test:
          _build.gt:
            - _build.array.length:
                _module.var: request_stages.write
            - 0
        then:
          - - id: apply-write-stages
              type: MongoDBUpdateOne
              connectionId:
                _module.connectionId: activities-collection
              properties:
                filter:
                  _id:
                    _payload: _id
                update:
                  _module.var: request_stages.write
        else: []
    - - id: new-event
        type: CallApi
        properties:
          endpointId:
            _module.endpointId:
              id: new-event
              module: events
          payload:
            type: create-activity
            display:
              _build.object.fromEntries:
                _build.array.map:
                  on:
                    _build.array.filter:
                      on:
                        _build.object.entries:
                          _build.object.assign:
                            - _ref: defaults/event_display.yaml
                            - _module.var: event_display
                      callback:
                        _build.function:
                          __build.ne:
                            - __build.if_none:
                                - __build.args: 0.1.create-activity
                                - null
                            - null
                  callback:
                    _build.function:
                      - __build.args: "0.0"
                      - title:
                          _nunjucks:
                            template:
                              __build.args: 0.1.create-activity
                            on:
                              user:
                                _user: true
                              target:
                                _ref: defaults/event_target.yaml
                        description: null
            references:
              _object.assign:
                - contact_ids:
                    _if_none:
                      - _payload: contact_ids
                      - []
                  company_ids:
                    _if_none:
                      - _payload: company_ids
                      - []
                  activity_ids:
                    - _payload: _id
                - _if_none:
                    - _payload: references
                    - {}
            metadata:
              activity_id:
                _payload: _id

      - :return:
          activityId:
            _payload: _id
