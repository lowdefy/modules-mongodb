id: create-activity
type: Api
routine:
  # Map payload agenda topics straight into task docs in their final DB
  # shape (kind: task, mirroring host-app adhoc tasks so they surface in
  # the same task lists), minting _ids up front so the create-activity
  # event can reference them — double-underscore operators in the map
  # callback re-evaluate per item, so __uuid mints a fresh id each time.
  # Only the initial status entry and the references payload are appended
  # at insert time — the status entry needs that event's id. The topic
  # (the task title) is required client-side by the form, so rows arrive
  # complete.
  - :set_state:
      agenda_tasks:
        _array.map:
          on:
            _if_none:
              - _payload: agenda_topics
              - []
          callback:
            _function:
              __object.assign:
                - _id:
                    __if_none:
                      - __args: 0._id
                      - __uuid: true
                  kind: task
                  workflow_id: null
                  title:
                    __args: 0.topic
                  description:
                    __if_none:
                      - __args: 0.details
                      - null
                  attributes:
                    action:
                      __if_none:
                        - __args: 0.action
                        - null
                  assignees:
                    __if:
                      test:
                        __eq:
                          - __args: 0.person_responsible
                          - null
                      then: []
                      else:
                        - contact_id:
                            __args: 0.person_responsible.contact_id
                          name:
                            __args: 0.person_responsible.name
                  due_date:
                    __if_none:
                      - __args: 0.due_date
                      - null
                  activity_ids:
                    - _payload: _id
                  company_ids:
                    _if_none:
                      - _payload: company_ids
                      - []
                  created:
                    _ref:
                      module: events
                      component: change_stamp
                  updated:
                    _ref:
                      module: events
                      component: change_stamp
                  deleted: null
                # App-keyed task message read by host-app task lists.
                - _build.object.fromEntries:
                    - - _module.var: app_name
                      - message:
                          __args: 0.topic

  - id: insert
    type: MongoDBInsertOne
    connectionId:
      _module.connectionId: activities-collection
    properties:
      doc:
        _object.assign:
          - _id:
              _payload: _id
            type:
              _payload: type
            title:
              _payload: title
            description:
              _payload: description
            contacts:
              _if_none:
                - _payload: contacts
                - []
            company_ids:
              _if_none:
                - _payload: company_ids
                - []
            attributes:
              _if_none:
                - _payload: attributes
                - {}
            source:
              channel:
                _if_none:
                  - _payload: source.channel
                  - manual
              external_ref:
                _if_none:
                  - _payload: source.external_ref
                  - null
              raw:
                _if_none:
                  - _payload: source.raw
                  - null
            status:
              - stage:
                  _if_none:
                    - _payload: initial_stage
                    - _get:
                        from:
                          _build.object.assign:
                            - _ref: enums/activity_types.yaml
                            - _module.var: activity_types
                        key:
                          _string.concat:
                            - _payload: type
                            - .default_stage
                        default: open
                created:
                  _ref:
                    module: events
                    component: change_stamp
            created:
              _ref:
                module: events
                component: change_stamp
            updated:
              _ref:
                module: events
                component: change_stamp
            deleted: null
            # Kept verbatim (as well as flattened below) so update-activity
            # can stamp the same references onto agenda tasks added later
            # from the edit page, where the payload can't rebuild them.
            references:
              _if_none:
                - _payload: references
                - {}
          - _if_none:
              - _payload: references
              - {}

  # Optional consumer-provided pipeline stages (only emitted when provided)
  - :if:
      _gt:
        - _array.length:
            _module.var: request_stages.write
        - 0
    :then:
      - id: apply-write-stages
        type: MongoDBUpdateOne
        connectionId:
          _module.connectionId: activities-collection
        properties:
          filter:
            _id:
              _payload: _id
          update:
            _module.var: request_stages.write

  - id: new-event
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: create-activity
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.if_none:
                        - _module.var: event_display
                        - _build.object.fromEntries:
                            - - _module.var: app_name
                              - _ref: defaults/event_display.yaml
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.create-activity
                            - null
                        - null
              callback:
                _build.function:
                  - __build.args: "0.0"
                  - title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.create-activity
                        on:
                          user:
                            _user: true
                          target:
                            _ref: defaults/event_target.yaml
                    description: null
        references:
          _object.assign:
            # Events store references as plain-id arrays for reverse
            # lookups, so flatten the contact reference objects to ids.
            - contact_ids:
                _array.map:
                  on:
                    _if_none:
                      - _payload: contacts
                      - []
                  callback:
                    _function:
                      __args: 0.contact_id
              company_ids:
                _if_none:
                  - _payload: company_ids
                  - []
              activity_ids:
                - _payload: _id
              # Tasks the agenda topics are stored as — inserted below
              # with this event's id on their initial status entry.
              action_ids:
                _array.map:
                  on:
                    _state: agenda_tasks
                  callback:
                    _function:
                      __args: 0._id
            - _if_none:
                - _payload: references
                - {}
        metadata:
          activity_id:
            _payload: _id

  # The docs are already in their final shape — insert them as-is in one
  # batch, appending the initial status entry (which needs the event id
  # minted above) and the activity's references (deal_ids etc.) so tasks
  # land in the same entity timelines and task lists as the activity.
  # Guarded because the driver rejects an empty batch.
  - :if:
      _gt:
        - _array.length:
            _state: agenda_tasks
        - 0
    :then:
      - id: insert-agenda-tasks
        type: MongoDBInsertMany
        connectionId:
          _module.connectionId: actions-collection
        properties:
          docs:
            _array.map:
              on:
                _state: agenda_tasks
              callback:
                _function:
                  __object.assign:
                    - __args: "0"
                    - status:
                        - stage: action-required
                          event_id:
                            _step: new-event.eventId
                          created:
                            _ref:
                              module: events
                              component: change_stamp
                    - _if_none:
                        - _payload: references
                        - {}

  - :return:
      activityId:
        _payload: _id
