name: Files
version: 0.1.1
description: File attachment management — upload, download, list, S3 integration

dependencies:
  - id: layout
    description: Card component for file-card wrapper
  - id: events
    description: Change stamp and event logging for file audit

vars:
  collection:
    default: files
    description: MongoDB collection name for file metadata
  s3_region:
    default: ca-central-1
    description: AWS region for S3 buckets
  log_events:
    type: boolean
    default: true
    description: Log file upload/delete events via the events module
  components:
    type: object
    description: "Overrides: file_list (deprecated)"

exports:
  connections:
    - id: files-collection
      description: MongoDB connection for file metadata
    - id: files-bucket
      description: S3 bucket for private file storage
    - id: files-bucket-public
      description: S3 bucket for public file storage
  api:
    - id: save-file
      description: Upsert file metadata (with optional metadata object) after S3 upload
    - id: delete-file
      description: Soft-delete file metadata
  components:
    - id: file-manager
      description: >-
        Unified FileManager block — drag-drop upload, file type icons,
        thumbnails, clipboard paste, progress bar, download, delete
        confirmation, form fields modal, single-file and max-count modes
    - id: file-card
      description: Layout card wrapping file-manager for easy embedding
    - id: file-list
      description: Lightweight read-only file list using standard Lowdefy blocks (no plugin needed)

connections:
  - _ref: connections/files-collection.yaml
  - _ref: connections/files-bucket.yaml
  - _ref: connections/files-bucket-public.yaml

api:
  - _ref: api/save-file.yaml
  - _ref: api/delete-file.yaml

components:
  - id: file-manager
    component:
      _ref: components/file-manager.yaml
  - id: file-card
    component:
      _ref: components/file-card.yaml
  - id: file-list
    component:
      _ref: components/file-list.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI
  - name: FILES_S3_ACCESS_KEY_ID
    description: AWS access key for S3 file storage
  - name: FILES_S3_SECRET_ACCESS_KEY
    description: AWS secret access key for S3 file storage
  - name: FILES_S3_BUCKET
    description: S3 bucket name for private file storage
  - name: FILES_S3_BUCKET_PUB
    description: S3 bucket name for public file storage

plugins:
  - name: "@lowdefy/modules-mongodb-plugins"
    version: "^0.1.0"
