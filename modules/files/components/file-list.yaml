id:
  _var:
    key: block_id
    default: file_list
type: Box
requests:
  - _ref:
      path: requests/get-entity-files.yaml
      vars:
        block_id:
          _var:
            key: block_id
            default: file_list
        entity_type:
          _var: entity_type
        entity_id:
          _var: entity_id
        file_category:
          _var:
            key: file_category
            default: null
  - _ref:
      path: requests/download-policy.yaml
      vars:
        block_id:
          _var:
            key: block_id
            default: file_list
events:
  onMount:
    - id: fetch_files
      type: Request
      params:
        _build.string.concat:
          - "get_entity_files_"
          - _var:
              key: block_id
              default: file_list
    - id: set_files_state
      type: SetState
      params:
        _build.object.fromEntries:
          - - - _build.string.concat:
                  - _var:
                      key: block_id
                      default: file_list
                  - _items
              - _request:
                  _build.string.concat:
                    - "get_entity_files_"
                    - _var:
                        key: block_id
                        default: file_list
blocks:
  - id:
      _build.string.concat:
        - _var:
            key: block_id
            default: file_list
        - _empty
    type: Box
    visible:
      _eq:
        - _array.length:
            _request:
              _build.string.concat:
                - "get_entity_files_"
                - _var:
                    key: block_id
                    default: file_list
        - 0
    blocks:
      - id:
          _build.string.concat:
            - _var:
                key: block_id
                default: file_list
            - _no_files
        type: Paragraph
        properties:
          content: No files
          type: secondary
          style:
            fontSize: 12
            fontStyle: italic
  - id:
      _build.string.concat:
        - _var:
            key: block_id
            default: file_list
        - _items
    type: List
    visible:
      _gt:
        - _array.length:
            _request:
              _build.string.concat:
                - "get_entity_files_"
                - _var:
                    key: block_id
                    default: file_list
        - 0
    properties:
      data:
        _request:
          _build.string.concat:
            - "get_entity_files_"
            - _var:
                key: block_id
                default: file_list
    blocks:
      - id:
          _build.string.concat:
            - _var:
                key: block_id
                default: file_list
            - _items.$.row
        type: Box
        layout:
          gap: 8
          justify: space-between
          contentAlign: middle
        blocks:
          - id:
              _build.string.concat:
                - _var:
                    key: block_id
                    default: file_list
                - _items.$.download
            type: S3Download
            properties:
              s3GetPolicyRequestId:
                _build.string.concat:
                  - "download_policy_"
                  - _var:
                      key: block_id
                      default: file_list
              fileList:
                - _state:
                    _build.string.concat:
                      - _var:
                          key: block_id
                          default: file_list
                      - _items.$.file
          - id:
              _build.string.concat:
                - _var:
                    key: block_id
                    default: file_list
                - _items.$.date
            type: Paragraph
            properties:
              type: secondary
              style:
                fontSize: 12
              content:
                _dayjs.format:
                  on:
                    _state:
                      _build.string.concat:
                        - _var:
                            key: block_id
                            default: file_list
                        - _items.$.created.timestamp
                  format: YYYY-MM-DD
