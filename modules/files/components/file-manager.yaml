id:
  _var:
    key: block_id
    default: file_manager
type: FileManager
requests:
  - _ref:
      path: requests/upload-policy.yaml
      vars:
        block_id:
          _var:
            key: block_id
            default: file_manager
        entity_type:
          _var: entity_type
  - _ref:
      path: requests/download-policy.yaml
      vars:
        block_id:
          _var:
            key: block_id
            default: file_manager
  - _ref:
      path: requests/get-entity-files.yaml
      vars:
        block_id:
          _var:
            key: block_id
            default: file_manager
        entity_type:
          _var: entity_type
        entity_id:
          _var: entity_id
        file_category:
          _var:
            key: file_category
            default: null
properties:
  s3PostPolicyRequestId:
    _build.string.concat:
      - "upload_policy_"
      - _var:
          key: block_id
          default: file_manager
  s3GetPolicyRequestId:
    _build.string.concat:
      - "download_policy_"
      - _var:
          key: block_id
          default: file_manager
  files:
    _request:
      _build.string.concat:
        - "get_entity_files_"
        - _var:
            key: block_id
            default: file_manager
  viewOnly:
    _var:
      key: view_only
      default: false
  disabled:
    _var:
      key: disabled
      default: false
  showDelete:
    _var:
      key: allow_delete
      default: true
  singleFile:
    _var:
      key: single_file
      default: false
  maxCount:
    _var:
      key: max_count
      default: null
  accept:
    _var:
      key: accept
      default: "*"
  hint:
    _var:
      key: hint
      default: Click or drag file to upload
  label:
    _var:
      key: label
      default: null
  modalTitle:
    _var:
      key: modal_title
      default: Upload File
events:
  onMount:
    - id: fetch_files
      type: Request
      params:
        _build.string.concat:
          - "get_entity_files_"
          - _var:
              key: block_id
              default: file_manager
  onSave:
    _build.array.concat:
      - - id: save_file_metadata
          type: CallAPI
          params:
            endpointId:
              _module.endpointId: save-file
            payload:
              entity_type:
                _var: entity_type
              entity_id:
                _var: entity_id
              file:
                _event: file
              file_title:
                _var:
                  key: file_title
                  default: null
              file_category:
                _var:
                  key: file_category
                  default: null
              metadata:
                _state:
                  _build.string.concat:
                    - _var:
                        key: block_id
                        default: file_manager
                    - .form
        - id: refresh_files
          type: Request
          params:
            _build.string.concat:
              - "get_entity_files_"
              - _var:
                  key: block_id
                  default: file_manager
      - _var:
          key: on_save
          default: []
  onDelete:
    _build.array.concat:
      - - id: delete_file
          type: CallAPI
          params:
            endpointId:
              _module.endpointId: delete-file
            payload:
              file_id:
                _event: fileDoc._id
              file_name:
                _event: fileDoc.file.name
              entity_type:
                _var: entity_type
              entity_id:
                _var: entity_id
        - id: refresh_files
          type: Request
          params:
            _build.string.concat:
              - "get_entity_files_"
              - _var:
                  key: block_id
                  default: file_manager
      - _var:
          key: on_delete
          default: []
