id: get_entity_files
type: MongoDBAggregation
connectionId:
  _module.connectionId: files-collection
properties:
  pipeline:
    - $match:
        collection:
          _var: entity_type
        doc_id:
          _var: entity_id
        removed:
          $ne: true
    - _build.if:
        test:
          _build.ne:
            - _var:
                key: file_category
                default: null
            - null
        then:
          $match:
            file_category:
              _var: file_category
        else:
          $addFields: {}
    - $sort:
        created.timestamp: -1
