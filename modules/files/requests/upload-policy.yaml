id:
  _build.string.concat:
    - "upload_policy_"
    - _var:
        key: block_id
        default: file_upload
type: AwsS3PresignedPostPolicy
connectionId:
  _module.connectionId: files-bucket
payload:
  file_name:
    _state:
      _string.concat:
        - _var:
            key: block_id
            default: file_upload
        - _s3.file.name
  file_type:
    _state:
      _string.concat:
        - _var:
            key: block_id
            default: file_upload
        - _s3.file.type
  url:
    _location: href
properties:
  key:
    _string.concat:
      - _var: entity_type
      - "/"
      - _dayjs.format:
          on:
            _date: now
          params:
            format: "YYYYMMDD_HHmmssSSS"
      - "/"
      - _uuid: true
      - "/"
      - _payload: file_name
  fields:
    x-amz-meta-uploaded-by-id:
      _if_none:
        - _user: id
        - "unknown"
    x-amz-meta-uploaded-by-name:
      _if_none:
        - _user: profile.name
        - "unknown"
    x-amz-meta-uploaded-by-url:
      _if_none:
        - _payload: url
        - "unknown"
  conditions:
    - - eq
      - $Content-Type
      - _payload: file_type
    - - starts-with
      - $x-amz-meta-uploaded-by-id
      - ""
    - - starts-with
      - $x-amz-meta-uploaded-by-name
      - ""
    - - starts-with
      - $x-amz-meta-uploaded-by-url
      - ""
