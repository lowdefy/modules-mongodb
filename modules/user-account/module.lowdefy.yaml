name: User Account
description: User account pages — login, email verification, profile view/edit/create

dependencies:
  - id: layout
    description: Page layout wrapper
  - id: events
    description: Audit event logging and change stamp

vars:
  app_name:
    required: true
    description: App name for event metadata
  login_message:
    default: <p>Welcome. Please provide your work email to sign in.</p>
    description: HTML message shown on the login page
  verify_email_message:
    default: A sign in link has been sent to your email. Follow the link to sign in.
    description: Message shown on the verify email request page
  event_display:
    default:
      _ref: defaults/event_display.yaml
    description: "Per-app event display templates. Keys are app identifiers, values map event types to Nunjucks title templates."
  avatar_colors:
    default:
      _ref: ../shared/profile/avatar_colors.yaml
    description: "Gradient pairs for avatar backgrounds. Each entry: { from, to }."
  fields:
    type: object
    description: "Field block arrays: profile. Same blocks used for edit forms and SmartDescriptions view. show_title toggles the title/honorific field."
    properties:
      show_title:
        type: boolean
        default: false
      profile:
        default: []
  components:
    type: object
    description: "Component overrides: view_extra"
    properties:
      view_extra:
        default: []
  request_stages:
    type: object
    description: "MongoDB pipeline stage overrides: write. write stages are appended to both create and update profile flows."
    properties:
      write:
        default: []

connections:
  - _ref: connections/user-contacts-collection.yaml

api:
  - _ref: api/create-profile.yaml
  - _ref: api/update-profile.yaml

pages:
  - _ref: pages/login.yaml
  - _ref: pages/verify-email-request.yaml
  - _ref: pages/profile.yaml
  - _ref: pages/edit-profile.yaml
  - _ref: pages/create-profile.yaml
  - _ref: pages/logout.yaml

exports:
  pages:
    - id: login
      description: Email-based passwordless login page
    - id: verify-email-request
      description: Confirmation page after sign-in link is sent
    - id: profile
      description: View user profile details
    - id: edit-profile
      description: Edit user profile fields
    - id: create-profile
      description: First-time profile creation after sign-up
    - id: logout
      description: Logout page — logs user out and shows login link
  connections:
    - id: user-contacts-collection
      description: MongoDB connection for user contact records
  api:
    - id: create-profile
      description: Create a new user profile record
    - id: update-profile
      description: Update existing user profile fields
  components:
    - id: profile-avatar
      description: Avatar config for PageHeaderMenu profile — user picture with first-letter fallback
    - id: profile-links
      description: MenuLink to user profile page
    - id: profile-actions
      description: MenuLink for logout (danger-styled)
    - id: event_types
      description: Event type display metadata for user-account events
  menus:
    - id: default
      description: User account navigation links

components:
  - id: profile-avatar
    component:
      _ref: components/profile-avatar.yaml
  - id: profile-links
    component:
      _ref: components/profile-links.yaml
  - id: profile-actions
    component:
      _ref: components/profile-actions.yaml
  - id: event_types
    component:
      _ref: enums/event_types.yaml
menus:
  - _ref: menu.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: "^2"
  - name: "@lowdefy/modules-mongodb-plugins"
