# Linked accounts + credential-presence read (design Decision 5) — ONE query
# feeding BOTH the read-only Linked-accounts tile AND the Security tile's
# credential-presence gate (task 18). Native read over `user-accounts` filtered to
# the caller (`_user.id`, plain string). A `$facet` splits the same match into:
#   accounts        — every linked row (providerId + accountId), incl. the
#                     built-in `credential` (email/password) row, which the tile
#                     renders as "Email & password" (unlike user-admin, which
#                     hides it — self-service shows the caller all their methods)
#   has_credential  — whether a `provider: "credential"` row exists; the per-user
#                     gate for the password-dependent controls (change password,
#                     2FA), since an OAuth/magic-link-only user has no credential
#                     and `changePassword` / `twoFactor.*` would 400
#   password_updated— the credential row's last-write date (Security tile subtitle)
# Returns a single-element array; the page binds get_accounts.0.*.
id: get_accounts
type: MongoDBAggregation
connectionId:
  _module.connectionId: user-accounts
properties:
  pipeline:
    - $match:
        userId:
          _user: id
    - $facet:
        list:
          - $project:
              _id: 0
              providerId: 1
              accountId: 1
        credential:
          - $match:
              providerId: credential
          - $limit: 1
    - $project:
        accounts: "$list"
        has_credential:
          $gt:
            - $size: "$credential"
            - 0
        password_updated:
          $dateToString:
            date:
              $first: "$credential.updatedAt"
            format: "%Y-%m-%d"
            onNull: ""
