# Read-only lookup of a single invitation for the accept page — display only
# (org name, inviter, invited email, status, expiry), keyed on the invitationId
# query parameter. $lookup joins user-organizations and users for their names.
id: get_invitation
type: MongoDBAggregation
connectionId:
  _module.connectionId: user-invitations
payload:
  invitationId:
    _url_query: invitationId
properties:
  pipeline:
    - $match:
        _id:
          _payload: invitationId
    - $limit: 1
    - $lookup:
        from: user-organizations
        localField: organizationId
        foreignField: _id
        as: org
    - $lookup:
        from: users
        localField: inviterId
        foreignField: _id
        as: inviter
    - $project:
        email: 1
        status: 1
        expiresAt: 1
        org_name:
          $first: "$org.name"
        inviter_name:
          $first: "$inviter.name"
