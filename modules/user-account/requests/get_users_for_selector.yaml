# Options request for the user-selector / user-multi-selector components.
#
# Split-model (BetterAuth) shape: the person record lives on `user-contacts`
# and the auth user lives on the `users` collection, linked back by
# `users.profile.contactId`. A contact is an "app user" when a `users` row
# points at it. We source from `user-contacts` (given_name / family_name /
# email live there) and $lookup `users` to keep only contacts that have become
# users. The old fused `apps.{slug}.is_user` guard is retired along with
# per-app scoping (app_name is gone — one deployment, one org; see the
# migration guide).
id: get_users_for_selector
type: MongoDBAggregation
connectionId:
  _module.connectionId: user-contacts-collection
properties:
  pipeline:
    - $lookup:
        from: users
        localField: _id
        foreignField: profile.contactId
        as: linked_user
    - $match:
        linked_user.0:
          $exists: true
    - $project:
        label:
          $concat:
            - "$profile.given_name"
            - " "
            - "$profile.family_name"
            - " ("
            - "$email"
            - ")"
        value: "$_id"
    - $sort:
        label: 1
