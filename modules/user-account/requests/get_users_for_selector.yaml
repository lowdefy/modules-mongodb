# Options request for the user-selector / user-multi-selector components.
# Scopes the dropdown to the current app's users via `apps.{slug}.is_user`.
#
# The app identifier comes from `_app: slug`, NOT `_module.var: app_name`:
# `_module.var` does not resolve through a cross-module component `_ref` (it
# yields null → `apps.null.is_user` → zero results), and these components are
# only ever consumed cross-module. `_app: slug` resolves at runtime from appMeta
# (the root `slug:` on lowdefy.yaml), independent of module-var resolution.
# Consuming apps must set `slug:` to match the `app_name` user-admin writes with.
id: get_users_for_selector
type: MongoDBAggregation
connectionId:
  _module.connectionId: user-contacts-collection
properties:
  pipeline:
    - $match:
        _object.defineProperty:
          on: {}
          key:
            _string.concat:
              - "apps."
              - _app: slug
              - ".is_user"
          descriptor:
            value: true
    - $project:
        label:
          $concat:
            - "$profile.given_name"
            - " "
            - "$profile.family_name"
            - " ("
            - "$email"
            - ")"
        value: "$_id"
    - $sort:
        label: 1
