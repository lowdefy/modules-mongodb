# Shared magic-link send affordance. Dispatches the one `Login` action with
# `magicLink: true` off the canonical `id: email` input the page owns. The send
# returns `{ status: true }` and no session, so it cannot navigate; on success
# it applies the caller-supplied `on_sent` SetState (the page's own view flip +
# stored target email) to show that page's "check your email" state. The send
# carries the two verify-callback targets the module owns as structured targets:
# `callbackUrl` -> the inbound `?callbackUrl=` or app home, `newUserCallbackUrl`
# -> the onboarding page. `errorCallbackUrl` is deliberately unset — the engine
# defaults it to authPages.error (the login page), so an expired/consumed link
# lands there with `?error=INVALID_TOKEN`.
#
# `magic_link_cooldown` disables the button between sends (set on click, cleared
# by a delayed SetState) so a user can't tap through the plugin's send rate
# limit (5 / 60s per IP). Referenced from login (primary send + resend) and
# signup (alternative-method send + resend); placements differ only in the
# id / label / styling vars and the page-specific `on_sent` flip.
id:
  _var: id
type: Button
visible:
  _var:
    key: visible
    default: true
properties:
  title:
    _var: label
  block: true
  size: large
  color:
    _var:
      key: color
      default: primary
  variant:
    _var:
      key: variant
      default: solid
  icon:
    _var:
      key: icon
      default: null
  disabled:
    _state: magic_link_cooldown
events:
  onClick:
    try:
      - id: begin_cooldown
        type: SetState
        params:
          magic_link_cooldown: true
      - id: magic_link_send
        type: Login
        messages:
          error: false
        params:
          email:
            _state: email
          magicLink: true
          callbackUrl:
            _if:
              test:
                _ne:
                  - _url_query: callbackUrl
                  - null
              then:
                url:
                  _url_query: callbackUrl
              else:
                home: true
          newUserCallbackUrl:
            pageId:
              _module.pageId: onboarding
      - id: show_link_sent
        type: SetState
        params:
          _var: on_sent
      - id: hold_cooldown
        type: Wait
        params:
          ms: 30000
      - id: clear_cooldown
        type: SetState
        params:
          magic_link_cooldown: false
    catch:
      - id: clear_cooldown_on_error
        type: SetState
        params:
          magic_link_cooldown: false
      - id: toast_magic_link_error
        type: DisplayMessage
        params:
          status: error
          content: We couldn't send your sign-in link right now. Please wait a moment and try again.
