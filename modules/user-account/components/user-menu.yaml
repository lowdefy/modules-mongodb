id: user-menu
type: Box
layout:
  contentGutter: 0
blocks:
  - id: user-name
    type: Html
    style:
      padding: 8px 16px
      fontWeight: bold
    properties:
      html:
        _user: profile.name
  - id: profile-link
    type: Button
    properties:
      title: Profile
      icon: AiOutlineUser
      type: text
      block: true
    events:
      onClick:
        - id: go-profile
          type: Link
          params:
            pageId:
              _module.pageId: profile
  - id: logout-btn
    type: Button
    properties:
      title: Logout
      icon: AiOutlineLogout
      type: text
      block: true
    events:
      onClick:
        - id: logout
          type: Logout
          params:
            callbackUrl:
              pageId: router
