id: form_profile
type: Box
layout:
  gap: 8
style:
  margin: auto
blocks:
  - id: user_avatar
    type: Img
    style:
      textAlign: center
      marginBottom: 42
      /element:
        width: 100px
        borderRadius: 50%
    properties:
      src:
        _nunjucks:
          template: https://api.dicebear.com/6.x/initials/svg?backgroundType=gradientLinear&scale=75&seed={{ name }}
          on:
            name:
              _string.concat:
                - _if_none:
                    - _state: contact.profile.given_name
                    - ""
                - " "
                - _if_none:
                    - _state: contact.profile.family_name
                    - ""
      alt:
        _string.concat:
          - "User avatar for "
          - _string.concat:
              - _if_none:
                  - _state: contact.profile.given_name
                  - ""
              - " "
              - _if_none:
                  - _state: contact.profile.family_name
                  - ""
  - id: contact.profile.title
    type: Selector
    layout:
      span: 3
    properties:
      title: Title
      placeholder: Mr
      options:
        - Mr
        - Ms
        - Mrs
        - Dr
        - Prof
  - id: contact.profile.given_name
    type: TextInput
    required: true
    layout:
      span: 9
    properties:
      title: First Name
      placeholder: John
  - id: contact.profile.family_name
    type: TextInput
    required: true
    layout:
      span: 12
    properties:
      title: Last Name
      placeholder: Doe
  - id: contact.email
    type: TextInput
    required: true
    validate:
      _ref:
        path: ../validate/email.yaml
        vars:
          field_name: contact.email
    properties:
      title: Email
      disabled: true
  - id: contact.profile.work_phone
    type: PhoneNumberInput
    layout:
      span: 12
    properties:
      title: Work Number
      defaultRegion: ZA
      placeholder: 11 001 2233
  - id: contact.profile.mobile_phone
    type: PhoneNumberInput
    layout:
      span: 12
    properties:
      title: Mobile Number
      defaultRegion: ZA
      placeholder: 82 111 2222
  - id: contact.profile.department
    type: TextInput
    properties:
      title: Department
      placeholder: Production
  - id: contact.profile.job_title
    type: TextInput
    properties:
      title: Job Title
      placeholder: Plant Manager
  - id: contact.profile.birthday
    type: DateSelector
    properties:
      title: Birthday
