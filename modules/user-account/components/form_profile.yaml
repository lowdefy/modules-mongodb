id: form_profile
type: Box
layout:
  gap: 8
style:
  margin: auto
blocks:
  _build.array.concat:
    - - id: avatar_preview
        type: Avatar
        style:
          textAlign: center
          marginBottom: 16
        properties:
          src:
            _js:
              _ref:
                path: ../shared/profile/generate-avatar-svg.js.njk
                vars:
                  prefix: contact.profile
          size: 100
      - id: shuffle_color
        type: Button
        style:
          textAlign: center
          marginBottom: 16
        properties:
          icon: AiOutlineSync
          shape: round
          variant: outlined
          # size: small
          title: Change color
        events:
          onClick:
            - id: next_color
              type: SetState
              params:
                contact.profile.avatar_color:
                  _get:
                    from:
                      _module.var: avatar_colors
                    key:
                      _math.floor:
                        _product:
                          - _math.random: true
                          - _array.length:
                              _module.var: avatar_colors
    - _build.if:
        test:
          _module.var: show_title
        then:
          - id: contact.profile.title
            type: Selector
            layout:
              span: 3
            properties:
              title: Title
              placeholder: Mr
              options:
                - Mr
                - Ms
                - Mrs
                - Dr
                - Prof
        else: []
    - - id: contact.profile.given_name
        type: TextInput
        required: true
        layout:
          span:
            _build.if:
              test:
                _module.var: show_title
              then: 9
              else: 12
        properties:
          title: First Name
          placeholder: John
      - id: contact.profile.family_name
        type: TextInput
        required: true
        layout:
          span: 12
        properties:
          title: Last Name
          placeholder: Doe
    - - id: email_display
        type: Descriptions
        properties:
          bordered: false
          column: 1
          size: small
          items:
            - label: Email
              value:
                _state: contact.email
    - _module.var: components.profile_fields
