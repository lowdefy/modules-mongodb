id: form_profile
type: Box
layout:
  gap: 8
style:
  margin: auto
blocks:
  _build.array.concat:
    - - id: avatar_preview
        type: Avatar
        style:
          textAlign: center
          marginBottom: 16
        properties:
          src:
            _js:
              _ref:
                path: ../shared/profile/generate-avatar-svg.js.njk
                vars:
                  prefix: profile
          size: 100
      - id: shuffle_color
        type: Button
        style:
          textAlign: center
          marginBottom: 16
        properties:
          icon: AiOutlineSync
          shape: round
          variant: outlined
          # size: small
          title: Change color
        events:
          onClick:
            - id: next_color
              type: SetState
              params:
                profile.avatar_color:
                  _get:
                    from:
                      _module.var: avatar_colors
                    key:
                      _math.floor:
                        _product:
                          - _math.random: true
                          - _array.length:
                              _module.var: avatar_colors
    # Core profile fields (shared)
    - _ref:
        path: ../shared/profile/form_core.yaml
        vars:
          show_title:
            _module.var: fields.show_title
    - - id: email_display
        type: Descriptions
        properties:
          bordered: false
          column: 1
          size: small
          items:
            - label: Email
              value:
                _state: email
    - _module.var: fields.profile
