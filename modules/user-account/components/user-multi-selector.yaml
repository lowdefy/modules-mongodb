id:
  _var:
    key: id
    default: user-multi-selector
type: MultipleSelector
requests:
  - _ref: requests/get_users_for_selector.yaml
events:
  onMount:
    - id: fetch_users
      type: Request
      params: get_users_for_selector
properties:
  title:
    _var:
      key: title
      default: Users
  placeholder: Select users
  options:
    _request: get_users_for_selector
  label:
    _var:
      key: label
      default: {}
