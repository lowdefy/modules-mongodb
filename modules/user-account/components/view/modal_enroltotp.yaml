# Set up 2FA modal (design Decision 5) — TwoFactorEnable returns the totpURI +
# backup codes (read from _actions), the built-in QRCode block renders the URI
# (with a copyable-text manual-entry fallback beside it), then a confirmation code
# → TwoFactorVerify. "Confirm & enable" opens the backup-codes modal (mock flow).
# Shown only when _build.authConfig.twoFactor.enabled AND the caller holds a
# credential row — those gates, and the TwoFactorEnable/Verify calls, are the wire
# task.
id: modal_enroltotp
type: Modal
properties:
  title: Set up two-factor authentication
  width: 560
  okText: Confirm & enable
  cancelText: Cancel
events:
  onOpen:
    # TODO(request-substitute) modal_enroltotp onOpen: "TwoFactorEnable client action → totpURI (into state.enroltotp.uri) + backup codes (into state for the backup-codes modal), read from _actions — wire task"
    - id: seed_totp
      type: SetState
      params:
        enroltotp:
          uri: "otpauth://totp/Module%20Demo%20App:jane.mokoena@example.com?secret=JBSWY3DPEHPK3PXP&issuer=Module%20Demo%20App"
  onOk:
    # TODO(request-substitute) modal_enroltotp onOk: "TwoFactorVerify (confirmation code) — wire task; on success the backup-codes modal below is shown"
    - id: open_backupcodes_modal
      type: CallMethod
      params:
        blockId: modal_backupcodes
        method: toggleOpen
blocks:
  - id: enroltotp_intro
    type: Html
    layout:
      span: 24
    properties:
      html: '<div style="font-size:13.5px; color:var(--ant-color-text-secondary);">Scan this with your authenticator app, then enter the 6-digit code to confirm.</div>'
  - id: enroltotp_row
    type: Box
    layout:
      direction: row
      gap: 16
      align: top
      selfAlign: top
    blocks:
      - id: enroltotp_qr
        type: QRCode
        layout:
          span: 8
          sm:
            span: 24
        properties:
          # TODO(request-substitute) enroltotp_qr: "totpURI from TwoFactorEnable (_state.enroltotp.uri)"
          value:
            _state: enroltotp.uri
          size: 132
          errorLevel: M
      - id: enroltotp_scancol
        type: Box
        layout:
          span: 16
          sm:
            span: 24
          gap: 16
        blocks:
          - id: enroltotp_uri
            type: TextInput
            layout:
              span: 24
            properties:
              # TODO(request-substitute) enroltotp_uri: "totpURI from TwoFactorEnable (_state.enroltotp.uri) — copyable manual-entry fallback"
              disabled: true
              label:
                title: Can't scan? Enter this key
                span: 24
                colon: false
          - id: enroltotp.confirmation_code
            type: TextInput
            layout:
              span: 24
            properties:
              placeholder: 6-digit code
              label:
                title: Confirmation code
                span: 24
