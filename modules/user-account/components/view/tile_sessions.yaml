# Active sessions tile (design Decision 5) — the caller's own signed-in devices,
# from a native read over user-sessions (token projected out — it's a bearer
# credential). One action: "Sign out others" (RevokeOtherSessions). Per-session
# revoke is deferred (token-exposure, Decision 5), so rows are display-only.
_ref:
  module: layout
  component: card
  vars:
    title: Active sessions
    header_buttons:
      - id: sessions_sign_out_others_btn
        type: Button
        layout:
          flex: 0 0 auto
        properties:
          title: Sign out others
          size: small
          color: danger
        events:
          onClick:
            # TODO(request-substitute) sessions_sign_out_others_btn: "RevokeOtherSessions client action — wire task"
            - id: sign_out_others_todo
              type: DisplayMessage
              params:
                status: info
                content: Sign out other sessions — wired in the wire task.
    blocks:
      - id: sessions_body
        type: Box
        layout:
          gap: 12
        blocks:
          - id: sessions_list
            type: ListSelector
            properties:
              selectable: false
              bordered: false
              gap: 0
              # TODO(request-substitute) sessions_list: "the caller's active sessions (native user-sessions read: device/user-agent, ip, city, expiresAt, current) — token $project-ed out (Decision 5)"
              data:
                - device: "Chrome · macOS"
                  meta: "41.203.11.8 · Johannesburg · expires in 6 days"
                  current: true
                - device: "Safari · iPhone"
                  meta: "102.54.9.2 · Cape Town · expires in 2 days"
                  current: false
                - device: "Firefox · Windows"
                  meta: "196.25.8.14 · expires in 5 days"
                  current: false
              html: |
                <div id="bl-{{ index }}.session_item" style="display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--ant-color-border-secondary); font-size:13px;">
                  <span style="flex:1 1 auto; min-width:0;">
                    <div style="color:var(--ant-color-text);">{{ item.device }}</div>
                    <div style="color:var(--ant-color-text-tertiary); font-size:12px;">{{ item.meta }}</div>
                  </span>
                  {% if item.current %}
                    <span style="flex:0 0 auto; padding:0 8px; border-radius:4px; font-size:12px; line-height:20px; background:var(--ant-color-success-bg); border:1px solid var(--ant-color-success-border); color:var(--ant-color-success-text);">This device</span>
                  {% endif %}
                </div>
            style:
              .body:
                padding: "0"
          - id: sessions_hint
            type: Html
            properties:
              html: '<div style="font-size:12px; color:var(--ant-color-text-tertiary);">Devices currently signed in to your account. “Sign out others” ends every session except this one.</div>'
