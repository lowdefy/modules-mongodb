# Change password modal (design Decision 5) — ChangePassword client action on the
# caller's session (current + new + revoke-other-sessions option). Shown only when
# _build.authConfig.emailAndPassword.enabled AND the caller holds a credential row
# (native user-accounts read) — those visibility gates are the wire task. onOk
# wiring (ChangePassword) is the wire task.
id: modal_changepw
type: Modal
properties:
  title: Change password
  width: 480
  okText: Update password
  cancelText: Cancel
events:
  onOk:
    # TODO(request-substitute) modal_changepw onOk: "Validate + ChangePassword client action (currentPassword, newPassword, revokeOtherSessions) — wire task"
    - id: change_password_todo
      type: DisplayMessage
      params:
        status: info
        content: Update password — wired in the wire task.
blocks:
  - id: changepw.current_password
    type: PasswordInput
    layout:
      span: 24
    properties:
      label:
        title: Current password
        span: 24
  - id: changepw.new_password
    type: PasswordInput
    layout:
      span: 24
    properties:
      label:
        title: New password
        span: 24
        extra: At least 8 characters.
  - id: changepw.revoke_other_sessions
    type: CheckboxSwitch
    layout:
      span: 24
    properties:
      title: Sign out my other sessions
      label:
        disabled: true
