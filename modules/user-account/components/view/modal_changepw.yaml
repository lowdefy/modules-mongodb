# Change password modal (design Decision 5) — ChangePassword client action on the
# caller's session (current + new + revoke-other-sessions option). The trigger is
# shown only when _build.authConfig.emailAndPassword.enabled AND the caller holds
# a credential row (gates on the tile). A failed change (wrong current password)
# throws, keeping the modal open and toasting the friendly error; a validation
# failure does the same. On success we re-fetch (the session list may have
# changed if revoke-other-sessions was set).
id: modal_changepw
type: Modal
properties:
  title: Change password
  width: 480
  okText: Update password
  cancelText: Cancel
events:
  onOk:
    _build.array.concat:
      - - id: validate_changepw
          type: Validate
          params: modal_changepw
        - id: change_password
          type: ChangePassword
          messages:
            loading: Updating password…
            success: Password updated.
            error: Couldn't update your password. Check your current password and try again.
          params:
            currentPassword:
              _state: changepw.current_password
            newPassword:
              _state: changepw.new_password
            revokeOtherSessions:
              _state: changepw.revoke_other_sessions
      - _ref: actions/refetch_account.yaml
blocks:
  - id: changepw.current_password
    type: PasswordInput
    required: true
    layout:
      span: 24
    properties:
      label:
        title: Current password
        span: 24
  - id: changepw.new_password
    type: PasswordInput
    required: true
    layout:
      span: 24
    properties:
      label:
        title: New password
        span: 24
        extra: At least 8 characters.
  - id: changepw.revoke_other_sessions
    type: CheckboxSwitch
    layout:
      span: 24
    properties:
      title: Sign out my other sessions
      label:
        disabled: true
