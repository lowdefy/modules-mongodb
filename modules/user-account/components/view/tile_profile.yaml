# Profile tile (design Decision 5) — the caller's own contact fields
# (fields.profile), read-only in SmartDescriptions. Edit opens modal_profile
# (write-profile routine via the update-profile API, wired in the wire task).
# Display reads the contact directly. Fields = shared form_core (name parts) +
# email (display only — email is a v1 non-goal to edit, Decision 6) + consumer
# fields.profile, matching the user-admin view.
_ref:
  module: layout
  component: card
  vars:
    title: Profile
    header_buttons:
      - id: profile_edit_btn
        type: Button
        layout:
          flex: 0 0 auto
        properties:
          title: Edit
          icon: AiOutlineEdit
          size: small
        events:
          onClick:
            - id: open_profile_modal
              type: CallMethod
              params:
                blockId: modal_profile
                method: toggleOpen
    blocks:
      - id: profile_view
        type: SmartDescriptions
        properties:
          column: 1
          size: small
          # TODO(request-substitute) profile_view: "caller's own contact — profile subdoc + email (native read over user-contacts by _user.profile.contactId)"
          data:
            profile:
              given_name: Jane
              family_name: Mokoena
              phone_number: "+27 82 555 0142"
              job_title: Operations Lead
              department: null
            email: jane.mokoena@example.com
          fields:
            _build.array.concat:
              - _ref:
                  path: ../shared/profile/form_core.yaml
                  vars:
                    show_honorific:
                      _module.var: fields.show_honorific
              # No `type` — let SmartDescriptions auto-detect the email value and
              # render it as an email (a forced TextInput/string renderer
              # title-cases the first letter, which is wrong for an address).
              - - id: email
                  properties:
                    title: Email
              - _module.var: fields.profile
