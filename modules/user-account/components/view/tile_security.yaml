# Security tile (design Decision 5) — self-service sign-in management for the
# caller's own account. Three sign-in rows: password (change), two-factor
# (manage / turn off), passkeys (add). Every control is a self-service BetterAuth
# client action on the caller's session (wire task). Visibility gates
# (_build.authConfig deployment gate + a user-accounts credential read per-user
# gate) are the wire task — this UI renders every row; the wire task hides the
# password-gated controls for credential-less users and the method-disabled rows.
# The email-verified badge lives in the tile header (resend when unverified).
_ref:
  module: layout
  component: card
  vars:
    title: Security
    header_buttons:
      # TODO(request-substitute) security_verified_badge: "verified state from the native users read (user.emailVerified); when unverified, swap to a 'Resend verification' control → SendVerificationEmail"
      - id: security_verified_badge
        type: Tag
        layout:
          flex: 0 0 auto
        properties:
          color: green
          icon: AiOutlineCheck
          title: Email verified
    blocks:
      - id: security_body
        type: Box
        layout:
          gap: 0
        blocks:
          - id: security_signin_eyebrow
            type: Html
            properties:
              html: '<div style="text-transform:uppercase; letter-spacing:0.08em; font-size:11px; color:var(--ant-color-text-tertiary);">Sign-in</div>'
            style:
              marginBottom: 8

          # ── Password row ──
          - id: password_row
            type: Box
            layout:
              direction: row
              align: middle
              selfAlign: middle
              justify: space-between
              gap: 12
            style:
              padding: 12px 0
              borderBottom: 1px solid var(--ant-color-border-secondary)
            blocks:
              - id: password_info
                type: Html
                layout:
                  flex: 1 1 auto
                properties:
                  # TODO(request-substitute) password_info: "last-changed timestamp for the credential row (native user-accounts read, provider: credential)"
                  html: |
                    <div style="display:flex; align-items:center; gap:12px; font-size:13px;">
                      <span style="width:28px; height:28px; border-radius:6px; background:var(--ant-color-primary-bg); color:var(--ant-color-primary); display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto;">
                        <svg viewBox="64 64 896 896" width="15" height="15" fill="currentColor" aria-hidden="true"><path d="M608 112c-167.9 0-304 136.1-304 304 0 70.3 23.9 135 63.9 186.5l-41.1 41.1-62.3-62.3a8.15 8.15 0 00-11.4 0l-39.8 39.8a8.15 8.15 0 000 11.4l62.3 62.3-44.9 44.9-62.3-62.3a8.15 8.15 0 00-11.4 0l-39.8 39.8a8.15 8.15 0 000 11.4l62.3 62.3-65.3 65.3a8.03 8.03 0 000 11.3l42.3 42.3c3.1 3.1 8.2 3.1 11.3 0l253.6-253.6A304.06 304.06 0 00608 720c167.9 0 304-136.1 304-304S775.9 112 608 112zm161.2 465.2C726.2 620.3 668.9 644 608 644c-60.9 0-118.2-23.7-161.2-66.8-43.1-43-66.8-100.3-66.8-161.2 0-60.9 23.7-118.2 66.8-161.2 43-43.1 100.3-66.8 161.2-66.8 60.9 0 118.2 23.7 161.2 66.8 43.1 43 66.8 100.3 66.8 161.2 0 60.9-23.7 118.2-66.8 161.2z"/></svg>
                      </span>
                      <span style="flex:1 1 auto; min-width:0;">
                        <div style="color:var(--ant-color-text);">Password</div>
                        <div style="color:var(--ant-color-text-tertiary); font-size:12px;">Last changed 3 months ago</div>
                      </span>
                    </div>
              - id: password_change_btn
                type: Button
                layout:
                  flex: 0 0 auto
                properties:
                  title: Change
                  size: small
                events:
                  onClick:
                    - id: open_changepw_modal
                      type: CallMethod
                      params:
                        blockId: modal_changepw
                        method: toggleOpen

          # ── Two-factor row ──
          - id: twofa_row
            type: Box
            layout:
              direction: row
              align: middle
              selfAlign: middle
              justify: space-between
              gap: 12
            style:
              padding: 12px 0
              borderBottom: 1px solid var(--ant-color-border-secondary)
            blocks:
              - id: twofa_info
                type: Html
                layout:
                  flex: 1 1 auto
                properties:
                  # TODO(request-substitute) twofa_info: "2FA enrolment state + backup-code count (native users read / twoFactor status)"
                  html: |
                    <div style="display:flex; align-items:center; gap:12px; font-size:13px;">
                      <span style="width:28px; height:28px; border-radius:6px; background:var(--ant-color-primary-bg); color:var(--ant-color-primary); display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto;">
                        <svg viewBox="64 64 896 896" width="15" height="15" fill="currentColor" aria-hidden="true"><path d="M744 62H280c-35.3 0-64 28.7-64 64v768c0 35.3 28.7 64 64 64h464c35.3 0 64-28.7 64-64V126c0-35.3-28.7-64-64-64zm-8 824H288V134h448v752zM472 784a40 40 0 1080 0 40 40 0 10-80 0z"/></svg>
                      </span>
                      <span style="flex:1 1 auto; min-width:0;">
                        <div style="color:var(--ant-color-text); display:flex; align-items:center; gap:8px;">Two-factor authentication <span style="padding:0 8px; border-radius:4px; font-size:12px; line-height:20px; background:var(--ant-color-success-bg); border:1px solid var(--ant-color-success-border); color:var(--ant-color-success-text);">On</span></div>
                        <div style="color:var(--ant-color-text-tertiary); font-size:12px;">Authenticator app · 8 backup codes left</div>
                      </span>
                    </div>
              - id: twofa_actions
                type: Box
                layout:
                  flex: 0 0 auto
                  direction: row
                  align: middle
                  selfAlign: middle
                  gap: 8
                blocks:
                  - id: twofa_manage_btn
                    type: Button
                    layout:
                      flex: 0 0 auto
                    properties:
                      title: Manage
                      size: small
                    events:
                      onClick:
                        - id: open_enroltotp_modal
                          type: CallMethod
                          params:
                            blockId: modal_enroltotp
                            method: toggleOpen
                  - id: twofa_disable_btn
                    type: Button
                    layout:
                      flex: 0 0 auto
                    properties:
                      title: Turn off
                      size: small
                      color: danger
                    events:
                      onClick:
                        # TODO(request-substitute) twofa_disable_btn: "TwoFactorDisable client action (password-gated) — wire task"
                        - id: twofa_disable_todo
                          type: DisplayMessage
                          params:
                            status: info
                            content: Turn off two-factor — wired in the wire task.

          # ── Passkeys row ──
          - id: passkeys_row
            type: Box
            layout:
              direction: row
              align: middle
              selfAlign: middle
              justify: space-between
              gap: 12
            style:
              padding: 12px 0
            blocks:
              - id: passkeys_info
                type: Html
                layout:
                  flex: 1 1 auto
                properties:
                  # TODO(request-substitute) passkeys_info: "registered passkeys (native read over user-passkeys, filtered to the caller — device names)"
                  html: |
                    <div style="display:flex; align-items:center; gap:12px; font-size:13px;">
                      <span style="width:28px; height:28px; border-radius:6px; background:var(--ant-color-primary-bg); color:var(--ant-color-primary); display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto;">
                        <svg viewBox="0 0 1024 1024" width="15" height="15" fill="currentColor" aria-hidden="true"><path d="M512 64L128 192v384c0 212.1 171.9 384 384 384s384-171.9 384-384V192L512 64zm312 512c0 172.3-139.7 312-312 312S200 748.3 200 576V246l312-110 312 110v330z"/><path d="M378.4 475.1a35.91 35.91 0 00-50.9 0 35.91 35.91 0 000 50.9l129.4 129.4 2.1 2.1a33.98 33.98 0 0048.1 0L730.6 434a33.98 33.98 0 000-48.1l-2.8-2.8a33.98 33.98 0 00-48.1 0L483 579.7 378.4 475.1z"/></svg>
                      </span>
                      <span style="flex:1 1 auto; min-width:0;">
                        <div style="color:var(--ant-color-text);">Passkeys</div>
                        <div style="color:var(--ant-color-text-tertiary); font-size:12px;">MacBook Pro · iPhone</div>
                      </span>
                    </div>
              - id: passkeys_add_btn
                type: Button
                layout:
                  flex: 0 0 auto
                properties:
                  title: Add passkey
                  size: small
                events:
                  onClick:
                    # TODO(request-substitute) passkeys_add_btn: "PasskeyRegister client action (WebAuthn registration ceremony) — wire task"
                    - id: passkeys_add_todo
                      type: DisplayMessage
                      params:
                        status: info
                        content: Add passkey — wired in the wire task.
