# Edit profile modal (design Decision 5) — the caller's own profile edit,
# save = write-profile routine (change-stamped contact write + UpdateUserProfile
# re-denorm) via the update-profile API, then UpdateSession so the header/avatar
# pick up the change (Decision 6). Fields bind state.profile.*; email is NOT
# edited here (verification flow, a v1 non-goal — Decision 6). Avatar preview +
# colour picker mirror the onboarding page. onOk wiring (CallAPI update-profile +
# UpdateSession) is the wire task.
id: modal_profile
type: Modal
properties:
  title: Edit profile
  width: 560
  okText: Save profile
  cancelText: Cancel
events:
  onOpen:
    - id: seed_profile
      type: SetState
      # TODO(request-substitute) modal_profile seed: "caller's own contact profile subdoc (native user-contacts read by _user.profile.contactId)"
      params:
        profile:
          given_name: Jane
          family_name: Mokoena
          phone_number: "+27 82 555 0142"
          job_title: Operations Lead
          department: null
  onOk:
    # TODO(request-substitute) modal_profile onOk: "Validate + CallAPI update-profile (write-profile fragment); on onDone fire UpdateSession — wire task"
    - id: save_profile_todo
      type: DisplayMessage
      params:
        status: info
        content: Save profile — wired in the wire task.
blocks:
  _build.array.concat:
    # Avatar preview + colour picker (profile-avatar shared component, Decision 5)
    - - id: profile_avatar_edit
        type: Box
        layout:
          gap: 8
          justify: center
        style:
          flexDirection: column
          alignItems: center
          marginBottom: 8
        blocks:
          # TODO(request-substitute) profile_avatar_face: "caller's initials from state.profile (first/last name); colour from the avatar_colors var"
          - id: profile_avatar_face
            type: Avatar
            properties:
              content: JM
              size: large
              theme:
                containerSizeLG: 64
                textFontSizeLG: 24
          # TODO(request-substitute) profile_avatar_color: "onClick → cycle the avatar colour across the avatar_colors var"
          - id: profile_avatar_color
            type: Button
            properties:
              title: Change colour
              icon: AiOutlineReload
              size: small
              shape: round
    - _ref:
        path: ../shared/profile/form_core.yaml
        vars:
          show_honorific:
            _module.var: fields.show_honorific
    - _module.var: fields.profile
