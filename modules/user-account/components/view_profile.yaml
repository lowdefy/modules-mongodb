id: view_contact_profile
type: Box
blocks:
  - id: user_avatar
    type: Img
    style:
      textAlign: center
      marginBottom: 42
      .element:
        width: 100px
        borderRadius: 50%
    properties:
      src:
        _user: profile.picture
  - id: profile_data
    type: DataView
    properties:
      sectionCards: false
      data:
        _object.assign:
          - _user: profile
          - email:
              _user: email
