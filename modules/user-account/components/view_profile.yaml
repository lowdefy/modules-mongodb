id: view_contact_profile
type: Box
blocks:
  _build.array.concat:
    # Identity header
    - - _ref:
          path: ../shared/layout/identity-header.yaml
          vars:
            avatar_src:
              _user: profile.picture
            name:
              _user: profile.name
            email:
              _user: email
            extra:
              - id: signed_up
                type: Paragraph
                visible:
                  _ne:
                    - _get:
                        key:
                          _build.string.concat:
                            - "apps."
                            - _module.var: app_name
                            - ".sign_up"
                        from:
                          _if_none:
                            - _request: get_my_profile.0
                            - {}
                    - null
                style:
                  marginBottom: 0
                properties:
                  type: secondary
                  content:
                    _nunjucks:
                      template: "Signed up {{ date | date('YYYY-MM-DD') }}"
                      on:
                        date:
                          _get:
                            key:
                              _build.string.concat:
                                - "apps."
                                - _module.var: app_name
                                - ".sign_up"
                            from:
                              _if_none:
                                - _request: get_my_profile.0
                                - {}
    # Profile SmartDescriptions
    - - id: profile_view
        type: SmartDescriptions
        properties:
          title: Profile
          column: 1
          size: small
          data:
            profile:
              _user: profile
          fields:
            _build.array.concat:
              - _ref:
                  path: ../shared/profile/form_core.yaml
                  vars:
                    show_honorific:
                      _module.var: fields.show_honorific
              - _module.var: fields.profile
