# Read-only native read of the BetterAuth-managed `user-invitations` collection (same
# MongoDB deployment as user-contacts). The workspace and hooks aggregate over
# these; all writes to auth-owned data go through BetterAuth client actions or
# engine steps, never this connection.
id: user-invitations
type: MongoDBCollection
properties:
  databaseUri:
    _secret: MONGODB_URI
  collection: user-invitations
  read: true
  write: false
