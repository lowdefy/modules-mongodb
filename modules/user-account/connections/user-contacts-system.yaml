id: user-contacts-system
type: MongoDBCollection
# Deliberately UNWALLED (no tenant:) — the system-context surface for the
# merge-on-signup contact mint (link-contact-on-signup), which runs from the
# session.create.after auth hook with no caller, where the tenant wall fails
# closed by design (org-aware-modules Decision 7). The wall's absence does NOT
# mean org-less writes: the mint stamps an explicit organizationId read from
# the hook payload's session (Decision 7's explicit-org rule) — see
# docs/shared/org-scoping.md.
# Every caller-ful path uses the walled user-contacts-collection instead.
properties:
  databaseUri:
    _secret: MONGODB_URI
  collection: user-contacts
  changeLog:
    collection: log-changes
    meta:
      user:
        _user: true
  write: true
