profile.name:
  _string.trim:
    _string.concat:
      - _string.trim:
          _if_none:
            - _payload: contact.profile.given_name
            - ""
      - " "
      - _string.trim:
          _if_none:
            - _payload: contact.profile.family_name
            - ""
profile.picture:
  _string.concat:
    - https://api.dicebear.com/6.x/initials/svg?backgroundType=gradientLinear&scale=75&seed=
    - _string.trim:
        _string.concat:
          - _string.trim:
              _if_none:
                - _payload: contact.profile.given_name
                - ""
          - " "
          - _string.trim:
              _if_none:
                - _payload: contact.profile.family_name
                - ""
profile.title:
  _payload: contact.profile.title
profile.given_name:
  _string.trim:
    _if_none:
      - _payload: contact.profile.given_name
      - ""
profile.family_name:
  _string.trim:
    _if_none:
      - _payload: contact.profile.family_name
      - ""
profile.work_phone:
  _payload: contact.profile.work_phone
profile.mobile_phone:
  _payload: contact.profile.mobile_phone
profile.birthday:
  _payload: contact.profile.birthday
profile.job_title:
