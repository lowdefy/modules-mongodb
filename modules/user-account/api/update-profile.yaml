id: update-profile
type: Api
routine:
  - :if:
      _or:
        - _eq:
            - _payload: profile.given_name
            - null
        - _eq:
            - _payload: profile.family_name
            - null
    :then:
      :reject: Missing required profile fields.

  - id: update
    type: MongoDBUpdateOne
    connectionId:
      _module.connectionId: user-contacts-collection
    properties:
      filter:
        _id:
          _user: id
      update:
        _build.array.concat:
          # Stage 1: Merge profile
          - - $set:
                profile:
                  $mergeObjects:
                    - $ifNull:
                        - "$$ROOT.profile"
                        - {}
                    - _payload: profile
                updated:
                  _ref:
                    module: events
                    component: change_stamp
          # Stage 2: Compute derived fields (sees merged profile from stage 1)
          - - $set:
                profile.name:
                  $concat:
                    - $trim:
                        input: "$profile.given_name"
                    - " "
                    - $trim:
                        input: "$profile.family_name"
          # Consumer pipeline stages
          - _module.var: request_stages.write

  - id: updated_user
    type: MongoDBFindOne
    connectionId:
      _module.connectionId: user-contacts-collection
    properties:
      query:
        _id:
          _user: id
  - id: new-event
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: update-profile
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.object.assign:
                        - _ref: defaults/event_display.yaml
                        - _module.var: event_display
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.update-profile
                            - null
                        - null
              callback:
                _build.function:
                  - __build.args: "0.0"
                  - title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.update-profile
                        on:
                          user:
                            _step: updated_user
                    description: null
        references:
          contact_ids:
            - _user: id
        metadata:
          app_name:
            _module.var: app_name
  - :return:
      success: true
