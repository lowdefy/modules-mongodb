_ref:
  module: layout
  component: page
  vars:
    id: edit-profile
    title: Edit Profile
    hide_title: true
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label: Profile
        pageId:
          _module.pageId: profile
      - label: Edit Profile
    events:
      onMount:
        - id: init
          type: SetState
          params:
            contact.profile:
              _user: profile
            contact.email:
              _user: email
    requests:
      - _ref: ../requests/update_profile.yaml
    blocks:
      - _ref:
          module: layout
          component: card
          vars:
            title: Edit Profile
            width: 600
            blocks:
              - _module.var:
                  key: components.form_profile
                  default:
                    _ref: ../components/form_profile.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            width: 600
            actions:
              - id: spacer
                type: Box
                layout:
                  flex: 1 0 auto
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: profile
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Save
                  icon: AiOutlineSave
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: update_profile
                      type: Request
                      messages:
                        success: Profile updated.
                      params: update_profile
                    - id: link_to_profile
                      type: Link
                      params:
                        pageId:
                          _module.pageId: profile
