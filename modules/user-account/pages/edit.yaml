_ref:
  module: layout
  component: page
  vars:
    id: edit
    title: Edit Profile
    content_width: 600
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label: Profile
        pageId:
          _module.pageId: view
      - label: Edit Profile
    events:
      onInit:
        - id: init
          type: SetState
          params:
            profile:
              _user: profile
            email:
              _user: email
    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          - _ref: components/form_profile.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Save
                  icon: AiOutlineSave
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: generate_avatar
                      type: SetState
                      params:
                        profile.picture:
                          _js:
                            _ref:
                              path: ../shared/profile/generate-avatar-svg.js.njk
                              vars:
                                prefix: profile
                    - id: update_profile
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: update-profile
                        payload:
                          profile:
                            _state: profile
                      messages:
                        success: Profile updated.
                    - id: link_to_profile
                      type: Link
                      params:
                        pageId:
                          _module.pageId: view
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: view
