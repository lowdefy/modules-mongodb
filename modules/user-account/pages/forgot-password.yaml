# Forgot-password page — task 11. Serves authPages.forgotPassword. Two renders
# via `forgot_view` (request | sent). Submit calls RequestPasswordReset with
# redirectTo = the reset-password page (so the emailed link lands there) and
# always shows the confirmation — success or failure — so the page never
# reveals whether an account exists (no enumeration).
_ref:
  module: layout
  component: auth-page
  vars:
    id: forgot-password
    title: ""
    events:
      onInit:
        - id: seed_forgot_view
          type: SetState
          params:
            forgot_view: request
    blocks:
      # ---- Request state ----
      - id: forgot_title
        type: Title
        visible:
          _eq:
            - _state: forgot_view
            - request
        properties:
          content: Reset your password
          level: 3
      - id: forgot_lead
        type: Html
        visible:
          _eq:
            - _state: forgot_view
            - request
        properties:
          html: Enter your email and we'll send a link to choose a new password.
        style:
          marginTop: -8
          fontSize: 13
          color: "var(--ant-color-text-secondary)"
      - id: email
        type: TextInput
        visible:
          _eq:
            - _state: forgot_view
            - request
        properties:
          type: email
          size: large
          suffixIcon: AiOutlineMail
          label:
            title: Email
            colon: false
            span: 24
      # Request the reset link, then always show the sent confirmation.
      # RequestPasswordReset is enumeration-safe server-side; the catch flips to
      # the same confirmation so a failure never reveals account existence.
      - id: forgot_submit
        type: Button
        visible:
          _eq:
            - _state: forgot_view
            - request
        properties:
          title: Send reset link
          block: true
          size: large
          color: primary
          variant: solid
        events:
          onClick:
            try:
              - id: request_reset
                type: RequestPasswordReset
                messages:
                  error: false
                params:
                  email:
                    _state: email
                  redirectTo:
                    _build.string.concat:
                      - "/"
                      - _module.pageId: reset-password
              - id: show_sent
                type: SetState
                params:
                  forgot_view: sent
                  forgot_email:
                    _state: email
            catch:
              - id: show_sent_on_error
                type: SetState
                params:
                  forgot_view: sent
                  forgot_email:
                    _state: email

      # ---- Sent confirmation (enumeration-safe) ----
      - id: forgot_sent
        type: Result
        visible:
          _eq:
            - _state: forgot_view
            - sent
        properties:
          icon:
            name: AiOutlineMail
            color: "var(--ant-color-primary)"
          status: info
          title: Check your email
          subTitle:
            _nunjucks:
              template: If an account exists for <b>{{ email }}</b>, we've sent a link to choose a new password.
              on:
                email:
                  _state: forgot_email
    nav:
      - id: forgot_footer
        type: Html
        properties:
          html: <a href="login">&larr; Back to sign in</a>
