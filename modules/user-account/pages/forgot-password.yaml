# Forgot-password page — task 11 (UI pipeline only; wiring deferred).
# Serves authPages.forgotPassword. Two renders via `forgot_view` (request | sent).
# On submit the confirmation always shows (enumeration-safe) — the submit →
# RequestPasswordReset call and the state flip are the wire task.
_ref:
  module: layout
  component: auth-page
  vars:
    id: forgot-password
    title: ""
    events:
      onInit:
        # TODO(request-substitute) forgot_view: request at rest; flip to "sent" on
        # a successful RequestPasswordReset (always, regardless of account
        # existence — no enumeration).
        - id: seed_forgot_view
          type: SetState
          params:
            forgot_view: request
    blocks:
      # ---- Request state ----
      - id: forgot_title
        type: Title
        visible:
          _eq:
            - _state: forgot_view
            - request
        properties:
          content: Reset your password
          level: 3
      - id: forgot_lead
        type: Html
        visible:
          _eq:
            - _state: forgot_view
            - request
        properties:
          html: Enter your email and we'll send a link to choose a new password.
        style:
          marginTop: -8
          fontSize: 13
          color: "var(--ant-color-text-secondary)"
      - id: email
        type: TextInput
        visible:
          _eq:
            - _state: forgot_view
            - request
        properties:
          type: email
          size: large
          suffixIcon: AiOutlineMail
          label:
            title: Email
            colon: false
            span: 24
      # TODO(request-substitute) forgot_submit: onClick → RequestPasswordReset with
      # redirectTo = _module.pageId reset-password (so the emailed link lands there).
      - id: forgot_submit
        type: Button
        visible:
          _eq:
            - _state: forgot_view
            - request
        properties:
          title: Send reset link
          block: true
          size: large
          color: primary
          variant: solid

      # ---- Sent confirmation (enumeration-safe) ----
      # TODO(request-substitute) forgot_sent: subTitle echoes the entered email.
      - id: forgot_sent
        type: Result
        visible:
          _eq:
            - _state: forgot_view
            - sent
        properties:
          icon:
            name: AiOutlineMail
            color: "var(--ant-color-primary)"
          status: info
          title: Check your email
          subTitle: If an account exists for that address, we've sent a link to choose a new password.
    nav:
      - id: forgot_footer
        type: Html
        properties:
          html: <a href="login">&larr; Back to sign in</a>
