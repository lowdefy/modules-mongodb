_ref:
  module: layout
  component: page
  vars:
    id: create-profile
    title: Create Profile
    content_width: 600
    breadcrumbs: []
    menu:
      links: []
    hide_profile: true
    hide_notifications: true
    events:
      onInit:
        - id: init
          type: SetState
          params:
            profile:
              _user: profile
            email:
              _user: email
            profile.birthday:
              _if:
                test:
                  _ne:
                    - _user: profile.birthday
                    - null
                then:
                  _date:
                    _if_none:
                      - _user: profile.birthday
                      - 2099-01-01
                else: null
        - id: init_avatar_color
          type: SetState
          params:
            profile.avatar_color:
              _if_none:
                - _state: profile.avatar_color
                - _get:
                    from:
                      _module.var: avatar_colors
                    key:
                      _math.floor:
                        _product:
                          - _math.random: true
                          - _array.length:
                              _module.var: avatar_colors
    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          - _ref: components/form_profile.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Save
                  icon: AiOutlineSave
                events:
                  onClick:
                    - id: validate
                      type: Validate
                      params:
                        regex: ^profile\.
                    - id: generate_avatar
                      type: SetState
                      params:
                        profile.picture:
                          _js:
                            _ref:
                              path: ../shared/profile/generate-avatar-svg.js.njk
                              vars:
                                prefix: profile
                    - id: create_profile
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: create-profile
                        payload:
                          profile:
                            _state: profile
                      messages:
                        success: Profile created.
                    # TODO: UpdateSession is bugged, using hard link to force refresh as workaround
                    # - id: update_session
                    #   type: UpdateSession
                    - id: reset
                      type: Reset
                    - id: link_to_home
                      type: Link
                      params:
                        url:
                          _location: origin
