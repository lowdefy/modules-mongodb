_ref:
  module: layout
  component: page
  vars:
    id: create-profile
    title: Create Profile
    hide_title: true
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label: Create Profile
    events:
      onInit:
        - id: init
          type: SetState
          params:
            contact.profile:
              _user: profile
            contact.email:
              _user: email
            contact.profile.birthday:
              _if:
                test:
                  _ne:
                    - _user: profile.birthday
                    - null
                then:
                  _date:
                    _if_none:
                      - _user: profile.birthday
                      - 2099-01-01
                else: null
    blocks:
      - _ref:
          module: layout
          component: card
          vars:
            title: Create Profile
            width: 600
            blocks:
              - _module.var:
                  key: components.form_profile
                  default:
                    _ref: ../components/form_profile.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            width: 600
            actions:
              - id: spacer
                type: Box
                layout:
                  flex: 1 0 auto
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Save
                  icon: AiOutlineSave
                events:
                  onClick:
                    - id: validate
                      type: Validate
                      params:
                        regex: ^contact\.
                    - id: create_profile
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: create-profile
                        payload:
                          contact:
                            _state: contact
                      messages:
                        success: Profile created.
                    - id: reset
                      type: Reset
                    - id: link_to_router
                      type: Link
                      params:
                        pageId: router
