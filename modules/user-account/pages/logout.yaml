# Logout page — task 16 (UI pipeline only; wiring deferred).
# Public signed-out confirmation. The Logout action (fired on load per the mock)
# and its ordering are the wire task; the confirmation render is built here.
_ref:
  module: layout
  component: auth-page
  vars:
    id: logout
    title: ""
    events:
      onInit:
        # TODO(request-substitute) logout: fire the Logout action on load, then
        # render this confirmation.
        - id: seed_logout
          type: SetState
          params:
            logged_out: true
    blocks:
      - id: logout_message
        type: Html
        properties:
          html: <div class="text-lg font-semibold">You're signed out</div><div class="text-sm mt-1 opacity-70">Thanks for stopping by. Your session on this device has ended.</div>
        style:
          textAlign: center
          padding: "12px 0 4px"
      - id: logout_sign_in_again
        type: Button
        properties:
          title: Sign in again
          block: true
          size: large
          color: primary
          variant: solid
        events:
          onClick:
            - id: go_login
              type: Link
              params:
                pageId:
                  _module.pageId: login
    nav: []
