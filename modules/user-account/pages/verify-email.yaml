# Verify-email page — task 13. Serves authPages.verifyEmail. One page, three
# renders via `verify_view`:
#   - check   : post-signup "check your email" prompt (default, no query).
#   - success : the emailed link verified — BetterAuth's GET /api/auth/verify-email
#               redirects to its callbackURL (no error) on success.
#   - expired : the link failed — the callback redirect carries `?error=<code>`
#               (TOKEN_EXPIRED / INVALID_TOKEN / ...).
#
# The verification callbackURL is set to this page with `?verified=1&email=<addr>`
# (see the resend below and signup.yaml), so the success landing is
# distinguishable from the resting check prompt, and — because BetterAuth appends
# `&error=` to the callbackURL on failure — the email survives onto the expired
# landing for the resend.
_ref:
  module: layout
  component: auth-page
  vars:
    id: verify-email
    title: ""
    events:
      onInit:
        - id: seed_verify_view
          type: SetState
          params:
            verify_view:
              _switch:
                branches:
                  - if:
                      _ne:
                        - _url_query: error
                        - null
                    then: expired
                  - if:
                      _ne:
                        - _url_query: verified
                        - null
                    then: success
                default: check
            verify_email:
              _url_query: email
    blocks:
      # ---- Check your email (post-signup prompt) ----
      - id: verify_prompt
        type: Result
        visible:
          _eq:
            - _state: verify_view
            - check
        properties:
          icon:
            name: AiOutlineMail
            color: "var(--ant-color-primary)"
          status: info
          title: Check your email
          subTitle:
            _module.var: verify_email_message
      - id: verify_resend
        type: Button
        visible:
          _eq:
            - _state: verify_view
            - check
        properties:
          title: Resend verification email
          block: true
          size: large
          variant: outlined
        events:
          onClick:
            - id: resend_check
              type: SendVerificationEmail
              params:
                email:
                  _state: verify_email
                callbackUrl:
                  _string.concat:
                    - "/"
                    - _module.pageId: verify-email
                    - "?verified=1&email="
                    - _state: verify_email

      # ---- Verified (callback success) ----
      - id: verify_success
        type: Result
        visible:
          _eq:
            - _state: verify_view
            - success
        properties:
          status: success
          title: Email verified
          subTitle: You're all set. Your email address has been confirmed.
      - id: verify_continue
        type: Button
        visible:
          _eq:
            - _state: verify_view
            - success
        properties:
          title: Continue to sign in
          block: true
          size: large
          color: primary
          variant: solid
        events:
          onClick:
            - id: verify_go_login
              type: Link
              params:
                pageId:
                  _module.pageId: login

      # ---- Expired (callback error) ----
      - id: verify_expired
        type: Result
        visible:
          _eq:
            - _state: verify_view
            - expired
        properties:
          icon:
            name: AiOutlineClockCircle
            color: "var(--ant-color-warning)"
          status: warning
          title: This link has expired
          subTitle: Verification links are valid for a short time. Request a fresh one to continue.
      - id: verify_resend_expired
        type: Button
        visible:
          _eq:
            - _state: verify_view
            - expired
        properties:
          title: Send a new link
          block: true
          size: large
          color: primary
          variant: solid
        events:
          onClick:
            - id: resend_expired
              type: SendVerificationEmail
              params:
                email:
                  _state: verify_email
                callbackUrl:
                  _string.concat:
                    - "/"
                    - _module.pageId: verify-email
                    - "?verified=1&email="
                    - _state: verify_email
