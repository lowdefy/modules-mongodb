# Reset-password page — task 12. Serves authPages.resetPassword. Landed on from
# the emailed reset link (forgot-password's redirectTo), which carries the reset
# token as `?token=`. Two renders via `reset_view` (form | success). Submit
# validates the confirm-match, calls ResetPassword with the URL token + new
# password, and maps invalid/expired-token errors to a friendly message.
_ref:
  module: layout
  component: auth-page
  vars:
    id: reset-password
    title: ""
    events:
      onInit:
        - id: seed_reset_view
          type: SetState
          params:
            reset_view: form
    blocks:
      # ---- Form state ----
      - id: reset_title
        type: Title
        visible:
          _eq:
            - _state: reset_view
            - form
        properties:
          content: Choose a new password
          level: 3
      - id: password
        type: PasswordInput
        visible:
          _eq:
            - _state: reset_view
            - form
        required: true
        properties:
          size: large
          label:
            title: New password
            colon: false
            span: 24
      - id: confirm_password
        type: PasswordInput
        visible:
          _eq:
            - _state: reset_view
            - form
        required: true
        validate:
          - pass:
              _eq:
                - _state: password
                - _state: confirm_password
            status: error
            message: Passwords must match.
        properties:
          size: large
          label:
            title: Confirm password
            colon: false
            span: 24
      # Validate the confirm-match, then reset with the URL token. On success
      # show the success state; a bad/expired token maps to a friendly message.
      - id: reset_submit
        type: Button
        visible:
          _eq:
            - _state: reset_view
            - form
        properties:
          title: Update password
          block: true
          size: large
          color: primary
          variant: solid
        events:
          onClick:
            try:
              - id: validate_reset
                type: Validate
              - id: reset_do
                type: ResetPassword
                messages:
                  error: false
                params:
                  newPassword:
                    _state: password
                  token:
                    _url_query: token
              - id: show_reset_success
                type: SetState
                params:
                  reset_view: success
            catch:
              # Validation failures show their own field messages; only toast
              # when the reset call itself failed (bad/expired token, etc.).
              - id: toast_reset_error
                type: DisplayMessage
                skip:
                  _ne:
                    - _actions: validate_reset.error
                    - null
                params:
                  status: error
                  content:
                    _switch:
                      branches:
                        - if:
                            _eq:
                              - _actions: reset_do.error.cause.code
                              - INVALID_TOKEN
                          then: This password reset link is invalid or has expired. Request a new one.
                      default: We couldn't reset your password. Request a new reset link and try again.

      # ---- Success state ----
      - id: reset_success
        type: Result
        visible:
          _eq:
            - _state: reset_view
            - success
        properties:
          status: success
          title: Password updated
          subTitle: Your password has been changed. You can now sign in with it.
      - id: reset_success_login
        type: Button
        visible:
          _eq:
            - _state: reset_view
            - success
        properties:
          title: Continue to sign in
          block: true
          size: large
          color: primary
          variant: solid
        events:
          onClick:
            - id: go_login
              type: Link
              params:
                pageId:
                  _module.pageId: login
