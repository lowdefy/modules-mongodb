# Reset-password page — task 12 (UI pipeline only; wiring deferred).
# Serves authPages.resetPassword. Landed on from the emailed reset link. Two
# renders via `reset_view` (form | success). Submit → ResetPassword (URL token +
# new password), token-error mapping, and the state flip are the wire task.
_ref:
  module: layout
  component: auth-page
  vars:
    id: reset-password
    title: ""
    events:
      onInit:
        # TODO(request-substitute) reset_view: form at rest; flip to "success" on a
        # successful ResetPassword; map invalid/expired-token errors inline.
        - id: seed_reset_view
          type: SetState
          params:
            reset_view: form
    blocks:
      # ---- Form state ----
      - id: reset_title
        type: Title
        visible:
          _eq:
            - _state: reset_view
            - form
        properties:
          content: Choose a new password
          level: 3
      # Data path `password`. Confirm-match validation is the wire task
      # (Validate action + input validate props).
      - id: password
        type: PasswordInput
        visible:
          _eq:
            - _state: reset_view
            - form
        required: true
        properties:
          size: large
          label:
            title: New password
            colon: false
            span: 24
      - id: confirm_password
        type: PasswordInput
        visible:
          _eq:
            - _state: reset_view
            - form
        required: true
        properties:
          size: large
          label:
            title: Confirm password
            colon: false
            span: 24
      # TODO(request-substitute) reset_submit: onClick → ResetPassword (reset token
      # from the URL + the new password).
      - id: reset_submit
        type: Button
        visible:
          _eq:
            - _state: reset_view
            - form
        properties:
          title: Update password
          block: true
          size: large
          color: primary
          variant: solid

      # ---- Success state ----
      - id: reset_success
        type: Result
        visible:
          _eq:
            - _state: reset_view
            - success
        properties:
          status: success
          title: Password updated
          subTitle: Your password has been changed. You can now sign in with it.
      - id: reset_success_login
        type: Button
        visible:
          _eq:
            - _state: reset_view
            - success
        properties:
          title: Continue to sign in
          block: true
          size: large
          color: primary
          variant: solid
        events:
          onClick:
            - id: go_login
              type: Link
              params:
                pageId:
                  _module.pageId: login
