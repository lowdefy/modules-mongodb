# Login page. Serves authPages.signIn and authPages.error.
# Three renders driven by `login_view` (signin | noaccess | link-sent):
#   - signin    : the sign-in form + enabled OAuth / passkey / magic-link methods.
#   - noaccess  : the authPages.error render (hard-wall "no access" etc.).
#   - link-sent : the magic-link "check your email" result (send returns
#                 { status: true } with no session, so it cannot navigate).
#
# Method enablement is read from the app auth config via `_build.authConfig`
# (Decision 2): the password form renders only when emailAndPassword is enabled,
# an OAuth button per configured provider, the passkey button only when passkey
# is enabled, and the magic-link send only when magicLink is enabled. The `email`
# input is shared by the password submit and the magic-link send, so it is
# hoisted out of the password branch and gated on emailAndPassword OR magicLink.
# Magic-link is the primary action (under the email) when password is off, and an
# alternative-method button (below the "or" divider) when password is on. The
# send button itself lives in the shared `components/magic-link-send.yaml`.
# OAuth display metadata (label/icon) comes from the `providers` var.
#
# Errors map through ONE code -> message table (the `_switch` blocks below):
# password errors return inline on the `Login` call (mapped in the onClick
# `catch`), OAuth / magic-link failures arrive as a redirect to authPages.error
# (this page) carrying `?error=` (mapped in `onInit`). Terminal codes
# (MEMBERSHIP_REQUIRED, EMAIL_NOT_VERIFIED) render the form-hiding noaccess wall;
# INVALID_EMAIL_OR_PASSWORD toasts inline; a retryable INVALID_TOKEN (expired /
# consumed magic link) stays on signin and drives a dedicated warning notice so
# the user can request a new link. A default covers 429 and any unmapped code.
_ref:
  module: layout
  component: auth-page
  vars:
    id: login
    title: Sign in
    events:
      onInit:
        # Seed the render. If the page was reached as the authPages.error
        # redirect target it carries `?error=<code>`. A retryable INVALID_TOKEN
        # (expired / consumed magic link) stays on signin so the email input and
        # send affordance remain reachable and drives the dedicated notice below;
        # every other code flips to the noaccess wall with its friendly title.
        - id: seed_login_view
          type: SetState
          params:
            login_view:
              _switch:
                branches:
                  - if:
                      _eq:
                        - _url_query: error
                        - INVALID_TOKEN
                    then: signin
                  - if:
                      _ne:
                        - _url_query: error
                        - null
                    then: noaccess
                default: signin
            # Dedicated retryable notice, set only for INVALID_TOKEN (null for
            # every other code and on a clean load) — a separate state to the
            # noaccess alert, whose title defaults on every load.
            login_notice_title:
              _if:
                test:
                  _eq:
                    - _url_query: error
                    - INVALID_TOKEN
                then: Link expired
                else: null
            login_notice_desc:
              _if:
                test:
                  _eq:
                    - _url_query: error
                    - INVALID_TOKEN
                then: This link has expired or was already used — request a new one below.
                else: null
            login_error_title:
              _switch:
                branches:
                  - if:
                      _eq:
                        - _url_query: error
                        - EMAIL_NOT_VERIFIED
                    then: Verify your email to continue
                default: You don't have access to this app
            login_error_desc:
              _switch:
                branches:
                  - if:
                      _eq:
                        - _url_query: error
                        - EMAIL_NOT_VERIFIED
                    then: Your email address hasn't been verified yet. Check your inbox for the verification link, then sign in again.
                  - if:
                      _eq:
                        - _url_query: error
                        - MEMBERSHIP_REQUIRED
                    then: Your sign-in worked, but no one has granted you access to this app yet. Ask an administrator for an invitation.
                default: Something went wrong while signing you in. Please try again, or contact an administrator.
    blocks:
      _build.array.concat:
        # --- Always present: lead + no-access alert --------------------------
        - - id: login_lead
            type: Html
            visible:
              _eq:
                - _state: login_view
                - signin
            properties:
              html:
                _module.var: login_message
            style:
              marginTop: -8
              fontSize: 13
              color: "var(--ant-color-text-secondary)"

          - id: login_error_alert
            type: Alert
            visible:
              _eq:
                - _state: login_view
                - noaccess
            properties:
              type: error
              showIcon: true
              message:
                _state: login_error_title
              description:
                _state: login_error_desc

          # Retryable notice above the form (chiefly an expired magic link).
          # Driven by the dedicated login_notice_* state, so it stays hidden on
          # a clean sign-in and leaves the send affordance reachable.
          - id: login_notice_alert
            type: Alert
            visible:
              _ne:
                - _state: login_notice_title
                - null
            properties:
              type: warning
              showIcon: true
              message:
                _state: login_notice_title
              description:
                _state: login_notice_desc

        # --- Shared email input — the one canonical `id: email` field both the
        # password submit and the magic-link send read. Hoisted out of the
        # password branch so it renders whenever either method is enabled. ------
        - _build.if:
            test:
              _build.or:
                - _build.authConfig: emailAndPassword.enabled
                - _build.authConfig: magicLink.enabled
            then:
              - id: email
                type: TextInput
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                properties:
                  type: email
                  size: large
                  suffixIcon: AiOutlineMail
                  label:
                    title: Email
                    colon: false
                    span: 24
                  placeholder: you@example.com
            else: []

        # --- Magic-link primary send — when password is off, the send is the
        # primary action directly under the email input. The button, its `Login`
        # dispatch, callback params, and cooldown live in the shared component. -
        - _build.if:
            test:
              _build.and:
                - _build.authConfig: magicLink.enabled
                - _build.not:
                    _build.authConfig: emailAndPassword.enabled
            then:
              - _ref:
                  path: components/magic-link-send.yaml
                  vars:
                    id: login_magic_send
                    label: Email me a sign-in link
                    visible:
                      _eq:
                        - _state: login_view
                        - signin
            else: []

        # --- Password form — rendered only when emailAndPassword is enabled ---
        - _build.if:
            test:
              _build.authConfig: emailAndPassword.enabled
            then:
              - id: login_password_label
                type: Box
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                layout:
                  justify: space-between
                  align: middle
                  selfAlign: middle
                blocks:
                  - id: login_password_label_text
                    type: Html
                    layout:
                      flex: 0 1 auto
                    properties:
                      html: Password
                    style:
                      fontSize: 13
                      fontWeight: 500
                      color: "var(--ant-color-text-secondary)"
                  - id: login_forgot_link
                    type: Button
                    layout:
                      flex: 0 1 auto
                    properties:
                      title: Forgot?
                      variant: link
                      color: primary
                      size: small
                    events:
                      onClick:
                        - id: go_forgot_password
                          type: Link
                          params:
                            pageId:
                              _module.pageId: forgot-password
              - id: password
                type: PasswordInput
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                properties:
                  size: large
                  label:
                    disabled: true

              # Primary submit — email/password via the one `Login` action.
              # On session success `Login` navigates to the callbackUrl itself
              # (from the `?callbackUrl=` set by the unauthenticated-page
              # redirect); a 2FA-enrolled user gets no session but a
              # `twoFactorRedirect` outcome, routed to the two-factor page.
              - id: login_submit
                type: Button
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                properties:
                  title: Sign in
                  block: true
                  size: large
                  color: primary
                  variant: solid
                events:
                  onClick:
                    try:
                      - id: login_do
                        type: Login
                        messages:
                          error: false
                        params:
                          email:
                            _state: email
                          password:
                            _state: password
                      - :if:
                          _eq:
                            - _actions: login_do.response.twoFactorRedirect
                            - true
                        :then:
                          - id: go_two_factor
                            type: Link
                            params:
                              pageId:
                                _module.pageId: two-factor
                              urlQuery:
                                callbackUrl:
                                  _url_query: callbackUrl
                    catch:
                      - id: map_login_error
                        type: SetState
                        params:
                          login_view:
                            _switch:
                              branches:
                                - if:
                                    _eq:
                                      - _actions: login_do.error.cause.code
                                      - MEMBERSHIP_REQUIRED
                                  then: noaccess
                                - if:
                                    _eq:
                                      - _actions: login_do.error.cause.code
                                      - EMAIL_NOT_VERIFIED
                                  then: noaccess
                              default: signin
                          login_error_title:
                            _switch:
                              branches:
                                - if:
                                    _eq:
                                      - _actions: login_do.error.cause.code
                                      - EMAIL_NOT_VERIFIED
                                  then: Verify your email to continue
                              default: You don't have access to this app
                          login_error_desc:
                            _switch:
                              branches:
                                - if:
                                    _eq:
                                      - _actions: login_do.error.cause.code
                                      - EMAIL_NOT_VERIFIED
                                  then: Your email address hasn't been verified yet. Check your inbox for the verification link, then sign in again.
                                - if:
                                    _eq:
                                      - _actions: login_do.error.cause.code
                                      - MEMBERSHIP_REQUIRED
                                  then: Your sign-in worked, but no one has granted you access to this app yet. Ask an administrator for an invitation.
                              default: Something went wrong while signing you in. Please try again.
                      - id: toast_login_error
                        type: DisplayMessage
                        skip:
                          _or:
                            - _eq:
                                - _actions: login_do.error.cause.code
                                - MEMBERSHIP_REQUIRED
                            - _eq:
                                - _actions: login_do.error.cause.code
                                - EMAIL_NOT_VERIFIED
                        params:
                          status: error
                          content:
                            _switch:
                              branches:
                                - if:
                                    _eq:
                                      - _actions: login_do.error.cause.code
                                      - INVALID_EMAIL_OR_PASSWORD
                                  then: Incorrect email or password. Please try again.
                              default: Something went wrong while signing you in. Please try again.
            else: []

        # --- Magic-link alternative-method button — when password holds the
        # primary slot, the send demotes to a peer of the OAuth / passkey buttons
        # below the "or" divider, placed first among them (closest to the email).
        # Same shared component as the primary send, restyled via vars. ---------
        - _build.if:
            test:
              _build.and:
                - _build.authConfig: magicLink.enabled
                - _build.authConfig: emailAndPassword.enabled
            then:
              - id: login_alt_divider
                type: Divider
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                properties:
                  title: or
                  plain: true
              - _ref:
                  path: components/magic-link-send.yaml
                  vars:
                    id: login_magic_send
                    label: Email me a sign-in link
                    variant: outlined
                    color: default
                    icon: AiOutlineMail
                    visible:
                      _eq:
                        - _state: login_view
                        - signin
            else: []

        # --- OAuth "or" divider — owned here unless the magic-link
        # alternative-method block above already renders one (mixed password +
        # magic-link deployment), so the two never double up. -------------------
        - _build.if:
            test:
              _build.and:
                - _build.gt:
                    - _build.array.length:
                        _build.authConfig: providers
                    - 0
                - _build.not:
                    _build.and:
                      - _build.authConfig: magicLink.enabled
                      - _build.authConfig: emailAndPassword.enabled
            then:
              - id: login_oauth_divider
                type: Divider
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                properties:
                  title: or
                  plain: true
            else: []

        # --- OAuth (signin state) — one button per configured provider that
        # also has display metadata in the `providers` var (label/icon). --------
        - _build.if:
            test:
              _build.gt:
                - _build.array.length:
                    _build.authConfig: providers
                - 0
            then:
              - id: login_oauth_buttons
                type: Box
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                layout:
                  gap: 12
                blocks:
                  _build.array.map:
                    on:
                      # `providers` var entries whose id the auth config enables.
                      _build.array.filter:
                        on:
                          _module.var: providers
                        callback:
                          _build.function:
                            __build.array.includes:
                              on:
                                __build.array.map:
                                  on:
                                    __build.authConfig: providers
                                  callback:
                                    _build.function:
                                      __build.args: "0.id"
                              value:
                                __build.args: "0.id"
                    callback:
                      _build.function:
                        id:
                          __build.string.concat:
                            - login_oauth_
                            - __build.args: "0.id"
                        type: Button
                        properties:
                          title:
                            __build.string.concat:
                              - "Continue with "
                              - __build.args: "0.label"
                          icon:
                            __build.args: "0.icon"
                          block: true
                          size: large
                          variant: outlined
                        events:
                          onClick:
                            - id: oauth_login
                              type: Login
                              params:
                                providerId:
                                  __build.args: "0.id"
            else: []

        # --- Passkey (signin state) — rendered only when passkey is enabled ---
        # PasskeySignIn runs the WebAuthn assertion ceremony in the browser and
        # navigates to the callbackUrl on success.
        - _build.if:
            test:
              _build.authConfig: passkey.enabled
            then:
              - id: login_passkey
                type: Button
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                properties:
                  title: Sign in with a passkey
                  icon: AiOutlineKey
                  block: true
                  size: large
                  variant: outlined
                events:
                  onClick:
                    - id: passkey_signin
                      type: PasskeySignIn
            else: []

        # --- Link-sent result (magic-link) — the send returns { status: true }
        # with no session, so it cannot navigate; it flips login_view to
        # link-sent and shows this "check your email" render. Resend re-fires the
        # same shared send (cooldown-guarded); the link button returns to signin.
        - _build.if:
            test:
              _build.authConfig: magicLink.enabled
            then:
              - id: login_link_sent
                type: Result
                visible:
                  _eq:
                    - _state: login_view
                    - link-sent
                properties:
                  icon:
                    name: AiOutlineMail
                    color: "var(--ant-color-primary)"
                  status: info
                  title: Check your email
                  subTitle:
                    _nunjucks:
                      template: We've emailed a sign-in link to <b>{{ email }}</b>. Open it on this device to continue — the link expires in a few minutes.
                      on:
                        email:
                          _state: magic_link_sent_email
              - _ref:
                  path: components/magic-link-send.yaml
                  vars:
                    id: login_resend
                    label: Resend link
                    variant: outlined
                    color: default
                    visible:
                      _eq:
                        - _state: login_view
                        - link-sent
              - id: login_back_to_form
                type: Button
                visible:
                  _eq:
                    - _state: login_view
                    - link-sent
                properties:
                  title: Use a different email
                  block: true
                  variant: link
                  color: primary
                events:
                  onClick:
                    - id: back_to_signin
                      type: SetState
                      params:
                        login_view: signin
            else: []
    nav:
      - id: login_footer
        type: Html
        properties:
          html: New here? <a href="signup">Create an account</a>
