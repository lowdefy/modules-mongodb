# Login page — task 09. Serves authPages.signIn and authPages.error.
# Two renders on one shared email/password form, driven by `login_view`
# (signin | noaccess):
#   - signin   : the sign-in form + enabled OAuth / passkey methods.
#   - noaccess : the authPages.error render (hard-wall "no access" etc.).
#
# Method enablement is read from the app auth config via `_build.authConfig`
# (Decision 2): the password form renders only when emailAndPassword is enabled,
# an OAuth button per configured provider, the passkey button only when passkey
# is enabled. OAuth display metadata (label/icon) comes from the `providers` var.
#
# Errors map through ONE code -> message table (the `_switch` blocks below),
# used by both paths: password errors return inline on the `Login` call (mapped
# in the onClick `catch`), OAuth / magic-link failures arrive as a redirect to
# authPages.error (this page) carrying `?error=` (mapped in `onInit`). Codes:
# MEMBERSHIP_REQUIRED, EMAIL_NOT_VERIFIED, INVALID_EMAIL_OR_PASSWORD, + default.
_ref:
  module: layout
  component: auth-page
  vars:
    id: login
    title: Sign in
    events:
      onInit:
        # Seed the render. If the page was reached as the authPages.error
        # redirect target it carries `?error=<code>` — flip to the noaccess
        # render and map the code to a friendly title/description.
        - id: seed_login_view
          type: SetState
          params:
            login_view:
              _if:
                test:
                  _ne:
                    - _url_query: error
                    - null
                then: noaccess
                else: signin
            login_error_title:
              _switch:
                branches:
                  - if:
                      _eq:
                        - _url_query: error
                        - EMAIL_NOT_VERIFIED
                    then: Verify your email to continue
                default: You don't have access to this app
            login_error_desc:
              _switch:
                branches:
                  - if:
                      _eq:
                        - _url_query: error
                        - EMAIL_NOT_VERIFIED
                    then: Your email address hasn't been verified yet. Check your inbox for the verification link, then sign in again.
                  - if:
                      _eq:
                        - _url_query: error
                        - MEMBERSHIP_REQUIRED
                    then: Your sign-in worked, but no one has granted you access to this app yet. Ask an administrator for an invitation.
                default: Something went wrong while signing you in. Please try again, or contact an administrator.
    blocks:
      _build.array.concat:
        # --- Always present: lead + no-access alert --------------------------
        - - id: login_lead
            type: Html
            visible:
              _eq:
                - _state: login_view
                - signin
            properties:
              html:
                _module.var: login_message
            style:
              marginTop: -8
              fontSize: 13
              color: "var(--ant-color-text-secondary)"

          - id: login_error_alert
            type: Alert
            visible:
              _eq:
                - _state: login_view
                - noaccess
            properties:
              type: error
              showIcon: true
              message:
                _state: login_error_title
              description:
                _state: login_error_desc

        # --- Password form — rendered only when emailAndPassword is enabled ---
        - _build.if:
            test:
              _build.authConfig: emailAndPassword.enabled
            then:
              - id: email
                type: TextInput
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                properties:
                  type: email
                  size: large
                  suffixIcon: AiOutlineMail
                  label:
                    title: Email
                    colon: false
                    span: 24
                  placeholder: you@example.com

              - id: login_password_label
                type: Box
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                layout:
                  justify: space-between
                  align: middle
                  selfAlign: middle
                blocks:
                  - id: login_password_label_text
                    type: Html
                    layout:
                      flex: 0 1 auto
                    properties:
                      html: Password
                    style:
                      fontSize: 13
                      fontWeight: 500
                      color: "var(--ant-color-text-secondary)"
                  - id: login_forgot_link
                    type: Button
                    layout:
                      flex: 0 1 auto
                    properties:
                      title: Forgot?
                      variant: link
                      color: primary
                      size: small
                    events:
                      onClick:
                        - id: go_forgot_password
                          type: Link
                          params:
                            pageId:
                              _module.pageId: forgot-password
              - id: password
                type: PasswordInput
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                properties:
                  size: large
                  label:
                    disabled: true

              # Primary submit — email/password via the one `Login` action.
              # On session success `Login` navigates to the callbackUrl itself
              # (from the `?callbackUrl=` set by the unauthenticated-page
              # redirect); a 2FA-enrolled user gets no session but a
              # `twoFactorRedirect` outcome, routed to the two-factor page.
              - id: login_submit
                type: Button
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                properties:
                  title: Sign in
                  block: true
                  size: large
                  color: primary
                  variant: solid
                events:
                  onClick:
                    try:
                      - id: login_do
                        type: Login
                        messages:
                          error: false
                        params:
                          email:
                            _state: email
                          password:
                            _state: password
                          # Login navigates only when it has a destination —
                          # normally the ?callbackUrl= set by the protected-page
                          # redirect. A direct visit to the login page has no
                          # query, and a successful sign-in would silently stay
                          # on the login page; default to the app root.
                          callbackUrl:
                            _if_none:
                              - _url_query: callbackUrl
                              - /
                      - :if:
                          _eq:
                            - _actions: login_do.response.twoFactorRedirect
                            - true
                        :then:
                          - id: go_two_factor
                            type: Link
                            params:
                              pageId:
                                _module.pageId: two-factor
                              urlQuery:
                                callbackUrl:
                                  _url_query: callbackUrl
                    catch:
                      - id: map_login_error
                        type: SetState
                        params:
                          login_view:
                            _switch:
                              branches:
                                - if:
                                    _eq:
                                      - _actions: login_do.error.cause.code
                                      - MEMBERSHIP_REQUIRED
                                  then: noaccess
                                - if:
                                    _eq:
                                      - _actions: login_do.error.cause.code
                                      - EMAIL_NOT_VERIFIED
                                  then: noaccess
                              default: signin
                          login_error_title:
                            _switch:
                              branches:
                                - if:
                                    _eq:
                                      - _actions: login_do.error.cause.code
                                      - EMAIL_NOT_VERIFIED
                                  then: Verify your email to continue
                              default: You don't have access to this app
                          login_error_desc:
                            _switch:
                              branches:
                                - if:
                                    _eq:
                                      - _actions: login_do.error.cause.code
                                      - EMAIL_NOT_VERIFIED
                                  then: Your email address hasn't been verified yet. Check your inbox for the verification link, then sign in again.
                                - if:
                                    _eq:
                                      - _actions: login_do.error.cause.code
                                      - MEMBERSHIP_REQUIRED
                                  then: Your sign-in worked, but no one has granted you access to this app yet. Ask an administrator for an invitation.
                              default: Something went wrong while signing you in. Please try again.
                      - id: toast_login_error
                        type: DisplayMessage
                        skip:
                          _or:
                            - _eq:
                                - _actions: login_do.error.cause.code
                                - MEMBERSHIP_REQUIRED
                            - _eq:
                                - _actions: login_do.error.cause.code
                                - EMAIL_NOT_VERIFIED
                        params:
                          status: error
                          content:
                            _switch:
                              branches:
                                - if:
                                    _eq:
                                      - _actions: login_do.error.cause.code
                                      - INVALID_EMAIL_OR_PASSWORD
                                  then: Incorrect email or password. Please try again.
                              default: Something went wrong while signing you in. Please try again.
            else: []

        # --- OAuth (signin state) — one button per configured provider that
        # also has display metadata in the `providers` var (label/icon). --------
        - _build.if:
            test:
              _build.gt:
                - _build.array.length:
                    _build.authConfig: providers
                - 0
            then:
              - id: login_oauth_divider
                type: Divider
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                properties:
                  title: or
                  plain: true
              - id: login_oauth_buttons
                type: Box
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                layout:
                  gap: 12
                blocks:
                  _build.array.map:
                    on:
                      # `providers` var entries whose id the auth config enables.
                      _build.array.filter:
                        on:
                          _module.var: providers
                        callback:
                          _build.function:
                            __build.array.includes:
                              on:
                                __build.array.map:
                                  on:
                                    __build.authConfig: providers
                                  callback:
                                    _build.function:
                                      __build.args: "0.id"
                              value:
                                __build.args: "0.id"
                    callback:
                      _build.function:
                        id:
                          __build.string.concat:
                            - login_oauth_
                            - __build.args: "0.id"
                        type: Button
                        properties:
                          title:
                            __build.string.concat:
                              - "Continue with "
                              - __build.args: "0.label"
                          icon:
                            __build.args: "0.icon"
                          block: true
                          size: large
                          variant: outlined
                        events:
                          onClick:
                            - id: oauth_login
                              type: Login
                              params:
                                providerId:
                                  __build.args: "0.id"
            else: []

        # --- Passkey (signin state) — rendered only when passkey is enabled ---
        # PasskeySignIn runs the WebAuthn assertion ceremony in the browser and
        # navigates to the callbackUrl on success.
        - _build.if:
            test:
              _build.authConfig: passkey.enabled
            then:
              - id: login_passkey
                type: Button
                visible:
                  _eq:
                    - _state: login_view
                    - signin
                properties:
                  title: Sign in with a passkey
                  icon: AiOutlineKey
                  block: true
                  size: large
                  variant: outlined
                events:
                  onClick:
                    - id: passkey_signin
                      type: PasskeySignIn
                      params:
                        # Same dead-end as the email path: PasskeySignIn only
                        # navigates when it has a destination; default a direct
                        # login-page visit to the app root.
                        callbackUrl:
                          _if_none:
                            - _url_query: callbackUrl
                            - /
            else: []
    nav:
      - id: login_footer
        type: Html
        properties:
          html: New here? <a href="signup">Create an account</a>
