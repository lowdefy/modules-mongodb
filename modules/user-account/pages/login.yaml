_ref:
  module: layout
  component: auth-page
  vars:
    id: login
    title: Login
    events:
      onMount:
        - id: logged_in_redirect
          type: Link
          skip:
            _eq:
              - _user: id
              - null
          params: router
        - id: set_error_message
          type: SetState
          skip:
            _eq:
              - _url_query: error
              - null
          params:
            error_message:
              _switch:
                branches:
                  - if:
                      _eq:
                        - _url_query: error
                        - EmailCreateAccount
                    then: You have not been granted access to this app. Please contact an administrator to request access.
                  - if:
                      _eq:
                        - _url_query: error
                        - Verification
                    then: <p>The sign in link is no longer valid.</p><p>It may have been used already or it may have expired.</p>
                default: An error occurred while logging in. Please contact an administrator.
        - id: logout
          type: Logout
          skip:
            _eq:
              - _url_query: error
              - null
          params:
            redirect: false
        - id: set_hint
          type: SetState
          skip:
            _eq:
              - _url_query: hint
              - null
          params:
            login_button_disabled: false
            email:
              _if_none:
                - _url_query: hint
                - ""
    blocks:
      - id: no_invite_alert
        type: Alert
        visible:
          _ne:
            - _state: error_message
            - null
        properties:
          description:
            _state: error_message
          type: error
          showIcon: true
      - id: sign_in_title
        type: Html
        style:
          color:
            _theme: colorTextSecondary
        properties:
          html:
            _module.var: login_message
      - id: email
        type: TextInput
        required: true
        validate:
          _ref: validate/email.yaml
        properties:
          title: Email
          label:
            disabled: true
          size: large
          placeholder: Work Email
          suffixIcon:
            name: AiOutlineMail
        events:
          onPressEnter:
            - id: validate
              type: Validate
            - id: set_login_button_disabled
              type: SetState
              params:
                login_button_disabled: true
            - id: login
              type: Login
              params:
                email:
                  _state: email
                callbackUrl:
                  _if:
                    test:
                      _ne:
                        - _input: callbackUrl
                        - null
                    then:
                      _input: callbackUrl
                    else:
                      pageId: router
            - id: set_login_button_enabled
              type: SetState
              params:
                login_button_disabled: false
    actions:
      - id: login_button
        type: Button
        style:
          marginTop: 8
        properties:
          title: Login
          icon: AiOutlineLogin
          block: true
          size: large
          disabled:
            _state: login_button_disabled
        events:
          onClick:
            - id: validate
              type: Validate
            - id: login
              type: Login
              params:
                email:
                  _state: email
                callbackUrl:
                  _if:
                    test:
                      _ne:
                        - _input: callbackUrl
                        - null
                    then:
                      _input: callbackUrl
                    else:
                      pageId: router
