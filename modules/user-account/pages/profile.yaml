_ref:
  module: layout
  component: page
  vars:
    id: profile
    title: Profile
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label: Profile
    blocks:
      - _ref:
          module: layout
          component: card
          vars:
            title: Profile
            width: 600
            blocks:
              - _module.var:
                  key: components.view_profile
                  default:
                    _ref: ../components/view_profile.yaml
            footer_buttons:
              - id: edit_profile_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Edit Profile
                  icon: AiOutlineEdit
                events:
                  onClick:
                    - id: edit_profile_link
                      type: Link
                      params:
                        pageId:
                          _module.pageId: edit-profile
              - id: logout_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Logout
                  icon: AiOutlineLogout
                  type: default
                events:
                  onClick:
                    - id: logout
                      type: Logout
                      params:
                        callbackUrl:
                          pageId: router
