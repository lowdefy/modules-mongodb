# Re-hydrate the workspace after a section edit (design Decision 5). `_ref`'d by
# the page onMount and by every modal / tile action chain, so a profile save,
# password change, 2FA enrol/disable, passkey add/delete, or session revoke
# re-fetches every read. Passkeys are also mirrored into `passkeys_ui` state — the
# List block that renders per-passkey delete binds to a state array, not a request.
- id: refetch_account
  type: Request
  params:
    - get_account
    - get_sessions
    - get_accounts
    - get_passkeys
- id: seed_passkeys_ui
  type: SetState
  params:
    passkeys_ui:
      _request: get_passkeys
