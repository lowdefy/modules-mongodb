name: Release Notes
version: 0.1.1
description: Display release notes from CHANGELOG.md

dependencies:
  - id: layout
    description: Page layout wrapper

vars:
  content:
    type: string
    description: Markdown content to render (typically loaded from CHANGELOG.md via _ref)

exports:
  pages:
    - id: view
      description: Release notes page
  menus:
    - id: default

pages:
  - _ref: pages/view.yaml

menus:
  - _ref: menus.yaml
