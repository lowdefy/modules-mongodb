_ref:
  module: layout
  component: page
  vars:
    id: view
    title: Release Notes
    hide_title: true
    content_width: 900
    blocks:
      - id: release_notes_card
        type: Card
        style:
          padding: 32px
        blocks:
          - id: release_notes_markdown
            type: Markdown
            properties:
              content:
                _if:
                  test:
                    _eq:
                      - _string.trim:
                          _if_none:
                            - _module.var: content
                            - ''
                      - ''
                  then: 'No release notes available yet.'
                  else:
                    _module.var: content
