id: pagination
type: Pagination
style:
  textAlign: right
properties:
  size: small
  showTotal: true
  showSizeChanger: true
  total:
    _if_none:
      - _get:
          from:
            _request:
              _var: request_id
          key: 0.total_results
      - 0
  disabled:
    _not:
      _request:
        _var: request_id
  pageSizeOptions:
    - 100
    - 500
    - 1000
events:
  onChange:
    - id: fetch_data
      type: Request
      messages:
        loading: true
      params:
        _var: request_id
