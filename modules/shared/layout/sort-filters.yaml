id: sort_filters_container
type: Box
layout:
  gap: 8
  justify: end
style:
  padding: 12px 16px 0px 16px
  margin: auto
blocks:
  - id: sort.by
    type: Selector
    layout:
      flex: 1 0 auto
    style:
      maxWidth: 160px
    properties:
      disabled:
        _ne:
          - _if_none:
              - _state: filter.search
              - null
          - null
      placeholder: Sort By
      label:
        disabled: true
      options:
        _var: sort_options
    events:
      onChange:
        try:
          _var: search_action
        debounce:
          ms: 500

  - id: sort_disabled_tooltip
    type: Tooltip
    layout:
      flex: 0 1 auto
    properties:
      title:
        _if:
          test:
            _ne:
              - _if_none:
                  - _state: filter.search
                  - null
              - null
          then: Ordered by most relevant to search
          else: null
    blocks:
      - id: sort_order
        type: Button
        properties:
          disabled:
            _ne:
              - _if_none:
                  - _state: filter.search
                  - null
              - null
          icon:
            _if:
              test:
                _eq:
                  - _state: sort.order
                  - -1
              then: AiOutlineSortDescending
              else: AiOutlineSortAscending
          hideTitle: true
        events:
          onClick:
            _build.array.concat:
              - - id: set_sort_order
                  type: SetState
                  params:
                    sort.order:
                      _if:
                        test:
                          _eq:
                            - _state: sort.order
                            - -1
                        then: 1
                        else: -1
              - _var: search_action
