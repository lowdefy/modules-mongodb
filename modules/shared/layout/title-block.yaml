id: title-block
type: Box
layout:
  selfAlign: middle
blocks:
  _build.array.concat:
    # Back button (optional — placed before the title)
    - _build.if:
        test:
          _var:
            key: show_back_button
            default: false
        then:
          - id: back-btn
            type: Button
            layout:
              flex: 0 0 auto
            style:
              marginRight: 8
            properties:
              hideTitle: true
              icon: AiOutlineArrowLeft
              type: text
              size: large
            events:
              onClick:
                # Explicit back target when `back_link` ({ pageId, urlQuery })
                # is supplied; otherwise browser history back.
                - id: back
                  type: Link
                  params:
                    _build.if:
                      test:
                        _build.ne:
                          - _var:
                              key: back_link
                              default: null
                          - null
                      then:
                        _var: back_link
                      else:
                        back: true
        else: []
    # Optional status badge — caller supplies text + colour; rendered as a
    # full-height pill to the left of the title.
    - _build.if:
        test:
          _build.ne:
            - _var:
                key: badge_text
                default: null
            - null
        then:
          - id: title-badge
            type: Tag
            layout:
              flex: 0 0 auto
              selfAlign: stretch
            # Hidden until the badge text resolves — avoids a grey
            # placeholder pill (and the block-id fallback) during load.
            visible:
              _ne:
                - _var: badge_text
                - null
            style:
              .element:
                display: flex
                alignItems: center
                height: 100%
                marginRight: 12
                fontSize: 15
                fontWeight: 500
                lineHeight: 1
                paddingInline: 12
                borderRadius: 6
            properties:
              color:
                _var:
                  key: badge_color
                  default: default
              title:
                _var: badge_text
        else: []
    - - id: title
        type: Html
        layout:
          flex: 1 0 auto
        properties:
          html:
            _nunjucks:
              template: |
                <h2 class="text-2xl font-semibold" style="margin: 0;">{{ title | safe }}</h2>
                <div class="text-text-secondary text-sm" style="overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">
                  {% if doc.updated.user.name %}
                    Last modified by {{ doc.updated.user.name | safe }} on {{ doc.updated.timestamp | date('MMM D, YYYY h:mm A')}}
                  {% endif %}
                  {% if doc.updated.user.name and doc.created.user.name %} | {% endif %}
                  {% if doc.created.user.name %}
                    Created by {{ doc.created.user.name | safe }} on {{ doc.created.timestamp | date('MMM D, YYYY h:mm A')}}
                  {% endif %}
                </div>
              on:
                title:
                  _var: title
                doc:
                  _var: doc
    - - id: page-actions
        type: Box
        layout:
          flex: 0 1 auto
        style:
          margin: 16
        blocks:
          _var:
            key: page_actions
            default: []
