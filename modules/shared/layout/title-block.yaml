id: title-block
type: Box
blocks:
  - id: title
    type: Html
    layout:
      flex: 1 0 auto
    properties:
      html:
        _nunjucks:
          template: |
            <h2 class="text-2xl font-semibold" style="margin: 0;">{{ title | safe }}</h2>
            <div class="text-text-secondary text-sm" style="overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">
              {% if doc.updated.user.name %}
                Last modified by {{ doc.updated.user.name | safe }} on {{ doc.updated.timestamp | date('MMM D, YYYY h:mm A')}}
              {% endif %}
              {% if doc.updated.user.name and doc.created.user.name %} | {% endif %}
              {% if doc.created.user.name %}
                Created by {{ doc.created.user.name | safe }} on {{ doc.created.timestamp | date('MMM D, YYYY h:mm A')}}
              {% endif %}
            </div>
          on:
            title:
              _var: title
            doc:
              _var: doc
  - id: page-actions
    type: Box
    layout:
      flex: 0 1 auto
    style:
      margin: 16
    blocks:
      _var:
        key: page_actions
        default: []
