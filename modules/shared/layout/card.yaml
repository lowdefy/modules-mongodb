_build.switch:
  branches:
    - if:
        _build.ne:
          - _module.var: card
          - null
      then:
        _module.var: card
  default:
    id: card-section
    type: Box
    layout:
      span: 24
      gap: 8
    blocks:
      _build.array.concat:
        - - id: card
            type: Card
            loading:
              _var:
                key: loading
                default: false
            skeleton:
              type: Card
              blocks:
                - type: Skeleton
                  properties:
                    height:
                      _var:
                        key: skeleton_height
                        default: 300
            properties:
              title:
                _build.if:
                  test:
                    _var:
                      key: hide_title
                      default: false
                  then: null
                  else:
                    _var: title
            layout:
              gap: 16
            # TODO: slots.extra forces the card title area to render even when hide_title: true
            slots:
              extra:
                blocks:
                  _var:
                    key: header_buttons
                    default: []
            blocks:
              _var:
                key: blocks
                default: []
        # Footer buttons (inline, not sticky)
        - _build.if:
            test:
              _build.gt:
                - _build.array.length:
                    _var:
                      key: footer_buttons
                      default: []
                - 0
            then:
              - id: card-footer
                type: Box
                layout:
                  direction: row-reverse
                  gap: 8
                blocks:
                  _var:
                    key: footer_buttons
                    default: []
            else: []
