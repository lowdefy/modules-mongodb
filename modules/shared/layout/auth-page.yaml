id:
  _var: id
type: Layout
style:
  minHeight: 100vh
events:
  onInit:
    _var:
      key: events.onInit
      default: []
  onInitAsync:
    _var:
      key: events.onInitAsync
      default: []
  onMount:
    _var:
      key: events.onMount
      default: []
  onMountAsync:
    _var:
      key: events.onMountAsync
      default: []
requests:
  _var:
    key: requests
    default: []
blocks:
  - id: auth-content
    type: Content
    layout:
      align: center
      justify: center
      flex: 1 1 auto
    style:
      padding: 0 20px
    blocks:
      - id: auth-page-container
        type: Box
        style:
          maxWidth: 400
        blocks:
          - id: auth-logo
            type: Img
            layout:
              selfAlign: middle
            properties:
              src:
                _module.var: logo.primary
              width: 100%
          - id: auth-card
            type: Card
            layout:
              gap: 8
            blocks:
              _build.array.concat:
                - _build.if:
                    test:
                      _build.ne:
                        - _var:
                            key: title
                            default: ""
                        - ""
                    then:
                      - id: auth-title
                        type: Title
                        style:
                          textAlign: center
                        properties:
                          content:
                            _var: title
                          level: 1
                    else: []
                - _var:
                    key: blocks
                    default: []
                - _var:
                    key: actions
                    default: []
  - id: auth-footer
    type: Footer
    blocks:
      _module.var:
        key: footer
        default: []
