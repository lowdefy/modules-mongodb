id:
  _var: id
type: Layout
style:
  minHeight: 100vh
events:
  onInit:
    _var:
      key: events.onInit
      default: []
  onInitAsync:
    _var:
      key: events.onInitAsync
      default: []
  onMount:
    _var:
      key: events.onMount
      default: []
  onMountAsync:
    _var:
      key: events.onMountAsync
      default: []
requests:
  _var:
    key: requests
    default: []
blocks:
  - id: auth-content
    type: Content
    layout:
      direction: column
      justify: center
      flex: 1 1 auto
    slots:
      content:
        style:
          minHeight: 100vh
          alignItems: center
    style:
      padding: 0 20px
    blocks:
      - id: auth-page-container
        type: Box
        style:
          maxWidth:
            _module.var:
              key: auth_page.max_width
              default: 360
        blocks:
          _build.array.concat:
            - - id: auth-card
                type: Card
                layout:
                  gap: 16
                style:
                  .element:
                    _module.var:
                      key: auth_page.card_style
                      default: {}
                properties:
                  bordered: false
                  theme:
                    borderRadiusLG: 12
                    bodyPadding: '28px 32px 28px 32px'
                slots:
                  cover:
                    blocks:
                      - id: auth-cover
                        type: Box
                        layout:
                          justify: center
                          align: middle
                        style:
                          padding: '32px 32px 24px 32px'
                          background:
                            _module.var:
                              key: auth_page.cover_background
                              default:
                                _if:
                                  test:
                                    _media: darkMode
                                  then: 'linear-gradient(160deg, color-mix(in srgb, var(--ant-color-primary) 40%, black) 0%, color-mix(in srgb, var(--ant-color-primary) 60%, black) 100%)'
                                  else: 'linear-gradient(160deg, color-mix(in srgb, var(--ant-color-primary) 70%, black) 0%, var(--ant-color-primary) 100%)'
                          borderRadius: '12px 12px 0 0'
                        blocks:
                          - id: auth-logo
                            type: Img
                            style:
                              maxWidth:
                                _module.var:
                                  key: auth_page.logo_max_width
                                  default: 160
                            properties:
                              src:
                                _module.var:
                                  key: logo.primary_dark
                                  default: /logo-dark-theme.png
                              width: 100%
                blocks:
                  _build.array.concat:
                    - _build.if:
                        test:
                          _build.ne:
                            - _var:
                                key: title
                                default: ''
                            - ''
                        then:
                          - id: auth-title
                            type: Title
                            properties:
                              content:
                                _var: title
                              level: 3
                        else: []
                    - _var:
                        key: blocks
                        default: []
                    - _var:
                        key: actions
                        default: []
            - _build.if:
                test:
                  _build.gt:
                    - _build.array.length:
                        _module.var:
                          key: footer
                          default: []
                    - 0
                then:
                  - id: auth-footer
                    type: Box
                    style:
                      marginTop: 24
                      textAlign: center
                      fontSize: 12
                      color: 'var(--ant-color-text-secondary)'
                    blocks:
                      _module.var:
                        key: footer
                        default: []
                else: []
