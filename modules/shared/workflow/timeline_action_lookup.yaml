# Shared timeline action-lookup fragment (Part 42 D1/D4/D5).
#
# Spliced (via _build.array.concat) into a pipeline that has ALREADY $match'd
# events to the target reference. Joins events → actions, projects an
# access-aware action card (status, message, single resolved link), and attaches
# each action only to its LATEST referencing event.
#
# Parameter: `_var: app_name`. Composes the shared `visible_verbs` and
# `resolve_action_link` stages (each parameterized by the same app_name).
- $lookup:
    from: actions
    localField: action_ids
    foreignField: _id
    as: actions
    pipeline:
      # Card-worthiness filter (adapted from v0 — see design D4). Drops:
      #   1. actions whose CURRENT stage is blocked (no blocked card ever
      #      renders; the block also hides them), and
      #   2. actions that have NEVER been in an active stage — a history of
      #      only blocked / not-required (e.g. blocked → not-required) means
      #      nothing ever happened, so there is no card story to tell.
      # v0 enumerated the two never-worked history shapes (['blocked'] and
      # ['not-required', 'blocked']); this expresses the same intent
      # semantically and also covers shapes v0's exact-array match missed
      # (e.g. blocked/not-required cycles).
      # MUST run before the $addFields below, which overwrites `status`
      # (the history array) with the scalar current stage.
      - $match:
          $expr:
            $and:
              - $ne:
                  - $arrayElemAt:
                      - $status.stage
                      - 0
                  - blocked
              - $gt:
                  - $size:
                      $filter:
                        input: $status.stage
                        cond:
                          $not:
                            $in:
                              - $$this
                              - - blocked
                                - not-required
                  - 0
      - $addFields:
          status:
            $arrayElemAt:
              - $status.stage
              - 0
      - _ref:
          path: ../shared/workflow/visible_verbs.yaml
          vars:
            app_name:
              _var: app_name
      # Drop actions the user holds NO verbs on — Part 34's "no role
      # intersection on any verb → invisible" outcome, same as every other
      # surface gets from visible_verbs_filter.yaml. Inlined: this fragment
      # (modules/shared/) cannot _ref the workflows-module-internal bundle.
      - $match:
          $expr:
            $anyElementTrue:
              - - $visible_verbs.view
                - $visible_verbs.edit
                - $visible_verbs.review
                - $visible_verbs.error
      - _ref:
          path: ../shared/workflow/resolve_action_link.yaml
          vars:
            app_name:
              _var: app_name
      - $project:
          _id: 1
          sort_order: 1
          updated: 1
          status: 1
          link: 1
          message:
            _string.concat:
              - '$'
              - _var: app_name
              - '.message'
- $unwind:
    path: $actions
    preserveNullAndEmptyArrays: true
- $setWindowFields:
    partitionBy: $actions._id
    sortBy:
      created.timestamp: 1
    output:
      last_event_id:
        $last: $_id
        window:
          documents:
            - current
            - unbounded
- $group:
    _id: $_id
    event:
      $first: $$ROOT
    actions:
      $push:
        $cond:
          - $eq:
              - $last_event_id
              - $_id
          - $actions
          - null
- $addFields:
    event.actions:
      $filter:
        input: $actions
        cond:
          $ne:
            - $$this
            - null
- $addFields:
    event.actions:
      $sortArray:
        input: $event.actions
        sortBy:
          sort_order: 1
          updated.timestamp: 1
- $replaceRoot:
    newRoot: $event
- $project:
    last_event_id: 0
