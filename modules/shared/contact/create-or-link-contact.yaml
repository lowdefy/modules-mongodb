# Shared create-or-link-contact fragment — one canonical spec, `_ref`'d by
# relative path from BOTH user-account (merge-on-signup hook) and user-admin
# (invite), so the match-and-write semantics can't drift. Runs in SYSTEM context
# (a hook / system-context endpoint): `_user` is null and the auth floor is
# waived, so the change stamp records a system write and UpdateUserProfile is
# allowed against any user.
#
# An upsert keyed on the contact's `lowercase_email` (compound with
# `organizationId` when the caller supplies one — see `organization_id` below):
#   - match the contact by lowercased email (within the org, when given);
#   - link (contactId) when found;
#   - insert BARE (change-stamped, no name, `profile.profile_created` unset —
#     so first login routes through onboarding) when absent;
#   - reconcile to the existing row on a duplicate-key error (the partial-unique
#     `user-contacts.{organizationId,lowercase_email}` index — see
#     docs/user-account/reference/indexes.md — is the guard that closes the
#     race with the user-admin invite).
#
# The contactId write-back runs only when `binding_point` is a post-write hook
# point (`session.create.after`): the user row already exists, so contactId is
# written through UpdateUserProfile. Callers that link elsewhere (the invite
# path links at accept) pass no `binding_point` and get no write-back.
#
# Var-free — every input is an `_ref` var (NEVER `_module.var`):
#   connection_id   — the caller's scoped user-contacts connection id
#   user            — the auth user record (the hook payload's `user`)
#   binding_point   — optional; "session.create.after" (which hook point fired)
#   organization_id — optional; explicit organization for system-context callers
#                     writing through an UNWALLED connection (Decision 7). When
#                     set, it joins the upsert filter and read query, so the
#                     match key is the compound-unique {organizationId,
#                     lowercase_email} tuple and MongoDB carries the equality
#                     into the inserted document. Callers on a WALLED connection
#                     must NOT pass it — the wall injects the org and rejects an
#                     authored organizationId filter.
#
# YAML sequence of routine steps — splice with `_build.array.concat`.

# Upsert the contact on lowercase_email. On a concurrent first-touch the
# partial-unique index throws a duplicate-key error; catch it and fall through
# to the read, which returns whichever row won.
- :try:
    - id: upsert_contact
      type: MongoDBUpdateOne
      connectionId:
        _var: connection_id
      properties:
        # The organizationId clause is merged at build time only when the
        # caller passes `organization_id` — an authored organizationId filter
        # on a walled connection would be rejected by the tenant wall.
        filter:
          _build.object.assign:
            - lowercase_email:
                _string.toLowerCase:
                  _string.trim:
                    _var: user.email
            - _build.if:
                test:
                  _build.not:
                    _build.eq:
                      - _var:
                          key: organization_id
                          default: null
                      - null
                then:
                  organizationId:
                    _var: organization_id
                else: {}
        update:
          # Document-style update: $setOnInsert only, so a matched (invited)
          # contact is never overwritten — only a brand-new one is minted bare.
          $setOnInsert:
            _id:
              _uuid: true
            email:
              _var: user.email
            lowercase_email:
              _string.toLowerCase:
                _string.trim:
                  _var: user.email
            hidden: false
            disabled: false
            created:
              _ref:
                module: events
                component: change_stamp
            updated:
              _ref:
                module: events
                component: change_stamp
        options:
          upsert: true
  :catch:
    - :log: create-or-link-contact — reconciling on duplicate lowercase_email (concurrent first-touch)

# Read the canonical contact row (inserted, matched, or reconciled) — same
# key as the upsert, including the org clause when given.
- id: read_contact
  type: MongoDBFindOne
  connectionId:
    _var: connection_id
  properties:
    query:
      _build.object.assign:
        - lowercase_email:
            _string.toLowerCase:
              _string.trim:
                _var: user.email
        - _build.if:
            test:
              _build.not:
                _build.eq:
                  - _var:
                      key: organization_id
                      default: null
                  - null
            then:
              organizationId:
                _var: organization_id
            else: {}

# Post-write point: the user row already exists (session.create.after fires
# after the session — and long after the user — is written), so contactId is
# written through UpdateUserProfile. Callers passing no binding_point (the
# invite path) skip this — they link at accept.
- :if:
    _eq:
      - _var:
          key: binding_point
          default: null
      - session.create.after
  :then:
    - id: link_user
      type: UpdateUserProfile
      properties:
        userId:
          _var: user.id
        profile:
          contactId:
            _step: read_contact._id
