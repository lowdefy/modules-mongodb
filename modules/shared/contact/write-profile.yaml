# Shared write-profile fragment — one canonical spec, `_ref`'d by relative path
# from BOTH user-account (self-service) and user-admin (an operator editing
# another user's profile). It pairs the change-stamped contact write with the
# `UpdateUserProfile` re-denorm so the denormalized `user.profile` bag and the
# top-level `user.name` / `user.image` display copies can NEVER drift from the
# contact (design Decisions 6 & 8, upstream ask 5). Neither module can write
# contact profile data without re-denormalizing the target's user row in the
# same routine.
#
# This is a var-free file — every input is an `_ref` var (NEVER `_module.var`).
# It resolves in any consumer that depends on the `events` module (for the
# change stamp) with no cross-module dependency edge.
#
# Vars (all required unless noted):
#   connection_id  — the caller's scoped user-contacts connection id
#   contact_id     — target contact `_id`
#   user_id        — target auth user id (users.profile.contactId === contact_id).
#                    MAY be absent (undefined/null) — the invite flow reuses this
#                    fragment before the invitee has a `user` row, so the
#                    `UpdateUserProfile` re-denorm is guarded on presence and
#                    no-ops when absent (the contact write still lands). All other
#                    callers always pass a user_id.
#   profile        — the profile fields to merge onto the contact (object)
#   write_stages   — extra MongoDB update stages appended to the contact write
#                    (the caller's `request_stages.write`; pass [] if none)
#
# It is a YAML sequence of routine steps — splice it into a routine with
# `_build.array.concat` so the steps flatten inline.

- id: write_contact
  type: MongoDBUpdateOne
  connectionId:
    _var: connection_id
  properties:
    filter:
      _id:
        _var: contact_id
    update:
      _build.array.concat:
        # Stage 1: merge the incoming profile fields onto the existing bag and
        # stamp the write.
        - - $set:
              profile:
                $mergeObjects:
                  - $ifNull:
                      - "$profile"
                      - {}
                  - _var: profile
              updated:
                _ref:
                  module: events
                  component: change_stamp
        # Stage 2: recompute the derived display name (sees stage 1's merge).
        - - $set:
              profile.name:
                $concat:
                  - $trim:
                      input: "$profile.given_name"
                  - " "
                  - $trim:
                      input: "$profile.family_name"
        # Caller-supplied write-stage extensions.
        - _var: write_stages

# Re-read the freshly-written contact so the re-denorm copies exactly what was
# stored (including the derived name).
- id: reread_contact
  type: MongoDBFindOne
  connectionId:
    _var: connection_id
  properties:
    query:
      _id:
        _var: contact_id

# Re-denormalize onto the auth user: the whole profile bag onto `user.profile`,
# and the name / image display copies onto top-level `user.name` / `user.image`.
# Because `resolveAuthentication` reads the target's user row per request, the
# bag is fresh on the target's next request with no UpdateSession needed. (A
# caller refreshing their OWN session is the caller routine's job, not the
# fragment's — see update-profile.)
#
# Guarded on `user_id` presence: coalesce to null first, so BOTH the no-match
# (`undefined`, e.g. the invite flow's find_user with no user row) and the
# explicit-`null` cases skip. A bare `_ne: [user_id, null]` would pass on
# `undefined` and fire UpdateUserProfile with no userId.
- :if:
    _ne:
      - _if_none:
          - _var: user_id
          - null
      - null
  :then:
    - id: denorm_user_profile
      type: UpdateUserProfile
      properties:
        userId:
          _var: user_id
        profile:
          _step: reread_contact.profile
        name:
          _step: reread_contact.profile.name
        image:
          _step: reread_contact.profile.picture
