# Display metadata for action (task) status stages rendered inside the
# events timeline. Keyed by the task's current status stage. Read by the
# EventsTimeline block's EventAction renderer:
#   color        — status badge dot color
#   title        — fallback badge text when the action has no message
#   card_color   — action card background
#   border_color — action card border
# Stages match the task status stages written by the activities module.
# `not-required` is filtered out by the lookup; `blocked` is hidden by the
# block itself, so neither needs an entry here.
action-required:
  title: Action Required
  color: "#1890ff"
  card_color: "rgba(24, 144, 255, 0.08)"
  border_color: "rgba(24, 144, 255, 0.25)"
in-progress:
  title: In Progress
  color: "#fa8c16"
  card_color: "rgba(250, 140, 22, 0.08)"
  border_color: "rgba(250, 140, 22, 0.25)"
done:
  title: Done
  color: "#52c41a"
  card_color: "rgba(82, 196, 26, 0.08)"
  border_color: "rgba(82, 196, 26, 0.25)"
