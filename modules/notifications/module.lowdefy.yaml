name: Notifications
version: 0.9.2
description: Notification dispatch pipeline, bell, inbox, and deep-link routing

dependencies:
  - id: layout
    description: Page layout wrapper

vars:
  app_name:
    type: string
    required: true
    description: >
      App identifier used to scope notifications. Matches created.app_name
      on notification documents.
  send_routine:
    type: array
    default: []
    description: >
      API routine steps that shape app events into notification items and
      dispatch them (typically ending in a CallApi to dispatch-notifications).
      Receives event_ids in the payload. Default is an empty routine (no-op).
  server_url:
    type: string
    default: null
    description: >
      Absolute origin used to compose email link URLs (e.g.
      https://app.example.com). Required when notification items carry page
      links — there is no framework fallback.
  public_link_types:
    type: array
    default:
      - invite-user
      - resend-user-invite
      - user-invite
    description: >
      Notification type values whose landing links resolve without a session
      (pre-auth flows such as user invites). Matched against both the
      legacy event_type field and the pipeline's type field.
  email:
    description: >
      SMTP transport for notification emails. Ignored when the app remaps the
      notifications-email connection to its own email connection.
    properties:
      host:
        type: string
        default: null
        description: SMTP host.
      port:
        type: number
        default: 465
        description: SMTP port.
      secure:
        type: boolean
        default: true
        description: Use TLS.
      user:
        type: string
        default: null
        description: SMTP auth user.
      pass:
        default:
          _secret: NOTIFICATIONS_SMTP_PASS
        description: >
          SMTP auth password. Defaults to the NOTIFICATIONS_SMTP_PASS secret;
          pass e.g. `_secret: SENDGRID_API_KEY` to reuse an existing secret.
      from:
        type: string
        default: null
        description: From address/header for notification emails.

connections:
  - _ref: connections/notifications-collection.yaml
  - _ref: connections/notifications-email.yaml
  - _ref: connections/notifications-files-bucket-public.yaml

pages:
  - _ref: pages/all.yaml
  - _ref: pages/link.yaml
  - _ref: pages/invalid.yaml
  - _ref: pages/file-download.yaml

exports:
  pages:
    - id: all
      description: Notifications inbox — list, filter, and view notifications
    - id: link
      description: Deep-link handler — routes notification links to target pages
    - id: invalid
      description: Error page for invalid notification links
    - id: file-download
      description: Public attachment redirect — resolves a notification file index to a presigned S3 URL and forwards the browser
  connections:
    - id: notifications-collection
      description: MongoDB connection for notifications collection
    - id: notifications-email
      description: SMTP connection for notification emails — configure via email vars, or remap to an app connection
    - id: notifications-files-bucket-public
      description: Public S3 bucket for notification attachment downloads
  api:
    - id: send-notification
    - id: dispatch-notifications
      description: Generic dispatch pipeline — render, store with dedup, send, record the result; payload { notification_id, items }
  components:
    - id: notification-config
      description: Notification bell config for PageHeaderMenu — count, icon, and link
    - id: unread-count-request
      description: MongoDB count request for unread notifications

api:
  - _ref: api/send-notification.yaml
  - _ref: api/dispatch-notifications.yaml
  - _ref: api/dispatch-notification-item.yaml

components:
  - id: notification-config
    component:
      _ref: components/notification-config.yaml
  - id: unread-count-request
    component:
      _ref: components/unread-count-request.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI
  - name: NOTIFICATIONS_SMTP_PASS
    description: SMTP password for notification emails (default of the email.pass var)
  - name: FILES_S3_ACCESS_KEY_ID
    description: AWS access key for the file-download bucket
  - name: FILES_S3_SECRET_ACCESS_KEY
    description: AWS secret access key for the file-download bucket
  - name: FILES_S3_REGION
    description: AWS region for the file-download bucket
  - name: FILES_S3_BUCKET_PUB
    description: Public S3 bucket name for notification attachments

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: "^3"
