name: Notifications
description: Notification dispatch — send-notification API stub

dependencies:
  - id: layout
    description: Page layout wrapper

connections:
  - _ref: connections/notifications-db.yaml

pages:
  - _ref: pages/inbox.yaml

exports:
  pages:
    - id: inbox
      description: Notifications inbox page
  connections:
    - id: notifications-db
      description: MongoDB connection for notifications collection
  api:
    - id: send-notification
  components:
    - id: notification-config
      description: Notification bell config for PageHeaderMenu — count and icon
    - id: notification-on-click
      description: Event handler to navigate to notifications inbox
    - id: unread-count-request
      description: MongoDB count request for unread notifications

api:
  - _ref: api/send-notification.yaml

components:
  - id: notification-config
    component:
      _ref: components/notification-config.yaml
  - id: notification-on-click
    component:
      _ref: components/notification-on-click.yaml
  - id: unread-count-request
    component:
      _ref: components/unread-count-request.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: "^2"
