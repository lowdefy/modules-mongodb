_ref:
  module: layout
  component: page
  vars:
    id: all
    title: Notifications
    hide_title: true
    requests:
      - _ref: requests/get-notifications.yaml
      - _ref: requests/get-notification-types.yaml
      - _ref: requests/get-selected-notification.yaml
      - _ref: requests/update-notifications.yaml
      - _ref: requests/update-selected-notification.yaml
    events:
      onInit:
        - id: init
          type: SetState
          params:
            pagination:
              pageSize: 10
              skip: 0
            filter:
              type: Unread
        - id: get_notification_types
          type: Request
          params: get_notification_types
      onMount:
        _build.array.concat:
          - _ref: actions/set-selected.yaml
          - _ref: actions/update-list.yaml
    blocks:
      - id: content_wrapper
        type: Box
        style:
          maxWidth: 1200
          margin: 64px auto
        layout:
          gap: 16
          justify: center
        blocks:
          # Left column — notification list
          - id: notifications_area
            type: Box
            layout:
              span: 10
              gap: 16
              sm:
                span: 24
                order: 2
              md:
                span: 10
                order: 1
            blocks:
              - id: title_box
                type: Box
                layout:
                  gap: 8
                blocks:
                  - id: notifications_area_title
                    type: Divider
                    layout:
                      flex: 1 0 auto
                    style:
                      .element:
                        margin: 0
                    properties:
                      title:
                        _nunjucks:
                          template: |
                            {{ type }} Notifications ({{ total or 0 }})
                          on:
                            total:
                              _request: get_notifications.0.total_count.0.total
                            type:
                              _state: filter.type
                  - id: button_mark_all_read
                    type: Button
                    layout:
                      flex: 1 1 auto
                    style:
                      textAlign: right
                    properties:
                      title: Mark All Read
                      type: default
                      disabled:
                        _or:
                          - _eq:
                              - _if_none:
                                  - _request: get_notifications.0.total_count.0.total
                                  - 0
                              - 0
                          - _eq:
                              - _state: filter.type
                              - Read
                    events:
                      onClick:
                        _build.array.concat:
                          - - id: update_notifications
                              type: Request
                              params: update_notifications
                          - _ref: actions/update-list.yaml
                  - id: filter.type
                    type: ButtonSelector
                    layout:
                      flex: 0 1 auto
                    style:
                      textAlign: right
                    loading:
                      _not:
                        _request: get_notifications
                    properties:
                      label:
                        disabled: true
                      options:
                        - Unread
                        - Read
                    events:
                      onChange:
                        debounce:
                          ms: 500
                        try:
                          _build.array.concat:
                            - - id: get_notification_types
                                type: Request
                                params: get_notification_types
                            - _ref: actions/update-list.yaml
              - _ref: components/form-filter.yaml
              - _ref: components/list-notifications.yaml
              - id: pagination
                type: Pagination
                style:
                  textAlign: right
                properties:
                  showTotal: true
                  total:
                    _get:
                      from:
                        _request: get_notifications.0.total_count
                      key: 0.total
                      default: 0
                events:
                  onChange:
                    - id: clear
                      type: SetState
                      params:
                        list: []
                    - id: fetch
                      type: Request
                      params: get_notifications
                    - id: set_list
                      type: SetState
                      params:
                        list:
                          _request: get_notifications.0.notifications
                    - _ref: actions/set-types.yaml
          # Right column — selected notification detail
          - id: selected_area
            type: Box
            layout:
              span: 14
              sm:
                span: 24
                order: 1
              md:
                span: 14
                order: 2
              gap: 8
            blocks:
              - id: selected_area_title
                type: Divider
                style:
                  .element:
                    margin: 0
                layout:
                  flex: 1 0 auto
                properties:
                  title: Selected
                  orientation: left
              - id: selected_area_card
                type: Card
                properties:
                  style:
                    boxShadow: 0px 5px 8px -3px rgba(0,0,0,0.1)
                blocks:
                  - _ref: components/area-selected.yaml
