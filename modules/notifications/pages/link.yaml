id: link
type: Box
requests:
  - _ref: requests/get-notification-for-link.yaml
  - _ref: requests/update-selected-notification.yaml
events:
  onMount:
    # Fetch notification (invite-user matches without contact_id, others need contact_id)
    - id: get_notification
      type: Request
      params: get_notification_for_link
    # Pre-auth types (public_link_types var) navigate directly to the
    # notification's link (e.g. the login page with an invite hint). Legacy
    # records store the resolved target at top-level links.button; pipeline
    # records keep the original { pageId, urlQuery } in data.links.button.
    - id: link_invite
      type: Link
      skip:
        _not:
          _array.includes:
            on:
              _module.var: public_link_types
            value:
              _if_none:
                - _request: get_notification_for_link.0.event_type
                - _request: get_notification_for_link.0.type
      params:
        pageId:
          _if_none:
            - _request: get_notification_for_link.0.data.links.button.pageId
            - _request: get_notification_for_link.0.links.button.pageId
            - _module.pageId: all
        urlQuery:
          _if_none:
            - _request: get_notification_for_link.0.data.links.button.urlQuery
            - _request: get_notification_for_link.0.links.button.urlQuery
            - {}
        input:
          _if_none:
            - _request: get_notification_for_link.0.data.links.button.input
            - _request: get_notification_for_link.0.links.button.input
            - {}
    # Break if a pre-auth link was followed
    - id: break_invite
      type: Throw
      skip:
        _not:
          _array.includes:
            on:
              _module.var: public_link_types
            value:
              _if_none:
                - _request: get_notification_for_link.0.event_type
                - _request: get_notification_for_link.0.type
      messages:
        error: false
      params:
        throw: true
    # If unauthenticated + not found, redirect to login with callback
    - id: link_to_login
      type: Link
      skip:
        _ne:
          - _user: true
          - null
      params:
        pageId: user-account/login
        input:
          callbackUrl:
            pageId:
              _module.pageId: link
            urlQuery:
              _url_query: true
    # Break if no user (login redirect should have fired)
    - id: break_no_user
      type: Throw
      messages:
        error: false
      params:
        throw:
          _eq:
            - _user: true
            - null
    # Authenticated — redirect to invalid page if not found
    - id: invalid_notification
      type: Link
      skip:
        _ne:
          - _request: get_notification_for_link.length
          - 0
      params:
        pageId:
          _module.pageId: invalid
    # Break if no notification
    - id: break_no_notification
      type: Throw
      messages:
        error: false
      params:
        throw:
          _eq:
            - _request: get_notification_for_link.length
            - 0
    # Mark as read
    - id: mark_read
      type: SetState
      params:
        selected_id:
          _url_query: _id
    - id: update_read
      type: Request
      params: update_selected_notification
    # Resolve the redirect target. Framework-composed links (lowdefy
    # `notifications:` records) carry ?option=<dataPath> pointing into the
    # record's `data` (e.g. links.button, actions.0.link); legacy records
    # store a resolved target at top-level links.button.
    - id: set_target
      type: SetState
      params:
        link_target:
          _if_none:
            - _get:
                from:
                  _if_none:
                    - _request: get_notification_for_link.0.data
                    - {}
                key:
                  _if_none:
                    - _url_query: option
                    - links.button
            - _request: get_notification_for_link.0.links.button
    # Absolute URL targets (e.g. framework data values) navigate directly
    - id: link_notification_url
      type: Link
      skip:
        _not:
          _type:
            type: string
            on:
              _state: link_target
      params:
        url:
          _state: link_target
    # Page targets navigate in-app, falling back to the inbox
    - id: link_notification
      type: Link
      skip:
        _type:
          type: string
          on:
            _state: link_target
      params:
        pageId:
          _if_none:
            - _state: link_target.pageId
            - _module.pageId: all
        urlQuery:
          _if_none:
            - _state: link_target.urlQuery
            - {}
        input:
          _if_none:
            - _state: link_target.input
            - {}
