id: get_notification_for_link
type: MongoDBAggregation
connectionId:
  _module.connectionId: notifications-collection
payload:
  _id:
    _url_query: _id
  app_name:
    _module.var: app_name
  contact_id:
    _user: id
properties:
  pipeline:
    - $match:
        _id:
          _payload: _id
        created.app_name:
          _payload: app_name
        # Pre-auth notification types (module var public_link_types) resolve
        # without a session; everything else needs the recipient's contact_id.
        # Legacy records store event_type; pipeline records store type.
        $or:
          - event_type:
              $in:
                _module.var: public_link_types
          - type:
              $in:
                _module.var: public_link_types
          - contact_id:
              _payload: contact_id
