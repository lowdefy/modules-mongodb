# Dispatches ONE notification item: render → insert with dedup → send →
# record the send result. Internal detail of dispatch-notifications — items
# run here one at a time so each gets fresh step results and state.
#
# Item contract (shaped by the app's send_routine):
#   contact: { _id, email, ... }   required — the recipient
#   key: string                    optional — deduplication key
#   send_email: boolean            optional — default true; false = inbox only
#   cc, bcc: [string]              optional
#   links.*, <template dataKeys>   optional — { pageId, urlQuery } page links
#   ...everything else is template data
id: dispatch-notification-item
type: InternalApi
routine:
  - :if:
      _or:
        - _not:
            _type:
              type: object
              on:
                _payload: item.contact
        - _eq:
            - _if_none:
                - _payload: item.contact._id
                - null
            - null
    :then:
      - :throw: dispatch-notification-item requires item.contact with an _id.

  # Transport guard — outside the send :try so a misconfigured transport var
  # throws loudly instead of being swallowed into retry bookkeeping. The
  # _module.var resolves at build, so this condition folds to a literal.
  - :if:
      _not:
        _or:
          - _eq:
              - _module.var: transport
              - smtp
          - _eq:
              - _module.var: transport
              - sendgrid
    :then:
      - :throw: 'notifications: the transport var must be "smtp" or "sendgrid".'

  # Mint the record id before rendering — landing-page link URLs embed it.
  - :set_state:
      record_id:
        _uuid: true
      email:
        _string.toLowerCase:
          _string.trim:
            _if_none:
              - _payload: item.contact.email
              - ""
  - :set_state:
      is_valid_email:
        _regex:
          pattern: "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"
          on:
            _state: email

  # Render subject/title/preview/html/text from the app's notifications:
  # config. Page links in the item resolve to landing URLs:
  # <server_url><basePath><link page>?_id=<record_id>&option=<dotpath>
  - id: render
    type: RenderNotification
    properties:
      notificationId:
        _payload: notification_id
      data:
        _payload: item
      serverUrl:
        _module.var: server_url
      landingPage:
        _string.concat:
          - "/"
          - _module.pageId: link
      recordId:
        _state: record_id

  # Insert BEFORE sending — claims the dedup key so concurrent dispatches
  # cannot double-send. Requires the app-managed unique partial index on
  # `key` (see the module docs, Required indexes) — without it duplicate
  # inserts succeed and the guarantee does not exist.
  - :try:
      - id: insert_record
        type: MongoDBInsertOne
        connectionId:
          _module.connectionId: notifications-collection
        properties:
          doc:
            _id:
              _state: record_id
            key:
              _if_none:
                - _payload: item.key
                - null
            type:
              _payload: notification_id
            contact_id:
              _payload: item.contact._id
            contact:
              _payload: item.contact
            email:
              _state: email
            is_valid_email:
              _state: is_valid_email
            subject:
              _step: render.subject
            title:
              _step: render.title
            preview:
              _step: render.preview
            body:
              _step: render.html
            text:
              _step: render.text
            # Store the ORIGINAL item — the link page reads { pageId, urlQuery }
            # targets back out of data at the ?option dot-path. Never store the
            # render result's data (its links point back at the landing page).
            data:
              _payload: item
            send_email:
              _if_none:
                - _payload: item.send_email
                - true
            cc:
              _if_none:
                - _payload: item.cc
                - null
            bcc:
              _if_none:
                - _payload: item.bcc
                - null
            sent: false
            send_attempts: 0
            last_attempt: null
            email_result: null
            read: false
            created:
              timestamp:
                _date: now
              app_name:
                _module.var: app_name
    :catch:
      # :catch cannot inspect the thrown error, so detect a duplicate key by
      # looking the dedup key up: item has a key AND a record carries it →
      # already dispatched, skip silently. Anything else is a real failure.
      - :if:
          _not:
            _type:
              type: string
              on:
                _payload: item.key
        :then:
          - :throw: Notification insert failed.
      - id: find_existing
        type: MongoDBFindOne
        connectionId:
          _module.connectionId: notifications-collection
        properties:
          query:
            key:
              _payload: item.key
      - :if:
          _eq:
            - _step: find_existing
            - null
        :then:
          - :throw: Notification insert failed.
      - :log:
          event: notification_duplicate_skipped
          key:
            _payload: item.key
        :level: info
      - :return:
          notification_id: null
          skipped: true

  # Send gate — send_email: false or an invalid/missing address stores the
  # notification inbox-only.
  - :if:
      _and:
        - _state: is_valid_email
        - _if_none:
            - _payload: item.send_email
            - true
    :then:
      - :try:
          # Transport switch — the _module.var resolves at build, so this :if
          # condition is a literal in the built routine and only one branch
          # ever runs. Both send steps throw into the same :catch below.
          - :if:
              _eq:
                - _module.var: transport
                - sendgrid
            :then:
              - id: send_mail_sendgrid
                type: SendGridMailSend
                connectionId:
                  _module.connectionId: notifications-email-sendgrid
                properties:
                  to:
                    _state: email
                  # Empty arrays (not null) when absent: like SMTPMailSend,
                  # SendGridMailSend's schema accepts an address list but not
                  # null for cc/bcc.
                  cc:
                    _if_none:
                      - _payload: item.cc
                      - []
                  bcc:
                    _if_none:
                      - _payload: item.bcc
                      - []
                  subject:
                    _step: render.subject
                  text:
                    _step: render.text
                  html:
                    _step: render.html
            :else:
              - id: send_mail_smtp
                type: SMTPMailSend
                connectionId:
                  _module.connectionId: notifications-email
                properties:
                  to:
                    _state: email
                  # Empty arrays (not null) when absent: SMTPMailSend's schema
                  # accepts an address list but not null for cc/bcc.
                  cc:
                    _if_none:
                      - _payload: item.cc
                      - []
                  bcc:
                    _if_none:
                      - _payload: item.bcc
                      - []
                  subject:
                    _step: render.subject
                  text:
                    _step: render.text
                  html:
                    _step: render.html
          - id: mark_sent
            type: MongoDBUpdateOne
            connectionId:
              _module.connectionId: notifications-collection
            properties:
              filter:
                _id:
                  _state: record_id
              update:
                $set:
                  sent: true
                  email_result:
                    transport:
                      _module.var: transport
                    # SMTP (nodemailer) reports a messageId; SendGridMailSend
                    # returns only a response string, so this is null for
                    # sendgrid (_step on a step that never ran returns null).
                    messageId:
                      _step: send_mail_smtp.results.0.messageId
                    timestamp:
                      _date: now
        :catch:
          # A send failure never fails the dispatch — the record stays
          # sent: false with the attempt recorded, ready for a drain retry.
          - id: record_send_failure
            type: MongoDBUpdateOne
            connectionId:
              _module.connectionId: notifications-collection
            properties:
              filter:
                _id:
                  _state: record_id
              update:
                $inc:
                  send_attempts: 1
                $set:
                  last_attempt:
                    _date: now
          - :log:
              event: notification_send_failed
              notification_id:
                _state: record_id
            :level: warn

  - :return:
      notification_id:
        _state: record_id
      skipped: false
