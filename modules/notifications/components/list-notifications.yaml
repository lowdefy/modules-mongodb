id: list_box
type: Box
loading:
  _not:
    _request: get_notifications
blocks:
  - id: list_none
    type: Result
    visible:
      _eq:
        - _request: get_notifications.0.notifications.length
        - 0
    properties:
      icon:
        name: AiOutlineContainer
        color: '#d9d9d9'
      subTitle: No matching notifications. Change filter to view more.
  - id: list
    type: List
    visible:
      _ne:
        - _request: get_notifications.0.notifications.length
        - 0
    blocks:
      - id: list.$.card
        type: Card
        properties:
          size: small
          style:
            boxShadow: 0px 5px 8px -3px rgba(0,0,0,0.1)
            border:
              _if:
                test:
                  _eq:
                    - _state: list.$._id
                    - _state: selected_id
                then: 2px solid var(--ant-color-primary)
                else: 2px solid var(--ant-color-border-secondary)
        style:
          margin: 4
        events:
          onClick:
            _build.array.concat:
              - - id: set_url_query
                  type: Link
                  params:
                    pageId:
                      _module.pageId: all
                    urlQuery:
                      _id:
                        _state: list.$._id
              - _ref:
                  path: actions/set-selected.yaml
                  vars:
                    selected_id:
                      _state: list.$._id
        blocks:
          - id: list.$.status_box
            type: Box
            layout:
              contentAlign: middle
              gap: 6
            blocks:
              - id: list.$.type
                type: Html
                layout:
                  flex: 0 1 auto
                properties:
                  html:
                    _nunjucks:
                      template: |
                        {% if status %}<div style="font-size: 0.7rem; background: {{ status.color }}; padding: 6px; border-radius: 4px; color: white; min-width: 80px; text-align: center"><b>{{ status.title | safe }}</b></div>{% endif %}
                      on:
                        status:
                          _global:
                            _string.concat:
                              - enums.event_types.
                              - _state: list.$.event_type
              - id: list.$.time_ago
                type: Html
                layout:
                  flex: 1 1 auto
                properties:
                  html:
                    _nunjucks:
                      template: |
                        <div style="text-align: middle; font-size: 12px;">Received {{ time_ago }} ago</div>
                      on:
                        time_ago:
                          _dayjs.humanizeDuration:
                            on:
                              _subtract:
                                - _date.valueOf:
                                    _date: now
                                - _date.valueOf:
                                    _state: list.$.created.timestamp
                            withSuffix: false
              - id: list.$.body
                type: Html
                properties:
                  html:
                    _nunjucks:
                      template: |
                        <div><b>{{ notification.title | safe }}</b></div>
                        <div style="color: var(--ant-color-text-secondary);">{{ notification.description | safe }}</div>
                      on:
                        notification:
                          _state: list.$
