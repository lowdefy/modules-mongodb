name: Companies
version: 0.2.0
description: Company management — list, detail, edit, create, selector

dependencies:
  - id: layout
    description: Page layout wrapper
  - id: events
    description: Audit event logging and change stamp
  - id: contacts
    description: Contact selector and bidirectional linking
  - id: files
    description: File attachments (optional sidebar tile)

vars:
  label:
    default: Company
    description: Singular display label
  label_plural:
    default: Companies
    description: Plural display label
  name_field:
    default: trading_name
    description: Field used as the display name in selectors and titles
  id_prefix:
    default: "C-"
    description: Prefix for auto-generated consecutive IDs
  id_length:
    default: 4
    description: Numeric length for consecutive IDs (e.g., 4 → C-0001)
  event_display:
    default:
      _ref: defaults/event_display.yaml
    description: "Per-app event display templates. Keys are app identifiers, values map event types to Nunjucks title templates."
  fields:
    type: object
    description: "Field block arrays rendered in both the edit form and SmartDescriptions view."
    properties:
      attributes:
        default: []
        description: >-
          Custom field blocks appended after the built-in company sections in
          the edit form and view page. Block ids must be prefixed with
          `attributes.` so they bind to `state.attributes.*`.
  components:
    type: object
    description: "Page slot overrides: table_columns, filters, main_slots, sidebar_slots, download_columns, contact_card_extra_fields"
    properties:
      table_columns:
        default: []
        description: Extra column definitions appended to the companies list table.
      filters:
        default: []
        description: >-
          Extra filter blocks rendered below the built-in search bar on the
          companies list page. Pair with `filter_requests` for custom data
          sources.
      main_slots:
        default: []
        description: Extra blocks appended to the main column on the company-detail page.
      sidebar_slots:
        default: []
        description: Extra blocks appended to the sidebar column on the company-detail page.
      download_columns:
        default: []
        description: Extra columns appended to the Excel export.
      contact_card_extra_fields:
        default: []
        description: |
          List of { label, value } pairs appended under each contact's name/email
          in the company view contacts tile. `value` is a top-level key on the
          contact doc projected by get_company_contacts.
  request_stages:
    type: object
    description: "Pipeline overrides: get_all_companies, selector, filter_match, write. write stages are appended to both create-company and update-company flows."
    properties:
      filter_match:
        default: []
        description: >-
          Atlas Search compound clauses appended to the list-page `$search`
          query. Used to add custom filter conditions to the companies list.
      get_all_companies:
        default:
          - $addFields: {}
        description: >-
          Pipeline stages appended after filtering on the companies list and
          Excel export aggregations.
      selector:
        default: []
        description: Pipeline stages appended to the company-selector aggregation.
      write:
        default: []
        description: >-
          Pipeline update stages appended to both create-company and
          update-company flows. On create, runs as a follow-up update on the
          newly inserted document; skipped at build time when empty.
  filter_requests:
    default: []
    description: Additional requests for the custom filters section

exports:
  pages:
    - id: all
      description: Company list with filtering, sorting, pagination, and Excel download
    - id: view
      description: Read-only company detail with sidebar tiles
    - id: edit
      description: Edit existing company
    - id: new
      description: Create a new company
  connections:
    - id: companies-collection
      description: MongoDB connection for company records
  api:
    - id: create-company
      description: Create company with contact linking and event logging
    - id: update-company
      description: Update company with contact reconciliation and event logging
  components:
    - id: company-selector
      description: Selector/MultipleSelector for picking companies
  menus:
    - id: default
      description: Companies navigation link

connections:
  - _ref: connections/companies-collection.yaml

api:
  - _ref: api/create-company.yaml
  - _ref: api/update-company.yaml

pages:
  - _ref: pages/all.yaml
  - _ref: pages/view.yaml
  - _ref: pages/edit.yaml
  - _ref: pages/new.yaml

components:
  - id: company-selector
    component:
      _ref: components/company-selector.yaml

menus:
  - _ref: menus.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: "^2"
  - name: "@lowdefy/community-plugin-xlsx"
    version: "^1"
  - name: "@lowdefy/modules-mongodb-plugins"
    version: "^0.1.0"
