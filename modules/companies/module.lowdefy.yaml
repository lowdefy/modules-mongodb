name: Companies
version: 0.14.1
description: Company management — list, detail, edit, create, selector

dependencies:
  - id: layout
    description: Page layout wrapper
  - id: events
    description: Audit event logging and change stamp
  - id: contacts
    description: Contact selector and bidirectional linking
  - id: files
    description: File attachments (optional sidebar tile)

vars:
  app_name:
    required: true
    description: App identifier used to key event_display titles when no override is supplied.
  label:
    default: Company
    description: Singular display label
  label_plural:
    default: Companies
    description: Plural display label
  name_field:
    default: name
    description: Field used as the display name in selectors and titles
  short_name:
    type: object
    description: Configuration for the togglable required `short_name` top-level field on companies.
    properties:
      enabled:
        type: boolean
        default: true
        description: >-
          When true, adds a required `short_name` text input to the create/edit
          form, the view-page core descriptions, the list table (between Name
          and Description), the Excel export, and the create/update API
          payloads. When false, every surface referencing `short_name` is
          omitted at build time and the field is absent from new documents.
          Existing documents that already carry `short_name` retain it on disk
          but won't be rendered or written until re-enabled.
  id_prefix:
    default: "C-"
    description: Prefix for auto-generated consecutive IDs
  id_length:
    default: 4
    description: Numeric length for consecutive IDs (e.g., 4 → C-0001)
  event_display:
    description: "Per-app event display templates. Keys are app identifiers, values map event types to Nunjucks title templates. When unset, the module's defaults render under app_name. When set, the override fully replaces the defaults — no merge."
  hierarchy:
    type: object
    description: Configuration for parent-child relationships between companies.
    properties:
      enabled:
        type: boolean
        default: false
        description: >-
          When true, adds a parent-companies multi-select to the edit form,
          shows parents + children in a sidebar tile on the view page, and
          enforces cycle prevention in the create/update APIs. Companies
          form a DAG (each company can have multiple parents). When false,
          no hierarchy UI or logic is emitted and the parent_ids field is
          omitted from new documents.
      parent_label:
        type: string
        default: null
        description: >-
          Optional override for the parent multi-select label on the edit form
          and the parents heading in the view-page sidebar tile. When null
          (the default), the label falls back at the usage site to
          `_string.concat: ["Parent ", _module.var: label_plural]`, giving
          "Parent Companies" by default.
      children_label:
        type: string
        default: null
        description: >-
          Optional override for the children heading in the view-page sidebar
          tile. When null (the default), the label falls back at the usage
          site to `_string.concat: ["Child ", _module.var: label_plural]`,
          giving "Child Companies" by default.
      max_depth:
        type: number
        default: 20
        description: >-
          Defensive cap on every $graphLookup in this module's hierarchy
          pipelines (descendants resolution + cycle check). 20 comfortably
          exceeds typical org depths (<10). The cycle check is the primary
          guard against runaway traversals; max_depth backstops the rare
          case where a cycle leaks past the API check, by truncating
          silently rather than running unboundedly.
  fields:
    type: object
    description: "Field block arrays rendered in both the edit form and SmartDescriptions view."
    properties:
      contact:
        default: []
        description: >-
          Field blocks for the contact section. Block ids must be prefixed with
          `contact.` so they bind to `state.contact.*`. Apps typically `_ref`
          `field-presets/contact-default.yaml` or supply their own array.
      address:
        default: []
        description: >-
          Field blocks for the address section. Block ids must be prefixed with
          `address.` so they bind to `state.address.*`. Apps typically `_ref`
          `field-presets/address-text.yaml` (zero-dep) or `field-presets/address-places.yaml`
          (depends on a custom PlacesAutocomplete plugin).
      registration:
        default: []
        description: >-
          Field blocks for the registration section. Block ids must be prefixed
          with `registration.` so they bind to `state.registration.*`. Apps
          typically `_ref` a region-specific preset such as
          `field-presets/registration-sa.yaml`.
      attributes:
        default: []
        description: >-
          Custom field blocks appended after the built-in company sections in
          the edit form and view page. Block ids must be prefixed with
          `attributes.` so they bind to `state.attributes.*`.
  components:
    type: object
    description: "Page slot overrides: table_columns, filters, main_slots, sidebar_slots, download_columns, contact_card_extra_fields"
    properties:
      table_columns:
        default: []
        description: Extra column definitions appended to the companies list table.
      filters:
        default: []
        description: >-
          Extra filter blocks rendered below the built-in search bar on the
          companies list page. Pair with `filter_requests` for custom data
          sources.
      main_slots:
        default: []
        description: Extra blocks appended to the main column on the company-detail page.
      sidebar_slots:
        default: []
        description: Extra blocks appended to the sidebar column on the company-detail page.
      download_columns:
        default: []
        description: Extra columns appended to the Excel export.
      contact_card_extra_fields:
        default: []
        description: |
          List of { label, value } pairs appended under each contact's name/email
          in the company view contacts tile. `value` is a top-level key on the
          contact doc projected by get_company_contacts.
  request_stages:
    type: object
    description: "Pipeline overrides: get_all_companies, selector, filter_match, write. write stages are appended to both create-company and update-company flows."
    properties:
      filter_match:
        default: []
        description: >-
          Atlas Search compound clauses appended to the list-page `$search`
          query. Used to add custom filter conditions to the companies list.
      get_all_companies:
        default:
          - $addFields: {}
        description: >-
          Pipeline stages appended after filtering on the companies list and
          Excel export aggregations.
      selector:
        default: []
        description: >-
          Pipeline stages injected into the company-selector aggregation after
          the base active-company $match and BEFORE the label projection, so
          stages can filter or derive on raw document fields (e.g. exclude
          app-specific soft-delete markers from pickers).
      write:
        default: []
        description: >-
          Pipeline update stages appended to both create-company and
          update-company flows. On create, runs as a follow-up update on the
          newly inserted document; skipped at build time when empty.
  on_create_routine:
    type: array
    default: []
    description: >
      API routine steps appended to the create-company routine after the
      insert, contact-link, and event steps, before the :return:. Steps run
      server-side with the routine's context: `_step: insert.insertedId` is
      the new company's id, and the request payload is readable via
      `_payload`, including the reserved `url_query` key — the new page
      forwards its full URL query under `url_query`, which is how
      start-link params reach the server.
  filter_requests:
    default: []
    description: Additional requests for the custom filters section

exports:
  pages:
    - id: all
      description: Company list with filtering, sorting, pagination, and Excel download
    - id: view
      description: Read-only company detail with sidebar tiles
    - id: edit
      description: Edit existing company
    - id: new
      description: Create a new company
  connections:
    - id: companies-collection
      description: MongoDB connection for company records
  api:
    - id: create-company
      description: Create company with contact linking and event logging
    - id: update-company
      description: Update company with contact reconciliation and event logging
  components:
    - id: company-selector
      description: >-
        Selector/MultipleSelector for picking companies. Vars: field_id, mode,
        title, label, disabled, and `required` (default false — sets the block
        required so a page-level Validate flags an empty selection).
  menus:
    - id: default
      description: Companies navigation link

connections:
  - _ref: connections/companies-collection.yaml

api:
  - _ref: api/create-company.yaml
  - _ref: api/update-company.yaml

pages:
  - _ref: pages/all.yaml
  - _ref: pages/view.yaml
  - _ref: pages/edit.yaml
  - _ref: pages/new.yaml

components:
  - id: company-selector
    component:
      _ref: components/company-selector.yaml

menus:
  - _ref: menus.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: "^3"
  - name: "@lowdefy/community-plugin-xlsx"
    version: "^1"
  - name: "@lowdefy/modules-mongodb-plugins"
    version: "^0.14.1"
