name: Companies
description: Company management — list, detail, edit, create, selector

dependencies:
  - id: layout
    description: Page layout wrapper
  - id: events
    description: Audit event logging and change stamp
  - id: contacts
    description: Contact selector and bidirectional linking
  - id: files
    description: File attachments (optional sidebar tile)

vars:
  collection:
    default: companies
    description: MongoDB collection name
  label:
    default: Company
    description: Singular display label
  label_plural:
    default: Companies
    description: Plural display label
  name_field:
    default: trading_name
    description: Field used as the display name in selectors and titles
  id_prefix:
    default: 'C-'
    description: Prefix for auto-generated consecutive IDs
  id_length:
    default: 4
    description: Numeric length for consecutive IDs (e.g., 4 → C-0001)
  contacts_collection:
    default: user-contacts
    description: MongoDB collection name for contacts (used in $lookup for edit page pre-population)
  event_display:
    default:
      _ref: defaults/event_display.yaml
    description: 'Per-app event display templates. Keys are app identifiers, values map event types to Nunjucks title templates.'
  components:
    type: object
    description: 'Overrides: detail_fields, form_fields, form_attributes, table, filters, main_tiles, sidebar_tiles, download_columns'
    properties:
      detail_fields:
        default:
          _ref: components/view_company.yaml
      form_fields:
        default:
          _ref: components/form_company.yaml
      form_attributes:
        default: []
      table:
        default:
          _ref: components/table_companies.yaml
      table_columns:
        default: []
      filters:
        default:
          _ref: components/filter_companies.yaml
      main_tiles:
        default: []
      sidebar_tiles:
        default: []
      download_columns:
        default: []
  request_stages:
    type: object
    description: 'Pipeline overrides: get_all_companies, get_company, insert_company, update_company, selector, filter_match'
    properties:
      filter_match:
        default: []
      get_all_companies:
        default:
          - $addFields: {}
      insert_company:
        default: {}
      update_company:
        default: []
  filter_requests:
    default: []
    description: Additional requests for the custom filters section

exports:
  pages:
    - id: companies
      description: Company list with filtering, sorting, pagination, and Excel download
    - id: company-detail
      description: Read-only company detail with sidebar tiles
    - id: company-edit
      description: Edit existing company
    - id: company-new
      description: Create a new company
  connections:
    - id: companies-collection
      description: MongoDB connection for company records
  api:
    - id: create-company
      description: Create company with contact linking and event logging
    - id: update-company
      description: Update company with contact reconciliation and event logging
  components:
    - id: company-selector
      description: Selector/MultipleSelector for picking companies
  menus:
    - id: default
      description: Companies navigation link

connections:
  - _ref: connections/companies-collection.yaml

api:
  - _ref: api/create-company.yaml
  - _ref: api/update-company.yaml

pages:
  - _ref: pages/companies.yaml
  - _ref: pages/company-detail.yaml
  - _ref: pages/company-edit.yaml
  - _ref: pages/company-new.yaml

components:
  - id: company-selector
    component:
      _ref: components/company-selector.yaml

menus:
  - _ref: menus.yaml

secrets:
  - name: MONGODB_URI
    description: MongoDB connection URI
