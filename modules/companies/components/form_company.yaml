id: form_company
type: Box
blocks:
  _build.array.concat:
    # Core fields
    - _ref: components/fields/core.yaml
    # Registration
    - - id: divider_registration
        type: Divider
        properties:
          title: Registration
    - _ref: components/fields/registration.yaml
    # Contact details
    - - id: divider_contact
        type: Divider
        properties:
          title: Contact Details
    - _ref: components/fields/contact.yaml
    # Address
    - - id: divider_address
        type: Divider
        properties:
          title: Address
    - _ref: components/fields/address.yaml
    # Consumer attributes (conditional — only when provided)
    - _build.if:
        test:
          _build.gt:
            - _build.array.length:
                _module.var: fields.attributes
            - 0
        then:
          _build.array.concat:
            - - id: divider_attributes
                type: Divider
                properties:
                  title: Additional Details
            - _module.var: fields.attributes
        else: []
    # Linked contacts
    - - id: divider_contacts
        type: Divider
        properties:
          title: Contacts
      - _ref:
          module: contacts
          component: contact-selector
          vars:
            id: contacts
            keyword: contact
            label:
              title: Linked Contacts
