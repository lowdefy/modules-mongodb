id: form_company
type: Box
blocks:
  _build.array.concat:
    # Core: name + description
    - _ref: components/fields/core.yaml

    # Registration
    - _build.if:
        test:
          _build.gt:
            - _build.array.length:
                _module.var: fields.registration
            - 0
        then:
          _build.array.concat:
            - - id: divider_registration
                type: Divider
                properties:
                  title: Registration
            - _module.var: fields.registration
        else: []

    # Contact details
    - _build.if:
        test:
          _build.gt:
            - _build.array.length:
                _module.var: fields.contact
            - 0
        then:
          _build.array.concat:
            - - id: divider_contact
                type: Divider
                properties:
                  title: Contact Details
            - _module.var: fields.contact
        else: []

    # Address
    - _build.if:
        test:
          _build.gt:
            - _build.array.length:
                _module.var: fields.address
            - 0
        then:
          _build.array.concat:
            - - id: divider_address
                type: Divider
                properties:
                  title: Address
            - _module.var: fields.address
        else: []

    # Attributes
    - _build.if:
        test:
          _build.gt:
            - _build.array.length:
                _module.var: fields.attributes
            - 0
        then:
          _build.array.concat:
            - - id: divider_attributes
                type: Divider
                properties:
                  title: Additional Details
            - _module.var: fields.attributes
        else: []

    # Linked contacts
    - - id: divider_contacts
        type: Divider
        properties:
          title: Contacts
      - _ref:
          module: contacts
          component: contact-selector
          vars:
            id: contacts
            keyword: contact
            label:
              title: Linked Contacts
