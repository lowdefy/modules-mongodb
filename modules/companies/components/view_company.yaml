id: view_company
type: Box
blocks:
  _build.array.concat:
    - - id: company_details
        type: SmartDescriptions
        properties:
          column: 2
          size: small
          data:
            _request: get_company.0
          fields:
            _build.array.concat:
              - _ref: components/fields/core.yaml
              - _ref: components/fields/registration.yaml
              - _ref: components/fields/contact.yaml
              - _ref: components/fields/address.yaml
    - - id: attributes_view
        type: SmartDescriptions
        visible:
          _build.gt:
            - _build.array.length:
                _module.var: fields.attributes
            - 0
        properties:
          title: Additional Details
          column: 1
          size: small
          data:
            attributes:
              _request: get_company.0.attributes
          fields:
            _module.var: fields.attributes
