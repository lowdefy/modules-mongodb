id:
  _var:
    key: field_id
    default: company
type:
  _var:
    key: mode
    default: Selector
requests:
  - _ref: requests/get_companies_for_selector.yaml
events:
  onMount:
    - id: fetch_companies
      type: Request
      params: get_companies_for_selector
properties:
  title:
    _if_none:
      - _var: title
      - _module.var: label
  placeholder:
    _string.concat:
      - "Select "
      - _if_none:
          - _var: title
          - _module.var: label
  disabled:
    _var:
      key: disabled
      default: false
  options:
    _request: get_companies_for_selector
  label:
    _var:
      key: label
      default: {}
