id: contact_list
type: List
properties:
  dataSource:
    _request: get_company_contacts
  renderItem:
    id: contact_item.__id
    type: List.Item
    properties:
      title:
        _nunjucks:
          template: "{{ profile.name }}"
          on:
            __args: 0
      description:
        _nunjucks:
          template: "{{ email }}"
          on:
            __args: 0
    events:
      onClick:
        - id: go_contact_detail
          type: Link
          params:
            pageId:
              _module.pageId:
                id: contact-detail
                module: contacts
            urlQuery:
              _id:
                _args: 0._id
