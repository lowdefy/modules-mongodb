# HTML rendering of the company's linked contacts. Reads
# `_request: get_company_contacts` directly — no state setup needed.
#
# Extension: set `components.contact_card_extra_fields` in the
# consuming app's vars (as a list of { label, value } pairs) to
# render additional rows under each contact's name/email.
#
#   components:
#     contact_card_extra_fields:
#       - { label: Phone, value: primary_phone }
#       - { label: Role, value: role }
#
# `value` is a top-level key on the contact document as projected
# by get_company_contacts. For a nested source field (e.g.
# `contact.primary_phone`), extend the request's $project stage
# to flatten it to a top-level key.
id: contact_list_html
type: Html
properties:
  html:
    _nunjucks:
      template: |
        {% if contacts.length %}
        <div>
          {% for contact in contacts %}
          <div style="padding:8px 0; border-bottom:1px solid var(--ant-color-border-secondary)">
            <a href="/contacts/contacts/{{ contact._id }}" style="color:inherit; text-decoration:none">
              <div><b>{{ contact.profile.name | safe }}</b></div>
              {% if contact.email %}
              <div style="color:var(--ant-color-text-secondary); font-size:12px">{{ contact.email | safe }}</div>
              {% endif %}
              {% for field in extra_fields %}
                {% if contact[field.value] %}
                <div style="color:var(--ant-color-text-secondary); font-size:11px">
                  <b>{{ field.label | safe }}:</b> {{ contact[field.value] | safe }}
                </div>
                {% endif %}
              {% endfor %}
            </a>
          </div>
          {% endfor %}
        </div>
        {% else %}
        <div style="color:var(--ant-color-text-secondary); font-size:12px; font-style:italic; padding:8px 0">
          No linked contacts
        </div>
        {% endif %}
      on:
        contacts:
          _if_none:
            - _request: get_company_contacts
            - []
        extra_fields:
          _if_none:
            - _module.var: components.contact_card_extra_fields
            - []
