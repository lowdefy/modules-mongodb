id: contact_list_container
type: Box
blocks:
  - id: contact_list_empty
    type: Paragraph
    visible:
      _eq:
        - _array.length:
            _request: get_company_contacts
        - 0
    properties:
      content: No linked contacts
      type: secondary
      style:
        fontSize: 12
        fontStyle: italic
  - id: contact_list
    type: List
    visible:
      _gt:
        - _array.length:
            _request: get_company_contacts
        - 0
    properties:
      dataSource:
        _request: get_company_contacts
      renderItem:
        id: contact_item.__id
        type: List.Item
        properties:
          title:
            _nunjucks:
              template: "{{ profile.name }}"
              on:
                __args: 0
          description:
            _nunjucks:
              template: "{{ email }}"
              on:
                __args: 0
        events:
          onClick:
            - id: go_contact_detail
              type: Link
              params:
                pageId:
                  _module.pageId:
                    id: contact-detail
                    module: contacts
                urlQuery:
                  _id:
                    _args: 0._id
