id: create-company
type: Api
routine:
  _build.array.concat:
    - - id: insert
        type: MongoDBInsertConsecutiveId
        connectionId:
          _module.connectionId: companies-collection
        properties:
          prefix:
            _module.var: id_prefix
          length:
            _module.var: id_length
          doc:
            trading_name:
              _payload: trading_name
            description:
              _payload: description
            registered_name:
              _payload: registered_name
            registration_number:
              _payload: registration_number
            vat_number:
              _payload: vat_number
            website:
              _payload: website
            address:
              _if_none:
                - _payload: address
                - {}
            contact:
              _if_none:
                - _payload: contact
                - {}
            attributes:
              _if_none:
                - _payload: attributes
                - {}
            lowercase_email:
              _string.toLowerCase:
                _string.trim:
                  _if_none:
                    - _payload: contact.primary_email
                    - ""
            removed: null
            created:
              _ref:
                module: events
                component: change_stamp
            updated:
              _ref:
                module: events
                component: change_stamp
    # Optional consumer-provided pipeline stages (only emitted when provided)
    - _build.if:
        test:
          _build.gt:
            - _build.array.length:
                _module.var: request_stages.write
            - 0
        then:
          - - id: apply-write-stages
              type: MongoDBUpdateOne
              connectionId:
                _module.connectionId: companies-collection
              properties:
                filter:
                  _id:
                    _step: insert.insertedId
                update:
                  _module.var: request_stages.write
        else: []
    - - id: link-contacts
        type: MongoDBUpdateMany
        connectionId:
          _module.connectionId:
            id: contacts-collection
            module: contacts
        properties:
          filter:
            _id:
              $in:
                _if_none:
                  - _payload: contacts
                  - []
          update:
            $addToSet:
              global_attributes.company_ids:
                _step: insert.insertedId

      - id: new-event
        type: CallApi
        properties:
          endpointId:
            _module.endpointId:
              id: new-event
              module: events
          payload:
            type: create-company
            display:
              _build.object.fromEntries:
                _build.array.map:
                  on:
                    _build.array.filter:
                      on:
                        _build.object.entries:
                          _build.object.assign:
                            - _ref: defaults/event_display.yaml
                            - _module.var: event_display
                      callback:
                        _build.function:
                          __build.ne:
                            - __build.if_none:
                                - __build.args: 0.1.create-company
                                - null
                            - null
                  callback:
                    _build.function:
                      key:
                        __build.args: 0.0
                      value:
                        title:
                          _nunjucks:
                            template:
                              __build.args: 0.1.create-company
                            on:
                              user:
                                _user: true
                              target:
                                name:
                                  _payload:
                                    _module.var: name_field
                        description: null
            references:
              company_ids:
                - _step: insert.insertedId
            metadata:
              company_id:
                _step: insert.insertedId

      - :return:
          companyId:
            _step: insert.insertedId
