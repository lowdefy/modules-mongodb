id: update-company
type: Api
routine:
  - id: update
    type: MongoDBUpdateOne
    connectionId:
      _module.connectionId: companies-collection
    properties:
      filter:
        _id:
          _payload: company._id
        updated.timestamp:
          _payload: company.updated.timestamp
      update:
        _build.array.concat:
          - - $set:
                trading_name:
                  _payload: company.trading_name
                description:
                  _payload: company.description
                registered_name:
                  _payload: company.registered_name
                registration_number:
                  _payload: company.registration_number
                vat_number:
                  _payload: company.vat_number
                website:
                  _payload: company.website
                address:
                  _payload: company.address
                contact:
                  _payload: company.contact
                lowercase_email:
                  _string.toLowerCase:
                    _string.trim:
                      _if_none:
                        - _payload: company.contact.primary_email
                        - ''
                updated:
                  _ref:
                    module: events
                    component: change_stamp
          - _module.var: request_stages.update_company

  - id: unlink-old-contacts
    type: MongoDBUpdateMany
    connectionId:
      _module.connectionId:
        id: contacts-collection
        module: contacts
    properties:
      filter:
        global_attributes.company_ids:
          _payload: company._id
      update:
        $pull:
          global_attributes.company_ids:
            _payload: company._id

  - id: link-new-contacts
    type: MongoDBUpdateMany
    connectionId:
      _module.connectionId:
        id: contacts-collection
        module: contacts
    properties:
      filter:
        _id:
          $in:
            _if_none:
              - _payload: company.contacts
              - []
      update:
        $addToSet:
          global_attributes.company_ids:
            _payload: company._id

  - id: new-event
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: update-company
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.object.assign:
                        - _ref: defaults/event_display.yaml
                        - _module.var: event_display
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.update-company
                            - null
                        - null
              callback:
                _build.function:
                  key:
                    __build.args: 0.0
                  value:
                    title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.update-company
                        on:
                          user:
                            _user: true
                          target:
                            name:
                              _payload:
                                _build.string.concat:
                                  - 'company.'
                                  - _module.var: name_field
                    description: null
        references:
          company_ids:
            - _payload: company._id
        metadata:
          company_id:
            _payload: company._id

  - :return:
      success: true
