id: update-company
type: Api
routine:
  - id: update
    type: MongoDBUpdateOne
    connectionId:
      _module.connectionId: companies-collection
    properties:
      filter:
        _id:
          _payload: _id
        updated.timestamp:
          _payload: updated.timestamp
      update:
        _build.array.concat:
          # Stage 1: Overwrite scalars, merge sub-objects
          - - $set:
                trading_name:
                  _payload: trading_name
                description:
                  _payload: description
                registered_name:
                  _payload: registered_name
                registration_number:
                  _payload: registration_number
                vat_number:
                  _payload: vat_number
                website:
                  _payload: website
                contact:
                  $mergeObjects:
                    - $ifNull:
                        - "$$ROOT.contact"
                        - {}
                    - _payload: contact
                address:
                  $mergeObjects:
                    - $ifNull:
                        - "$$ROOT.address"
                        - {}
                    - _payload: address
                attributes:
                  $mergeObjects:
                    - $ifNull:
                        - "$$ROOT.attributes"
                        - {}
                    - $ifNull:
                        - _payload: attributes
                        - {}
                updated:
                  _ref:
                    module: events
                    component: change_stamp
          # Stage 2: Derived fields (sees merged contact from stage 1)
          - - $set:
                lowercase_email:
                  $toLower:
                    $trim:
                      input:
                        $ifNull:
                          - "$contact.primary_email"
                          - ""
          # Consumer pipeline stages
          - _module.var: request_stages.write

  - id: unlink-old-contacts
    type: MongoDBUpdateMany
    connectionId:
      _module.connectionId:
        id: contacts-collection
        module: contacts
    properties:
      filter:
        global_attributes.company_ids:
          _payload: _id
      update:
        $pull:
          global_attributes.company_ids:
            _payload: _id

  - id: link-new-contacts
    type: MongoDBUpdateMany
    connectionId:
      _module.connectionId:
        id: contacts-collection
        module: contacts
    properties:
      filter:
        _id:
          $in:
            _if_none:
              - _payload: contacts
              - []
      update:
        $addToSet:
          global_attributes.company_ids:
            _payload: _id

  - id: new-event
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: update-company
        display:
          _build.object.fromEntries:
            _build.array.map:
              on:
                _build.array.filter:
                  on:
                    _build.object.entries:
                      _build.object.assign:
                        - _ref: defaults/event_display.yaml
                        - _module.var: event_display
                  callback:
                    _build.function:
                      __build.ne:
                        - __build.if_none:
                            - __build.args: 0.1.update-company
                            - null
                        - null
              callback:
                _build.function:
                  - __build.args: "0.0"
                  - title:
                      _nunjucks:
                        template:
                          __build.args: 0.1.update-company
                        on:
                          user:
                            _user: true
                          target:
                            name:
                              _payload:
                                _module.var: name_field
                    description: null
        references:
          company_ids:
            - _payload: _id
        metadata:
          company_id:
            _payload: _id

  - :return:
      success: true
