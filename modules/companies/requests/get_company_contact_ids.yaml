id: get_company_contact_ids
type: MongoDBAggregation
connectionId:
  _module.connectionId:
    id: contacts-collection
    module: contacts
payload:
  company_id:
    _url_query: _id
properties:
  pipeline:
    - $match:
        global_attributes.company_ids:
          _payload: company_id
        disabled:
          $ne: true
        hidden:
          $ne: true
    - $project:
        _id: 0
        contact_id: $_id
        name: $profile.name
        email: $lowercase_email
    - $sort:
        name: 1
