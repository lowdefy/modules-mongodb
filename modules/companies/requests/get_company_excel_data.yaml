id: get_company_excel_data
type: MongoDBAggregation
connectionId:
  _module.connectionId: companies-collection
payload:
  filter:
    _state: filter
  sort:
    _state: sort
  pagination:
    _state: fetch_request_pagination
    ~ignoreBuildChecks: true
properties:
  pipeline:
    _build.array.concat:
      - - $search:
            returnStoredSource: true
            compound:
              filter:
                - compound:
                    mustNot:
                      - exists:
                          path: removed.timestamp
                    must:
                      _array.concat:
                        - _if:
                            test:
                              _ne:
                                - _payload: filter.search
                                - null
                            then:
                              - compound:
                                  should:
                                    - text:
                                        query:
                                          _string.toLowerCase:
                                            _payload: filter.search
                                        path:
                                          - _module.var: name_field
                                          - lowercase_email
                                    - wildcard:
                                        query:
                                          _string.concat:
                                            - "*"
                                            - _string.toLowerCase:
                                                _payload: filter.search
                                            - "*"
                                        path:
                                          - _module.var: name_field
                                          - lowercase_email
                                        allowAnalyzedField: true
                            else: []
                        - _array.filter:
                            - _module.var: request_stages.filter_match
                            - _function:
                                __ne:
                                  - __args: 0
                                  - null
        - $addFields:
            score:
              $meta: searchScore
            display_name:
              $getField:
                field:
                  _module.var: name_field
                input: "$$ROOT"
            updated_at:
              $dateToString:
                date: $updated.timestamp
                format: "%Y-%m-%d"
            created_at:
              $dateToString:
                date: $created.timestamp
                format: "%Y-%m-%d"
        - _if:
            test:
              _eq:
                - _if_none:
                    - _payload: filter.search
                    - null
                - null
            then:
              $sort:
                _object.assign:
                  - _object.defineProperty:
                      on: {}
                      key:
                        _payload: sort.by
                      descriptor:
                        value:
                          _payload: sort.order
                  - _id: 1
            else:
              $sort:
                score: -1
                updated.timestamp: -1
      - _module.var: request_stages.get_all_companies
      - - $skip:
            _payload: pagination.skip
        - $limit:
            _payload: pagination.pageSize
