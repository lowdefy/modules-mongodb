id: get_company
type: MongoDBAggregation
connectionId:
  _module.connectionId: companies-collection
payload:
  _id:
    _url_query: _id
properties:
  pipeline:
    - $match:
        _id:
          _payload: _id
        removed:
          $ne: true
    - $addFields:
        display_name:
          $getField:
            field:
              _module.var: name_field
            input: "$$ROOT"
