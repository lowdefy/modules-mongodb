id: get_company
type: MongoDBAggregation
connectionId:
  _module.connectionId: companies-db
payload:
  _id:
    _url_query: _id
properties:
  pipeline:
    - $match:
        _id:
          _payload: _id
        removed:
          $ne: true
    - $addFields:
        display_name:
          $getField:
            field:
              _module.var:
                key: name_field
                default: trading_name
            input: "$$ROOT"
    - $lookup:
        from:
          _module.var:
            key: contacts_collection
            default: user_contacts
        let:
          company_id: "$_id"
        pipeline:
          - $match:
              $expr:
                $in:
                  - "$$company_id"
                  - $ifNull:
                      - "$global_attributes.company_ids"
                      - []
          - $project:
              _id: 1
        as: contacts
    - $addFields:
        contacts:
          $map:
            input: "$contacts"
            as: c
            in: "$$c._id"
