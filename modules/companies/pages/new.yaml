_ref:
  module: layout
  component: page
  vars:
    id: new
    title:
      _string.concat:
        - "New "
        - _module.var: label
    content_width: 700
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
        pageId:
          _module.pageId: all
      - label:
          _string.concat:
            - "New "
            - _module.var: label
    events:
      onInit:
        - id: init_state
          type: SetState
          params:
            contact: {}
            address: {}
            registration: {}
            attributes: {}
            contacts: []
      # When hierarchy is enabled, fetch the parent_selector's options on
      # mount. The selector itself has no onMount (it's the parent_selector
      # wrapper, intentionally without self-fetch — see modules/companies/
      # components/parent_selector.yaml). On the new page there's no doc, so
      # cycle_check_self_id and cycle_check_ids resolve to their defaults
      # (null and []) and the selector behaves as a plain company picker.
      onMount:
        _build.if:
          test:
            _module.var: hierarchy.enabled
          then:
            - id: fetch_selector_options
              type: Request
              params: get_companies_for_selector
          else: []
    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          - _ref: components/form_company.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title:
                    _string.concat:
                      - "Create "
                      - _module.var: label
                  icon: AiOutlinePlusCircle
                  type: primary
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: create_company
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: create-company
                        payload:
                          _build.object.assign:
                            - name:
                                _state: name
                              description:
                                _state: description
                              contact:
                                _state: contact
                              address:
                                _state: address
                              registration:
                                _state: registration
                              attributes:
                                _state: attributes
                              contacts:
                                _array.map:
                                  on:
                                    _if_none:
                                      - _state: contacts
                                      - []
                                  callback:
                                    _function:
                                      __args: 0.contact_id
                            # parent_ids (build-gated): inserted on the
                            # company doc when hierarchy.enabled is true.
                            - _build.if:
                                test:
                                  _module.var: hierarchy.enabled
                                then:
                                  parent_ids:
                                    _if_none:
                                      - _state: parent_ids
                                      - []
                                else: {}
                      messages:
                        success:
                          _string.concat:
                            - _module.var: label
                            - " created."
                    - id: reset
                      type: Reset
                    - id: go_detail
                      type: Link
                      params:
                        pageId:
                          _module.pageId: view
                        urlQuery:
                          _id:
                            _actions: create_company.response.response.companyId
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: all
