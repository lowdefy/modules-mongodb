_ref:
  module: layout
  component: page
  vars:
    id: new
    title:
      _string.concat:
        - "New "
        - _module.var: label
    content_width: 700
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
        pageId:
          _module.pageId: all
      - label:
          _string.concat:
            - "New "
            - _module.var: label
    events:
      onInit:
        - id: init_state
          type: SetState
          params:
            contact: {}
            address: {}
            attributes: {}
            contacts: []
    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          - _ref: components/form_company.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title:
                    _string.concat:
                      - "Create "
                      - _module.var: label
                  icon: AiOutlinePlusCircle
                  type: primary
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: create_company
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: create-company
                        payload:
                          trading_name:
                            _state: trading_name
                          description:
                            _state: description
                          registered_name:
                            _state: registered_name
                          registration_number:
                            _state: registration_number
                          vat_number:
                            _state: vat_number
                          website:
                            _state: website
                          contact:
                            _state: contact
                          address:
                            _state: address
                          attributes:
                            _state: attributes
                          contacts:
                            _array.map:
                              on:
                                _if_none:
                                  - _state: contacts
                                  - []
                              callback:
                                _function:
                                  __args: 0.contact_id
                      messages:
                        success:
                          _string.concat:
                            - _module.var: label
                            - " created."
                    - id: reset
                      type: Reset
                    - id: go_detail
                      type: Link
                      params:
                        pageId:
                          _module.pageId: view
                        urlQuery:
                          _id:
                            _actions: create_company.response.response.companyId
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        pageId:
                          _module.pageId: all
