_ref:
  module: layout
  component: page
  vars:
    id: view
    type:
      _module.var: label
    title:
      _if_none:
        - _request: get_company.0.display_name
        - ""
    loading:
      _not:
        _request: get_company
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
        pageId:
          _module.pageId: all
      - label:
          _if_none:
            - _request: get_company.0.display_name
            - ""
    page_actions:
      - id: edit_button
        type: Button
        layout:
          flex: 0 1 auto
        properties:
          title: Edit
          icon: AiOutlineEdit
          type: default
        events:
          onClick:
            - id: go_edit
              type: Link
              params:
                pageId:
                  _module.pageId: edit
                urlQuery:
                  _id:
                    _url_query: _id
    doc:
      _request: get_company.0
    events:
      onInit:
        - id: init_state
          type: SetState
          params:
            contact: {}
            address: {}
            registration: {}
            attributes: {}
            # company-selector (used by any sidebar slot that includes
            # activities' tile_activities → capture modal → form_activity)
            # reads _state.cycle_check_* via get_companies_for_selector.
            # Init to null/[] here so the build's _state validator doesn't
            # warn on this page. Runtime unchanged — the request's _if_none
            # defaults already cover null/empty.
            cycle_check_self_id: null
            cycle_check_ids: []
      onMount:
        - id: fetch
          type: Request
          params:
            _build.array.concat:
              - - get_company
              - _build.if:
                  test:
                    _module.var: hierarchy.enabled
                  then:
                    - get_company_children
                  else: []
        - id: redirect_if_not_found
          type: Link
          skip:
            _ne:
              - _request: get_company.0
              - null
          params:
            pageId:
              _module.pageId: all
    requests:
      _build.array.concat:
        - - _ref: requests/get_company.yaml
        - _build.if:
            test:
              _module.var: hierarchy.enabled
            then:
              - _ref: requests/get_company_children.yaml
            else: []
    blocks:
      - id: detail_layout
        type: Box
        layout:
          gap: 16
        blocks:
          - id: main_column
            type: Box
            layout:
              span: 14
              sm:
                span: 24
            blocks:
              _build.array.concat:
                - - _ref:
                      module: layout
                      component: card
                      vars:
                        title:
                          _string.concat:
                            - _module.var: label
                            - " Information"
                        blocks:
                          - _ref: components/view_company.yaml
                - _module.var: components.main_slots
          - id: sidebar_column
            type: Box
            layout:
              span: 10
              sm:
                span: 24
            blocks:
              _build.array.concat:
                - - _ref: components/tile_contacts.yaml
                # Hierarchy tile (build-gated). Sits between contacts and
                # events so hierarchy navigation comes before activity.
                # Self-hides at runtime when both parents and children are
                # empty (visibility on the wrapper Box).
                - _build.if:
                    test:
                      _module.var: hierarchy.enabled
                    then:
                      - _ref: components/tile_hierarchy.yaml
                    else: []
                - - _ref: components/tile_events.yaml
                - _module.var: components.sidebar_slots
