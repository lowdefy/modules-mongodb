_ref:
  module: layout
  component: page
  vars:
    id: view
    title:
      _nunjucks:
        template: |
          {{ label }}{% if display_name %}: {{ display_name | safe }}{% endif %}
        on:
          _object.assign:
            - _request: get_company.0
            - label:
                _module.var: label
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
        pageId:
          _module.pageId: all
      - label:
          _if_none:
            - _request: get_company.0.display_name
            - ""
    page_actions:
      - id: edit_button
        type: Button
        layout:
          flex: 0 1 auto
        properties:
          title: Edit
          icon: AiOutlineEdit
          type: default
        events:
          onClick:
            - id: go_edit
              type: Link
              params:
                pageId:
                  _module.pageId: edit
                urlQuery:
                  _id:
                    _url_query: _id
    doc:
      _request: get_company.0
    events:
      onInit:
        - id: init_state
          type: SetState
          params:
            contact: {}
            address: {}
            registration: {}
            attributes: {}
            # TEMPORARY — paired with the inline activities tile below.
            # The tile's capture modal uses company-selector, whose request
            # reads `_state.cycle_check_*` and trips ConfigWarning on pages
            # that don't declare those keys. Runtime behaviour unchanged
            # (the request's `_if_none` defaults already handle null/empty).
            # Remove these alongside the inline-tile workaround once the
            # framework limitation (decisions.md §7) is fixed.
            cycle_check_self_id: null
            cycle_check_ids: []
      onMount:
        - id: fetch
          type: Request
          params:
            _build.array.concat:
              - - get_company
              - _build.if:
                  test:
                    _module.var: hierarchy.enabled
                  then:
                    - get_company_children
                  else: []
        - id: redirect_if_not_found
          type: Link
          skip:
            _ne:
              - _request: get_company.0
              - null
          params:
            pageId:
              _module.pageId: all
    requests:
      _build.array.concat:
        - - _ref: requests/get_company.yaml
        - _build.if:
            test:
              _module.var: hierarchy.enabled
            then:
              - _ref: requests/get_company_children.yaml
            else: []
    blocks:
      - id: detail_layout
        type: Box
        layout:
          gap: 16
        blocks:
          - id: main_column
            type: Box
            layout:
              span: 14
              sm:
                span: 24
            blocks:
              _build.array.concat:
                - - _ref:
                      module: layout
                      component: card
                      vars:
                        title:
                          _string.concat:
                            - _module.var: label
                            - " Information"
                        blocks:
                          - _ref: components/view_company.yaml
                - _module.var: components.main_slots
          - id: sidebar_column
            type: Box
            layout:
              span: 10
              sm:
                span: 24
            blocks:
              _build.array.concat:
                - - _ref: components/tile_contacts.yaml
                # Hierarchy tile (build-gated). Sits between contacts and
                # activity so hierarchy navigation comes before activity.
                # Self-hides at runtime when both parents and children are
                # empty (visibility on the wrapper Box). Lifted to its own
                # concat element so the inner [tile_hierarchy] array flattens.
                - _build.if:
                    test:
                      _module.var: hierarchy.enabled
                    then:
                      - _ref: components/tile_hierarchy.yaml
                    else: []
                # TEMPORARY inline activities tile — intended pattern is
                # app-level slot wiring via components.sidebar_slots
                # (decisions.md §7); blocked by framework limitation. Move
                # back to app vars once fixed. Paired with the activities
                # module dep (module.lowdefy.yaml) and the cycle_check_*
                # state init in this page's onInit — revert all three.
                - - _ref:
                      module: activities
                      component: tile_activities
                      vars:
                        reference_field: company_ids
                        reference_value:
                          _url_query: _id
                        prefill:
                          company_ids:
                            - _url_query: _id
                        on_created:
                          - id: refetch_events
                            type: Request
                            params: get-events
                  - _ref: components/tile_events.yaml
                - _module.var: components.sidebar_slots
