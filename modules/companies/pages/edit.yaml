_ref:
  module: layout
  component: page
  vars:
    id: edit
    title:
      _string.concat:
        - "Edit "
        - _module.var: label
        - ": "
        - _if_none:
            - _request: get_company.0.display_name
            - ""
    content_width: 700
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label:
          _module.var: label_plural
        pageId:
          _module.pageId: all
      - label:
          _string.concat:
            - "Edit "
            - _module.var: label
    events:
      onMount:
        _build.array.concat:
          - - id: fetch
              type: Request
              params:
                _build.array.concat:
                  - - get_company
                    - get_company_contact_ids
                  - _build.if:
                      test:
                        _module.var: hierarchy.enabled
                      then:
                        - get_descendant_company_ids
                      else: []
            - id: redirect_if_not_found
              type: Link
              skip:
                _ne:
                  - _request: get_company.0
                  - null
              params:
                pageId:
                  _module.pageId: all
            - id: set_state
              type: SetState
              params:
                _build.object.assign:
                  - _id:
                      _request: get_company.0._id
                    name:
                      _request: get_company.0.name
                    description:
                      _request: get_company.0.description
                    contact:
                      _request: get_company.0.contact
                    address:
                      _request: get_company.0.address
                    registration:
                      _request: get_company.0.registration
                    attributes:
                      _request: get_company.0.attributes
                    contacts:
                      _array.map:
                        on:
                          _if_none:
                            - _request: get_company_contact_ids.0.ids
                            - []
                        callback:
                          _function:
                            contact_id:
                              __args: 0
                    updated:
                      _request: get_company.0.updated
                  # Hierarchy state (build-gated): parent_ids prefills the
                  # form, cycle_check_self_id is read by the parent_selector's
                  # request to $match-exclude self, cycle_check_ids is read
                  # to $cond-disable descendants in the dropdown.
                  - _build.if:
                      test:
                        _module.var: hierarchy.enabled
                      then:
                        parent_ids:
                          _if_none:
                            - _request: get_company.0.parent_ids
                            - []
                        cycle_check_self_id:
                          _request: get_company.0._id
                        cycle_check_ids:
                          _if_none:
                            - _request: get_descendant_company_ids.0.ids
                            - []
                      else: {}
          # Fetch the parent_selector's options AFTER set_state so the
          # request payload sees the new state on its first invocation
          # (no first-render flash where self appears as a valid parent).
          - _build.if:
              test:
                _module.var: hierarchy.enabled
              then:
                - id: fetch_selector_options
                  type: Request
                  params: get_companies_for_selector
              else: []
    requests:
      _build.array.concat:
        - - _ref: requests/get_company.yaml
          - _ref: requests/get_company_contact_ids.yaml
        - _build.if:
            test:
              _module.var: hierarchy.enabled
            then:
              - _ref: requests/get_descendant_company_ids.yaml
            else: []
    blocks:
      - id: card
        type: Card
        layout:
          gap: 16
        blocks:
          - _ref: components/form_company.yaml
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              - id: save_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Save
                  icon: AiOutlineSave
                events:
                  onClick:
                    - id: validate
                      type: Validate
                    - id: update_company
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId: update-company
                        payload:
                          _build.object.assign:
                            - _id:
                                _state: _id
                              name:
                                _state: name
                              description:
                                _state: description
                              contact:
                                _state: contact
                              address:
                                _state: address
                              registration:
                                _state: registration
                              attributes:
                                _state: attributes
                              contacts:
                                _array.map:
                                  on:
                                    _if_none:
                                      - _state: contacts
                                      - []
                                  callback:
                                    _function:
                                      __args: 0.contact_id
                              updated:
                                _state: updated
                            # parent_ids (build-gated): the form's auto-bound
                            # multi-select writes to state.parent_ids; payload
                            # forwards the array authoritative-ly. The
                            # update-company API's cycle check rejects sets
                            # that would form a cycle.
                            - _build.if:
                                test:
                                  _module.var: hierarchy.enabled
                                then:
                                  parent_ids:
                                    _if_none:
                                      - _state: parent_ids
                                      - []
                                else: {}
                      messages:
                        success:
                          _string.concat:
                            - _module.var: label
                            - " updated."
                    - id: reset
                      type: Reset
                    - id: back
                      type: Link
                      params:
                        back: true
              - id: cancel_button
                type: Button
                layout:
                  flex: 0 1 auto
                properties:
                  title: Cancel
                  icon: AiOutlineCloseCircle
                  type: default
                events:
                  onClick:
                    - id: back
                      type: Link
                      params:
                        back: true
