- id: contact.website
  type: TextInput
  properties:
    title: Website
    placeholder: "https://..."
- id: contact.primary_email
  type: TextInput
  properties:
    title: Email
    placeholder: "info@company.com"
  validate:
    - message: Please provide a valid email address.
      status: error
      pass:
        _or:
          - _regex: '^(([^<>()\[\]\\.,;:\s@"]+(\.[^<>()\[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$'
          - _eq:
              - _state: contact.primary_email
              - null
- id: contact.primary_phone
  type: PhoneNumberInput
  properties:
    title: Phone
