# Conversation list for the chat page's sidebar, most recent first. Carries
# titles/metadata only: messages and dataParts are excluded — selecting a
# conversation restores both via a fresh get-conversation-results read (a
# list snapshot races the onFinish save and can be a turn behind, and a stale
# restore would overwrite the saved transcript on the next turn). The list is
# capped to keep the payload bounded.
id: list-conversations
type: Api
routine:
  # Scope by sub ?? id to match the write key: the agent hooks store userId as
  # _payload.userId, which the framework derives as user.sub ?? user.id.
  - :if:
      _eq:
        - _if_none:
            - _user: sub
            - _user: id
        - null
    :then:
      - :return: []
  - id: find_conversations
    type: MongoDBFind
    connectionId:
      _module.connectionId: conversations-store
    properties:
      query:
        userId:
          _if_none:
            - _user: sub
            - _user: id
      options:
        sort:
          updatedAt: -1
        limit: 30
        projection:
          dataParts: 0
          messages: 0
  - :return:
      _step: find_conversations
