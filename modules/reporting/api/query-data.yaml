# The open query endpoint — one endpoint, three consumers: the agent's
# query_data tool, report filter re-queries (CallAPI), and panel downloads.
# The AnalyticsPipeline request is the single security boundary: it validates
# the AI-authored pipeline against the catalog (bound at the connection) and
# the user's roles, prepends the filter $match, and runs it read-only.
# The filter triples are untrusted client input (a re-query is a browser-side
# CallAPI) — contained because the server builds the $match from a fixed op
# map and the combined pipeline is revalidated through the same walk.
id: query-data
type: Api
description: >
  Run an AI-authored, allowlist-validated read-only aggregation pipeline
  against a cataloged collection. Never raw database access — the pipeline is
  reconstructed and revalidated before execution. Returns result rows.
payloadSchema:
  type: object
  required:
    - query
  properties:
    query:
      type: object
      description: The collection and pipeline to run.
      required:
        - collection
        - pipeline
      properties:
        collection:
          type: string
          description: Catalog-declared base collection the pipeline reads from.
        pipeline:
          type: array
          description: Read-only MongoDB aggregation pipeline stages.
    filters:
      type: array
      description: >
        Report filter triples applied as a leading $match before the pipeline
        (report filter re-queries only). Values arrive as deferred __state
        reads resolved client-side; null/undefined values drop the triple.
      items:
        type: object
        required:
          - field
          - op
          - value
        properties:
          field:
            type: string
          op:
            type: string
          value: {}
routine:
  - id: run_query
    type: AnalyticsPipeline
    connectionId:
      _module.connectionId: reporting-data
    properties:
      query:
        _payload: query
      filters:
        _payload: filters
      roles:
        _user: roles
  - :return:
      _step: run_query
