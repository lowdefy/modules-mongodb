# onFinish hook: read the validated chart/export specs from the turn's
# toolResults, run each chart's query once (bounded, inside :try — a failed
# query skips its chart), and return chart + download dataParts for the chat
# page's adjacent panel. Tools cannot write to the stream — dataParts are
# written only from onFinish hook responses. No-ops headlessly.
id: emit-data-parts
type: Api
routine:
  - :if:
      _eq:
        - _payload: conversationId
        - null
    :then:
      - :return: {}
  # The validated chart specs, in tool-call order, capped at 8 per turn.
  - :set_state:
      chart_specs:
        _mql.expr:
          on:
            results:
              _payload: toolResults
          expr:
            $slice:
              - $map:
                  input:
                    $filter:
                      input: $results
                      cond:
                        $eq:
                          - $$this.toolName
                          - render_chart
                  in: $$this.output.spec
              - 8
      download_specs:
        _mql.expr:
          on:
            results:
              _payload: toolResults
          expr:
            $slice:
              - $map:
                  input:
                    $filter:
                      input: $results
                      cond:
                        $eq:
                          - $$this.toolName
                          - export_data
                  in: $$this.output.spec
              - 8
  - :for: chart
    :in:
      _state: chart_specs
    :do:
      - :try:
          - id: chart_rows
            type: AnalyticsPipeline
            connectionId:
              _module.connectionId: reporting-data
            properties:
              query:
                _item: chart.query
              roles:
                _user: roles
        :catch:
          - :log: A chart pipeline failed at turn end — its chart is skipped.
  # buildDataParts holds the fetched rows already, so it needs no catalog: it
  # re-checks the inert spec shapes and verifies each chart's x/y contract
  # against its rows (throwing an actionable error the agent self-corrects on).
  - :set_state:
      data_parts:
        _analytics.buildDataParts:
          charts:
            _state: chart_specs
          results:
            _step: chart_rows
          downloads:
            _state: download_specs
          roles:
            _user: roles
  # Snapshot this turn's built parts onto the conversation doc so reopening it
  # restores the Results panel. save-conversation (the prior onFinish hook)
  # owns the doc lifecycle (messages, title, createdAt); this hook only appends
  # `dataParts` per turn, mirroring the live panel's onDataPart accumulation.
  # upsert is false: the prior hook has already created the doc, and creating it
  # here would leave a title-less, createdAt-less doc if that hook had failed.
  - :if:
      _gt:
        - _array.length:
            _state: data_parts
        - 0
    :then:
      - id: persist_results
        type: MongoDBUpdateOne
        connectionId:
          _module.connectionId: conversations-store
        properties:
          filter:
            _id:
              _payload: conversationId
            userId:
              _payload: userId
          update:
            $push:
              dataParts:
                $each:
                  _state: data_parts
          options:
            upsert: false
  - :return:
      dataParts:
        _state: data_parts
