# Report tool: validate the report spec against the catalog and the
# allow-listed section types (each query section's pipeline is run through
# validatePipeline before persist), persist it raw (the durable contract —
# blocks are compiled from it at every resolve), return the report's URL.
# Persisting raw stores nested $-prefixed keys inside the report doc, which
# MongoDB allows from 5.0 (see task 9); the resolve-time revalidation is the
# guarantee, so the pipeline is stored verbatim, never sanitized.
id: generate-report
type: Api
description: >
  Save the conversation's findings as a navigable report. Takes a report
  spec — title, optional description, and up to 12 sections of types kpi,
  chart (bar|line|pie), table, filter (select|daterange), markdown, download.
  Query-backed sections carry a { collection, pipeline } query plus a
  presentation contract (kpi: valueKey, format?; chart: x, y; table: columns
  [{ key, label?, format? }]); bind sections to filter controls with
  filterBy: [field]. Returns the report URL to share with the user.
payloadSchema:
  type: object
  required:
    - spec
  properties:
    spec:
      type: object
      description: The report spec.
      required:
        - title
        - sections
      properties:
        title:
          type: string
          description: Report title (max 200 characters).
        description:
          type: string
          description: Short report description.
        sections:
          type: array
          description: >
            Report sections in render order. kpi/chart/table/download carry a
            query; filter carries { control, field, label }; markdown carries
            { content }.
          items:
            type: object
            required:
              - type
routine:
  # Reports are per-user; an unauthenticated context cannot save one.
  - :if:
      _eq:
        - _user: id
        - null
    :then:
      - :reject: You must be signed in to save a report.
  # Validation throws on an invalid spec — the tool call fails with the
  # validator's actionable message. The raw spec is what gets stored.
  - :set_state:
      validated:
        _analytics.validateReportSpec:
          spec:
            _payload: spec
          catalog:
            _module.var: catalog
          roles:
            _user: roles
  - id: insert_report
    type: MongoDBInsertOne
    connectionId:
      _module.connectionId: reports-store
    properties:
      doc:
        _id:
          _uuid: true
        userId:
          _user: id
        title:
          _payload: spec.title
        description:
          _payload: spec.description
        spec:
          _payload: spec
        # Tool endpoints receive only the tool input as payload — the agent
        # context (conversationId) does not reach them in the current agent
        # system, so the source conversation is not linked in v1.
        sourceConversationId: null
        createdAt:
          _date: now
        updatedAt:
          _date: now
  - :return:
      ok: true
      reportId:
        _step: insert_report.insertedId
      url:
        _string.concat:
          - "/"
          - _module.id: true
          - "/report?reportId="
          - _step: insert_report.insertedId
