name: Layout
version: 0.2.0
description: Page layout module supporting three page block variants — PageHeaderMenu (top header + inline menu, default), PageSiderMenu (top header + collapsible sider), and PageSidebarLayout (full-height sider) — selected via the page_type var.

dependencies:
  - id: user-account
  - id: notifications

vars:
  page_type:
    type: string
    default: header-menu
    enum:
      - header-menu
      - sider-menu
      - sidebar
    description: Which page block to render. 'header-menu' (default) uses PageHeaderMenu (top header bar with inline menu, no sider); 'sider-menu' uses PageSiderMenu (top header bar + collapsible sider); 'sidebar' uses PageSidebarLayout (full-height sider containing menu, profile, and notifications). Can be overridden per page via `_ref` vars.
  sider:
    type: object
    default: {}
    description: "Sider properties forwarded to the page block: { width, initialCollapsed, collapsible, hideToggleButton, collapsedWidth }. `collapsible` applies to PageSidebarLayout only. Ignored for page_type 'header-menu' (PageHeaderMenu has no sider)."
    properties:
      width:
        description: Width of the expanded sider (number in pixels or CSS length string).
      initialCollapsed:
        description: >-
          Initial collapsed state on first load. Subsequent visits read the
          persisted state from localStorage (see `sider_storage_key`).
      collapsible:
        description: >-
          Whether the sider can be collapsed by the user. PageSidebarLayout
          only.
      hideToggleButton:
        description: Hide the collapse toggle button rendered in the sider.
      collapsedWidth:
        description: Width of the collapsed sider in pixels.
  sider_open_blocks:
    type: array
    default: []
    description: Blocks rendered in the PageSidebarLayout siderOpen slot (below the menu when expanded). Only used when page_type is 'sidebar'.
  sider_closed_blocks:
    type: array
    default: []
    description: Blocks rendered in the PageSidebarLayout siderClosed slot (shown when collapsed). Only used when page_type is 'sidebar'.
  sider_storage_key:
    type: string
    default: layout-sider
    description: localStorage key suffix for sider collapsed-state persistence. Produces key 'lf-{sider_storage_key}-open'. Ignored for page_type 'header-menu' (no sider to persist).
  logo:
    type: object
    description: "Logo config: { primary_light, primary_dark, primary, icon, style }"
    properties:
      primary_light:
        description: >-
          Logo rendered in the page header on light backgrounds. Consumers
          must set this — there is no default.
      primary_dark:
        default: /logo-dark-theme.png
        description: >-
          Logo rendered on dark backgrounds (auth-page cover, dark-theme
          header).
      primary:
        default: /logo-light-theme.png
        description: >-
          Logo rendered in the auth-page brand panel and mobile auth view.
      icon:
        description: Square icon logo used in the mobile header.
      style:
        description: Inline style object applied to the header logo.
  menu:
    type: object
    default:
      _menu: default
    description: Menu config passed to the page block. Defaults to _menu default.
  header:
    type: object
    default: {}
    description: "Page block header properties: { theme, contentStyle }"
  header_extra:
    type: object
    description: "Header customization: { blocks, requests }"
    properties:
      requests:
        default: []
        description: >-
          Requests loaded with every page that uses the page component. Use
          for shared header data (e.g. notification counts).
      blocks:
        default: []
        description: Blocks rendered in the header slot on the right side.
  title_block:
    type: object
    default: null
    description: Custom title block override (replaces default title bar)
  footer:
    type: array
    default: []
    description: Footer blocks appended after page content
  card:
    type: object
    default: null
    description: Custom card component override (replaces default Card layout)
  dark_mode_toggle:
    type: boolean
    default: true
    description: Enable dark mode toggle in the page block (rendered in the header for sider-menu, in the sider for sidebar)
  profile_menu_id:
    type: string
    default: profile
    description: >
      Id of the app-level menu used for the profile dropdown. Menu links are
      filtered server-side by page access (auth.pages.roles). The app must
      register a menu with this id in its menus list.
  auth_page:
    type: object
    description: "Auth page overrides: { cover_background, card_style, max_width, logo_max_width, brand_panel_background }"
    properties:
      max_width:
        default: 360
        description: Max width of the auth card container in pixels.
      card_style:
        default: {}
        description: >-
          Inline style object applied to the auth card (e.g. shadows, borders,
          radius overrides).
      cover_background:
        default:
          _if:
            test:
              _media: darkMode
            then: "linear-gradient(160deg, color-mix(in srgb, var(--ant-color-primary) 40%, black) 0%, color-mix(in srgb, var(--ant-color-primary) 60%, black) 100%)"
            else: "linear-gradient(160deg, color-mix(in srgb, var(--ant-color-primary) 70%, black) 0%, var(--ant-color-primary) 100%)"
        description: >-
          CSS `background` for the auth card cover area. Defaults to a
          colorPrimary gradient that auto-adapts to dark mode.
      logo_max_width:
        default: 160
        description: Max width of the logo in the cover area in pixels.
      brand_panel_background:
        default: "linear-gradient(160deg, color-mix(in srgb, var(--ant-color-primary) 70%, black) 0%, var(--ant-color-primary) 100%)"
        description: >-
          CSS `background` for the auth-page brand panel (alternate auth
          layout). Defaults to a colorPrimary gradient.

exports:
  components:
    - id: page
      description: Page layout wrapper with title bar, header/sider slots, menu, and content area. Selects PageHeaderMenu, PageSiderMenu, or PageSidebarLayout based on the page_type var.
    - id: card
      description: Standard content card layout with optional back button and footer
    - id: floating-actions
      description: Floating action button bar affixed to bottom of viewport
    - id: auth-page
      description: Centered auth/login page layout with logo and card

components:
  - id: page
    component:
      _ref: components/page.yaml
  - id: card
    component:
      _ref: ../shared/layout/card.yaml
  - id: floating-actions
    component:
      _ref: ../shared/layout/floating-actions.yaml
  - id: auth-page
    component:
      _ref: ../shared/layout/auth-page.yaml
