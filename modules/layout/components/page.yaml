id:
  _var: id
type:
  _build.switch:
    branches:
      - if:
          _build.eq:
            - _var:
                key: page_type
                default:
                  _module.var: page_type
            - sidebar
        then: PageSidebarLayout
      - if:
          _build.eq:
            - _var:
                key: page_type
                default:
                  _module.var: page_type
            - sider-menu
        then: PageSiderMenu
    default: PageHeaderMenu
properties:
  _build.object.assign:
    - title:
        _var: title
      breadcrumb:
        list:
          _var:
            key: breadcrumbs
            default: []
      menu:
        _var:
          key: menu
          default:
            _module.var: menu
      # Built-in header features — gated by per-page hide flags
      profile:
        _build.if:
          test:
            _build.not:
              _var:
                key: hide_profile
                default: false
          then:
            avatar:
              _ref:
                module: user-account
                component: profile-avatar
            links:
              _menu:
                _module.var: profile_menu_id
          else: null
      notifications:
        _build.if:
          test:
            _build.not:
              _var:
                key: hide_notifications
                default: false
          then:
            _ref:
              module: notifications
              component: notification-config
          else: null
      darkModeToggle:
        _module.var: dark_mode_toggle
    # sider / siderStorageKey only apply to sider-menu and sidebar variants.
    # PageHeaderMenu rejects them (additionalProperties: false).
    - _build.if:
        test:
          _build.ne:
            - _var:
                key: page_type
                default:
                  _module.var: page_type
            - header-menu
        then:
          sider:
            _module.var: sider
          siderStorageKey:
            _module.var: sider_storage_key
        else: {}
style:
  .logo:
    _module.var: logo.style
requests:
  _build.array.concat:
    - _build.if:
        test:
          _build.not:
            _var:
              key: hide_notifications
              default: false
        then:
          - _ref:
              module: notifications
              component: unread-count-request
        else: []
    - _module.var: header_extra.requests
    - _var:
        key: requests
        default: []
events:
  onInit:
    _var:
      key: events.onInit
      default: []
  onInitAsync:
    _var:
      key: events.onInitAsync
      default: []
  onMount:
    _var:
      key: events.onMount
      default: []
  onMountAsync:
    _build.array.concat:
      - _build.if:
          test:
            _build.not:
              _var:
                key: hide_notifications
                default: false
          then:
            - id: __fetch_notifications_unread_count
              type: Request
              params: notifications_unread_count
          else: []
      - _var:
          key: events.onMountAsync
          default: []
slots:
  _build.object.assign:
    - header:
        blocks:
          _module.var: header_extra.blocks
      footer:
        _build.if:
          test:
            _build.not:
              _var:
                key: hide_footer
                default: false
          then:
            style:
              textAlign: center
              fontSize: 12
              color: "var(--ant-color-text-secondary)"
            blocks:
              _module.var: footer
          else: []
    - _build.if:
        test:
          _build.eq:
            - _var:
                key: page_type
                default:
                  _module.var: page_type
            - sidebar
        then:
          siderOpen:
            blocks:
              _module.var: sider_open_blocks
          siderClosed:
            blocks:
              _module.var: sider_closed_blocks
        else: {}
blocks:
  - id: page-content
    type: Box
    layout:
      span: 24
      gap: 12
    style:
      maxWidth:
        _var:
          key: content_width
          default: "100%"
      margin: auto
    blocks:
      _build.array.concat:
        # Title block (per-page override > module-level override > default)
        - _build.if:
            test:
              _build.not:
                _var:
                  key: hide_title
                  default: false
            then:
              _build.if:
                test:
                  _build.ne:
                    - _var:
                        key: title_block
                        default: null
                    - null
                then:
                  _var: title_block
                else:
                  _build.if:
                    test:
                      _build.ne:
                        - _module.var: title_block
                        - null
                    then:
                      _module.var: title_block
                    else:
                      - _ref:
                          path: ../shared/layout/title-block.yaml
                          vars:
                            title:
                              _var: title
                            doc:
                              _var:
                                key: doc
                                default: null
                            page_actions:
                              _var:
                                key: page_actions
                                default: []
                            type:
                              _var:
                                key: type
                                default: null
                            status:
                              _var:
                                key: status
                                default: null
                            status_enum:
                              _var:
                                key: status_enum
                                default: null
                            loading:
                              _var:
                                key: loading
                                default: false
                            show_back_button:
                              _var:
                                key: show_back_button
                                default: false
                            back_link:
                              _var:
                                key: back_link
                                default: null
            else: []
        # Consumer content
        - _var: blocks
