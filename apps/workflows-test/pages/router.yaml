# The user-account module links to a host-app page with id `router`
# after login/logout, so the app must provide one.
id: router
type: Box
events:
  onMount:
    - id: router
      type: Link
      params:
        pageId:
          _switch:
            branches:
              - if:
                  _eq:
                    - _user: true
                    - null
                then: user-account/login
              - if:
                  _ne:
                    - _user: profile.profile_created
                    - true
                then: user-account/new
            default: things
