id: leads-create
type: Api
routine:
  - id: insert
    type: MongoDBInsertOne
    connectionId: leads-collection
    properties:
      doc:
        _id:
          _payload: _id
        name:
          _payload: name
        email:
          _payload: email
        created:
          _ref:
            module: events
            component: change_stamp
        updated:
          _ref:
            module: events
            component: change_stamp
  - id: log_lead_created
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: new-event
          module: events
      payload:
        type: create-lead
        display:
          demo:
            title:
              _nunjucks:
                template: "{{ user.profile.name }} created lead {{ target.name }}"
                on:
                  user:
                    _user: true
                  target:
                    name:
                      _payload: name
        references:
          lead_ids:
            - _payload: _id
  - id: start_onboarding
    type: CallApi
    properties:
      endpointId:
        _module.endpointId:
          id: onboarding-start
          module: workflows
      payload:
        entity:
          id:
            _payload: _id
  - :return:
      _id:
        _payload: _id
