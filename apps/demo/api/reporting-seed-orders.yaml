# Seeds the demo_orders collection the reporting data dictionary describes.
# Clears the collection first so re-seeding is idempotent, then inserts a spread
# of synthetic orders across regions, categories, statuses, channels and ~8
# months. createdAt is a real Date (the helpers serializer round-trips it to a
# BSON date); month is the pre-bucketed "YYYY-MM" string used for time-series
# grouping, since the analytics engine groups on raw field values.
id: reporting-seed-orders
type: Api
routine:
  - id: clear
    type: MongoDBDeleteMany
    connectionId: demo-orders
    properties:
      filter: {}
  - id: insert
    type: MongoDBInsertMany
    connectionId: demo-orders
    properties:
      docs:
        _js: |
          const regions = ['North', 'South', 'East', 'West'];
          const categories = ['Electronics', 'Clothing', 'Home', 'Toys', 'Sports'];
          const statuses = ['pending', 'paid', 'shipped', 'cancelled'];
          const channels = ['online', 'retail', 'partner'];
          const now = Date.now();
          const docs = [];
          for (let i = 0; i < 120; i++) {
            const d = new Date(now - i * 2 * 86400000);
            docs.push({
              region: regions[i % 4],
              category: categories[Math.floor(i / 2) % 5],
              status: statuses[Math.floor(i / 3) % 4],
              channel: channels[i % 3],
              month: d.toISOString().slice(0, 7),
              createdAt: d,
              total: 50 + ((i * 37) % 950),
              quantity: 1 + (i % 10),
            });
          }
          return docs;
  - :return:
      inserted:
        _step: insert.insertedCount
