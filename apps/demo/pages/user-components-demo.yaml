_ref:
  module: layout
  component: page
  vars:
    id: user-components-demo
    title: User components
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label: User components
    blocks:
      - _ref:
          module: layout
          component: card
          vars:
            title: user-avatar
            blocks:
              # Populated picture + name → renders the image and the name.
              - _ref:
                  module: user-account
                  component: user-avatar
                  vars:
                    user:
                      profile:
                        name: Ada Lovelace
                        picture: "data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'128'%20height%3D'128'%3E%3Crect%20width%3D'128'%20height%3D'128'%20fill%3D'%231565c0'%2F%3E%3Ctext%20x%3D'64'%20y%3D'64'%20dominant-baseline%3D'central'%20text-anchor%3D'middle'%20fill%3D'white'%20font-family%3D'sans-serif'%20font-size%3D'48'%20font-weight%3D'bold'%3EAL%3C%2Ftext%3E%3C%2Fsvg%3E"
              # No picture → falls back to the Avatar block's UserOutlined icon.
              - _ref:
                  module: user-account
                  component: user-avatar
                  vars:
                    user:
                      profile:
                        name: Grace Hopper
              # show_name: false → avatar only, no name beside it.
              - _ref:
                  module: user-account
                  component: user-avatar
                  vars:
                    show_name: false
                    user:
                      profile:
                        name: Alan Turing
      - _ref:
          module: layout
          component: card
          vars:
            title: user-multi-selector
            blocks:
              - _ref:
                  module: user-account
                  component: user-multi-selector
                  vars:
                    label: Assignees
              - id: assignees_readback
                type: Html
                properties:
                  html:
                    _nunjucks:
                      template: "<strong>Selected ids (array):</strong> {{ ids | dump }}"
                      on:
                        ids:
                          _state: user-multi-selector
