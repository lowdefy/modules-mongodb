# Quote builder (Part 28 showcase) — the app-owned working surface for the
# onboarding workflow's `send-quote` custom action.
#
# The send-quote action's `link:` cell points here with ?action_id=<id>. This
# page loads the action (and the lead's current quote), derives edit/review/view
# mode from the action's stage + the caller's allowed verbs, and renders a
# bespoke line-items builder with a live total — the surface a flat form: block
# can't express, which is the whole point of kind:custom. On save it persists
# the quote to the lead, then calls the module's onboarding-submit endpoint to
# advance the workflow (two non-atomic requests — the documented recommended
# path; the atomic alternative is a hooks.submit.pre routine on the action).
#
# References the module's connection / submit endpoint via the cross-module
# `_module.{connectionId,endpointId}: { id, module: workflows }` operators
# (resolved against the demo's `workflows` module entry).
_ref:
  module: layout
  component: page
  vars:
    id: quote-builder
    title: Quote builder
    content_width: 760
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label: Leads
        pageId: lead-list
      - label: Quote builder
    requests:
      - id: get_workflow_action
        type: GetWorkflowAction
        connectionId:
          _module.connectionId:
            id: workflow-api
            module: workflows
        payload:
          action_id:
            _url_query: action_id
        properties:
          action_id:
            _payload: action_id
      - id: get_lead
        type: MongoDBAggregation
        connectionId: leads-collection
        payload:
          lead_id:
            _state: current_action.entity.id
        properties:
          pipeline:
            - $match:
                _id:
                  _payload: lead_id
            - $limit: 1
      - id: update_lead_quote
        type: MongoDBUpdateOne
        connectionId: leads-collection
        payload:
          lead_id:
            _state: current_action.entity.id
          line_items:
            _state: quote.line_items
          total:
            _state: quote.total
          notes:
            _state: quote.notes
        properties:
          filter:
            _id:
              _payload: lead_id
          update:
            $set:
              quote:
                line_items:
                  _payload: line_items
                total:
                  _payload: total
                notes:
                  _payload: notes
              updated:
                _ref:
                  module: events
                  component: change_stamp
    events:
      onMount:
        # Guard: no action_id → bounce back to the lead list.
        - id: redirect_no_action
          type: Link
          skip:
            _ne:
              - _url_query: action_id
              - null
          params:
            pageId: lead-list
        - id: load_action
          type: Request
          params: get_workflow_action
        # Spread the response + derive mode in ONE SetState (the action.yaml.njk
        # ladder: error → view; in-review + review verb → review; the editable
        # stages + edit verb → edit; otherwise view).
        - id: set_current_action
          type: SetState
          params:
            current_action:
              _request: get_workflow_action
            current_action.mode:
              _if:
                test:
                  _eq:
                    - _request: get_workflow_action.status.0.stage
                    - error
                then: view
                else:
                  _if:
                    test:
                      _and:
                        - _eq:
                            - _request: get_workflow_action.status.0.stage
                            - in-review
                        - _eq:
                            - _request: get_workflow_action.allowed.review
                            - true
                    then: review
                    else:
                      _if:
                        test:
                          _and:
                            - _array.includes:
                                - - action-required
                                  - in-progress
                                  - changes-required
                                - _request: get_workflow_action.status.0.stage
                            - _eq:
                                - _request: get_workflow_action.allowed.edit
                                - true
                        then: edit
                        else: view
        # Load the lead's current quote (now that entity.id is in state).
        - id: load_lead
          type: Request
          params: get_lead
        # Seed the editable quote state from the lead, defaulting to one empty
        # line item so the builder is never blank.
        - id: seed_quote
          type: SetState
          params:
            quote.line_items:
              _if_none:
                - _request: get_lead.0.quote.line_items
                - - description: ""
                    amount: 0
            quote.notes:
              _if_none:
                - _request: get_lead.0.quote.notes
                - ""
    blocks:
      - _ref:
          module: layout
          component: card
          vars:
            title:
              _state: current_action.message
            blocks:
              # ── Edit surface: the bespoke line-items builder ──────────────────
              - id: quote.line_items
                type: ControlledList
                visible:
                  _eq:
                    - _state: current_action.mode
                    - edit
                properties:
                  title: Line items
                  addItemButton:
                    title: Add line item
                    icon: AiOutlinePlus
                    variant: dashed
                  minItems: 1
                blocks:
                  - id: quote.line_items.$.description
                    type: TextInput
                    required: true
                    properties:
                      title: Description
                  - id: quote.line_items.$.amount
                    type: NumberInput
                    required: true
                    properties:
                      title: Amount
              - id: quote.notes
                type: TextArea
                visible:
                  _eq:
                    - _state: current_action.mode
                    - edit
                properties:
                  title: Notes
              # ── Read-only summary (review / view modes): what the actor built ──
              - id: quote_readonly
                type: Html
                visible:
                  _ne:
                    - _state: current_action.mode
                    - edit
                properties:
                  html:
                    _nunjucks:
                      template: |
                        <div style="display: flex; flex-direction: column; gap: 6px;">
                          {% for item in line_items %}
                          <div style="display: flex; justify-content: space-between;">
                            <span>{{ item.description }}</span>
                            <span>{{ item.amount }}</span>
                          </div>
                          {% endfor %}
                          {% if notes %}<p style="color: rgba(0,0,0,0.45);">{{ notes }}</p>{% endif %}
                        </div>
                      on:
                        line_items:
                          _state: quote.line_items
                        notes:
                          _state: quote.notes
              # ── Live total (every mode) ───────────────────────────────────────
              - id: quote_total
                type: Statistic
                properties:
                  title: Quote total
                  value:
                    _sum:
                      _array.map:
                        - _if_none:
                            - _state: quote.line_items
                            - []
                        - _function:
                            _if_none:
                              - __args: 0.amount
                              - 0
      - _ref:
          module: layout
          component: floating-actions
          vars:
            actions:
              # ── Actor (edit mode): persist the quote, then submit for review ──
              - id: submit_quote_btn
                type: Button
                layout:
                  flex: 0 1 auto
                visible:
                  _eq:
                    - _state: current_action.mode
                    - edit
                properties:
                  title: Send for approval
                  type: primary
                  icon: AiOutlineSend
                events:
                  onClick:
                    - id: validate_items
                      type: Validate
                      params:
                        regex: ^quote\.line_items
                    # Compute and stash the total so the persisted quote carries it.
                    - id: set_total
                      type: SetState
                      params:
                        quote.total:
                          _sum:
                            _array.map:
                              - _state: quote.line_items
                              - _function:
                                  _if_none:
                                    - __args: 0.amount
                                    - 0
                    - id: persist_quote
                      type: Request
                      params: update_lead_quote
                    - id: submit_for_review
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId:
                            id: onboarding-submit
                            module: workflows
                        payload:
                          action_id:
                            _url_query: action_id
                          signal: submit
                          current_key:
                            _state: current_action.key
                      messages:
                        success: Quote sent for approval.
                    - id: back_to_lead
                      type: Link
                      params:
                        pageId: lead-view
                        urlQuery:
                          _id:
                            _state: current_action.entity.id
              # ── Reviewer (review mode): approve or request changes ────────────
              - id: approve_quote_btn
                type: Button
                layout:
                  flex: 0 1 auto
                visible:
                  _eq:
                    - _state: current_action.mode
                    - review
                properties:
                  title: Approve
                  type: primary
                events:
                  onClick:
                    - id: approve_quote
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId:
                            id: onboarding-submit
                            module: workflows
                        payload:
                          action_id:
                            _url_query: action_id
                          signal: approve
                          current_key:
                            _state: current_action.key
                      messages:
                        success: Quote approved.
                    - id: back_to_lead_approve
                      type: Link
                      params:
                        pageId: lead-view
                        urlQuery:
                          _id:
                            _state: current_action.entity.id
              - id: request_changes_btn
                type: Button
                layout:
                  flex: 0 1 auto
                visible:
                  _eq:
                    - _state: current_action.mode
                    - review
                properties:
                  title: Request changes
                  type: default
                  danger: true
                  ghost: true
                events:
                  onClick:
                    - id: request_changes
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId:
                            id: onboarding-submit
                            module: workflows
                        payload:
                          action_id:
                            _url_query: action_id
                          signal: request_changes
                          current_key:
                            _state: current_action.key
                      messages:
                        success: Changes requested.
                    - id: back_to_lead_changes
                      type: Link
                      params:
                        pageId: lead-view
                        urlQuery:
                          _id:
                            _state: current_action.entity.id
