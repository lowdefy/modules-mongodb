_ref:
  module: layout
  component: page
  vars:
    id: lead-list
    title: Leads
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label: Leads
    page_actions:
      - id: new_lead_btn
        type: Button
        layout:
          flex: 0 1 auto
        properties:
          title: New lead
          icon: AiOutlineUserAdd
          type: primary
        events:
          onClick:
            - id: go_new
              type: Link
              params:
                pageId: lead-new
    events:
      onMount:
        - id: fetch
          type: Request
          params: get_all_leads
    requests:
      - id: get_all_leads
        type: MongoDBAggregation
        connectionId: leads-collection
        properties:
          pipeline:
            - $sort:
                updated.timestamp: -1
            - $limit: 500
    blocks:
      - id: leads_table_card
        type: Card
        blocks:
          - id: leads_table
            type: AgGridBalham
            properties:
              rowData:
                _request: get_all_leads
              defaultColDef:
                resizable: true
                sortable: true
                filter: true
              columnDefs:
                - field: name
                  headerName: Name
                  flex: 2
                - field: email
                  headerName: Email
                  flex: 3
            events:
              onCellClick:
                - id: go_view
                  type: Link
                  params:
                    pageId: lead-view
                    urlQuery:
                      _id:
                        _event: row._id
