_ref:
  module: layout
  component: page
  vars:
    id: lead-view
    title:
      _request: get_lead.0.name
    # Pipeline status badge in the page header (title-block pill). status is the
    # current stage slug; status_enum resolves it to the colour contract.
    status:
      _request: get_lead.0.status.0.stage
    status_enum:
      _ref: enums/lead_statuses.yaml
    loading:
      _not:
        _request: get_lead.0
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label: Leads
        pageId: lead-list
      - label:
          _request: get_lead.0.name
    events:
      onMount:
        - id: fetch
          type: Request
          params:
            - get_lead
        - id: redirect_if_not_found
          type: Link
          skip:
            _ne:
              - _request: get_lead.0
              - null
          params:
            pageId: lead-list
    requests:
      - id: get_lead
        type: MongoDBAggregation
        connectionId: leads-collection
        payload:
          _id:
            _url_query: _id
        properties:
          pipeline:
            - $match:
                _id:
                  _payload: _id
            - $limit: 1
      # E4 demo: the files module's exported download-policy request, consumed
      # here (outside file-manager/file-list) so the events-timeline below can
      # download file attachments. Instantiated request id: download_policy_lead_view.
      - _ref:
          module: files
          component: download-policy
          vars:
            block_id: lead_view
    blocks:
      - id: lead_view_row
        type: Box
        layout:
          gap: 16
        blocks:
          - id: workflows_column
            type: Box
            layout:
              span: 8
              sm:
                span: 24
            blocks:
              - _ref:
                  module: layout
                  component: card
                  vars:
                    title: Workflows
                    blocks:
                      - _ref:
                          module: workflows
                          component: actions-on-entity
                          vars:
                            entity_id:
                              _url_query: _id
                            entity_connection_id: leads-collection
          - id: lead_info_column
            type: Box
            layout:
              span: 16
              sm:
                span: 24
              gap: 16
            blocks:
              - _ref:
                  module: layout
                  component: card
                  vars:
                    title: Lead information
                    blocks:
                      # SmartDescriptions read-only view — selectors render as
                      # tags, the denormalized contact auto-detects into a CRM
                      # link. Status lives in the page-header pill, so it's not
                      # repeated here.
                      - id: lead_info_fields
                        type: SmartDescriptions
                        properties:
                          column: 1
                          size: small
                          data:
                            _request: get_lead.0
                          fields:
                            - id: company
                              type: TextInput
                              properties:
                                title: Company
                            - id: source
                              type: Selector
                              properties:
                                title: Source
                                options:
                                  - label: Web
                                    value: web
                                  - label: Referral
                                    value: referral
                                  - label: Event
                                    value: event
                                  - label: Cold outreach
                                    value: cold
                            - id: estimated_value
                              type: NumberInput
                              properties:
                                title: Estimated value
                            - id: contact
                              properties:
                                title: Contact
              # E1 demo: file-card with an upload-modal form slot. After each
              # upload, the injected fields render in a modal; the category
              # Selector (id `<block_id>.form.file_category`) sets the saved
              # file's top-level file_category, and available_to_client is
              # persisted into metadata.
              - _ref:
                  module: files
                  component: file-card
                  vars:
                    block_id: lead_documents
                    title: Documents
                    entity_type: leads
                    entity_id:
                      _url_query: _id
                    modal_title: File details
                    ok_text: Save file
                    form_fields:
                      - id: lead_documents.form.file_category
                        type: Selector
                        required: true
                        properties:
                          title: Category
                          options:
                            - label: Proposal
                              value: proposal
                            - label: Contract
                              value: contract
                            - label: Correspondence
                              value: correspondence
                      - id: lead_documents.form.available_to_client
                        type: Switch
                        properties:
                          title: Available to client
                    # E3 demo: consumer-facing onDownload hook. (The built-in
                    # log_events download-file event is also recorded and shows
                    # up in the Activity timeline below.)
                    on_download:
                      - id: notify_download
                        type: DisplayMessage
                        params:
                          content:
                            _nunjucks:
                              template: "Downloading {{ fileDoc.file.name }}"
                              on:
                                fileDoc:
                                  _event: fileDoc
              - _ref:
                  module: layout
                  component: card
                  vars:
                    title: Activity
                    blocks:
                      - _ref:
                          module: events
                          component: events-timeline
                          vars:
                            reference_field: lead_ids
                            reference_value:
                              _url_query: _id
                            contact_page_url: "/contacts/view?_id={id}"
                            # E4 demo: download file attachments in the timeline
                            # via the files module's exported download-policy.
                            s3GetPolicyRequestId: download_policy_lead_view
      # Page owns the single check-action modal drop and its on_complete (Part
      # 55 D1): refresh every co-present surface after a successful signal — the
      # action steps (actions-on-entity) and the Activity timeline
      # (events-timeline, which only fetches on mount).
      - _ref:
          module: workflows
          component: check-action-modal
          vars:
            on_complete:
              _build.array.concat:
                # refresh the action steps (actions-on-entity's surface)
                - _ref:
                    module: workflows
                    component: entity-workflows-refetch
                    vars:
                      entity_id:
                        _url_query: _id
                      entity_connection_id: leads-collection
                # refresh the activity timeline (events-timeline's surface)
                - - id: refetch_events_timeline
                    type: Request
                    params: get-events
