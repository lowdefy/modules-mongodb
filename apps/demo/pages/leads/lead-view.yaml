_ref:
  module: layout
  component: page
  vars:
    id: lead-view
    title:
      _request: get_lead.0.name
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label: Leads
        pageId: lead-list
      - label:
          _request: get_lead.0.name
    page_actions:
      - id: edit_btn
        type: Button
        layout:
          flex: 0 1 auto
        properties:
          title: Edit
          icon: AiOutlineEdit
        events:
          onClick:
            - id: go_edit
              type: Link
              params:
                pageId: lead-edit
                urlQuery:
                  _id:
                    _url_query: _id
    events:
      onMount:
        - id: fetch
          type: Request
          params:
            - get_lead
        - id: redirect_if_not_found
          type: Link
          skip:
            _ne:
              - _request: get_lead.0
              - null
          params:
            pageId: lead-list
        - id: compute_installation_child_id
          type: SetState
          params:
            installation_child_id:
              _js:
                args:
                  workflows:
                    _state: entity_workflows
                fn: |
                  const { workflows } = args;
                  const onboarding = (workflows || []).find((w) => w.workflow_type === 'onboarding');
                  if (!onboarding) return null;
                  const tracker = (onboarding.actions || []).find(
                    (a) => a.kind === 'tracker' && a.child_workflow_id
                  );
                  return (tracker && tracker.child_workflow_id) || null;
    requests:
      - id: get_lead
        type: MongoDBAggregation
        connectionId: leads-collection
        payload:
          _id:
            _url_query: _id
        properties:
          pipeline:
            - $match:
                _id:
                  _payload: _id
            - $limit: 1
    blocks:
      - id: lead_view_row
        type: Box
        layout:
          gap: 16
        blocks:
          - id: workflows_column
            type: Box
            layout:
              span: 10
              sm:
                span: 24
            blocks:
              - _ref:
                  module: layout
                  component: card
                  vars:
                    title: Workflows
                    blocks:
                      - _ref:
                          module: workflows
                          component: actions-on-entity
                          vars:
                            entity_id:
                              _url_query: _id
                            entity_collection: leads-collection
          - id: lead_info_column
            type: Box
            layout:
              span: 14
              sm:
                span: 24
              gap: 16
            blocks:
              - _ref:
                  module: layout
                  component: card
                  vars:
                    title: Lead information
                    blocks:
                      - id: lead_name_row
                        type: Box
                        layout:
                          gap: 8
                          align: middle
                        blocks:
                          - id: lead_name_label
                            type: Paragraph
                            properties:
                              type: secondary
                              content: 'Name:'
                          - id: lead_name_value
                            type: Paragraph
                            properties:
                              content:
                                _request: get_lead.0.name
                      - id: lead_email_row
                        type: Box
                        layout:
                          gap: 8
                          align: middle
                        blocks:
                          - id: lead_email_label
                            type: Paragraph
                            properties:
                              type: secondary
                              content: 'Email:'
                          - id: lead_email_value
                            type: Paragraph
                            properties:
                              content:
                                _request: get_lead.0.email
              - _ref:
                  module: layout
                  component: card
                  vars:
                    title: Activity
                    blocks:
                      - _ref:
                          module: events
                          component: events-timeline
                          vars:
                            reference_field: lead_ids
                            reference_value:
                              _url_query: _id
      - id: workflows_section
        type: Box
        layout:
          gap: 16
        blocks:
          - id: workflow_actions_row
            type: Box
            layout:
              gap: 8
              align: middle
            blocks:
              - id: start_onboarding_btn
                type: Button
                visible:
                  _eq:
                    - _state: entity_workflows.length
                    - 0
                layout:
                  flex: 0 1 auto
                properties:
                  title: Start onboarding
                  icon: AiOutlinePlayCircle
                  type: primary
                events:
                  onClick:
                    - id: seed_devices
                      type: SetState
                      params:
                        devices:
                          - device_serial: ''
                    - id: open_start_onboarding_modal
                      type: CallMethod
                      params:
                        blockId: start_onboarding_modal
                        method: setOpen
                        args:
                          - open: true
              - id: start_onboarding_modal
                type: Modal
                properties:
                  title: Start onboarding
                  footer: false
                  width: 560
                events:
                  onCancel:
                    - id: clear_devices
                      type: SetState
                      params:
                        devices: null
                slots:
                  content:
                    blocks:
                      - id: start_onboarding_body
                        type: Box
                        layout:
                          gap: 16
                        blocks:
                          - id: start_onboarding_intro
                            type: Paragraph
                            properties:
                              type: secondary
                              content: Add one row per device. Each device gets its own proof-of-installation action.
                          - id: devices
                            type: ControlledList
                            layout:
                              gap: 8
                            properties:
                              title: Devices
                              minItems: 1
                            blocks:
                              - id: devices.$.device_serial
                                type: TextInput
                                required: true
                                properties:
                                  title: Device serial
                                  placeholder: e.g. device-001
                          - id: start_onboarding_actions
                            type: Box
                            layout:
                              gap: 8
                              justify: end
                            blocks:
                              - id: start_onboarding_cancel
                                type: Button
                                layout:
                                  flex: 0 0 auto
                                properties:
                                  title: Cancel
                                  type: default
                                events:
                                  onClick:
                                    - id: close_modal_cancel
                                      type: CallMethod
                                      params:
                                        blockId: start_onboarding_modal
                                        method: setOpen
                                        args:
                                          - open: false
                                    - id: clear_devices
                                      type: SetState
                                      params:
                                        devices: null
                              - id: start_onboarding_submit
                                type: Button
                                layout:
                                  flex: 0 0 auto
                                properties:
                                  title: Start onboarding
                                  icon: AiOutlinePlayCircle
                                  type: primary
                                events:
                                  onClick:
                                    _build.array.concat:
                                      - - id: validate
                                          type: Validate
                                        - id: start
                                          type: CallAPI
                                          params:
                                            endpointId:
                                              _module.endpointId:
                                                module: workflows
                                                id: start-workflow
                                            payload:
                                              workflow_type: onboarding
                                              entity_id:
                                                _url_query: _id
                                              entity_collection: leads-collection
                                              actions:
                                                _js:
                                                  args:
                                                    devices:
                                                      _state: devices
                                                  fn: |
                                                    return (args.devices || [])
                                                      .filter((row) => row && row.device_serial)
                                                      .map((row) => ({
                                                        type: 'proof-of-installation',
                                                        key: row.device_serial,
                                                        status: 'blocked',
                                                        fields: { device_serial: row.device_serial },
                                                      }));
                                          messages:
                                            success: Onboarding workflow started.
                                      - _ref:
                                          module: workflows
                                          component: entity-workflows-refetch
                                          vars:
                                            entity_id:
                                              _url_query: _id
                                            entity_collection: leads-collection
                                      - - id: recompute_installation_child_id
                                          type: SetState
                                          params:
                                            installation_child_id:
                                              _js:
                                                args:
                                                  workflows:
                                                    _state: entity_workflows
                                                fn: |
                                                  const { workflows } = args;
                                                  const onboarding = (workflows || []).find((w) => w.workflow_type === 'onboarding');
                                                  if (!onboarding) return null;
                                                  const tracker = (onboarding.actions || []).find(
                                                    (a) => a.kind === 'tracker' && a.child_workflow_id
                                                  );
                                                  return (tracker && tracker.child_workflow_id) || null;
                                        - id: close_modal_submit
                                          type: CallMethod
                                          params:
                                            blockId: start_onboarding_modal
                                            method: setOpen
                                            args:
                                              - open: false
                                        - id: clear_devices_after_submit
                                          type: SetState
                                          params:
                                            devices: null
              - id: close_child_btn
                type: Button
                layout:
                  flex: 0 1 auto
                visible:
                  _ne:
                    - _state: installation_child_id
                    - null
                properties:
                  title: '[admin] Close installation child'
                  icon: AiOutlineCheckCircle
                events:
                  onClick:
                    - id: close
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId:
                            module: workflows
                            id: close-workflow
                        payload:
                          workflow_id:
                            _state: installation_child_id
                      messages:
                        success: Installation child closed.
                    - id: refetch_entity_workflows
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId:
                            module: workflows
                            id: get-entity-workflows
                        payload:
                          entity_id:
                            _url_query: _id
                          entity_collection: leads-collection
                    - id: set_entity_workflows
                      type: SetState
                      params:
                        entity_workflows:
                          _actions: refetch_entity_workflows.response.response.workflows
                    - id: recompute_installation_child_id
                      type: SetState
                      params:
                        installation_child_id:
                          _js:
                            args:
                              workflows:
                                _state: entity_workflows
                            fn: |
                              const { workflows } = args;
                              const onboarding = (workflows || []).find((w) => w.workflow_type === 'onboarding');
                              if (!onboarding) return null;
                              const tracker = (onboarding.actions || []).find(
                                (a) => a.kind === 'tracker' && a.child_workflow_id
                              );
                              return (tracker && tracker.child_workflow_id) || null;
              - id: cancel_child_btn
                type: Button
                layout:
                  flex: 0 1 auto
                visible:
                  _ne:
                    - _state: installation_child_id
                    - null
                properties:
                  title: '[admin] Cancel installation child'
                  icon: AiOutlineStop
                events:
                  onClick:
                    - id: cancel
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId:
                            module: workflows
                            id: cancel-workflow
                        payload:
                          workflow_id:
                            _state: installation_child_id
                      messages:
                        success: Installation child cancelled.
                    - id: refetch_entity_workflows
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId:
                            module: workflows
                            id: get-entity-workflows
                        payload:
                          entity_id:
                            _url_query: _id
                          entity_collection: leads-collection
                    - id: set_entity_workflows
                      type: SetState
                      params:
                        entity_workflows:
                          _actions: refetch_entity_workflows.response.response.workflows
                    - id: recompute_installation_child_id
                      type: SetState
                      params:
                        installation_child_id:
                          _js:
                            args:
                              workflows:
                                _state: entity_workflows
                            fn: |
                              const { workflows } = args;
                              const onboarding = (workflows || []).find((w) => w.workflow_type === 'onboarding');
                              if (!onboarding) return null;
                              const tracker = (onboarding.actions || []).find(
                                (a) => a.kind === 'tracker' && a.child_workflow_id
                              );
                              return (tracker && tracker.child_workflow_id) || null;
