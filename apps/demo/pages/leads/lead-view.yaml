_ref:
  module: layout
  component: page
  vars:
    id: lead-view
    title:
      _request: get_lead.0.name
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label: Leads
        pageId: lead-list
      - label:
          _request: get_lead.0.name
    events:
      onMount:
        - id: fetch
          type: Request
          params:
            - get_lead
        - id: redirect_if_not_found
          type: Link
          skip:
            _ne:
              - _request: get_lead.0
              - null
          params:
            pageId: lead-list
        - id: compute_installation_child_id
          type: SetState
          params:
            installation_child_id:
              _js:
                args:
                  workflows:
                    _state: entity_workflows
                fn: |
                  const { workflows } = args;
                  const onboarding = (workflows || []).find((w) => w.workflow_type === 'onboarding');
                  if (!onboarding) return null;
                  const tracker = (onboarding.actions || []).find(
                    (a) => a.kind === 'tracker' && a.child_workflow_id
                  );
                  return (tracker && tracker.child_workflow_id) || null;
    requests:
      - id: get_lead
        type: MongoDBAggregation
        connectionId: leads-collection
        payload:
          _id:
            _url_query: _id
        properties:
          pipeline:
            - $match:
                _id:
                  _payload: _id
            - $limit: 1
    blocks:
      - id: lead_view_row
        type: Box
        layout:
          gap: 16
        blocks:
          - id: workflows_column
            type: Box
            layout:
              span: 8
              sm:
                span: 24
            blocks:
              - _ref:
                  module: layout
                  component: card
                  vars:
                    title: Workflows
                    blocks:
                      - id: workflows_card_body
                        type: Box
                        layout:
                          gap: 16
                        blocks:
                          - _ref:
                              module: workflows
                              component: actions-on-entity
                              vars:
                                entity_id:
                                  _url_query: _id
                                entity_collection: leads-collection
                          - id: start_onboarding_btn
                            type: Button
                            visible:
                              _eq:
                                - _state: entity_workflows.length
                                - 0
                            layout:
                              flex: 0 1 auto
                            properties:
                              title: Start onboarding
                              icon: AiOutlinePlayCircle
                              type: primary
                            events:
                              onClick:
                                _build.array.concat:
                                  - - id: start
                                      type: CallAPI
                                      params:
                                        endpointId:
                                          _module.endpointId:
                                            module: workflows
                                            id: start-workflow
                                        payload:
                                          workflow_type: onboarding
                                          entity_id:
                                            _url_query: _id
                                          entity_collection: leads-collection
                                      messages:
                                        success: Onboarding workflow started.
                                    - id: log_onboarding_started
                                      type: CallAPI
                                      params:
                                        endpointId:
                                          _module.endpointId:
                                            module: events
                                            id: new-event
                                        payload:
                                          type: start-onboarding
                                          display:
                                            demo:
                                              title: Onboarding workflow started
                                          references:
                                            lead_ids:
                                              - _url_query: _id
                                            workflow_ids:
                                              - _actions: start.response.response.workflow_id
                                            action_ids:
                                              _actions: start.response.response.action_ids
                                    - id: refetch_events
                                      type: Request
                                      params: get-events
                                  - _ref:
                                      module: workflows
                                      component: entity-workflows-refetch
                                      vars:
                                        entity_id:
                                          _url_query: _id
                                        entity_collection: leads-collection
                                  - - id: recompute_installation_child_id
                                      type: SetState
                                      params:
                                        installation_child_id:
                                          _js:
                                            args:
                                              workflows:
                                                _state: entity_workflows
                                            fn: |
                                              const { workflows } = args;
                                              const onboarding = (workflows || []).find((w) => w.workflow_type === 'onboarding');
                                              if (!onboarding) return null;
                                              const tracker = (onboarding.actions || []).find(
                                                (a) => a.kind === 'tracker' && a.child_workflow_id
                                              );
                                              return (tracker && tracker.child_workflow_id) || null;
          - id: lead_info_column
            type: Box
            layout:
              span: 16
              sm:
                span: 24
              gap: 16
            blocks:
              - _ref:
                  module: layout
                  component: card
                  vars:
                    title: Lead information
                    blocks:
                      - id: lead_info_fields
                        type: Html
                        properties:
                          html:
                            _nunjucks:
                              template: |
                                <div style="display: flex; flex-direction: column; gap: 8px;">
                                  <div style="display: flex; gap: 8px; align-items: baseline;">
                                    <span style="color: rgba(0, 0, 0, 0.45);">Name:</span>
                                    <span>{{ name }}</span>
                                  </div>
                                  <div style="display: flex; gap: 8px; align-items: baseline;">
                                    <span style="color: rgba(0, 0, 0, 0.45);">Email:</span>
                                    <span>{{ email }}</span>
                                  </div>
                                </div>
                              on:
                                name:
                                  _request: get_lead.0.name
                                email:
                                  _request: get_lead.0.email
              - _ref:
                  module: layout
                  component: card
                  vars:
                    title: Activity
                    blocks:
                      - _ref:
                          module: events
                          component: events-timeline
                          vars:
                            reference_field: lead_ids
                            reference_value:
                              _url_query: _id
      - id: workflows_section
        type: Box
        layout:
          gap: 16
        blocks:
          - id: workflow_actions_row
            type: Box
            layout:
              gap: 8
              align: middle
            blocks:
              - id: close_child_btn
                type: Button
                layout:
                  flex: 0 1 auto
                visible:
                  _ne:
                    - _state: installation_child_id
                    - null
                properties:
                  title: '[admin] Close installation child'
                  icon: AiOutlineCheckCircle
                events:
                  onClick:
                    - id: close
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId:
                            module: workflows
                            id: close-workflow
                        payload:
                          workflow_id:
                            _state: installation_child_id
                      messages:
                        success: Installation child closed.
                    - id: refetch_entity_workflows
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId:
                            module: workflows
                            id: get-entity-workflows
                        payload:
                          entity_id:
                            _url_query: _id
                          entity_collection: leads-collection
                    - id: set_entity_workflows
                      type: SetState
                      params:
                        entity_workflows:
                          _actions: refetch_entity_workflows.response.response.workflows
                    - id: recompute_installation_child_id
                      type: SetState
                      params:
                        installation_child_id:
                          _js:
                            args:
                              workflows:
                                _state: entity_workflows
                            fn: |
                              const { workflows } = args;
                              const onboarding = (workflows || []).find((w) => w.workflow_type === 'onboarding');
                              if (!onboarding) return null;
                              const tracker = (onboarding.actions || []).find(
                                (a) => a.kind === 'tracker' && a.child_workflow_id
                              );
                              return (tracker && tracker.child_workflow_id) || null;
              - id: cancel_child_btn
                type: Button
                layout:
                  flex: 0 1 auto
                visible:
                  _ne:
                    - _state: installation_child_id
                    - null
                properties:
                  title: '[admin] Cancel installation child'
                  icon: AiOutlineStop
                events:
                  onClick:
                    - id: cancel
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId:
                            module: workflows
                            id: cancel-workflow
                        payload:
                          workflow_id:
                            _state: installation_child_id
                      messages:
                        success: Installation child cancelled.
                    - id: refetch_entity_workflows
                      type: CallAPI
                      params:
                        endpointId:
                          _module.endpointId:
                            module: workflows
                            id: get-entity-workflows
                        payload:
                          entity_id:
                            _url_query: _id
                          entity_collection: leads-collection
                    - id: set_entity_workflows
                      type: SetState
                      params:
                        entity_workflows:
                          _actions: refetch_entity_workflows.response.response.workflows
                    - id: recompute_installation_child_id
                      type: SetState
                      params:
                        installation_child_id:
                          _js:
                            args:
                              workflows:
                                _state: entity_workflows
                            fn: |
                              const { workflows } = args;
                              const onboarding = (workflows || []).find((w) => w.workflow_type === 'onboarding');
                              if (!onboarding) return null;
                              const tracker = (onboarding.actions || []).find(
                                (a) => a.kind === 'tracker' && a.child_workflow_id
                              );
                              return (tracker && tracker.child_workflow_id) || null;
