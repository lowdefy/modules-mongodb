_ref:
  module: layout
  component: page
  vars:
    id: lead-view
    title:
      _request: get_lead.0.name
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - label: Leads
        pageId: lead-list
      - label:
          _request: get_lead.0.name
    events:
      onMount:
        - id: fetch
          type: Request
          params:
            - get_lead
        - id: redirect_if_not_found
          type: Link
          skip:
            _ne:
              - _request: get_lead.0
              - null
          params:
            pageId: lead-list
    requests:
      - id: get_lead
        type: MongoDBAggregation
        connectionId: leads-collection
        payload:
          _id:
            _url_query: _id
        properties:
          pipeline:
            - $match:
                _id:
                  _payload: _id
            - $limit: 1
    blocks:
      - id: lead_view_row
        type: Box
        layout:
          gap: 16
        blocks:
          - id: workflows_column
            type: Box
            layout:
              span: 8
              sm:
                span: 24
            blocks:
              - _ref:
                  module: layout
                  component: card
                  vars:
                    title: Workflows
                    blocks:
                      - _ref:
                          module: workflows
                          component: actions-on-entity
                          vars:
                            entity_id:
                              _url_query: _id
                            entity_collection: leads-collection
          - id: lead_info_column
            type: Box
            layout:
              span: 16
              sm:
                span: 24
              gap: 16
            blocks:
              - _ref:
                  module: layout
                  component: card
                  vars:
                    title: Lead information
                    blocks:
                      - id: lead_info_fields
                        type: Html
                        properties:
                          html:
                            _nunjucks:
                              template: |
                                <div style="display: flex; flex-direction: column; gap: 8px;">
                                  <div style="display: flex; gap: 8px; align-items: baseline;">
                                    <span style="color: rgba(0, 0, 0, 0.45);">Name:</span>
                                    <span>{{ name }}</span>
                                  </div>
                                  <div style="display: flex; gap: 8px; align-items: baseline;">
                                    <span style="color: rgba(0, 0, 0, 0.45);">Email:</span>
                                    <span>{{ email }}</span>
                                  </div>
                                </div>
                              on:
                                name:
                                  _request: get_lead.0.name
                                email:
                                  _request: get_lead.0.email
              - _ref:
                  module: layout
                  component: card
                  vars:
                    title: Activity
                    blocks:
                      - _ref:
                          module: events
                          component: events-timeline
                          vars:
                            reference_field: lead_ids
                            reference_value:
                              _url_query: _id
