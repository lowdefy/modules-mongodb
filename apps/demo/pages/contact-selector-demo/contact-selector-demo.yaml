_ref:
  module: layout
  component: page
  vars:
    id: contact-selector-demo
    title: Contact Selector Demo
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - title: Contact Selector
    events:
      onInit:
        - id: init_contact_selector_state
          type: SetState
          params:
            contact_selector_input: ""
            contact_selector_contact_id: null
            contact_selector_fetch_contacts: []
    blocks:
      - id: description
        type: Paragraph
        properties:
          content: |
            Demo of the ContactSelector block against the user-contacts collection.
            Search, select, add new, edit, or remove contacts and watch the block value update below.

      - id: contact_selector
        type: ContactSelector
        requests:
          - _ref: pages/contact-selector-demo/requests/search_contacts.yaml
          - _ref: pages/contact-selector-demo/requests/get_contact.yaml
          - _ref: pages/contact-selector-demo/requests/get_contacts_data.yaml
        properties:
          allowNewContacts: true
          allowEdit: true
          allowDelete: true
          title: Select contacts
          placeholder: Search contacts...
          max: 5
          searchContactsRequest: search_contacts
          getContactRequest: get_contact
          getContactsDataRequest: get_contacts_data
          options:
            _request: search_contacts
          data:
            _request: get_contacts_data
          list:
            title: Selected contacts
            placeholder: No contacts selected
            item:
              title: "{{ name }}"
              description: "{{ email }}"
          modal:
            title: Add contact
            editTitle: Edit contact
            okText: Save
        events:
          onAddContact:
            - id: create_contact
              type: CallAPI
              params:
                endpointId: contacts/create-contact
                payload:
                  email:
                    _state: contact_selector_contact.email
                  profile:
                    _state: contact_selector_contact.profile
            - id: append_new
              type: CallMethod
              params:
                blockId: contact_selector
                method: appendContact
                args:
                  - contact:
                      _state: contact_selector_contact
                    contactId:
                      _actions: create_contact.response.response.contactId
          onEditContact:
            - id: update_contact
              type: CallAPI
              params:
                endpointId: contacts/update-contact
                payload:
                  _id:
                    _state: contact_selector_contact._id
                  profile:
                    _state: contact_selector_contact.profile
                  updated:
                    timestamp:
                      _state: contact_selector_contact.updated.timestamp
        blocks:
          - id: contact_selector_contact.profile.given_name
            type: TextInput
            properties:
              label:
                title: Given name
              placeholder: e.g. Alice
          - id: contact_selector_contact.profile.family_name
            type: TextInput
            properties:
              label:
                title: Family name
              placeholder: e.g. Smith
          - id: contact_selector_contact.email
            type: TextInput
            properties:
              label:
                title: Email
              placeholder: e.g. alice@example.com

      - id: current_value_title
        type: Title
        properties:
          level: 5
          content: Current block value

      - id: current_value_html
        type: Html
        properties:
          html:
            _nunjucks:
              template: |
                <pre style="background:#f5f5f5;padding:12px;border-radius:4px;font-size:12px;overflow:auto">{{ value }}</pre>
              on:
                value:
                  _js: |
                    () => JSON.stringify(state('contact_selector') || [], null, 2)
