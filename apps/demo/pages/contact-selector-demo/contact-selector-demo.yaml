_ref:
  module: layout
  component: page
  vars:
    id: contact-selector-demo
    title: Contact Selector Demo
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
      - title: Contact Selector
    requests:
      - _ref: pages/contact-selector-demo/requests/get_demo_doc.yaml
    events:
      onInit:
        - id: load_demo_doc
          type: Request
          params: get_demo_doc
        - id: hydrate_state
          type: SetState
          params:
            rich_contacts:
              _if_none:
                - _request: get_demo_doc.rich_contacts
                - []
            basic_contacts:
              _if_none:
                - _request: get_demo_doc.basic_contacts
                - []
    blocks:
      - id: description
        type: Paragraph
        properties:
          content: |
            Both pickers read contacts from the real `user-contacts`
            collection (via the contacts module). The selected ids
            are persisted to `demo-contact-selector-test` under
            `_id: contact-selector-demo` — stand-in for a parent
            record like a company with linked contacts. Use Save to
            round-trip, reload the page to confirm hydration.

      - id: rich_title
        type: Title
        properties:
          level: 4
          content: Rich ContactSelector (module wrapper)

      - _ref:
          module: contacts
          component: contact-selector
          vars:
            id: rich_contacts
            keyword: Contact
            max: 5

      - id: rich_value_title
        type: Title
        properties:
          level: 5
          content: Rich block value
      - id: rich_value_html
        type: Html
        properties:
          html:
            _nunjucks:
              template: |
                <pre style="background:#f5f5f5;padding:12px;border-radius:4px;font-size:12px;overflow:auto">{{ value | safe }}</pre>
              on:
                value:
                  _json.stringify:
                    on:
                      _if_none:
                        - _state: rich_contacts
                        - []
                    options:
                      indent: 2

      - id: divider_pickers
        type: Divider

      - id: basic_title
        type: Title
        properties:
          level: 4
          content: Basic contact selector (simple dropdown)

      - _ref:
          module: contacts
          component: basic-contact-selector
          vars:
            field_id: basic_contacts
            mode: MultipleSelector
            label: Linked contacts

      - id: basic_value_title
        type: Title
        properties:
          level: 5
          content: Basic block value
      - id: basic_value_html
        type: Html
        properties:
          html:
            _nunjucks:
              template: |
                <pre style="background:#f5f5f5;padding:12px;border-radius:4px;font-size:12px;overflow:auto">{{ value | safe }}</pre>
              on:
                value:
                  _json.stringify:
                    on:
                      _if_none:
                        - _state: basic_contacts
                        - []
                    options:
                      indent: 2

      - id: divider_save
        type: Divider

      - id: save_row
        type: Box
        layout:
          gap: 8
        blocks:
          - id: save_button
            type: Button
            properties:
              title: Save to test collection
              type: primary
              icon: AiOutlineSave
            events:
              onClick:
                - id: save
                  type: CallAPI
                  params:
                    endpointId: save-demo-doc
                    payload:
                      rich_contacts:
                        _state: rich_contacts
                      basic_contacts:
                        _state: basic_contacts
                  messages:
                    success: Saved to demo-contact-selector-test
          - id: reload_button
            type: Button
            properties:
              title: Reload from test collection
              type: default
              icon: AiOutlineReload
            events:
              onClick:
                - id: refetch
                  type: Request
                  params: get_demo_doc
                - id: rehydrate
                  type: SetState
                  params:
                    rich_contacts:
                      _if_none:
                        - _request: get_demo_doc.rich_contacts
                        - []
                    basic_contacts:
                      _if_none:
                        - _request: get_demo_doc.basic_contacts
                        - []
