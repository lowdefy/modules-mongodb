id: get_contacts_data
type: MongoDBAggregation
connectionId: demo-contacts
payload:
  contactIds:
    _if_none:
      - _state: contact_selector_fetch_contacts
      - []
properties:
  pipeline:
    - $match:
        _id:
          $in:
            _payload: contactIds
    - $project:
        _id: 0
        contact_id: "$_id"
        name: "$profile.name"
        email: "$email"
        picture: "$profile.picture"
