_ref:
  module: layout
  component: page
  vars:
    id: home
    title: Module Demo App
    breadcrumbs:
      - home: true
        icon: AiOutlineHome
    blocks:
      - id: description
        type: Paragraph
        properties:
          content: |
            This app tests all modules in the monorepo.
      - id: links
        type: Box
        layout:
          gap: 16
        blocks:
          - id: user_admin_link
            type: Button
            properties:
              title: User Admin
              icon: AiOutlineTeam
              block: true
            events:
              onClick:
                - id: link
                  type: Link
                  params:
                    pageId: user-admin/users
