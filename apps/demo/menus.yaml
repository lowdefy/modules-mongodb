- id: default
  links:
    - id: crm-group
      type: MenuGroup
      properties:
        title: CRM
        icon: AiOutlineContacts
      links:
        _build.array.concat:
          - - id: leads
              type: MenuLink
              pageId: lead-list
              properties:
                title: Leads
                icon: AiOutlineUserAdd
          - _ref:
              module: companies
              menu: default
          - _ref:
              module: contacts
              menu: default
          - _ref:
              module: activities
              menu: default
    - id: reporting-group
      type: MenuGroup
      properties:
        title: Reporting
        icon: AiOutlineBarChart
      links:
        - id: reporting-home
          type: MenuLink
          pageId: reporting-demo
          properties:
            title: Overview
            icon: AiOutlineDashboard
        - id: reporting-chat
          type: MenuLink
          pageId:
            _module.pageId:
              module: reporting
              id: chat
          properties:
            title: Chat
            icon: AiOutlineMessage
        - id: reporting-generate
          type: MenuLink
          pageId:
            _module.pageId:
              module: reporting
              id: generate
          properties:
            title: Generate
            icon: AiOutlineRobot
        - id: reporting-reports
          type: MenuLink
          pageId:
            _module.pageId:
              module: reporting
              id: reports-list
          properties:
            title: Saved reports
            icon: AiOutlineFileText

    - id: admin-group
      type: MenuGroup
      properties:
        title: Admin
        icon: AiOutlineSetting
      links:
        _ref:
          module: user-admin
          menu: default

- id: profile
  links:
    - id: profile
      type: MenuLink
      pageId:
        _module.pageId:
          module: user-account
          id: view
      properties:
        title: Profile
        icon: AiOutlineUser
    - id: release-notes
      type: MenuLink
      pageId:
        _module.pageId:
          module: release-notes
          id: view
      properties:
        title: Release Notes
        icon: AiOutlineFileText
    - id: users
      type: MenuLink
      pageId:
        _module.pageId:
          module: user-admin
          id: all
      properties:
        title: User Admin
        icon: AiOutlineTeam
    - id: logout-divider
      type: MenuDivider
    - id: logout
      type: MenuLink
      pageId:
        _module.pageId:
          module: user-account
          id: logout
      properties:
        title: Logout
        icon: AiOutlineLogout
        danger: true
