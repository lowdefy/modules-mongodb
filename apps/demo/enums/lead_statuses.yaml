# Lead pipeline status — the stage slug stored at status.0.stage advances as the
# onboarding workflow progresses (set by action posthooks). Consumed by the
# title-block status pill (lead-view) and the entity_view profile card, so each
# entry carries the four-colour pill contract (color / borderColor / titleColor
# / title) matching modules/shared/enums/action_statuses.yaml.
new:
  color: "#fafafa"
  borderColor: "#d9d9d9"
  titleColor: "#595959"
  title: New
qualified:
  color: "#e6f7ff"
  borderColor: "#91d5ff"
  titleColor: "#096dd9"
  title: Qualified
quoted:
  color: "#fffbe6"
  borderColor: "#ffe58f"
  titleColor: "#d48806"
  title: Quoted
won:
  color: "#f6ffed"
  borderColor: "#b7eb8f"
  titleColor: "#389e0d"
  title: Won
parked:
  color: "#fff1f0"
  borderColor: "#ffa39e"
  titleColor: "#cf1322"
  title: Parked
