lowdefy: 0.0.0-experimental-20260420110710
name: Module Demo App

cli:
  watch:
    - ../../modules/shared

theme:
  antd:
    token:
      colorPrimary: "#7c3aed"

config:
  homePageId: router

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: 2.4.1
  - name: "@lowdefy/community-plugin-xlsx"
    version: 1.1.0
  - name: "@lowdefy/community-plugin-nodemailer"
    version: 1.1.4
  - name: "@lowdefy/modules-mongodb-plugins"
    version: workspace:*

auth:
  authPages:
    signIn: /user-account/login
    verifyRequest: /user-account/verify-email-request
    error: /user-account/login
  theme:
    brandColor: "#7c3aed"
  adapter:
    id: mdb_adapter
    type: MultiAppMongoDBAdapter
    properties:
      invite:
        required: true
      databaseUri:
        _secret: MONGODB_URI
      appName:
        _ref:
          path: app_config.yaml
          key: app_name
      verificationTokens:
        uses: 5
      collections:
        accounts: user-accounts
        contacts: user-contacts
        sessions: user-sessions
        verificationTokens: user-verification-tokens
  providers:
    - id: email
      type: EmailProvider
      properties:
        maxAge: 1800
        server:
          host: smtp.sendgrid.net
          port: 465
          auth:
            user: apikey
            pass:
              _secret: SENDGRID_API_KEY
        from:
          _secret: AUTH_FROM_ADDRESS
        templateVariables:
          appName: Lowdefy Modules MongoDB Demo
          logoHeight: 80px
  userFields:
    id: user.id
    profile: user.profile
    app_attributes: user.app_attributes
    global_attributes: user.global_attributes
    roles: user.roles
  pages:
    protected: true
    public:
      - "404"
      - notifications-invalid
      - notifications-link
      - router
      - user-account/login
      - user-account/verify-email-request
    roles:
      user-admin:
        - user-admin/*
  api:
    protected: true
    roles:
      user-admin:
        - user-admin/*

modules:
  _ref: modules.yaml

menus:
  _ref: menus.yaml

pages:
  - _ref: pages/router.yaml
  - _ref: pages/avatar.yaml
  - _ref: pages/404.yaml
  - _ref: pages/home.yaml
