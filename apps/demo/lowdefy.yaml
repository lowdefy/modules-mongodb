lowdefy: 0.0.0-experimental-20260707145139
name: Module Demo App
slug: demo

cli:
  watch:
    - ../../modules/shared

theme:
  antd:
    algorithm: compact
    token:
      colorPrimary: "#7c3aed"

config:
  homePageId: router

global:
  enums:
    event_types:
      _ref:
        module: events
        component: event_types

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: 3.0.0
  - name: "@lowdefy/community-plugin-xlsx"
    version: 1.1.0
  - name: "@lowdefy/community-plugin-nodemailer"
    version: 1.1.4
  - name: "@lowdefy/modules-mongodb-plugins"
    version: workspace:*

auth:
  authPages:
    signIn: /user-account/login
    verifyRequest: /user-account/verify-email-request
    error: /user-account/login
  theme:
    brandColor: "#7c3aed"
  adapter:
    id: mdb_adapter
    type: MultiAppMongoDBAdapter
    properties:
      invite:
        required: true
      databaseUri:
        _secret: MONGODB_URI
      appName:
        _ref:
          path: app_config.yaml
          key: app_name
      verificationTokens:
        uses: 5
      collections:
        accounts: user-accounts
        contacts: user-contacts
        sessions: user-sessions
        verificationTokens: user-verification-tokens
  providers:
    - id: email
      type: EmailProvider
      properties:
        maxAge: 1800
        server:
          host: smtp.sendgrid.net
          port: 465
          auth:
            user: apikey
            pass:
              _secret: SENDGRID_API_KEY
        from:
          _secret: AUTH_FROM_ADDRESS
        templateVariables:
          appName: Lowdefy Modules MongoDB Demo
          logoHeight: 80px
  userFields:
    id: user.id
    profile: user.profile
    app_attributes: user.app_attributes
    global_attributes: user.global_attributes
    roles: user.roles
  pages:
    protected: true
    public:
      - "404"
      - notifications-invalid
      - notifications-link
      - router
      - user-account/login
      - user-account/verify-email-request
    roles:
      user-admin:
        - user-admin/*
  api:
    protected: true
    roles:
      user-admin:
        - user-admin/*

modules:
  _ref: modules.yaml

menus:
  _ref: menus.yaml

connections:
  - id: demo-contacts
    type: MongoDBCollection
    properties:
      databaseUri:
        _secret: MONGODB_URI
      collection: user-contacts
  - id: leads-collection
    type: MongoDBCollection
    properties:
      databaseUri:
        _secret: MONGODB_URI
      collection: leads
      write: true
      changeLog:
        collection: log-changes
        meta:
          user:
            _user: true
  # Write side of the reporting demo dataset — seeded by reporting-seed-orders.
  # The reporting module reads the same collection through reporting-analytics
  # (below), which its reporting-data connection is remapped to.
  - id: demo-orders
    type: MongoDBCollection
    properties:
      databaseUri:
        _secret: MONGODB_URI
      collection: demo_orders
      write: true
  # The reporting module's own connections default to REPORTING_MONGODB_URI /
  # REPORTING_DATA_MONGODB_URI so an app can keep reporting storage and its
  # analytics source on separate databases. The demo has one database, so we
  # remap all three module connections (on the reporting module entry) to these
  # MONGODB_URI-backed connections instead of introducing new secrets.
  - id: reporting-reports # module reports-store — saved report specs
    type: MongoDBCollection
    properties:
      databaseUri:
        _secret: MONGODB_URI
      collection: report_layouts
      write: true
  - id: reporting-conversations # module conversations-store — chat conversations
    type: MongoDBCollection
    properties:
      databaseUri:
        _secret: MONGODB_URI
      collection: conversations
      write: true
  - id: reporting-analytics # module reporting-data — read-only analytics source
    type: ReportingData
    properties:
      databaseUri:
        _secret: MONGODB_URI
      # The module binds the collections catalog on its own reporting-data
      # connection via _module.var, but remapping reporting-data onto this
      # app connection replaces that definition — so the catalog must be bound
      # here too, or validatePipeline gets no catalog and rejects every
      # collection. Same file the module var references (modules/reporting/
      # catalog.yaml), so the two can't drift.
      catalog:
        _ref: modules/reporting/catalog.yaml

api:
  - _ref: api/leads-create.yaml
  - _ref: api/leads-update.yaml
  - _ref: api/reporting-seed-orders.yaml
  - _ref: api/reporting-seed-example-report.yaml

pages:
  - _ref: pages/router.yaml
  - _ref: pages/avatar.yaml
  - _ref: pages/user-components-demo.yaml
  - _ref: pages/404.yaml
  - _ref: pages/home.yaml
  - _ref: pages/leads/lead-list.yaml
  - _ref: pages/leads/lead-new.yaml
  - _ref: pages/leads/lead-view.yaml
  # App-owned working surface for the send-quote custom action (Part 28).
  - _ref: pages/leads/quote-builder.yaml
  - _ref: pages/reporting/reporting-demo.yaml
  - _ref: pages/files/files-demo.yaml
