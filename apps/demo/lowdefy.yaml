lowdefy: 0.0.0-experimental-20260723135655
name: Module Demo App
slug: demo

cli:
  watch:
    - ../../modules/shared

theme:
  antd:
    algorithm: compact
    token:
      colorPrimary: "#7c3aed"

config:
  homePageId: router

global:
  enums:
    event_types:
      _ref:
        module: events
        component: event_types

plugins:
  # @lowdefy/community-plugin-mongodb dropped (design task 1): the built-in
  # @lowdefy/connection-mongodb (vendored, supportsJSON) now serves every MongoDB
  # connection/request in the demo — including the companies module's
  # MongoDBInsertConsecutiveId — plus the auth.database MongoDBAuthAdapter. The
  # community plugin is fully superseded; the built-in is auto-included (no pin).
  - name: "@lowdefy/community-plugin-xlsx"
    version: 1.1.0
  - name: "@lowdefy/community-plugin-nodemailer"
    version: 1.1.4
  - name: "@lowdefy/modules-mongodb-plugins"
    version: workspace:*

auth:
  # Protect every page by default. The auth pages (login, signup, accept,
  # verify-email, …) stay public via the roles the user-account module
  # contributes. Without this, every page renders for anonymous visitors and
  # every walled request fails closed for the org-less caller — loud
  # AuthenticationErrors on each page instead of a login redirect.
  pages:
    protected: true
  secret:
    _secret: AUTH_SECRET
  database:
    id: mdb_adapter
    type: MongoDBAuthAdapter
    properties:
      uri:
        _secret: MONGODB_URI
  # Full method matrix so every _build.authConfig-gated branch in the login
  # page and account workspace resolves and builds into a demo artifact (task
  # 01). No real OAuth secrets are needed — ldf:b reads only the config
  # projection.
  emailAndPassword:
    enabled: true
    requireEmailVerification: true
    minPasswordLength: 8
  magicLink:
    enabled: true
    expiresIn: 1800
  twoFactor:
    enabled: true
  passkey:
    enabled: true
    rpId: localhost
    rpName: Module Demo App
  providers:
    - id: google
      type: Google
      properties:
        clientId:
          _secret: GOOGLE_CLIENT_ID
        clientSecret:
          _secret: GOOGLE_CLIENT_SECRET
  # Auth mail (verification, password reset, magic link, invitation) sends
  # through the app SMTP connection referenced here — the connection owns
  # `from`, the transport, and the delivery filter. Requires lowdefy >=
  # experimental-20260723135655 (older experimentals rejected `connectionId`
  # at build while the runtime read nothing else — lowdefy PR #2285).
  email:
    connectionId: email
  # authPages and pages.public are contributed by the user-account module
  # manifest (auth.pages / auth.public); app config would win on collision.
  # Pinned-org policy (design Decision 1): one deployment = one pinned org.
  # The engine ensures this org by slug at startup; the user-admin module's
  # native reads $match on it via `_organization: id`, and org-scoped admin
  # steps default their organizationId to it.
  organizations:
    policy: pinned
    org: demo
    # Open signup: the invite-only default has no first-user bootstrap on a
    # fresh database (nobody exists to send the first invite). The demo is a
    # dev playground and the runtime-verification walkthrough (and the tenant
    # policy) both need self-serve signup. Production apps should choose
    # deliberately.
    signup: open
  # The member role that administers users across the suite. Enforced by the
  # engine as a step-level floor before every auth-owned admin step, and named
  # by the user-admin module's `admin_roles` var for the endpoint gate below.
  userAdminRole: user-admin
  # Authored role catalog (role-catalog design) — the single source of truth for
  # assignable roles, their labels, and help text. Every gate reference and
  # `userAdminRole` must be declared here.
  roles:
    - id: user-admin
      label: User Admin
      description: Administers users across the pinned suite (ban, invite, roles, sessions).
    - id: admin
      label: Admin
      description: Application administrator.
    - id: manager
      label: Manager
      description: Team manager.
    - id: user
      label: User
      description: Standard application user.
  # Defense-in-depth endpoint gate (design Decision 3): the user-admin routine
  # endpoints require the user-admin role. Other endpoints stay as-is (no global
  # `protected` flip). Composes on top of the engine's userAdminRole step-floor.
  api:
    roles:
      user-admin:
        - user-admin/*

modules:
  _ref: modules.yaml

menus:
  _ref: menus.yaml

connections:
  # One transport + delivery filter for every auth email (verification,
  # password reset, magic link, invitation) — referenced by
  # auth.email.connectionId above. SMTP is a framework built-in (no plugin pin).
  - id: email
    type: SMTP
    properties:
      from:
        _secret: AUTH_FROM_ADDRESS
      host: smtp.sendgrid.net
      port: 465
      secure: true
      auth:
        user: apikey
        pass:
          _secret: SENDGRID_API_KEY
  - id: demo-contacts
    type: MongoDBCollection
    properties:
      databaseUri:
        _secret: MONGODB_URI
      collection: user-contacts
  - id: leads-collection
    type: MongoDBCollection
    properties:
      databaseUri:
        _secret: MONGODB_URI
      collection: leads
      write: true
      changeLog:
        collection: log-changes
        meta:
          user:
            _user: true

api:
  - _ref: api/leads-create.yaml
  - _ref: api/leads-update.yaml

pages:
  - _ref: pages/router.yaml
  - _ref: pages/avatar.yaml
  - _ref: pages/user-components-demo.yaml
  - _ref: pages/404.yaml
  - _ref: pages/home.yaml
  - _ref: pages/leads/lead-list.yaml
  - _ref: pages/leads/lead-new.yaml
  - _ref: pages/leads/lead-view.yaml
  # App-owned working surface for the send-quote custom action (Part 28).
  - _ref: pages/leads/quote-builder.yaml
  - _ref: pages/files/files-demo.yaml
