lowdefy: 0.0.0-experimental-20260717123930
name: Module Demo App
slug: demo

cli:
  watch:
    - ../../modules/shared

theme:
  antd:
    algorithm: compact
    token:
      colorPrimary: "#7c3aed"

config:
  homePageId: router

global:
  enums:
    event_types:
      _ref:
        module: events
        component: event_types

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: 3.0.0
  - name: "@lowdefy/community-plugin-xlsx"
    version: 1.1.0
  - name: "@lowdefy/community-plugin-nodemailer"
    version: 1.1.4
  - name: "@lowdefy/modules-mongodb-plugins"
    version: workspace:*

auth:
  secret:
    _secret: AUTH_SECRET
  database:
    id: mdb_adapter
    type: MongoDBAuthAdapter
    properties:
      uri:
        _secret: MONGODB_URI
  # Full method matrix so every _build.authConfig-gated branch in the login
  # page and account workspace resolves and builds into a demo artifact (task
  # 01). No real OAuth secrets are needed — ldf:b reads only the config
  # projection.
  emailAndPassword:
    enabled: true
    requireEmailVerification: true
    minPasswordLength: 8
  magicLink:
    enabled: true
    expiresIn: 1800
  twoFactor:
    enabled: true
  passkey:
    enabled: true
    rpId: localhost
    rpName: Module Demo App
  providers:
    - id: google
      type: Google
      properties:
        clientId:
          _secret: GOOGLE_CLIENT_ID
        clientSecret:
          _secret: GOOGLE_CLIENT_SECRET
  email:
    from:
      _secret: AUTH_FROM_ADDRESS
    provider:
      type: smtp
      properties:
        host: smtp.sendgrid.net
        port: 465
        auth:
          user: apikey
          pass:
            _secret: SENDGRID_API_KEY
  # authPages and pages.public are contributed by the user-account module
  # manifest (auth.pages / auth.public); app config would win on collision.

modules:
  _ref: modules.yaml

menus:
  _ref: menus.yaml

connections:
  - id: demo-contacts
    type: MongoDBCollection
    properties:
      databaseUri:
        _secret: MONGODB_URI
      collection: user-contacts
  - id: leads-collection
    type: MongoDBCollection
    properties:
      databaseUri:
        _secret: MONGODB_URI
      collection: leads
      write: true
      changeLog:
        collection: log-changes
        meta:
          user:
            _user: true

api:
  - _ref: api/leads-create.yaml
  - _ref: api/leads-update.yaml

pages:
  - _ref: pages/router.yaml
  - _ref: pages/avatar.yaml
  - _ref: pages/user-components-demo.yaml
  - _ref: pages/404.yaml
  - _ref: pages/home.yaml
  - _ref: pages/leads/lead-list.yaml
  - _ref: pages/leads/lead-new.yaml
  - _ref: pages/leads/lead-view.yaml
  # App-owned working surface for the send-quote custom action (Part 28).
  - _ref: pages/leads/quote-builder.yaml
  - _ref: pages/files/files-demo.yaml
