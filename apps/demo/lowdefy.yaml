lowdefy: 0.0.0-experimental-20260319101008
name: Module Demo App

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: 2.4.1
  - name: "@lowdefy/community-plugin-xlsx"
    version: 1.1.0
  - name: "@lowdefy/modules-mongodb-plugins"
    version: workspace:*

modules:
  - id: user-admin
    source: "file:../../modules/user-admin"
    # source: github:lowdefy/modules-mongodb/modules/user-admin@v1.0.0
    vars:
      _ref: modules/user-admin/index.yaml

  - id: user-account
    source: "file:../../modules/user-account"
    # source: github:lowdefy/modules-mongodb/modules/user-account@v1.0.0
    vars:
      _ref: modules/user-account/index.yaml

menus:
  - id: default
    links:
      _build.array.concat:
        - - id: home
            type: MenuLink
            pageId: home
            properties:
              title: Home
              icon: AiOutlineHome

        - _ref:
            module: user-admin
            menu: default

        - _ref:
            module: user-account
            menu: default

pages:
  - _ref: pages/home.yaml
