lowdefy: 0.0.0-experimental-20260326075333
name: Module Demo App

cli:
  watch:
    - ../../modules/shared

theme:
  antd:
    # algorithm: dark
    token:
      colorPrimary: '#7c3aed'

config:
  homePageId: router

auth:
  authPages:
    signIn: /user-account/login
    verifyRequest: /user-account/verify-email-request
    error: /user-account/login
  theme:
    brandColor: '#7c3aed'
  adapter:
    id: mdb_adapter
    type: MultiAppMongoDBAdapter
    properties:
      invite:
        required: true
      databaseUri:
        _secret: MONGODB_URI
      appName: demo
      verificationTokens:
        uses: 5
  providers:
    - id: email
      type: EmailProvider
      properties:
        maxAge: 1800
        server:
          host: smtp.sendgrid.net
          port: 465
          auth:
            user: apikey
            pass:
              _secret: SENDGRID_API_KEY
        from:
          _secret: AUTH_FROM_ADDRESS
        templateVariables:
          appName: Lowdefy Modules MongoDB Demo
          logoHeight: 80px
  userFields:
    id: user.id
    profile: user.profile
    app_attributes: user.app_attributes
    global_attributes: user.global_attributes
    roles: user.roles
  pages:
    public: true
  # pages:
  #   protected: true
  #   public:
  #     - user-account/login
  #     - "404"
  #     - user-account/verify-email-request
  #     - router

plugins:
  - name: '@lowdefy/community-plugin-mongodb'
    version: 2.4.1
  - name: '@lowdefy/community-plugin-xlsx'
    version: 1.1.0
  - name: '@lowdefy/community-plugin-nodemailer'
    version: 1.1.4
  - name: '@lowdefy/plugin-aws'
    version: '^4'
  - name: '@lowdefy/modules-mongodb-plugins'
    version: workspace:*

modules:
  - id: layout
    source: 'file:../../modules/layout-header-menu'
    vars:
      auth_page:
        max_width: 380
        logo_max_width: 180
        card_style:
          boxShadow: '0 4px 24px rgba(0, 0, 0, 0.12)'
      footer:
        - id: footer-text
          type: Html
          properties:
            html: |
              <p>Lowdefy Modules MongoDB Demo</p>
              <p>© 2026 Lowdefy. All rights reserved.</p>

  - id: events
    source: 'file:../../modules/events'
    vars:
      collection: log-events
      display_key: demo
      change_stamp:
        user:
          _user: id
        timestamp:
          _date: now

  - id: notifications
    source: 'file:../../modules/notifications'

  - id: user-admin
    source: 'file:../../modules/user-admin'
    # source: github:lowdefy/modules-mongodb/modules/user-admin@v1.0.0
    dependencies:
      layout: layout
      events: events
      notifications: notifications
    vars:
      _ref: modules/user-admin/index.yaml

  - id: user-account
    source: 'file:../../modules/user-account'
    # source: github:lowdefy/modules-mongodb/modules/user-account@v1.0.0
    vars:
      _ref: modules/user-account/index.yaml

  - id: companies
    source: 'file:../../modules/companies'
    dependencies:
      layout: layout
      events: events
      contacts: contacts
      files: files
    vars:
      _ref: modules/companies/index.yaml

  - id: contacts
    source: 'file:../../modules/contacts'
    dependencies:
      layout: layout
      events: events
      companies: companies
      files: files
    vars:
      _ref: modules/contacts/index.yaml

  - id: files
    source: 'file:../../modules/files'
    dependencies:
      events: events
    vars:
      collection: files
      bucket: demo-files-bucket
      s3_region: af-south-1

menus:
  - id: default
    links:
      _build.array.concat:
        - - id: home
            type: MenuLink
            pageId: home
            properties:
              title: Home
              icon: AiOutlineHome

        - _ref:
            module: user-admin
            menu: default

        - _ref:
            module: user-account
            menu: default

        - _ref:
            module: companies
            menu: default

        - _ref:
            module: contacts
            menu: default

pages:
  - _ref: pages/router.yaml
  - _ref: pages/avatar.yaml
  - _ref: pages/404.yaml
  - _ref: pages/home.yaml
