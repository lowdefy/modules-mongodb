lowdefy: 0.0.0-experimental-20260324134638
name: Module Demo App

plugins:
  - name: "@lowdefy/community-plugin-mongodb"
    version: 2.4.1
  - name: "@lowdefy/community-plugin-xlsx"
    version: 1.1.0
  - name: "@lowdefy/plugin-aws"
    version: "^4"
  - name: "@lowdefy/modules-mongodb-plugins"
    version: workspace:*

modules:
  - id: layout
    source: "file:../../modules/layout-header-menu"

  - id: events
    source: "file:../../modules/events"
    vars:
      display_key: demo
      change_stamp:
        user:
          _user: id
        timestamp:
          _date: now

  - id: notifications
    source: "file:../../modules/notifications"

  - id: user-admin
    source: "file:../../modules/user-admin"
    # source: github:lowdefy/modules-mongodb/modules/user-admin@v1.0.0
    dependencies:
      layout: layout
      events: events
      notifications: notifications
    vars:
      _ref: modules/user-admin/index.yaml

  - id: user-account
    source: "file:../../modules/user-account"
    # source: github:lowdefy/modules-mongodb/modules/user-account@v1.0.0
    vars:
      _ref: modules/user-account/index.yaml

  - id: companies
    source: "file:../../modules/companies"
    dependencies:
      layout: layout
      events: events
      contacts: contacts
      files: files
    vars:
      _ref: modules/companies/index.yaml

  - id: contacts
    source: "file:../../modules/contacts"
    dependencies:
      layout: layout
      events: events
      companies: companies
      files: files
    vars:
      _ref: modules/contacts/index.yaml

  - id: files
    source: "file:../../modules/files"
    dependencies:
      events: events
    vars:
      bucket: demo-files-bucket
      s3_region: af-south-1

menus:
  - id: default
    links:
      _build.array.concat:
        - - id: home
            type: MenuLink
            pageId: home
            properties:
              title: Home
              icon: AiOutlineHome

        - _ref:
            module: user-admin
            menu: default

        - _ref:
            module: user-account
            menu: default

        - _ref:
            module: companies
            menu: default

        - _ref:
            module: contacts
            menu: default

pages:
  - _ref: pages/home.yaml
