type: deal-outcome
kind: form
action_group: closing
description: |
  Record the deal outcome — won or lost, with a reason. Stamps `outcome` on the
  deal so the workspace shows the Won/Lost badge.
access:
  demo:
    view: true
    edit: true
form:
  - key: form.outcome_type
    component: button_selector
    title: Outcome
    required: true
    options:
      - label: Won
        value: won
      - label: Lost
        value: lost
  - key: form.reason
    component: text_input
    title: Reason
# Post-submit stamps the deal's `outcome` field (type + reason). The deals
# module's outcome surface reads deal.outcome.* (not the workflow form_data),
# so this hook is what makes the Won/Lost badge appear.
hooks:
  submit:
    post:
      routine:
        - id: stamp_outcome
          type: MongoDBUpdateOne
          connectionId:
            _module.connectionId: { id: deals-collection, module: deals }
          properties:
            filter:
              _id:
                _payload: context.workflow.entity.id
            update:
              - $set:
                  outcome:
                    type:
                      _payload: form.outcome_type
                    reason:
                      _payload: form.reason
                  updated:
                    _ref:
                      module: events
                      component: change_stamp
        - :return:
            deal_id:
              _payload: context.workflow.entity.id
status_map:
  action-required:
    demo:
      message: Record the deal outcome.
  in-progress:
    demo:
      message: Recording the outcome.
  done:
    demo:
      message: Outcome recorded.
