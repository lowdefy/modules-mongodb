# entity_view.slot for the sales-pipeline workflow (read-only). Reads the entity
# fields the workflow's `entity.data` routine returns off get_workflow_action.entity.
# `name` is omitted — it already drives the breadcrumb entity crumb.
- id: deal_detail_slot
  type: SmartDescriptions
  properties:
    column: 1
    size: small
    data:
      _request: get_workflow_action.entity
    fields:
      - id: description
        type: TextInput
        properties:
          title: Description
      - id: sector
        type: TextInput
        properties:
          title: Sector
      - id: status
        type: TextInput
        properties:
          title: Stage
