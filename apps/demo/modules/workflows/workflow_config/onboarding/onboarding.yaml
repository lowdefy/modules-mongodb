type: onboarding
# title omitted — derives to "Onboarding" via humanizeSlug (docs/workflows/reference/authoring-grammar.md#titles).
entity:
  connection_id: leads-collection
  ref_key: lead_ids
  page_id: lead-view
  title: Lead
  # id_query_key omitted — defaults to _id
  # Part 26 — inline routine the module turns into the onboarding-entity-data
  # InternalApi. The action read handlers call it server-side (payload
  # { entity_id }); its reserved `name` key drives the breadcrumb entity crumb,
  # and the rest (email) is read by the entity_view slot off
  # get_workflow_action.entity. The routine names its own connection.
  data:
    routine:
      - id: load_lead
        type: MongoDBAggregation
        connectionId: leads-collection
        payload:
          entity_id:
            _payload: entity_id
        properties:
          pipeline:
            - $match:
                _id:
                  _payload: entity_id
      - :return:
          name:
            _step: load_lead.0.name
          email:
            _step: load_lead.0.email
  # Entity-list breadcrumb link → trail mirrors lead-list / lead-view:
  # Home / Leads / {name} / {workflow} / {action}.
  list_page_id: lead-list
  list_title: Leads

# entity_view.slot (Part 56) — read-only detail rendered as the RHS Details
# section on the onboarding form pages and as the middle review subject on the
# onboarding-check page. Baked into the emitted pages by makeActionPages.
entity_view:
  slot:
    _ref: modules/workflows/workflow_config/onboarding/lead-detail-slot.yaml

display_order: 1

starting_actions:
  - type: qualify
    status: action-required
  - type: send-quote
    status: blocked
  - type: schedule-followup
    status: blocked
  - type: upload-po
    status: blocked
  - type: track-company-setup
    status: blocked
  # site-visit is deliberately absent — conditional, spawned by the
  # qualify pre-submit hook when the user flags a site visit.

# No blocked_by on groups — groups are blocked_by *targets* (an action's
# blocked_by entry may name a group id), never carriers; the engine reads
# blocked_by only on actions. Sequencing lives on the actions below.
# Group titles below override the derived defaults ("Qualification", "Quoting",
# "Order", "Conversion") where the slug humanizes to a less apt label.
action_groups:
  - id: qualification
    title: Qualify
    icon: AiOutlineUserAdd
  - id: quoting
    title: Quote
    icon: AiOutlineFileText
  - id: order
    title: Purchase order
    icon: AiOutlineFileDone
  - id: conversion
    title: Convert to customer
    icon: AiOutlineShop

actions:
  - _ref: modules/workflows/workflow_config/onboarding/qualify.yaml
  - _ref: modules/workflows/workflow_config/onboarding/site-visit.yaml
  - _ref: modules/workflows/workflow_config/onboarding/send-quote.yaml
  - _ref: modules/workflows/workflow_config/onboarding/schedule-followup.yaml
  - _ref: modules/workflows/workflow_config/onboarding/upload-po.yaml
  - _ref: modules/workflows/workflow_config/onboarding/track-company-setup.yaml
