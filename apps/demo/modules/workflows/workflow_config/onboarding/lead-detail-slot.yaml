# entity_view.slot for the onboarding workflow (read-only).
#
# Baked by makeActionPages into the onboarding form pages (RHS Details section) and
# the onboarding-check page (middle review subject). It reads the entity doc the
# baked pages already fetch into the `get_entity` request — display only, NO
# inputs and NO save handlers (Part 56 D6: entity_view is read-only).
- id: lead_detail_slot
  type: Html
  properties:
    html:
      _nunjucks:
        template: |
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; gap: 8px; align-items: baseline;">
              <span style="color: rgba(0, 0, 0, 0.45);">Name:</span>
              <span>{{ name }}</span>
            </div>
            <div style="display: flex; gap: 8px; align-items: baseline;">
              <span style="color: rgba(0, 0, 0, 0.45);">Email:</span>
              <span>{{ email }}</span>
            </div>
          </div>
        on:
          name:
            _request: get_entity.0.name
          email:
            _request: get_entity.0.email
