# entity_view.slot for the onboarding workflow (read-only).
#
# Baked by makeActionPages into the onboarding form pages (RHS Details section) and
# the onboarding-check page (middle review subject). It reads the entity fields the
# workflow's `entity.data` routine returns, surfaced server-side on the
# get_workflow_action response's `entity` object (Part 26 — an object, so no `.0`).
# Display only, NO inputs and NO save handlers (Part 56 D6: entity_view is read-only).
- id: lead_detail_slot
  type: Html
  properties:
    html:
      _nunjucks:
        template: |
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; gap: 8px; align-items: baseline;">
              <span style="color: rgba(0, 0, 0, 0.45);">Name:</span>
              <span>{{ name }}</span>
            </div>
            <div style="display: flex; gap: 8px; align-items: baseline;">
              <span style="color: rgba(0, 0, 0, 0.45);">Email:</span>
              <span>{{ email }}</span>
            </div>
          </div>
        on:
          name:
            _request: get_workflow_action.entity.name
          email:
            _request: get_workflow_action.entity.email
