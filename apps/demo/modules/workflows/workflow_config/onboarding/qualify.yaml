type: qualify
kind: form
action_group: qualification
description: Confirm the lead's details and capture qualification notes.
access:
  demo:
    view: true
    edit: true
form:
  # Keys are full state paths including the form. prefix — field components
  # bind block id verbatim from the key, and the edit template primes/submits
  # the form state subtree. Hooks receive the values under the payload's
  # form bag (without the prefix): _payload: form.site_visit_required.
  - key: form.contact
    component: contact
    title: Contact
    required: true
  - key: form.notes
    component: text_area
    title: Qualification notes
  - key: form.site_visit_required
    component: yes_no_selector
    title: Site visit needed?
hooks:
  submit:
    pre:
      routine:
        - :return:
            actions:
              _if:
                test:
                  _eq:
                    - _payload: form.site_visit_required
                    - true
                then:
                  - type: site-visit
                    signal: activate
                    upsert: true
                else: []
pages:
  edit:
    # Part 36: author-supplied extra button in the floating-actions bar.
    # A full Lowdefy Button block concatenated verbatim after the template's
    # signal buttons — a plain Link, no engine call and no new endpoint, so it
    # exercises the slot end-to-end (validator accepts it; template concats it).
    buttons:
      extra:
        - id: open_help
          type: Button
          layout:
            flex: 0 1 auto
          properties:
            title: Help
            type: link
            icon: QuestionCircleOutlined
          events:
            onClick:
              - id: nav_help
                type: Link
                params:
                  url: https://docs.lowdefy.com
                  newTab: true
status_map:
  action-required:
    demo:
      message: Qualify the lead.
  in-progress:
    demo:
      message: Qualifying the lead.
  done:
    demo:
      message: Lead qualified.
