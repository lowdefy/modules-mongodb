type: send-quote
kind: form
action_group: quoting
blocked_by:
  - qualify
description: Build and send the lead a quote; reviewer approves before send.
access:
  demo:
    view: true
    edit: true
    review:
      - admin
form:
  - key: form.quote_total
    component: number
    title: Quote total
    required: true
  - key: form.notes
    component: text_area
    title: Quote notes
status_map:
  blocked:
    demo:
      message: Awaiting qualification.
  action-required:
    demo:
      message: Build and send the quote.
  in-progress:
    demo:
      message: Quote in progress.
  in-review:
    demo:
      message: Quote awaiting approval.
  changes-required:
    demo:
      message: Reviewer requested changes.
  done:
    demo:
      message: Quote approved and sent.
