type: track-installation
kind: tracker
action_group: g3
sort_order: 20
blocked_by:
  - send-quote
description: Tracks the installation child workflow.
access:
  demo:
    - view
  roles:
    - admin
tracker:
  workflow_type: installation
status_map:
  blocked:
    demo:
      message: Awaiting quote approval.
  in-progress:
    demo:
      message: Installation in progress.
      link:
        pageId:
          _module.pageId:
            id: workflow-overview
            module: workflows
        urlQuery:
          workflow_id: $child_workflow_id
  done:
    demo:
      message: Installation complete.
      link:
        pageId:
          _module.pageId:
            id: workflow-overview
            module: workflows
        urlQuery:
          workflow_id: $child_workflow_id
  not-required:
    demo:
      message: Installation skipped.
