- id: log_pre_submit_event
  type: CallApi
  properties:
    endpointId:
      _module.endpointId:
        id: new-event
        module: events
    payload:
      type: workflow-hook
      display:
        demo:
          title: qualify pre-submit hook fired
      references:
        lead_ids:
          - _payload: context.workflow.entity_id
        action_ids:
          - _payload: action_id
        workflow_ids:
          - _payload: workflow_id
- :return:
    event_overrides:
      display: Lead qualified by demo pre-hook.
