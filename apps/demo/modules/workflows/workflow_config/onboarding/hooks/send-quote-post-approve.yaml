- id: log_post_approve_event
  type: CallApi
  properties:
    endpointId:
      _module.endpointId:
        id: new-event
        module: events
    payload:
      type: workflow-hook
      display:
        demo:
          title: send-quote post-approve hook fired
      references:
        lead_ids:
          - _payload: context.workflow.entity_id
        action_ids:
          - _payload: action_id
        workflow_ids:
          - _payload: workflow_id
- :return:
    message:
      _string.concat:
        - 'Quote approved; event id: '
        - _payload: result.event_id
