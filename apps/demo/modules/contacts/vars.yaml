app_name:
  _ref:
    path: app_config.yaml
    key: app_name
fields:
  show_honorific: true
  profile:
    _ref: modules/shared/profile/fields.yaml
  global_attributes:
    _ref: modules/contacts/global_attributes_fields.yaml
request_stages:
  write: []
event_display:
  demo:
    create-contact: "{{ user.profile.name }} created {{ target.name }}"
    update-contact: "{{ user.profile.name }} updated {{ target.name }}"
# Slot wiring for activities tile (per design decisions.md §7) is the
# intended pattern but is blocked by a Lowdefy framework limitation —
# `_ref { module, component }` inside an entry's vars cannot resolve
# (parseLowdefyYaml walks vars before modules are registered). Until the
# framework defers cross-module refs in app vars, the tile is inlined
# directly in modules/contacts/pages/view.yaml. Re-enable once fixed:
