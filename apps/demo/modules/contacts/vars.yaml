app_name:
  _ref:
    path: app_config.yaml
    key: app_name
fields:
  show_honorific: true
  profile:
    _ref: modules/shared/profile/fields.yaml
  global_attributes:
    _ref: modules/contacts/global_attributes_fields.yaml
request_stages:
  write: []
event_display:
  demo:
    create-contact: "{{ user.profile.name }} created {{ target.name }}"
    update-contact: "{{ user.profile.name }} updated {{ target.name }}"
components:
  sidebar_slots:
    - _ref:
        module: activities
        component: tile_activities
        vars:
          reference_field: contact_ids
          reference_value:
            _url_query: _id
          prefill:
            contact_ids:
              - _url_query: _id
          on_created:
            - id: refetch_events
              type: Request
              params: get-events
