app_name:
  _ref:
    path: app_config.yaml
    key: app_name

label: Deal
label_plural: Deals

# Repointed onto the richer onboarding workflow (task 8, deals-module-rework) —
# the workflows module resolves {workflow_type}-start/-submit endpoints and the
# get_selected_deal workflow lookup off this slug.
workflow_type: onboarding

# Deal pipeline stages (deal.status[].stage). create-deal seeds `prospecting`.
stages:
  prospecting:
    title: Prospecting
    fg: var(--ant-color-primary)
    bd: var(--ant-color-primary-border)
  closing:
    title: Closing
    fg: var(--ant-color-warning)
    bd: var(--ant-color-warning-border)
  complete:
    title: Complete
    fg: var(--ant-color-success)
    bd: var(--ant-color-success-border)

outcomes:
  won:
    title: Won
    fg: var(--ant-color-success)
    bd: var(--ant-color-success-border)
  lost:
    title: Lost
    fg: var(--ant-color-error)
    bd: var(--ant-color-error-border)

# Won/Lost reasons — `outcome` discriminates which set shows for a given outcome.
outcome_reasons:
  price-accepted:
    title: Price accepted
    outcome: won
  best-fit:
    title: Best fit
    outcome: won
  no-budget:
    title: No budget
    outcome: lost
  lost-to-competitor:
    title: Lost to competitor
    outcome: lost

contact_roles:
  main_point_of_contact:
    title: Main point of contact
  decision_maker:
    title: Decision maker
  finance_contact:
    title: Finance contact

# ActionSteps group display config — one entry per group slug the onboarding
# workflow config declares (apps/demo/modules/workflows/workflow_config/onboarding/onboarding.yaml).
action_groups:
  qualification:
    title: Qualify
    order: 1
    icon: AiOutlineUserAdd
  quoting:
    title: Quote
    order: 2
    icon: AiOutlineFileText
  order:
    title: Purchase order
    order: 3
    icon: AiOutlineShoppingCart
  conversion:
    title: Company setup
    order: 4
    icon: AiOutlineBank
  closing:
    title: Closing
    order: 5
    icon: AiOutlineFileDone

# Host-supplied domain fields (module `fields` var). Block ids prefixed
# `attributes.` bind to state.attributes.* — rendered as inputs on the create
# form and read-only on the deal view via SmartDescriptions. These are demo
# (host) config: the generic deals module ships none of them.
fields:
  - id: attributes.material_code
    type: Selector
    properties:
      title: Material
      showSearch: true
      placeholder: Search material / SKU
      options:
        - value: SKU-100
          label: Widget 100 (SKU-100)
        - value: SKU-200
          label: Gadget 200 (SKU-200)
  - id: attributes.product
    type: Selector
    properties:
      title: Product
      placeholder: Select product
      options:
        - value: widget
          label: Widget
        - value: gadget
          label: Gadget
  - id: attributes.customer_type
    type: ButtonSelector
    properties:
      title: Customer Type
      options:
        - value: new-business
          label: New business
        - value: existing
          label: Existing customer
  - id: attributes.project_type
    type: ButtonSelector
    properties:
      title: Project Type
      options:
        - value: project
          label: Project
        - value: additional-volume
          label: Additional Volume
  - id: attributes.sector
    type: Selector
    properties:
      title: Sector
      options:
        - value: manufacturing
          label: Manufacturing
        - value: services
          label: Services
    events:
      onChange:
        - id: reset_sub_sector
          type: SetState
          params:
            attributes.sub_sector: null
  - id: attributes.sub_sector
    type: Selector
    properties:
      title: Sub-sector
      options:
        - value: automotive
          label: Automotive
        - value: food-and-beverage
          label: Food & beverage
        - value: consulting
          label: Consulting
  - id: attributes.package
    type: ButtonSelector
    properties:
      title: Package
      options:
        - value: small
          label: Small
        - value: medium
          label: Medium
        - value: large
          label: Large
        - value: bulk
          label: Bulk

# Sector is a deal field now (rendered via the `fields` SmartDescriptions
# section). company_fields carries genuine company-scoped display rows — here,
# the linked company's Industry, read off the joined company doc.
company_fields:
  - label: Industry
    value:
      _if_none:
        - _request: get_selected_deal.0.company.attributes.industry
        - "—"
# Value + close date come from the raw fields a workflow stamps onto the deal,
# formatted here with this app's $ currency.
meta_fields:
  - label: Value
    value:
      _nunjucks:
        template: "{% if value %}${{ value }}{% else %}—{% endif %}"
        on:
          value:
            _request: get_selected_deal.0.value
  - label: Commercialisation Date
    value:
      _nunjucks:
        template: "{% if close %}{{ close | date('D MMM YYYY') }}{% else %}—{% endif %}"
        on:
          close:
            _request: get_selected_deal.0.close_date
filters: []

# Drives both the list-page card and the workspace switcher card; raw
# deal_value formatted with this app's $ currency.
card_fields:
  - path: salesperson_name
  - path: deal_value
    prefix: "$"
    round: true
    highlight: true
  - path: expected_close_date
    prefix: "close "
    date_format: MMM YYYY
