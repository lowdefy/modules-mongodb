app_name:
  _ref:
    path: app_config.yaml
    key: app_name

workflow_type: sales-pipeline

# Deal pipeline stages (deal.status[].stage). create-deal seeds `prospecting`.
stages:
  prospecting:
    title: Prospecting
    fg: var(--ant-color-processing)
    bd: var(--ant-color-processing-border)
  closing:
    title: Closing
    fg: var(--ant-color-warning)
    bd: var(--ant-color-warning-border)
  complete:
    title: Complete
    fg: var(--ant-color-success)
    bd: var(--ant-color-success-border)

outcomes:
  won:
    title: Won
    fg: var(--ant-color-success)
    bd: var(--ant-color-success-border)
  lost:
    title: Lost
    fg: var(--ant-color-error)
    bd: var(--ant-color-error-border)

# Won/Lost reasons — `outcome` discriminates which set shows for a given outcome.
outcome_reasons:
  price-accepted:
    title: Price accepted
    outcome: won
  best-fit:
    title: Best fit
    outcome: won
  no-budget:
    title: No budget
    outcome: lost
  lost-to-competitor:
    title: Lost to competitor
    outcome: lost

contact_roles:
  main_point_of_contact:
    title: Main point of contact
  decision_maker:
    title: Decision maker
  finance_contact:
    title: Finance contact

action_groups:
  prospecting:
    title: Prospecting
  closing:
    title: Closing

customer_types:
  new-business:
    title: New business
    definition: A company we have not sold to before.
  existing:
    title: Existing customer
    definition: An expansion or repeat deal with a current customer.

sectors:
  manufacturing:
    title: Manufacturing
  services:
    title: Services

sub_sectors:
  automotive:
    title: Automotive
    sector: manufacturing
  food-and-beverage:
    title: Food & beverage
    sector: manufacturing
  consulting:
    title: Consulting
    sector: services

products:
  widget:
    title: Widget
  gadget:
    title: Gadget

# Material/SKU → product hierarchy (L2 › L3 › L4). Drives the create form's
# Material selector and the auto-filled hierarchy.
product_hierarchy:
  SKU-100:
    title: Widget 100
    l2: Widgets
    l3: Standard Widgets
    l4: Widget 100
  SKU-200:
    title: Gadget 200
    l2: Gadgets
    l3: Premium Gadgets
    l4: Gadget 200

company_fields: []
meta_fields: []
filters: []

card_fields:
  - path: salesperson_name
  - path: value_label
    highlight: true

components:
  info_grid_slots:
    _ref: modules/deals/tiles/product_volumes.yaml
