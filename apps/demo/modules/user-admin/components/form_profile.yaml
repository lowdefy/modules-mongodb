id: form_profile
type: Box
layout:
  gap: 8
blocks:
  - id: user.profile.title
    type: Selector
    layout:
      span: 4
    properties:
      label: Title
      options:
        - Mr
        - Ms
        - Mrs
        - Dr
        - Prof
  - id: user.profile.given_name
    type: TextInput
    required: true
    layout:
      span: 10
    properties:
      label: First Name
  - id: user.profile.family_name
    type: TextInput
    required: true
    layout:
      span: 10
    properties:
      label: Last Name
  - id: user.profile.phone
    type: TextInput
    properties:
      label: Phone Number
  - id: user.profile.department
    type: Selector
    properties:
      label: Department
      options:
        - label: Engineering
          value: engineering
        - label: Operations
          value: operations
        - label: Finance
          value: finance
