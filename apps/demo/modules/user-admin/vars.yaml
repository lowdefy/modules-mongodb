# user-admin module vars (BetterAuth rebuild). No app_name / roles / app_domain:
# per-app scoping, the module role list, and app-built invite links all retired
# (design Decisions 1, 7, 8). Roles now come from the app's auth.roles catalog.
admin_roles:
  - user-admin
suspension: true
impersonation: false
download: true
fields:
  show_honorific: true
  profile:
    _ref: modules/shared/profile/fields.yaml
  user_attributes:
    _ref: modules/user-admin/user_attributes_fields.yaml
  member_attributes:
    _ref: modules/user-admin/member_attributes_fields.yaml
components:
  # Worked example of the `table_columns` slot: a custom column injected between
  # the built-in content columns and the audit-date columns on the Members list.
  table_columns:
    - headerName: Department
      field: department
      width: 140
request_stages:
  write: []
