# Demo dispatch routine for the notifications module's send-notification
# endpoint. Two aggregation branches on the events collection shape
# notification ITEMS (recipient contact + template data + page links), then
# CallApi the module's dispatch-notifications pipeline, which renders the
# app's `notifications:` template, stores the record with dedup, and sends
# the email. An empty $match shapes nothing, so every other event type is a
# silent no-op (dispatch-notifications loops zero items).
# See designs/demo-notifications/design.md.
- id: shape_quote_approved
  type: MongoDBAggregation
  connectionId:
    _module.connectionId:
      id: events-collection
      module: events
  properties:
    pipeline:
      # ── select the handled events ──
      - $match:
          _id:
            $in:
              _payload: event_ids
          type: action-approve
          metadata.action_type: send-quote
      # ── join the send-quote action (action_ids may include
      #    cascade-touched actions, so filter by type) ──
      # The new-event endpoint flattens the `references` payload onto the event
      # doc's top level (_object.assign), so reference arrays are top-level
      # fields (action_ids, lead_ids, …), not nested under `references`.
      - $lookup:
          from: actions
          let:
            action_ids: $action_ids
          pipeline:
            - $match:
                $expr:
                  $and:
                    - $in:
                        - $_id
                        - $$action_ids
                    - $eq:
                        - $type
                        - send-quote
          as: quote_action
      - $set:
          quote_action:
            $first: $quote_action
      # ── recipient: the submit transition's user (last in-review entry) ──
      - $set:
          recipient_id:
            $let:
              vars:
                submit_entry:
                  $last:
                    $filter:
                      input: $quote_action.status
                      as: entry
                      cond:
                        $eq:
                          - $$entry.stage
                          - in-review
              in: $$submit_entry.created.user.id
      # ── embed the recipient contact ──
      - $lookup:
          from: user-contacts
          localField: recipient_id
          foreignField: _id
          as: recipient_contact
      - $set:
          recipient_contact:
            $first: $recipient_contact
      # ── shape the notification item ──
      - $project:
          _id: 0
          key:
            $concat:
              - $_id
              - ":"
              - $recipient_id
              - ":"
              - $dateToString:
                  date: $created.timestamp
          contact:
            _id: $recipient_contact._id
            email: $recipient_contact.email
            profile:
              name: $recipient_contact.profile.name
          approver_name: $created.user.name
          links:
            button:
              pageId: lead-view
              urlQuery:
                _id:
                  $first: $lead_ids
- id: dispatch_quote_approved
  type: CallApi
  properties:
    endpointId:
      _module.endpointId:
        id: dispatch-notifications
        module: notifications
    payload:
      notification_id: quote-approved
      items:
        _step: shape_quote_approved

# Invite notifications are no longer shaped here: the user-admin module ships
# its own invite-user / resend-user-invite templates and dispatches them
# directly from its invite endpoints (_module.notificationId). Records carry
# the scoped type user-admin/invite-user.
