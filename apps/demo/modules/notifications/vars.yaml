app_name:
  _ref:
    path: app_config.yaml
    key: app_name
send_routine:
  _ref: modules/notifications/send-routine.yaml
# Origin for email link URLs — point at the deployed origin in production.
server_url: http://localhost:3000
# SMTP transport for notification emails, reusing the auth provider's
# SendGrid relay credentials (apps/demo/lowdefy.yaml auth.providers).
email:
  host: smtp.sendgrid.net
  port: 465
  secure: true
  user: apikey
  pass:
    _secret: SENDGRID_API_KEY
  from:
    _secret: AUTH_FROM_ADDRESS
