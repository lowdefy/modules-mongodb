app_name:
  _ref:
    path: app_config.yaml
    key: app_name
label: Company
label_plural: Companies
hierarchy:
  enabled: true
fields:
  registration:
    _ref: ../../modules/companies/field-presets/registration-sa.yaml
  contact:
    _ref: ../../modules/companies/field-presets/contact-default.yaml
  address:
    _ref: ../../modules/companies/field-presets/address-text.yaml
  attributes:
    - id: attributes.industry
      type: Selector
      properties:
        title: Industry
        options:
          - Manufacturing
          - Services
          - Retail
event_display:
  demo:
    create-company: "{{ user.profile.name }} created {{ target.name }}"
    update-company: "{{ user.profile.name }} updated {{ target.name }}"
components:
  sidebar_slots:
    - _ref:
        module: activities
        component: tile_activities
        vars:
          reference_field: company_ids
          reference_value:
            _url_query: _id
          prefill:
            company_ids:
              - _url_query: _id
          on_created:
            - id: refetch_events
              type: Request
              params: get-events
