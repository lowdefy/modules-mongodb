display_key:
  _ref:
    path: app_config.yaml
    key: app_name
contact_page_url: "/contacts/view?_id={id}"
event_types:
  _ref: modules/events/event_types.yaml
change_stamp:
  timestamp:
    _date: now
  user:
    name:
      _if_none:
        - _user: profile.name
        - _var: default_name
    id:
      _if_none:
        - _user: id
        - _var: default_id
  app_name:
    _ref:
      path: app_config.yaml
      key: app_name
  version:
    app:
      _ref:
        path: package.json
        key: version
    lowdefy:
      _ref:
        path: package.json
        key: dependencies.lowdefy
