app_name:
  _ref:
    path: app_config.yaml
    key: app_name
event_display:
  demo:
    create-activity: "{{ user.profile.name }} logged a {{ target.type_label }}: {{ target.title }}"
    update-activity: "{{ user.profile.name }} updated a {{ target.type_label }}: {{ target.title }}"
    complete-activity: "{{ user.profile.name }} completed a {{ target.type_label }}: {{ target.title }}"
    cancel-activity: "{{ user.profile.name }} cancelled a {{ target.type_label }}: {{ target.title }}"
    reopen-activity: "{{ user.profile.name }} reopened a {{ target.type_label }}: {{ target.title }}"
    delete-activity: "{{ user.profile.name }} deleted a {{ target.type_label }}: {{ target.title }}"

# --- PR #93 extension points, exercised for the demo ---------------------
#
# Type behavior flags: a consumer-registered "Site Visit" type made fully
# meeting-like via flags — `agenda` (Agenda Topics section), `duration`
# (Duration meta field), and a `contact_label` retitling the contacts
# selector. No code change keys off the type id; the built-ins keep their
# own flags as defaults.
activity_types:
  site_visit:
    title: Site Visit
    color: "#fa8c16"
    icon: AiOutlineEnvironment
    default_stage: done
    type: complex
    agenda: true
    duration: true
    contact_label: Attendees

fields:
  # Global custom fields — render for every type that has no per-type list.
  attributes:
    - id: attributes.outcome
      type: TextInput
      properties:
        title: Outcome
  # Per-type custom fields — a type with an entry renders this list instead
  # of the global `attributes` array (form + detail view); other types fall
  # back to the global list.
  attributes_by_type:
    site_visit:
      - id: attributes.site_ref
        type: TextInput
        properties:
          title: Site Reference
      # Request-backed field: options come from `form_requests` below, so it
      # only works on the full new/edit pages. Gate on activity_form_context
      # == page to keep it out of the capture modal and the read-only view.
      - id: attributes.lead_id
        type: Selector
        visible:
          _eq:
            - _state: activity_form_context
            - page
        properties:
          title: Related Lead
          options:
            _request: selector_leads

# Option source for the request-backed `attributes.lead_id` field above.
# Spliced into the new/edit page request lists and fired on page init; not
# added to the capture modal (a modal can't own page requests).
form_requests:
  - id: selector_leads
    type: MongoDBAggregation
    connectionId: leads-collection
    properties:
      pipeline:
        - $match:
            deleted:
              $ne: true
        - $project:
            _id: 0
            value: "$_id"
            label: "$name"
        - $sort:
            label: 1

# Post-create hook: runs after every successful create (new page + capture
# modal) with the new activity id at `_state: activity_id`. This one just
# surfaces a toast; it leaves `on_created_handled` unset, so the built-in
# reset + navigate-to-view tail still runs on the new page.
hooks:
  on_created:
    - id: activity_created_toast
      type: Message
      params:
        status: info
        content:
          _string.concat:
            - "on_created hook fired for activity "
            - _state: activity_id

# Attachment slots (`components.form_attachments` / `components.view_attachments`)
# are left at their defaults, which wire the files module's file-manager /
# file-card — the demo already exercises those slots through the defaults.
