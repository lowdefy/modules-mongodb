# user-account contributes the auth pages (login, onboarding, logout, …) and the
# authPages / pages.public wiring this app's passwordless auth relies on. layout
# and events are its declared dependencies; layout in turn depends on
# notifications, so all four modules are wired.
- id: user-account
  source: "file:../../modules/user-account"
  vars:
    _ref: modules/user-account/vars.yaml

- id: layout
  source: "file:../../modules/layout"
  vars:
    _ref: modules/layout/vars.yaml

- id: events
  source: "file:../../modules/events"
  vars:
    _ref: modules/events/vars.yaml

- id: notifications
  source: "file:../../modules/notifications"
  vars:
    _ref: modules/notifications/vars.yaml
